 pd_hive_military: "초월체 행성"
 pd_hive_military_desc: "이 행성은 군체 의식의 핵심 중추로서 기능하며, 외부의 영향력과 위협을 차단하기 위해 단단히 방비되어 있습니다. 막강한 방어막이 행성을 감싸고 있고, 전사 드론들이 준비 태세를 갖추어 행성을 보호하고 있습니다."
 pd_machine_military: "연결체 행성"
 pd_machine_military_desc: "이 행성 단위 유닛은 기계 지능의 운영 체계에 필수적입니다. 외부 간섭으로부터 보호되며, 무적의 방어 체계로 둘러싸여 있습니다. 전투 유닛들은 항상 준비 태세를 갖추고 있으며, 단위의 무결성을 보존하고 있습니다."