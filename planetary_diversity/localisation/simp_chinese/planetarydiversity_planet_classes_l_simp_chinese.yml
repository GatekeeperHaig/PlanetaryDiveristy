 pc_pd_peatland: "泥炭地星球"
 pc_pd_peatland_desc: "拥有氮氧大气层的岩石星球，广袤的泥炭地横跨整片大陆。厚如绒毯的苔藓与腐解的植被交织成一层充满生机的表壳，其中蕴藏着海量的有机物质，如缓慢的潮汐一般，向空中吞吐着气体与水汽。"
 pc_pd_peatland_adj: "泥炭"
