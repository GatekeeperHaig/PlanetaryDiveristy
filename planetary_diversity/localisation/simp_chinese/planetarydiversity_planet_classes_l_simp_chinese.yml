 pc_pd_carotene: "胡萝卜素星球"
 pc_pd_carotene_desc: "浩瀚的平原与丘陵上长满了富含类胡萝卜素的植被，使整片地貌沐浴在琥珀色与赭色之中。尽管以叶绿素为基础的生命在此近乎绝迹，该星球温和的气候依然孕育出了一个多姿多彩且坚韧稳定的生物圈。"
