 pc_pd_dust: "沙暴星球"
 pc_pd_dust_desc: "这个荒漠世界不稳定的水分循环和强劲的气流，驱动着巨大的尘埃锋面掠过地表。这些风暴缓慢而猛烈地席卷整个星球，掩埋原有地形，改变着此处的地表形态。"
 pc_pd_dust_adj: "沙尘"
