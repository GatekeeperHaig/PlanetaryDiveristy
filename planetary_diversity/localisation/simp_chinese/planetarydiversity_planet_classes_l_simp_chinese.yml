 pc_pd_kelp: "巨藻星球"
 pc_pd_kelp_desc: "拥有氮氧大气层和广阔的水圈的岩石星球。其大部分地表被海洋覆盖，海中遍布着茂密的巨藻林。"
 pc_pd_kelp_adj: "巨藻"
