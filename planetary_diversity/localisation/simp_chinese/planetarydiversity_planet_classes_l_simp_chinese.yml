 trait_pc_pd_dust_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_volcanic_pd: "火山星球"
 pc_volcanic_pd_desc: "这是地表火山遍布的岩石星球。大气层相当稀薄，或者完全没有大气；星球内部的高烈度地质活动造成了持续的火山喷发。这类星球没法维持有机生命的存在。有时能看到地表上涌起高达500千米的硫磺喷流。"
 pc_pd_ravine: "山涧星球"
 pc_pd_ravine_desc: "这颗高山星球被庞大的沟壑网络所割裂，深邃的峡谷直抵地壳。高山冰川的融水化作无数溪流，蜿蜒穿梭于深谷与绝壁之中；恒久不息的侵蚀，最终雕凿出这番壮丽的景观。"
 mod_pc_pd_ravine_habitability: "高山星球宜居性"
 trait_pc_pd_ravine_preference: "高山星球偏好"
 trait_pc_pd_ravine_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_thunder: "雷暴星球"
 pc_pd_thunder_desc: "这个热带世界几乎无时无刻不在经受雷暴的侵袭。密集的云盖和持续的降雨为巨大的风暴系统提供了能量，这些风暴在海洋和丛林上空无休止地翻滚扫过，从而形成了一个极其活跃的水文循环系统。"
 pc_pd_thunder_adj: "雷雨"
 mod_pc_pd_thunder_habitability: "热带星球宜居性"
 trait_pc_pd_thunder_preference: "热带星球偏好"
 trait_pc_pd_thunder_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_superbloom: "繁花星球"
 pc_pd_superbloom_desc: "拥有氮氧大气的干旱岩石星球。肥沃的土壤与罕见却猛烈的季节性降雨相遇，在地表唤醒了连绵不绝的花海。繁花似锦的植被如浪潮般翻涌，像地毯一样铺满了平原与谷底。"
 pc_pd_superbloom_adj: "繁花"
 mod_pc_pd_superbloom_habitability: "干旱星球宜居性"
