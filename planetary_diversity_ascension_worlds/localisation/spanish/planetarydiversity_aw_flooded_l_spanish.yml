#Flooded/Aquatic Planets
 decision_pd_aw_flood_planet: "Expandir Mar Planetario"
 decision_pd_aw_flood_planet_desc: "Este planeta oceánico tiene el potencial de ser un hogar ideal para nuestro pueblo. Ajustando los niveles del mar y trasladando las ciudades bajo el agua, podemos asegurarnos de que la vida florezca para quienes están adaptados a vivir bajo las olas."
 decision_pd_aw_flood_planet_tooltip: "El hielo será extraído de sistemas con una §Y$sm_ice_mining_station$§!\nModificador §Y$pd_aw_flooded_planet$§! añadido:\n$pd_aw_flooded_planet_tooltip$"
 flooded_planet_tooltip: "$MOD_PLANET_MAX_DISTRICTS_ADD$: §G+3§!\n$MOD_LOGISTIC_GROWTH_MULT$: §G+10%§!\n$mod_planet_jobs_produces_mult$: §G+5%§!\nHabitabilidad §YNo Acuática§!: §R-20%§!"
 decision_pd_aw_unflood_planet: "Desanegar Planeta"
 decision_pd_aw_unflood_planet_desc: "Este planeta oceánico tiene el potencial de ser un hogar ideal para nuestro pueblo. Bajando los niveles del mar y trasladando las ciudades a islas, podemos asegurarnos de que la vida florezca para quienes están adaptados a vivir sobre las olas."
 decision_pd_aw_flood_ringworld: "Anegar Mundo Anular"
 decision_pd_aw_flood_ringworld_desc: "Este mundo anular tiene el potencial de ser un hogar ideal para nuestro pueblo. Ajustando los niveles del mar y trasladando las ciudades bajo el agua, podemos asegurarnos de que la vida florezca para quienes están adaptados a vivir bajo las olas."
 decision_pd_aw_unflood_ringworld: "Desanegar Mundo Anular"
 decision_pd_aw_unflood_ringworld_desc: "Este mundo anular tiene el potencial de ser un hogar ideal para nuestro pueblo. Bajando los niveles del mar y trasladando las ciudades de vuelta a tierra, podemos asegurarnos de que la vida florezca para quienes están adaptados a vivir sobre las olas."
 decision_pd_aw_unflood_habitat: "Desanegar Hábitat"
 decision_pd_aw_unflood_habitat_desc: "Este hábitat tiene el potencial de ser un hogar ideal para nuestro pueblo. Drenando este hábitat, podemos asegurarnos de que la vida florezca para quienes están adaptados a vivir sobre las olas."
 decision_pd_aw_flood_habitat_tooltip: "Habitabilidad: §R-20%§!\nConsiderado un mundo §YOceánico§! para las especies §YAcuáticas§!.\nEl hielo será extraído de un sistema con una §Y$sm_ice_mining_station$§! en la base estelar."

 flooded_habitat: "Anegado"
 flooded_habitat_desc: "Engullido por el agua, este mundo es un entorno idílico para los habitantes acuáticos."
 pd_aw_flooded_planet_tooltip: "$MOD_PLANET_MAX_DISTRICTS_ADD$: §G+3§!\n$MOD_LOGISTIC_GROWTH_MULT$: §G+10%§!\n$mod_planet_jobs_produces_mult$: §G+5%§!\nHabitabilidad §YNo Acuática§!: §R-20%§!"

 pd_aw_flooded_planet: "Mundo Inundado"
 pd_aw_flooded_planet_desc: "Este planeta oceánico es un hogar ideal para las especies acuáticas. La vida florece para quienes están adaptados a vivir bajo las olas."
 pd_aw_flooded_habitat: "Hábitat Inundado"
 pd_aw_flooded_habitat_desc: "Este hábitat ha sido inundado con agua, imitando el entorno natural de las criaturas Acuáticas."

 ICE_MINING_PLANET_SUCCESS_TITLE: "Planeta Inundado"
