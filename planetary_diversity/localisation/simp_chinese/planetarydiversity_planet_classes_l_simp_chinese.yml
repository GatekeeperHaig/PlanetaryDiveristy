 pc_pd_fungal: "蕈菌星球（热带）"
 pc_pd_fungal_desc: "潮湿的岩石星球，被厚重的氮氧大气包裹，时有丰沛的雨季。陆地被真菌植被覆盖，充满生机。"
 pc_pd_fungal_adj: "蕈菌"
 mod_pc_pd_fungal_habitability: "热带星球宜居性"
