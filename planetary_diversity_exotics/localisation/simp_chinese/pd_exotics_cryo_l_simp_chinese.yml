 ap_pd_cryothermal_engineering: "低温热学工程"
 ap_pd_cryothermal_engineering_desc: "要在低温环境中繁荣发展，仅靠更保暖的衣物是不够的，还需要材料、生物学和化学领域的根本性革新。我们正在开拓这门关于寒冷的科学。"
 ap_pd_cryothermal_workforce_effect: "$mod_pop_pdexotic_cryo_chemist_bonus_workforce_mult$: §G+20%§!"
 ap_pd_cryothermal_workforce_drone_effect: "$mod_pop_pdexotic_cryo_chemist_drone_bonus_workforce_mult$: §G+20%§!"
 ap_pd_cryothermal_workforce_machine_effect: "$mod_pop_pdexotic_cryo_chemist_machine_bonus_workforce_mult$: §G+20%§!"
 ap_pd_cryothermal_engineered_planets_effect: "你帝国境内的['concept_pd_cryogenic_planets']会获得§Y$pd_cryothermal_engineered_planet$§!修正。"
 concept_pd_cryogenic_planet: "深冷星球"
 concept_pd_cryogenic_planets: "深冷星球"
 concept_pd_cryogenic_planet_desc: "$concept_pd_cryogenic_planet$的生物圈建立在低温化学之上，而不依靠液态水。这类星球包括：$NEW_LINE$—$pc_pd_ammonia$$NEW_LINE$—$pc_pd_methane$$NEW_LINE$—$pc_pd_nitrogen$"
 pd_cryothermal_workforce: "低温热学劳力优化"
 pd_cryothermal_workforce_desc: "$pd_cryothermal_workforce_shared_desc$"
 pd_cryothermal_workforce_drone: "$pd_cryothermal_workforce$"
 pd_cryothermal_workforce_drone_desc: "$pd_cryothermal_workforce_shared_desc$"
 pd_cryothermal_workforce_machine: "$pd_cryothermal_workforce$"
 pd_cryothermal_workforce_machine_desc: "$pd_cryothermal_workforce_shared_desc$"
 pd_cryothermal_workforce_shared_desc: "大气适应培训、强化工具和特种氢化物供应链，可提升每个培养槽作业团队的生产力。"
 pd_cryothermal_engineered_planet: "低温热学工程改造"
 pd_cryothermal_engineered_planet_desc: "适应大气环境的基础设施与超低温处理生产线，使该星球能够越过自然环境的限制，承载密度更高的定居点。"
 mod_pop_pdexotic_cryo_chemist_bonus_workforce_mult: "[pdexotic_cryo_chemist.GetName] $MOD_POP_BONUS_WORKFORCE_MULT$"
 mod_pop_pdexotic_cryo_chemist_drone_bonus_workforce_mult: "[pdexotic_cryo_chemist_drone.GetName] $MOD_POP_BONUS_WORKFORCE_MULT$"
 mod_pop_pdexotic_cryo_chemist_machine_bonus_workforce_mult: "[pdexotic_cryo_chemist_machine.GetName] $MOD_POP_BONUS_WORKFORCE_MULT$"
 tech_pd_pressure_suits: "压力服"
 tech_pd_pressure_suits_desc: "经过强化的耐寒真空服与大气密封栖息地，使我们的殖民者能够承受其他星球的含氧量、压力和热度。反过来，其他物种也能在我们的大气中生存。"
 tech_pd_pressure_suits_effect_title: "§H解锁殖民：§!['concept_pd_cryogenic_planet']（非深冷物种）"
 tech_pd_pressure_suits_effect_desc: "§H深冷栖息地§!\n加压栖息地与耐寒真空服使得依赖氧气呼吸的殖民者能够在甲烷、氨和氮的大气环境中维持生存。"
 tech_pd_cryoforming: "深冷改造"
 tech_pd_cryoforming_desc: "低温化学与大气改造的进步，赋予了我们将生物圈拓展至其他星球的能力，而那些星球本就不可能自然形成此类生物圈。温和的星球可被重塑成我们族群所需的，寒冷而稠密的大气环境。"
 tech_pd_cryoforming_effect_title: "§H解锁特性：§!深冷环境改造"
 tech_pd_cryoforming_effect_desc: "允许我们将气候温和的星球改造为氨星球、甲烷星球与氮星球。"
 tech_pd_cryogenic_terraforming_effect_title: "§H解锁特性：§!深冷环境改造"
 tech_pd_cryogenic_terraforming_effect_desc: "允许我们将星球、甲烷星球与氮星球改造为气候温和的星球。"
 decision_pd_exotic_habitat_add_ammonia_atmosphere: "灌注氨大气"
 decision_pd_exotic_habitat_add_ammonia_atmosphere_desc: "向栖息地生命维持系统充入氨气与氮气，以便我们的种族在此定居。大气成分转变完成后，只有适应深冷环境的物种才能在其内部生存。"
 decision_pd_exotic_habitat_remove_ammonia_atmosphere: "排除氨大气"
 decision_pd_exotic_habitat_remove_ammonia_atmosphere_desc: "清除这个栖息地中的氨大气，替换为常规的含氧混合气体。此后，依赖深冷环境的物种将无法在此定居。"
 decision_pd_exotic_habitat_add_methane_atmosphere: "灌注甲烷大气"
 decision_pd_exotic_habitat_add_methane_atmosphere_desc: "向栖息地生命维持系统充入氮气与甲烷，以便我们的种族在此定居。大气成分转变完成后，只有适应深冷环境的物种才能在其内部生存。"
 decision_pd_exotic_habitat_remove_methane_atmosphere: "排除甲烷大气"
 decision_pd_exotic_habitat_remove_methane_atmosphere_desc: "清除这个栖息地中的甲烷大气，替换为常规的含氧混合气体。此后，依赖深冷环境的物种将无法在此定居。"
 decision_pd_exotic_habitat_add_nitrogen_atmosphere: "灌注氮大气"
 decision_pd_exotic_habitat_add_nitrogen_atmosphere_desc: "向栖息地生命维持系统充入低温高压的纯氮，以便我们的种族在此定居。大气成分转变完成后，只有适应深冷环境的物种才能在其内部生存。"
 decision_pd_exotic_habitat_remove_nitrogen_atmosphere: "排除氮大气"
 decision_pd_exotic_habitat_remove_nitrogen_atmosphere_desc: "清除这个栖息地中的低温氮大气，替换为常规的含氧混合气体。此后，依赖深冷环境的物种将无法在此定居。"
 d_pd_cryo_clathrate_pockets: "水合物矿囊"
 d_pd_cryo_clathrate_pockets_desc: "挥发性气体被封存在由水冰和氨冰构成的笼状结构内部。在开采热量的作用下，这些晶格会分解，释放出可供利用的微粒。"
 d_pd_cryo_volatile_geyser_fields: "挥发间歇泉原野"
 d_pd_cryo_volatile_geyser_fields_desc: "广袤的平原上，高压挥发物从冰壳的裂隙中喷涌而出。这些喷发物会在地表沉积出稳定存在的可精炼微粒。"
 d_pd_cryo_cryocrystal_caverns: "冰晶洞穴"
 d_pd_cryo_cryocrystal_caverns_desc: "地下洞穴中分布着仅在极寒环境中才能形成的稀有结晶格架。只要周遭的冰层不受扰动，这些沉积物便能保持稳定。"
 d_pd_cryo_cryocrystal_spires: "冰晶尖塔"
 d_pd_cryo_cryocrystal_spires_desc: "地表历经数千年缓慢沉淀而成的针状稀有晶簇。每一根晶柱都可采集开采出大量的稀有水晶。"
 d_pd_cryo_gas_seeps: "冰封的气体渗漏区"
 d_pd_cryo_gas_seeps_desc: "异星天然气从冰层下方的裂缝中缓慢渗出。产量不大，却会从周遭区域稳定出产。"
 d_pd_cryo_gas_columns: "冰封的气柱"
 d_pd_cryo_gas_columns_desc: "异星天然气从深层地下储层中持续喷涌而出，形成高耸的气柱。其产量足以媲美较温暖行星上最大的气田。"
 d_pd_cryo_betharian_deposit: "冰封的贝塞里安平原"
 d_pd_cryo_betharian_deposit_desc: "广袤的深层冰川中封存着贝塔里安石。在解冻并加工之前，这些矿藏始终处于惰性状态。"
 d_pd_cryo_alien_pets_deposit: "低温动物的庇护所谷地"
 d_pd_cryo_alien_pets_deposit_desc: "一片受保护的低地，本土的寒带动物在此异常繁盛。当地的野生动物性情温顺，非常适合作为伴侣。"
 d_pd_cryo_toxic_mire: "£blocker£有毒低温沼泽"
 d_pd_cryo_toxic_mire_desc: "广阔的化学活性泥泞地带，富集了冰点状态的有毒化合物。在这片受污染的地形上，无法安全建造定居设施。"
 d_pd_cryo_glacier_wall: "£blocker£寒冷冰墙"
 d_pd_cryo_glacier_wall_desc: "古老、致密、巨大的冰墙横亘大地。冰体厚重且不稳定，未经专门清理则无法施工。"
 tech_pd_cryo_toxic_mire: "低温沼泽治理"
 tech_pd_cryo_toxic_mire_desc: "利用化学中和液与低温净化器，我们能够排干并净化深冷星球上的有毒沼泽。改造后的土地可以安全地进行开发建设。"
 tech_pd_cryo_glacier_wall: "深冷冰川钻探"
 tech_pd_cryo_glacier_wall_desc: "加热钻探平台与聚能炸药可以钻穿阻碍深冷星球殖民开发的致密冰墙。清理队能在远短于自然融化所需的时间内，开辟出可通行的地形。"