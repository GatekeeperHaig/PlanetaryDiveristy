 district_pd_fortress_arcology_urban_1_desc: "요새화된 행성의 전략 신경 중추를 담고 있는 아콜로지입니다. 군 전략가들이 변함없는 교리와 함께 끊임없이 병력들을 배치하고 지휘하며 정비합니다."
