 pc_pd_obsidian: "黑曜石星球"
 pc_pd_obsidian_desc: "这颗潮湿的星球具有氮氧大气和热带浅海，海边绵延着大片黑曜石沉积带，顽强的植物群落遍布于整个火山景观之中。"
 pc_pd_obsidian_adj: "黑曜石"
