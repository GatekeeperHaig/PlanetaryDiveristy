 pc_pd_tepui: "台地星球（热带）"
 pc_pd_tepui_desc: "拥有氮氧大气层的岩石星球，群山连绵、生机盎然。星球上水系发达，植被茂密；上方凉爽多雨的平顶山高原，与下方温暖潮湿的底层丛林形成了鲜明的气候对比。"
 pc_pd_tepui_adj: "山地"
