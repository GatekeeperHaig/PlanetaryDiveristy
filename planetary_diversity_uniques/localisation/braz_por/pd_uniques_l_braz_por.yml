###Crystal World
 sr_acean:0 "Cristal Aceano"
 sr_acean_desc:0 "A ressonância única deste cristal melhora a regeneração de saúde e o crescimento em formas de vida orgânicas."
 mod_planet_miners_sr_acean_produces_add: "£sr_acean£ $sr_acean$ de £job_miner£ [GetMinerPlural]"
 pd_crystal: "Mundo de Cristal"
 pd_crystal_desc: "O planeta está coberto de grandes pilares de Cristal Aceano, cuja ressonância única melhora a regeneração de saúde e o crescimento em formas de vida orgânicas."
 pd_dead_crystal: "Mundo de Cristal Morto"
 pd_dead_crystal_desc: "O superorganismo que criava o Cristal Aceano foi eliminado, encerrando seus efeitos positivos sobre a vida orgânica. Porém, a mineração de cristal é agora muito mais produtiva."
 pd_living_crystal: "Mundo de Cristal Restaurado"
 pd_living_crystal_desc: "O superorganismo foi restaurado, potencializando seus efeitos positivos sobre a vida orgânica. A mineração de cristal melhorou, mas a criatura agora se alimenta de qualquer vida que possa capturar."
 pc_pd_crystal: "Mundo de Cristal"
 pc_pd_crystal_desc: "$pd_crystal_desc$"
 pc_pd_crystal_adj: "cristalino"
 mod_pc_pd_crystal_habitability: "Habitabilidade Cristalina"
 trait_pc_pd_crystal_preference: "Preferência Cristalina"
 trait_pc_pd_crystal_preference_desc: "$trait_pc_arctic_preference_desc$"
 d_pd_khel_ruins: "Ruínas Khel"
 d_pd_khel_ruins_desc: "Os restos de uma colônia fracassada, incluindo gigantescas instalações de pesquisa de perfurações, estão espalhados por uma seção deste planeta."
 d_pd_acean_pillars: "Pilares Aceanos"
 d_pd_acean_pillars_desc: "Este planeta está coberto de grandes pilares de Cristal Aceano que, embora conectados ao planeta, afetam profundamente a vida orgânica próxima, acalmando as emoções e estimulando a fertilidade."

 #Events
 pdcrystal.100.name: "Gema da Vida"
 pdcrystal.100.desc: "Um escaneamento profundo de §Y[From.GetName]§! revelou algo extraordinário: imponentes formações de cristal espalhadas pela paisagem, que designamos §YCristal Aceano§!. Essas gemas parecem melhorar a saúde das formas de vida orgânicas próximas e, notavelmente, seus efeitos persistem mesmo em amostras isoladas.\n\n§Y[Root.Leader.GetName]§! também descobriu sinais de um posto avançado na selva; se pudermos manter o planeta, poderemos explorar as ruínas."
 pdcrystal.100.a: "Incrível."
 pdcrystal.200.name: "Ruínas na Selva"
 pdcrystal.200.desc: "À medida que nossa colônia se estabelece em §Y[Root.GetName]§!, descobrimos que as ruínas encontradas pela nossa equipe inicial não eram de forma alguma as únicas. Vários acampamentos abandonados, silenciosos e desgastados pelo tempo, podem ser encontrados espalhados pela natureza ao redor.\n\nQuem eram esses primeiros habitantes e o que aconteceu com eles permanece incerto."
 pdcrystal.200.a: "Exploraremos essas ruínas."
 pdcrystal.300.name: "O Destino do Planeta"
 pdcrystal.300.desc: "Agora conhecemos o destino dos Khel e o sombrio segredo do Cristal Aceano. Temos três opções: deixar o superorganismo como está, eliminá-lo ou curá-lo até seu estado original.\n\nEliminá-lo aumentaria a mineração de cristal, mas encerraria seus efeitos sobre a vida orgânica. Restaurá-lo potencializaria seu impacto na vida, mas aumentaria o risco de mortes de colonos, embora medidas de segurança possam ajudar a mitigar isso."
 pdcrystal.300.a: "Ele foi lobotomizado por uma razão."
 pdcrystal.300.a.tooltip: "Deixaremos o superorganismo intocado, sem mudar nada na forma como interagimos com o planeta."
 pdcrystal.300.b: "Encerraremos a vida desta criatura."
 pdcrystal.300.b.tooltip: "Terminaremos o que os Khel começaram e eliminaremos o superorganismo. Isso encerrará os efeitos do planeta sobre a vida orgânica, mas aumentará significativamente a produção de mineração de Cristal Aceano."
 pdcrystal.300.c: "Devemos desfazer este crime injusto."
 pdcrystal.300.c.tooltip: "Reverter a lobotomia dos Khel restaurará o superorganismo, potencializando seus efeitos sobre a vida e aumentando levemente a mineração de Cristal Aceano, mas também retomará sua alimentação de criaturas vivas, incluindo colonos."

 #Archaeology Site
 pdcrystal_site: "As Ruínas Invadidas"
 pdcrystal_site_desc: "Uma região do planeta está repleta de ruínas abandonadas. Uma investigação minuciosa pode nos ajudar a compreender os depósitos de Cristal Aceano únicos deste mundo e sua notável influência sobre o desenvolvimento da vida orgânica."
 pdcrystal.250.name: "As Ruínas Khel"
 pdcrystal.250.desc: "A selva tomou conta de grande parte das bases em decomposição e sua tecnologia, mas recuperamos algumas informações úteis. Os Khel, uma espécie alienígena não nativa deste mundo, realizavam um experimento em escala planetária envolvendo perfurações profundas na crosta.\n\nEmbora a maioria dos dados estivesse corrompida, encontramos pistas indicando um grande assentamento Khel não descoberto perto de nosso posto de pesquisa."
 pdcrystal.250.a: "Interessante."
 pdcrystal.251.desc: "No assentamento, encontramos os restos de uma nave geracional que não possuía tecnologia de hiperespaço. Os Khel, fugindo de um desastre climático em seu mundo natal, vagaram por vários sistemas durante gerações. Eventualmente encontraram este planeta, que parecia atender a todas as suas necessidades, e começaram a construir um novo lar.\n\nContinuaremos a examinar os registros Khel."
 ancrel.251.a: "Que sorte a deles."
 pdcrystal.252.desc: "A colônia prosperou por vários anos, auxiliada por pilares de cristal que melhoravam suas culturas transplantadas. Mas então os colonos começaram a desaparecer. A princípio parecia aleatório, mas a taxa aumentou. Ao investigar os desaparecimentos, sua cientista-chefe fez uma descoberta chocante: o planeta estava vivo e se alimentando deles. Sem como relançar sua nave, concentraram-se em comunicar-se e pacificar o planeta.\n\nComeçaremos a explorar um dos locais de perfuração a seguir."
 pdcrystal.252.a: "A colônia está em risco?"
 pdcrystal.253.desc: "O estudo revelou que o cristal é um superorganismo litoide com inteligência rudimentar, usando o Aceano para atrair animais para sumidouros ocultos. Os Khel perfuraram poços e usaram um pulso eletromagnético para interromper sua alimentação enquanto preservavam as propriedades do cristal.\n\nTambém descobrimos o centro de controle do projeto de perfuração."
 pdcrystal.253.a: "Como deviam estar desesperados."
 pdcrystal.254.desc: "As perfurações dos Khel apenas aceleraram a alimentação do planeta, talvez como mecanismo de defesa. Quando estavam prontos para disparar sua arma, restavam apenas algumas dezenas de Khel. Após a detonação, o planeta liberou uma enorme onda de energia e todos os registros Khel cessaram abruptamente.\n\nEmbora os Khel não tenham sobrevivido para testemunhá-lo, estavam corretos: o planeta havia perdido sua capacidade de se alimentar da vida. Esta é a sombria origem dos poderes do Cristal Aceano."
 pdcrystal.254.a: "Que fim sombrio para todos."

