 pc_pd_blossom: "花簇星球"
 pc_pd_blossom_desc: "这颗多山的星球拥有氮氧大气层与有限的水圈，季节交替显著。广袤的草原上点缀着生机勃勃的花卉，交织成在太空轨道上依然清晰可见的壮丽奇观。"
 pc_pd_blossom_adj: "繁花"
 mod_pc_pd_blossom_habitability: "高山星球宜居性"
 trait_pc_pd_blossom_preference: "高山星球偏好"
 trait_pc_pd_blossom_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_glaciovolcanic: "冰川火山星球"
 pc_pd_glaciovolcanic_desc: "这颗星球是一个多山的冰封世界，拥有氮氧大气层，火山活动异常频繁。这使得星球表面遍布着巨大的地热湖，为原本冰冻的地表带来了稀有矿产与能量。"
 pc_pd_glaciovolcanic_adj: "火山"
 mod_pc_pd_glaciovolcanic_habitability: "高山星球宜居性"
 trait_pc_pd_glaciovolcanic_preference: "高山星球偏好"
 trait_pc_pd_glaciovolcanic_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_lanthanide: "镧星"
 pc_pd_lanthanide_desc: "拥有氮氧大气层的多山世界，稀土金属含量异常丰富，磁场活动极为活跃。这种自然现象造就了壮观的环状山巅。然而，由于气候严寒且几乎没有季节交替，这里的水圈只能勉强维持零星的耐寒植被。"
 pc_pd_lanthanide_adj: "磁性"
 mod_pc_pd_lanthanide_habitability: "高山星球宜居性"
 trait_pc_pd_lanthanide_preference: "高山星球偏好"
 trait_pc_pd_lanthanide_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_bog: "沼泽星球（酸沼）"
 pc_pd_bog_desc: "寒冷、泥泞的星球，被厚重的氮氧大气所包裹。这里的夏季短暂潮湿，冬季漫长寒冷，年降水量丰沛。在活跃的水文系统作用下，大陆上覆盖着浸透水分、茂密而又顽强的植被。"
 pc_pd_bog_adj: "沼泽"
 mod_pc_pd_bog_habitability: "苔原星球宜居性"
 trait_pc_pd_bog_preference: "苔原星球偏好"
 trait_pc_pd_bog_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_mycelium: "蕈菌星球（苔原）"
 pc_pd_mycelium_desc: "拥有氮氧大气层的寒冷岩石星球。除了短暂凉爽的夏季之外，这里其余的时间皆是干燥且冰封的严冬。广袤的旷野、高耸的蘑菇森林，以及密集的地下菌丝网络，覆盖了这颗星球的大部分中纬度地区。"
 pc_pd_mycelium_adj: "寒冷"
 mod_pc_pd_mycelium_habitability: "苔原星球宜居性"
 trait_pc_pd_mycelium_preference: "苔原星球偏好"
 trait_pc_pd_mycelium_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_mud: "泥浆星球"
 pc_pd_mud_desc: "冰冷、泥泞，拥有氮氧大气层的世界，四季并不分明，却伴随着大量的降水。地表极其丰富的低强度地热活动，在这片原本被冰封的荒原上造就了无数滚烫的泥浆湖与泥火山。"
 pc_pd_mud_adj: "泥浆"
 mod_pc_pd_mud_habitability: "苔原星球宜居性"
 trait_pc_pd_mud_preference: "苔原星球偏好"
 trait_pc_pd_mud_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_basalt: "玄武岩星球"
 pc_pd_basalt_desc: "拥有氮氧大气层的寒冷岩石星球，季节变化并不明显。由于间歇性的火山活动，星球表面覆盖着广袤的玄武岩熔岩原。生长在冷却玄武岩上的苔藓与地衣，构成了这里稳定的生物圈。"
 pc_pd_basalt_adj: "寒冷"
 mod_pc_pd_basalt_habitability: "苔原星球宜居性"
 trait_pc_pd_basalt_preference: "苔原星球偏好"
 trait_pc_pd_basalt_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_tuya: "平顶火山星球"
 pc_pd_tuya_desc: "拥有氮氧大气层的寒冷岩石星球。尽管季节变化有限且冬季漫长严酷，但得益于火山土壤中的养分，该星球拥有稳定的生物圈。广阔的冰盖和高强度的火山活动造就了无数遍布地表的冰下火山。"
 pc_pd_tuya_adj: "寒冷"
 mod_pc_pd_tuya_habitability: "苔原星球宜居性"
 trait_pc_pd_tuya_preference: "苔原星球偏好"
 trait_pc_pd_tuya_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_cryoflora: "冰雪植物星球"
 pc_pd_cryoflora_desc: "拥有氮氧大气层的寒冷岩石星球。这里的气温时常低于冰点，绝大部分水圈都被封冻在冰雪之中。尽管如此，这颗星球上的动植物却通过进化出抗冻蛋白适应了环境，孕育出一个繁茂葱郁、生机勃勃的生态系统。"
