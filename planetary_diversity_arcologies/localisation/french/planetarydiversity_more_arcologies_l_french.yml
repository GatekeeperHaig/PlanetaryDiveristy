district_pd_hive_industrial_desc: "Des installations de fusion et des usines remplissent ce district, créant des produits avancés à partir de matières premières."
district_pd_gestalt_naval: "District Logistique"
district_pd_gestalt_naval_plural: "Districts Logistiques"
