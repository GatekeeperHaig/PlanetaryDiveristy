 pc_pd_dry_gaia_tidally_locked_desc: "Un mundo seco, idóneo y templado, bloqueado por marea, con una atmósfera de nitrógeno y oxígeno y un ecosistema resiliente. Condiciones óptimas para todas las formas de vida superiores conocidas en diferentes latitudes."
