 pc_pd_domed_colony_barren: "Colônia Abobadada Árida"
 pc_pd_domed_colony_barren_desc: "Mundo árido e rochoso com uma atmosfera fina ou inexistente. A superfície está coberta de crateras de impacto de meteoros e completamente desprovida de vida. Colônias abobadadas foram construídas na superfície, permitindo habitação permanente."
