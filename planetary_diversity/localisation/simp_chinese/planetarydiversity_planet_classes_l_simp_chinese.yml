 pc_pd_silvergrass: "银草星球"
 pc_pd_silvergrass_desc: "拥有氮氧大气的草原星球，紫外线辐射偏高。无垠的旷野上长满野草，草叶表面覆有一层反光的蜡质，这是为了适应星球上的严酷旱季而进化出的特征。"
 pc_pd_silvergrass_adj: "银色"
 mod_pc_pd_silvergrass_habitability: "草原星球宜居性"
