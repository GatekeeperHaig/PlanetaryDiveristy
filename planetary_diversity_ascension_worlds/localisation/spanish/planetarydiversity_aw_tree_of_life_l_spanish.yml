 district_pd_flora_hive_industrial: "Distrito Industrial"
 district_pd_flora_hive_industrial_desc: "Instalaciones de fundición y fábricas llenan este distrito, creando productos avanzados a partir de materias primas."
 district_pd_flora_hive_industrial_plural: "Distritos Industriales"
 district_pd_flora_hive_naval: "Distrito Logístico"
 district_pd_flora_hive_naval_desc: "Los drones aquí optimizan las operaciones navales a la máxima eficiencia."
 district_pd_flora_hive_naval_plural: "Distritos Logísticos"
 district_pd_flora_hive_research: "Distrito de Investigación"
 district_pd_flora_hive_research_desc: "Incontables laboratorios llenos de drones de investigación concentrados."
 district_pd_flora_hive_research_plural: "Distritos de Investigación"
 district_pd_flora_hive_administrative: "Distrito Sináptico"
 district_pd_flora_hive_administrative_desc: "Un nodo sináptico que amplifica las conexiones psiónicas de la colmena, extendiendo su voluntad y guía por el cosmos."
 district_pd_flora_hive_administrative_plural: "Distritos Sinápticos"
 pc_pd_flora_hive: "Mundo Corona Megaflora"
 pc_pd_flora_hive_desc: "Esta Colmena evolucionó en una relación simbiótica con un vasto árbol de megaflora cuyas raíces se han extendido a cada rincón del planeta y cambiaron el ecosistema para adaptarse tanto a él como a los drones. Ha sido crecido como un bastión de procesos de pensamiento avanzados y está altamente defendido por la colmena que lo habita."
 pc_pd_flora_hive_adj: "boscoso"
 mod_pc_pd_flora_hive_habitability: "Habitabilidad Corona Megaflora"
 trait_pc_pd_flora_hive_preference: "Preferencia Corona Megaflora"
 trait_pc_pd_flora_hive_preference_desc: "$trait_pc_arctic_preference_desc$"
 pd_aw_flora_hive_military: "Mundo Corona Megaflora"
 pd_aw_flora_hive_military_desc: "Este mundo es fundamental para las funciones principales de la Mente Colmena Megaflora y está fortificado contra amenazas e influencias externas. Un formidable escudo envuelve el planeta y los drones guerreros están listos para garantizar su protección."
 decision_pd_flora_hive_crown_project: "Proyecto de Colmena Megaflora - Corona"
 decision_pd_flora_hive_crown_project_desc: "Este mundo colmena será crecido hasta convertirse en un bastión de procesos de pensamiento avanzados para la mente colmena."
 decision_pd_flora_hive_crown_project_effects: "Convierte el planeta en §Y$pc_pd_flora_hive$§!, aumentando £housing£ §Y$PLANET_HOUSING_TITLE$§!, §YProducción de Recursos§! y §YCrecimiento Poblacional§! y desbloqueando especiales £district£ §YDistritos de Arcología§! a expensas de que los recursos naturales del planeta sean §Rinaccesibles§!, evitando toda construcción futura de £district£ §YDistritos§! de §YGeneradores§!, §YMinería§! y §YAgricultura§!."
 decision_pd_flora_hive_crown_project_effects_short: "Aumenta £housing£ §Y$PLANET_HOUSING_TITLE$§!, §YProducción de Recursos§! y §YCrecimiento Poblacional§!\nHabilita £district£ §YDistritos de Arcología§!\nDeshabilita la construcción de £district£ §YDistritos§! de §YGeneradores§!, §YMinería§! y §YAgricultura§!"
 decision_pd_megaflora_capital_building: "Construir Gran Árbol de la Vida"
 decision_pd_megaflora_capital_building_desc: "Para manifestar la supremacía y el alcance de nuestro colectivo, haremos crecer un poderoso Gran Árbol de la Vida. Este imponente árbol amplificará significativamente nuestras operaciones a través de las estrellas."
 decision_pd_megaflora_capital_building_effects: "Añade §Y$d_pd_megaflora_capital_building$§! a este mundo capital de megaflora, intercambiando distritos potenciales para mejorar las capacidades administrativas de nuestra colmena."
 d_pd_megaflora_capital_building: "Gran Árbol de la Vida"
 d_pd_megaflora_capital_building_desc: "Este árbol se erige supremo sobre la superficie del planeta, un faro imponente de control. Es el centro de nuestra voluntad colectiva, donde comienzan nuestras raíces entre las estrellas."

