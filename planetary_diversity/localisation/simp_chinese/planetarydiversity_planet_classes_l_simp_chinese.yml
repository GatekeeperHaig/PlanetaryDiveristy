 pc_pd_atoll: "环礁星球"
 pc_pd_atoll_desc: "具有氮氧大气层的海洋星球。浅水潟湖、珊瑚礁与热带岛屿构成了这颗星球的主体，温暖的气候孕育了极其庞大的生物圈。"
 pc_pd_atoll_adj: "热带"
