 trait_pc_pd_silvergrass_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_ash: "灰烬星球"
 pc_pd_ash_desc: "这是一颗岩石星球，大气层泛着硫磺的色泽，广袤的冷却玄武岩平原被深深掩埋在厚重的火山灰之下。在地热穿透灰烬沙丘带与休眠火山锥喷薄而出的地方，依然残留着孤立的熔岩湖与缓缓涌动的熔岩流。即便这里存在生命，也只能找到嗜极生物。"
