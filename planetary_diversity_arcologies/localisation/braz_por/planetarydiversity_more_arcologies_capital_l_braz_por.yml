l_braz_por:

#Senate
 decision_pd_arcology_senate: "Construir Cúpula do Senado"
 decision_pd_arcology_senate_desc: "Para atender às crescentes necessidades de nossa nação, devemos construir um monumental edifício do senado em nossa capital, dedicando espaço substancial para aprimorar as capacidades administrativas do nosso governo."
 decision_pd_arcology_senate_effects: "Adiciona o §Y$d_pd_senate_building$§! a esta capital, trocando distritos potenciais para aprimorar as capacidades administrativas do nosso governo."
 d_pd_senate_building: "Cúpula do Senado"
 d_pd_senate_building_desc: "A Cúpula do Senado, um majestoso símbolo de governança, ergue-se imponente como o coração administrativo onde o futuro de nossa civilização é forjado."

#Palace
 decision_pd_arcology_palace: "Construir Complexo Palaciano"
 decision_pd_arcology_palace_desc: "Para refletir o poder e a autoridade de nosso império, erguemos um colossal palácio em nossa capital. Esta grandiosa edificação encarnará o poder de nossa liderança e aumentará significativamente nossa administração governamental."
 decision_pd_arcology_palace_effects: "Adiciona o §Y$d_pd_palace_building$§! a esta capital, trocando distritos potenciais para aprimorar as capacidades administrativas do nosso governo."
 d_pd_palace_building: "Complexo Palaciano"
 d_pd_palace_building_desc: "O Complexo Palaciano, um grandioso símbolo de nossa soberania e do poder de nosso governante, domina a capital. É o coração da governança, onde o destino de nosso império é moldado."

#Headquarters
 decision_pd_arcology_headquarters: "Construir Sede Planetária"
 decision_pd_arcology_headquarters_desc: "Para demonstrar o poder e a influência de nossa megacorporação, construiremos uma imponente sede neste centro econômico. Esta estrutura imponente representará a força de nossa liderança e potenciará enormemente nossas operações galácticas."
 decision_pd_arcology_headquarters_effects: "Adiciona o §Y$d_pd_headquarters_building$§! a esta capital, trocando distritos potenciais para aprimorar as capacidades administrativas de nossa corporação."
 d_pd_headquarters_building: "Sede Planetária"
 d_pd_headquarters_building_desc: "Um monumental símbolo de domínio, esta sede se ergue sobre o planeta. Serve como centro nevrálgico de nossas operações, onde o futuro de nossa megacorporação é forjado."

#Hive Confluence Spire
 decision_pd_hive_confluence_spire: "Construir Agulha de Confluência"
 decision_pd_hive_confluence_spire_desc: "Para manifestar a supremacia e o alcance de nosso coletivo, faremos crescer uma poderosa agulha de confluência. Esta estrutura imponente amplificará significativamente nossas operações pelas estrelas."
 decision_pd_hive_confluence_spire_effects: "Adiciona o §Y$d_pd_confluence_spire_building$§! a esta capital, trocando distritos potenciais para aprimorar nossas capacidades administrativas."
 d_pd_confluence_spire_building: "Agulha de Confluência"
 d_pd_confluence_spire_building_desc: "Esta agulha ergue-se suprema sobre a superfície do planeta, um imponente farol de controle. É o centro de nossa vontade coletiva, onde nosso caminho entre as estrelas é intrincadamente tecido."

#Machine Centralized Processing
 decision_pd_machine_centralized_processing: "Construir Unidade de Processamento Centralizado"
 decision_pd_machine_centralized_processing_desc: "Para afirmar nossa superioridade e ampliar a capacidade operacional, construiremos uma Unidade de Processamento Centralizado. Esta estrutura potenciará significativamente nossas funções galácticas."
 decision_pd_machine_centralized_processing_effects: "Adiciona o §Y$d_pd_machine_centralized_processing$§! a esta capital, trocando distritos potenciais para aprimorar nossas capacidades administrativas."
 d_pd_machine_centralized_processing: "Unidade de Processamento Centralizado"
 d_pd_machine_centralized_processing_desc: "Esta unidade de processamento domina a superfície planetária e é o nó central para nossas diretivas coletivas, orquestrando intrincadamente nossos drones."
