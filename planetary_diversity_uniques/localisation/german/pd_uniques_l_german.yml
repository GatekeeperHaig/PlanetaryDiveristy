 d_pd_acean_pillars: "Acean-SÃĪulen"
 d_pd_acean_pillars_desc: "Dieser Planet ist von groÃen Acean-KristallsÃĪulen bedeckt, die, wÃĪhrend sie mit dem Planeten verbunden sind, das organische Leben in der Umgebung tiefgreifend beeinflussen, Emotionen beruhigen und die Fruchtbarkeit steigern."

 #Events
 pdcrystal.100.name: "Edelstein des Lebens"
 pdcrystal.100.desc: "Ein Tiefenscan von Â§Y[From.GetName]Â§! enthÃžllte etwas AuÃergewÃķhnliches: Ãžber die Landschaft verteilte, hochaufragende Kristallformationen, die wir als Â§YAcean-KristallÂ§! bezeichneten. Diese Edelsteine scheinen die Gesundheit nahegelegenen organischen Lebens zu verbessern, und bemerkenswerterweise bleiben ihre Effekte sogar in isolierten Proben bestehen.\n\nÂ§Y[Root.Leader.GetName]Â§! entdeckte auch Anzeichen eines AuÃenpostens im Dschungel. Wenn wir den Planeten halten kÃķnnen, werden wir die Ruinen erforschen kÃķnnen."
 pdcrystal.100.a: "Erstaunlich."
 pdcrystal.200.name: "Ruinen im Dschungel"
 pdcrystal.200.desc: "WÃĪhrend sich unsere Kolonie auf Â§Y[Root.GetName]Â§! etabliert, haben wir entdeckt, dass die von unserer ersten Expedition gefundenen Ruinen bei weitem nicht die einzigen sind. Mehrere verlassene Lager, still und verwittert, finden sich Ãžber die umliegende Wildnis verstreut.\n\nWer diese frÃžhen Bewohner waren und was aus ihnen wurde, bleibt unklar."
 pdcrystal.200.a: "Wir werden diese Ruinen erforschen."
 pdcrystal.300.name: "Das Schicksal des Planeten"
 pdcrystal.300.desc: "Wir kennen nun das Schicksal der Khels und das dunkle Geheimnis des Acean-Kristalls. Wir haben drei MÃķglichkeiten: den Superorganismus so zu lassen wie er ist, ihn zu tÃķten oder ihn in seinen ursprÃžnglichen Zustand zurÃžckzuversetzen.\n\nIhn zu tÃķten wÃžrde den Kristallabbau steigern, aber seine Effekte auf organisches Leben beenden. Seine Wiederherstellung wÃžrde seinen Einfluss auf das Leben verstÃĪrken, aber das Risiko von Kolonistentoden erhÃķhen, auch wenn SicherheitsmaÃnahmen dies abmildern kÃķnnten."
 pdcrystal.300.a: "Er wurde nicht ohne Grund lobotomiert."
 pdcrystal.300.a.tooltip: "Wir werden den Superorganismus unberÃžhrt lassen und nichts an unserer Interaktion mit dem Planeten ÃĪndern."
 pdcrystal.300.b: "Wir werden das Leben dieser Kreatur beenden."
 pdcrystal.300.b.tooltip: "Wir werden vollenden, was die Khel begonnen haben, und den Superorganismus tÃķten. Dies wird die Effekte des Planeten auf organisches Leben beenden, aber die Acean-FÃķrderung deutlich steigern."
 pdcrystal.300.c: "Wir sollten dieses ungerechte Verbrechen rÃžckgÃĪngig machen."
 pdcrystal.300.c.tooltip: "Die RÃžckgÃĪngigmachung der Khel-Lobotomie wird den Superorganismus wiederherstellen, seine Effekte auf das Leben verstÃĪrken und die Acean-FÃķrderung leicht verbessern, aber er wird auch wieder beginnen, sich von lebenden Kreaturen zu ernÃĪhren, einschlieÃlich Kolonisten."

 #Archaeology Site
 pdcrystal_site: "Die Ãžberwucherten Ruinen"
 pdcrystal_site_desc: "Eine Region des Planeten ist ÃžbersÃĪt mit verlassenen Ruinen. Eine grÃžndliche Untersuchung kÃķnnte uns helfen, die fÃžr diese Welt einzigartigen Acean-Kristallvorkommen und ihren bemerkenswerten Einfluss auf die Entwicklung organischen Lebens zu verstehen."
 pdcrystal.250.name: "Die Khel-Ruinen"
 pdcrystal.250.desc: "Der Dschungel hat einen GroÃteil der verfallenden StÃžtzpunkte und ihrer Technologie Ãžberwuchert, aber wir konnten einige hilfreiche Informationen bergen. Die Khel, eine nicht auf dieser Welt heimische Alienspezies, fÃžhrten ein planetenweites Experiment durch, das tiefe BohrlÃķcher in die Kruste beinhaltete.\n\nObwohl die meisten Daten beschÃĪdigt waren, fanden wir Hinweise auf eine groÃe, noch unentdeckte Khel-Siedlung in der NÃĪhe unseres Forschungspostens."
 pdcrystal.250.a: "Interessant."
 pdcrystal.251.desc: "In der Siedlung fanden wir die Ãberreste eines Generationenschiffs ohne Hyperraumtechnologie. Die Khel, die vor einer Klimakatastrophe auf ihrer Heimatwelt flohen, wanderten generationenlang durch mehrere Systeme. SchlieÃlich fanden sie diesen Planeten, der all ihre BedÃžrfnisse zu erfÃžllen schien, und begannen, eine neue Heimat zu errichten.\n\nWir werden die Aufzeichnungen der Khel weiter durchforsten."
 ancrel.251.a: "Wie glÃžcklich fÃžr sie."
 pdcrystal.252.desc: "Die Kolonie gedieh mehrere Jahre lang, unterstÃžtzt durch KristallsÃĪulen, die ihre verpflanzten Ernten verbesserten. Doch dann begannen Kolonisten zu verschwinden. Anfangs schien es zufÃĪllig, aber die HÃĪufigkeit nahm zu. Bei der Untersuchung der Verschwundenen machte ihr leitender Wissenschaftler eine schockierende Entdeckung: Der Planet war lebendig und ernÃĪhrte sich von ihnen. Da sie ihr Schiff nicht neu starten konnten, konzentrierten sie sich darauf, mit dem Planeten zu kommunizieren und ihn zu besÃĪnftigen.\n\nWir werden als nÃĪchstes einen der Bohrloch-Standorte erkunden."
 pdcrystal.252.a: "Ist die Kolonie in Gefahr?"
 pdcrystal.253.desc: "Die Untersuchung ergab, dass der Kristall ein lithoider Superorganismus mit rudimentÃĪrer Intelligenz ist, der den Acean nutzt, um Tiere in verborgene SinklÃķcher zu locken. Die Khel bohrten LÃķcher und nutzten einen elektromagnetischen Impuls, um seine Nahrungsaufnahme zu stÃķren, wÃĪhrend die Eigenschaften des Kristalls erhalten blieben.\n\nWir haben auch das Kontrollzentrum fÃžr das Bohrungsprojekt entdeckt."
 pdcrystal.253.a: "Wie verzweifelt sie gewesen sein mÃžssen."
 pdcrystal.254.desc: "Die BohrlÃķcher der Khel beschleunigten nur die Nahrungsaufnahme des Planeten, vielleicht als Abwehrmechanismus. Als sie bereit waren, ihre Waffe abzufeuern, waren nur noch wenige Dutzend Khel Ãžbrig. Nach der Detonation setzte der Planet einen massiven EnergiestoÃ frei, und alle Aufzeichnungen der Khel endeten abrupt.\n\nObwohl die Khel es nicht mehr erlebten, hatten sie Recht: Der Planet hatte seine FÃĪhigkeit verloren, Leben zu verschlingen. Dies ist die dÃžstere Quelle der KrÃĪfte des Acean-Kristalls."
 pdcrystal.254.a: "Was fÃžr ein grausames Ende fÃžr alle."

