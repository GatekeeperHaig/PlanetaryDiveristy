 pc_nuked_relic_desc: "这个星球表面曾经被完全被单一城市所覆盖。如今这里只有废弃的古老遗迹，其原住民早已离去。目前它正处于核冬天，大气中含有乌黑浓厚的悬浮颗粒。地表和洞穴体系中辐射水平高。鲜有生命迹象表面。"
