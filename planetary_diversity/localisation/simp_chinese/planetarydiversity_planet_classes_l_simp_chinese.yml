 pc_pd_crag: "峭壁星球"
 pc_pd_crag_desc: "拥有氮氧大气层与广阔的水圈的寒冷岩石星球。海洋与极地冰盖覆盖了超过§Y99%§!的地表，其间点缀着崎岖而散落的岛屿。丰富的火山与地热活动维系着这里的海洋生态系统。"
 pc_pd_crag_adj: "副极地"
