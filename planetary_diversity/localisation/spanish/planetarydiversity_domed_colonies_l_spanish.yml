#Origen
 origin_pd_interplanetary_settlers: "Colonos Interplanetarios"
 origin_pd_interplanetary_settlers_desc: "Antes de que las estrellas fueran alcanzables, este imperio sentó sus cimientos, erigiendo hábitats bajo cúpula en las lunas y planetas de su sistema natal. Ahora, armados con tecnología FTL, se encuentran al borde de una nueva era, listos para expandir su alcance hacia los reinos inexplorados del espacio."
 origin_tooltip_pd_interplanetary_settlers_start_effects: "- $INITIAL_POPS$ §G+200§!$NEW_LINE$- $HOMEWORLD$$TABBED_NEW_LINE$- ['concept_pd_network_hub', $d_pd_solar_system_network_hub$]$NEW_LINE$- Luna del Mundo Natal:$TABBED_NEW_LINE$- ['concept_pd_moonbase', $pd_domed_base_0$]$NEW_LINE$- Colonia:$TABBED_NEW_LINE$- ['concept_pd_domed_colony', $pd_domed_colony_0$]$NEW_LINE$- $ADDITONAL_TECHNOLOGIES_STRING$ ['concept_tech_pd_domed_colonies', £engineering£ $tech_pd_domed_colonies$]"
