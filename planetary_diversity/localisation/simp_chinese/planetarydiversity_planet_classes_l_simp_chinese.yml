 pc_pd_opal: "蛋白石星球"
 pc_pd_opal_desc: "富硅水曾渗入这个干旱世界的地壳，充填了其中的断裂与孔隙。随着该星球水分散失，沉积物逐渐固结成庞大的蛋白石矿体，成为了如今地表的主要景观。"
 pc_pd_opal_adj: "欧珀"
 mod_pc_pd_opal_habitability: "干旱星球宜居性"
