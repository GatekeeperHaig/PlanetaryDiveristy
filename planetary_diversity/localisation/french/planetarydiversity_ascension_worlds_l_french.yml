###PD Tree of Life
 #Deposits
 d_pd_tree_of_life_uncommon: "Arbre de Vie"
 d_pd_tree_of_life_uncommon_desc: "Une ramification du Grand Arbre, transplantée ici par la Ruche. Bien que les conditions soient hospitalières pour l'Arbre, l'écosystème peu commun de cette planète ne lui permet pas de pousser à pleine taille."
 d_pd_tree_of_life_home: "Arbre de Vie"
 d_pd_tree_of_life_home_desc: "L'Arbre de Vie a abrité et soutenu la Ruche pendant d'innombrables générations."
 d_pd_tree_of_life_colony: "Pousse de l'Arbre de Vie"
 d_pd_tree_of_life_colony_desc: "Une ramification du Grand Arbre, transplantée ici par la Ruche. Il lui faudra du temps pour atteindre sa pleine maturité."
 d_pd_tree_of_life_bloomed: "Arbre de Vie en Floraison"
 d_pd_tree_of_life_bloomed_desc: "Le Grand Arbre a abrité et soutenu la Ruche pendant d'innombrables générations. Désormais en floraison, ses effets bénéfiques peuvent être ressentis par chaque drone."

 #Decisions
 decision_pd_replant_tree_of_life: "Replanter l'Arbre de Vie"
 decision_pd_replant_tree_of_life_desc: "Nous devons établir ici une pousse du Grand Arbre de Vie pour que notre Ruche s'épanouisse."
 decision_pd_bloom_tree_of_life: "Faire Fleurir l'Arbre de Vie"
 decision_pd_bloom_tree_of_life_desc: "Encourager un Grand Arbre de Vie à fleurir demande un temps et des ressources considérables, mais cela débloquera son véritable potentiel."
 decision_pd_bloom_tree_of_life_tooltip: "Cette planète sera développée en un §YBloomed $pc_pd_megaflora_hive_bloomed$§!.\n\nDoublant les £pop£ §YEmplois§! et £housing£ §YLogements§! que chaque district fournira."

 #Modifiers
 pd_tree_of_life_bloomed: "Monde de l'Arbre de Vie en Floraison"
 pd_tree_of_life_bloomed: "Le Grand Arbre sur cette planète a atteint sa pleine maturité et est en floraison. Son énorme système racinaire fournit de l'espace pour des drones ouvriers supplémentaires et peut résister à des dommages considérables."
 pd_tree_of_life_growing: "Pousse de l'Arbre de Vie en Croissance"
 pd_tree_of_life_growing_desc: "Les drones de cette planète sont concentrés sur l'établissement de la pousse du Grand Arbre que nous avons plantée ici."
 pd_tree_of_life_home: "Monde de l'Arbre de Vie"
 pd_tree_of_life_home_desc: "Le Grand Arbre sur cette planète est entièrement développé. Son système racinaire fournit de l'espace pour les drones ouvriers et résiste naturellement aux dommages."
 pd_no_lifetree: "Pas d'Arbre de Vie"
 pd_no_lifetree_desc: "Sans un Grand Arbre de Vie, la ruche est incomplète."

 #Origin
 origin_pd_aw_tree_of_life: "Origine Espace Réservé - NE PAS UTILISER"
 origin_pd_aw_tree_of_life_desc: "Cette origine est un espace réservé et ne fonctionnera pas dans Stellaris. Veuillez la supprimer avant de commencer votre partie, car elle causera des problèmes."

###Wasteland
 #Decisions
 decision_pd_wasteland_planet: "Normes Industrielles Non Réglementées"
 decision_pd_wasteland_planet_desc: "Les préoccupations environnementales ne font que nous freiner. En ignorant l'état de l'écosystème naturel de la planète, nous débloquerons son véritable potentiel industriel."
 decision_pd_wasteland_planet_effects_short: "Modificateur §Y$pd_wasteland_planet$§! ajouté.\n\nAugmente §GProduction Industrielle§! mais réduit £mod_pop_environment_tolerance£ §RHabitabilité§!."
 decision_pd_wasteland_planet_cleanup: "Nettoyage Environnemental"
 decision_pd_wasteland_planet_cleanup_desc: "La grave dégradation environnementale sur cette planète a laissé son écosystème dans un état précaire. Nous réparerons les dommages infligés à ce monde."
 decision_pd_wasteland_planet_cleanup_tooltip: "Nous restaurerons l'écosystème originel de cette planète."

 #Modifiers
 pd_wasteland_planet: "Friche Industrielle"
 pd_wasteland_planet_desc: "Les préoccupations environnementales ne font que nous freiner. En ignorant l'état de l'écosystème naturel de la planète, nous débloquons le véritable potentiel industriel de la planète."
 pd_wasteland_planet_tooltip: "Déverrouille £district£ §YDistricts Générateurs§! et §YDistrict Minier§!"
 pd_aw_wasteland_planet: "Friche Industrielle"
 pd_aw_wasteland_planet_desc: "$decision_pd_wasteland_planet_desc$"
 pd_aw_wasteland_planet_tooltip: "Déverrouille £district£ §YDistricts Générateurs§! et §YDistrict Minier§!"

 #Notification Message
 MESSAGE_PD_WASTELAND_DESC:1 "$PLANET|Y$ a maintenant §Y$decision_pd_wasteland_planet$§!"
 MESSAGE_PD_WASTELAND_MESSAGE_TYPE_TITLE: "Réglementations Environnementales Abolies"
 MESSAGE_PD_WASTELAND_CLEANUP_DESC:1 "L'écosystème sur $PLANET|Y$ a été réparé."
 MESSAGE_PD_WASTELAND_CLEANUP_MESSAGE_TYPE_TITLE: "Réglementations Environnementales Rétablies"

###Shroud
 #Decisions
 decision_pd_shroud_planet: "Déphasage du Linceul"
 decision_pd_shroud_planet_desc: "Nous pouvons affaiblir la barrière entre cette planète et le Linceul et créer un équilibre entre les royaumes matériel et psionique."
 decision_pd_shroud_planet_effects_short: "Modificateur §Y$pd_aw_shroud_planet$§! ajouté.\n\nAugmente £pop£ §GProduction Psionique des Pop§! mais réduit £pop£ §YProduction des Pop Non-Psioniques§!."
 decision_pd_shroud_planet_cleanup: "Déphasage de la Planète"
 decision_pd_shroud_planet_cleanup_desc: "Nos physiciens peuvent renforcer la barrière entre cette planète et le Linceul, la verrouillant dans le royaume matériel."
 decision_pd_shroud_planet_cleanup_tooltip: "\nNous supprimerons l'influence psionique de cette planète."

 #Modifier
 pd_aw_shroud_planet: "Effleuré par le Linceul"
 pd_aw_shroud_planet_desc: "En cet endroit, la barrière délibérément affaiblie entre le royaume matériel et le Linceul a permis aux individus dotés de capacités psychiques de remodeler la réalité dans une certaine mesure. Cependant, pour ceux qui ne possèdent pas ces dons, la frontière entre le cauchemar et la réalité se brouille, donnant naissance à une tapisserie infinie de souffrance et de tourment."
 pd_aw_shroud_planet_tooltip: "§GPsionique§! £pop£ Pop :\n- $mod_psionic_pop_bonus_workforce_mult$ : §G10%§!\n- $MOD_POP_HAPPINESS$ : §G25%§!\n\n§YNon-Psionique§! £pop£ Pop :\n- £mod_pop_environment_tolerance£ §YHabitabilité Planétaire§! : §R-50%§!\n- $MOD_POP_HAPPINESS$ : §R-25%§!\n- $MOD_LOGISTIC_GROWTH_MULT$ : §R-25%§!"

 #Notification Message
 MESSAGE_PD_SHROUD_DESC:1 "$PLANET|Y$ est maintenant §Y$pd_aw_shroud_planet$§!"
 MESSAGE_PD_SHROUD_MESSAGE_TYPE_TITLE: "Communion Planétaire avec le Linceul Accomplie"
 MESSAGE_PD_SHROUD_CLEANUP_DESC:1 "L'influence du Linceul a été supprimée sur $PLANET|Y$."
 MESSAGE_PD_SHROUD_CLEANUP_MESSAGE_TYPE_TITLE: "Planète Libérée du Linceul"

###Necro
 #Decisions
 decision_pd_necro_planet: "Construire une Nécropole Planétaire"
 decision_pd_necro_planet_desc: "Ce monde aspire à devenir un temple tentaculaire qui résonne des murmures de notre héritage d'éternelle signifiance."
 decision_pd_necro_planet_effects_short: "Modificateur §Y$district_pd_aw_necro$§! ajouté.\nConstruction de §Y$district_farming_plural$§! remplacée par §G$district_pd_aw_necro_plural$§!"
 decision_pd_necro_planet_cleanup: "Supprimer la Nécropole Planétaire"
 decision_pd_necro_planet_cleanup_desc: "Nous devons supprimer les temples et les tombes laissés par les anciens propriétaires de cette planète."
 decision_pd_necro_planet_cleanup_effects_short: "Le modificateur §Y$pd_aw_necro_planet$§! sera supprimé."
 pd_aw_necro_planet: "Espace réservé pour OW"

 #Notification Message
 MESSAGE_PD_NECRO_DESC:1 "$PLANET|Y$ est maintenant une §Y$pd_aw_necro_planet$§!"
 MESSAGE_PD_NECRO_MESSAGE_TYPE_TITLE: "Nécropole Planétaire Terminée"
 MESSAGE_PD_NECRO_CLEANUP_DESC:1 "La Nécropole planétaire sur $PLANET|Y$ a été supprimée."
 MESSAGE_PD_NECRO_CLEANUP_MESSAGE_TYPE_TITLE: "Nécropole Supprimée"

 #Tech for Uncommon World Hab
 tech_pd_uncommon_necro_habitability: "Habitabilité du Monde Tombeau"
 tech_pd_uncommon_necro_habitability_desc: "Naviguer dans les subtilités de la survie au sein d'une Nécropole est facilement maîtrisé par ceux qui partagent l'étreinte intemporelle des non-vivants."

