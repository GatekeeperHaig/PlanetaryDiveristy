#Origine
 origin_pd_interplanetary_settlers: "Colons Interplanétaires"
 origin_pd_interplanetary_settlers_desc: "Avant que les étoiles fussent accessibles, cet empire posait ses fondations, érigeant des habitats sous dôme sur les lunes et planètes de leur système natal. Maintenant, armés de la technologie FTL, ils se trouvent au seuil d'une nouvelle ère, prêts à étendre leur portée vers les royaumes inexplorés de l'espace."
 origin_tooltip_pd_interplanetary_settlers_start_effects: "- $INITIAL_POPS$ §G+200§!$NEW_LINE$- $HOMEWORLD$$TABBED_NEW_LINE$- ['concept_pd_network_hub', $d_pd_solar_system_network_hub$]$NEW_LINE$- Lune du Monde Natal :$TABBED_NEW_LINE$- ['concept_pd_moonbase', $pd_domed_base_0$]$NEW_LINE$- Colonie :$TABBED_NEW_LINE$- ['concept_pd_domed_colony', $pd_domed_colony_0$]$NEW_LINE$- $ADDITONAL_TECHNOLOGIES_STRING$ ['concept_tech_pd_domed_colonies', £engineering£ $tech_pd_domed_colonies$]"
 pd_interplanetary_system_initializer_NAME: "Colons Interplanétaires"
 pd_interplanetary_system_initializer_DESC: "Système de départ aléatoire avec une Colonie sous Dôme et un Avant-poste Planétaire."
 pd_interplanetary_sol_system_initializer_NAME: "Colons Interplanétaires (Sol)"
 pd_interplanetary_sol_system_initializer_DESC: "Système de départ Sol avec une Colonie sous Dôme et un Avant-poste Planétaire."

#Concepts
 concept_pd_network_hub: "$d_pd_solar_system_network_hub$"
 concept_pd_network_hub_desc: "Accorde de nombreux emplois selon le niveau de capitale et les ['concept_pd_moonbases', Avants-postes Planétaires] construits dans le système solaire.\n\n§L$d_pd_solar_system_network_hub_desc$§!"
 concept_pd_moonbase: "Avant-poste Planétaire"
 concept_pd_moonbase_desc: "Ces avant-postes se connectent à tout §Y$d_pd_solar_system_network_hub$§! dans le système, accordant à ces planètes des emplois supplémentaires.\n\n§L$pd_domed_base_0_MEGASTRUCTURE_DETAILS$§!"
 concept_pd_domed_colony: "Colonie sous Dôme"
 concept_pd_domed_colony_desc: "Construite sur des planètes avec le modificateur §Y$terraforming_candidate$§! permettant la colonisation avant terraformation.\n\n§L$pd_domed_colony_0_MEGASTRUCTURE_DETAILS$§!"
