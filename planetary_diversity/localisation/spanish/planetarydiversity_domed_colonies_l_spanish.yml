 pc_pd_domed_colony_frozen: "Colonia Bajo Cúpula Helada"
 pc_pd_domed_colony_frozen_desc: "Un mundo rocoso cubierto por una gruesa capa de hielo permanente. Las bajas temperaturas y la delgada atmósfera impiden la existencia de vida en la superficie. Se han construido colonias bajo cúpula en la superficie, permitiendo la habitación permanente."
 pc_pd_domed_colony_frozen_adj: "$pc_pd_domed_colony_barren_adj$"
 mod_pc_pd_domed_colony_frozen_habitability: "Placeholder/Should not see."
