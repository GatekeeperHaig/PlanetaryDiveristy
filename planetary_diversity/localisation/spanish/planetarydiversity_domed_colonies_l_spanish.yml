 pc_pd_domed_colony_barren: "Colonia Bajo Cúpula Árida"
 pc_pd_domed_colony_barren_desc: "Mundo árido y rocoso con una atmósfera delgada o inexistente. La superficie está cubierta de cráteres de impacto de meteoritos y completamente desprovista de vida. Se han construido colonias bajo cúpula en la superficie, permitiendo la habitación permanente."
 pc_pd_domed_colony_barren_adj: "bajo cúpula"
