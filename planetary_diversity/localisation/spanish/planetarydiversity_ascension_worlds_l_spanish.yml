 decision_pd_necro_planet: "Construir Necrópolis Planetaria"
 decision_pd_necro_planet_desc: "Este mundo anhela convertirse en un templo descomunal que resuene con los susurros de nuestro legado de eterna trascendencia."
 decision_pd_necro_planet_effects_short: "Modificador §Y$district_pd_aw_necro$§! añadido.\nLa construcción de §Y$district_farming_plural$§! es reemplazada por §G$district_pd_aw_necro_plural$§!"
 decision_pd_necro_planet_cleanup: "Eliminar Necrópolis Planetaria"
 decision_pd_necro_planet_cleanup_desc: "Debemos eliminar los templos y tumbas dejados por los anteriores propietarios de este planeta."
 decision_pd_necro_planet_cleanup_effects_short: "El modificador §Y$pd_aw_necro_planet$§! será eliminado."
