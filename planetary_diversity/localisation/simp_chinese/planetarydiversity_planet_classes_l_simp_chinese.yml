 pc_pd_aerial: "浮荚星球"
 pc_pd_aerial_desc: "潮湿的岩石星球，包裹在浓密的氮氧大气层中，降水极为丰沛。广袤的陆地被茂密的植被所覆盖，而在其高空之上，由该星球独特植物所孕育的巨大种荚，正宛如云朵般在天际间飘行。"
 pc_pd_aerial_adj: "漂浮"
 mod_pc_pd_aerial_habitability: "热带星球宜居性"
 trait_pc_pd_aerial_preference: "热带星球偏好"
