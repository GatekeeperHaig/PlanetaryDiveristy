###Colonias Bajo Cúpula
#Megaestructura
 pd_domed_colony_0: "Colonia Bajo Cúpula"
 pd_domed_colony_0_DESC: "Este planeta alberga el potencial para la terraformación. Al establecer una Colonia Bajo Cúpula, podemos crear una cabeza de puente que sirva de base para la transformación gradual del entorno planetario."
 pd_domed_colony_0_MEGASTRUCTURE_DETAILS: "Una §YColonia Bajo Cúpula§! es una colonia de domos de habitación autosuficientes en la superficie de un planeta con potencial para ser terraformado."
 requires_terraforming_candidate: "$TRIGGER_FAIL$Debe tener un modificador de Candidato a Terraformación."
 requires_correct_planet_class: "$TRIGGER_FAIL$La Clase Planetaria debe permitir la construcción de una Colonia Bajo Cúpula."
 requires_pd_colony: "$TRIGGER_FAIL$Debe haber al menos 1 Colonia No Artificial en este sistema."
 requires_pd_moon_base_site: "$TRIGGER_FAIL$Debe tener un modificador de Sitio de Puesto Planetario."
 pd_domed_base_0: "Puesto Planetario"
 pd_domed_base_0_DESC: "Este planeta inhabitable es un sitio ideal para un Puesto Planetario. Está destinado a convertirse en un centro de apoyo para las colonias vecinas del sistema solar."
 pd_domed_base_0_MEGASTRUCTURE_DETAILS: "Un §YPuesto Planetario§! es una base autosuficiente de valor estratégico en un planeta inhabitable. Aunque no es lo suficientemente grande para la colonización permanente, impulsa la economía del sistema local."
 TARGET_DOME_BASE_NAME: "[FROM.from.planet.GetName] Base"

