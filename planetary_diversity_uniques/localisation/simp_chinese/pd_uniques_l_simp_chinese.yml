l_simp_chinese:
 sr_eludium:0 "叵得矿石"
 sr_eludium_desc:0 "这种奇异的物质拥有许多违背物理定律的特性。只有在这个星球上，它才能通过影响重力来改变物质的重量。"
 mod_planet_miners_sr_eludium_produces_add: "£job_miner£[GetMinerPlural]产出的£sr_eludium£$sr_eludium$"
 pd_floating: "空岛星球"
 pd_floating_desc: "这个奇怪的世界以漂浮在空中的岛屿为特色，由一种仅在这里发现的罕见矿石支撑。层层叠叠的岛屿极大地拓展了这颗星球的生存空间。"
 pc_pd_floating: "空岛星球"
 pc_pd_floating_desc: "这个奇怪的世界以漂浮在空中的岛屿为特色，由一种仅在这里发现的罕见矿石支撑。层层叠叠的岛屿极大地拓展了这颗星球的生存空间。"
 pc_pd_floating_adj: "空岛"
 mod_pc_pd_floating_habitability: "空岛世界宜居性"
 trait_pc_pd_floating_preference: "空岛世界偏好"
 trait_pc_pd_floating_preference_desc: "$trait_pc_arctic_preference_desc$"
 d_pd_floating_the_great_knot: "巨结群岛"
 d_pd_floating_the_great_knot_desc: "这是一组星罗棋布的浮空岛屿。变幻莫测的狂风将古树连根拔起，横亘在漂浮的陆块之间，化作一道道天然的桥梁。独特的气流模式、丰富多变的微气候与罕见的野生动植物，让此地成为了研究生物演化适应力，以及探寻生命在动荡环境下的坚韧生命力的理想之地。"
 d_pd_floating_whispering_glades: "沉吟林地"
 d_pd_floating_whispering_glades_desc: "一片静谧的垂直浮岛悬浮在原野上空。微风轻拂过狭窄的通道，发出舒缓、宛如音乐般的声响，是放松身心与焕发活力的理想之地。"
 d_pd_floating_skyfall_islands: "天瀑之岛"
 d_pd_floating_skyfall_islands_desc: "这片区域由众多水系极其发达的环形岛屿组成，瀑布从岛屿边缘倾泻而下，消失在下方的薄雾中。令人叹为观止的自然美景使其成为首屈一指的贸易与旅游胜地，吸引着来自整个星系的游客与商人。"
 d_pd_floating_mining_operation: "叵得开采区"
 d_pd_floating_mining_operation_desc: "该行星的生态系统曾是大规模采矿作业的阻碍。它们已被清除，以便全面开发稀有的叵得矿石。"
 d_pd_eludium_islands: "叵得空岛"
 d_pd_eludium_islands_desc: "虽然该行星的基岩富含叵得素，许多较小的岛屿上却也存在着易于开采的富集矿床，使得采矿作业对环境的影响微乎其微。"
 decision_d_pd_the_great_knot_mining: "$d_pd_floating_the_great_knot$开发区"
 decision_d_pd_the_great_knot_mining_desc: "被称为$d_pd_floating_the_great_knot$的区域将被开发为大规模叵得素开采区。"
 decision_d_pd_whispering_glades_mining: "$d_pd_floating_whispering_glades$开发区"
 decision_d_pd_whispering_glades_mining_desc: "被称为$d_pd_floating_whispering_glades$的区域将被开发为大规模叵得素开采区。"
 decision_d_pd_skyfall_islands_mining: "$d_pd_floating_skyfall_islands$开发区"
 decision_d_pd_skyfall_islands_mining_desc: "被称为$d_pd_floating_skyfall_islands$的区域将被开发为大规模叵得素开采区。"
 tech_eludium_research:1 "叵得精炼"
 tech_eludium_research_desc: "开采叵得素并不复杂，但要理解其潜力和精炼工艺却要困难得多。与所有资源一样，想要充分释放它的潜力需要时间。"
 tech_eludium_research_tt_desc: "§H解锁：§!叵得素开采\n§H解锁：§!叵得素法令"
 edict_eludium_research:0 "叵得素研究促进"
 edict_eludium_research_desc:0 "用精炼叵得素强化实验室，可以大幅提升物理部门的研究能力。"
 edict_eludium_energy:0 "叵得素电网"
 edict_eludium_energy_desc:0 "将叵得素作为超导材整合到能量网络中，可以提升电网的吞吐功率。"
 edict_eludium_weapons:0 "叵得素武器晶体管"
 edict_eludium_weapons_desc:0 "将基于叵得素的晶体管集成到能量武器中，可以大幅提高其射速和冲击威力。"
 decision_pd_add_floating_island: "建立人工空岛"
 decision_pd_add_floating_island_desc: "借助叵得素的力量，我们可以将整座岛屿升入天空，释放出大量崭新的建设用地。"
 d_pd_artifical_floating_islands: "人工空岛"
 d_pd_artifical_floating_islands_desc: "借助叵得素的力量，我们可以将整座岛屿升入天空，释放出大量崭新的建设用地。"
 tech_eludium_floating_islands: "人工空岛构造"
 tech_eludium_floating_islands_desc: "蕴含叵得素的岛屿可以自然而然地漂浮于空中，但我们可以在其他世界的岛屿下方建造浮力装置，从而大幅扩展其他行星上的生活空间。"
 tech_eludium_floating_islands_tt_desc: "§H解锁决议：§!$decision_pd_add_floating_island$"
 building_pd_eludium_floating_resort: "浮空度假区"
 building_pd_eludium_floating_resort_desc: "借助叵得素将整体结构托举于空中，这座令人叹为观止的度假胜地凭借其置身云端的优势，坐拥极其壮阔的视野。"
 tech_eludium_floating_resort: "浮空度假区建设"
 tech_eludium_floating_resort_desc: "借助叵得素将整体结构托举于空中，我们可以建立一座令人叹为观止的度假胜地，凭借置身云端的优势，坐拥极其壮阔的视野。"
 tech_eludium_floating_overseer: "浮空监察站"
 tech_eludium_floating_overseer_desc: "借助叵得素将整体结构托举于空中，我们可以建立用于监控子个体的浮空监察站。"
 building_pd_eludium_floating_overseer: "浮空监察站"
 building_pd_eludium_floating_overseer_desc: "借助叵得素将整体结构托举于空中，这些悬浮的监视站时刻提醒着子个体牢记自身的使命。"
 pd_origin_init_floating_NAME:0 "空岛恒星系"
 pd_origin_init_floating_DESC:0 "包含空岛星球的初始恒星系"
 pdfloating.100.name: "天空之岛"
 pdfloating.100.desc: "完成了对§Y[From.GetName]§!的扫描后，§Y[Root.GetName]§!报告了一项惊人的发现。由于一种名为叵得素的独特矿石，这颗星球的陆地竟无视了物理法则，悬浮在半空之中。\n\n这种非凡矿石的特性值得进一步调查。占领并控制这颗星球，对于研究叵得素的潜力以及解开其奥秘将至关重要。"
 pdfloating.100.a: "令人惊讶。"
 origin_pd_floating_world:0 "天空之岛"
 origin_pd_floating_world_desc:0 "这一文明诞生于一颗星海中绝无仅有的星球。得益于叵得素这一物质，这颗行星的陆地可以轻盈地悬浮于天际。"
 origin_tooltip_floating_world_effects:0 "—$HOMEWORLD$$TABBED_NEW_LINE$—§Y$pc_continental$§!（规模：£planetsize£20）$TABBED_NEW_LINE$—拥有['concept_pd_floating']星球修正$TABBED_NEW_LINE$—拥有两项['concept_d_pd_eludium_islands']星球特征\n—可额外获得科技：$TABBED_NEW_LINE$—['concept_eludium_research', £engineering_research£ $tech_eludium_research$]$TABBED_NEW_LINE$—['concept_eludium_floating_islands', £physics_research£ $tech_eludium_floating_islands$]$TABBED_NEW_LINE$—['concept_eludium_floating_resort', £physics_research£ $tech_eludium_floating_resort$]（常规帝国）$TABBED_NEW_LINE$—['concept_eludium_floating_overseer', £physics_research£ $tech_eludium_floating_overseer$]（格式塔帝国）"
