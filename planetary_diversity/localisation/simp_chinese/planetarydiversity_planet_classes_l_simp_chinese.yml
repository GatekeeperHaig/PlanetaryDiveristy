 pc_pd_moss: "苔藓星球"
 pc_pd_moss_desc: "这颗星球的表面完全被茂密且肆意蔓延的苔藓覆盖。这种生命力顽强的植被如毛毯般铺满大地，形成了一个宛如海绵般的生态系统，从而维持了水圈的稳定。"
