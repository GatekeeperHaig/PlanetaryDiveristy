 pc_pd_domed_colony_frozen: "Colônia Abobadada Gelada"
 pc_pd_domed_colony_frozen_desc: "Um mundo rochoso coberto por uma espessa camada de gelo permanente. Baixas temperaturas e uma atmosfera fina impedem a existência de vida na superfície. Colônias abobadadas foram construídas na superfície, permitindo habitação permanente."
 pc_pd_domed_colony_frozen_adj: "$pc_pd_domed_colony_barren_adj$"
