l_spanish:
###Lithoid Planets
#Decision
 decision_pd_aw_lithoid_planet: "Crear Ecosistema Litotrófico"
 decision_pd_aw_lithoid_planet_desc: "Este mundo espera ser esculpido en uno de cristal y piedra. El débil ecosistema biológico se interpone en nuestro camino."
 decision_pd_aw_lithoid_planet_effects_short: "Un ecosistema litotrófico será tallado en este mundo, permitiéndonos ajustar con precisión las frecuencias cristalinas para satisfacer mejor nuestras necesidades."
 decision_pd_aw_lithoid_planet_tooltip: "Una vez completado, podremos elegir la frecuencia de los cristales litoróficos de este planeta."
 decision_pd_aw_lithoid_planet_cleanup: "Restaurar Ecosistema Biológico"
 decision_pd_aw_lithoid_planet_cleanup_desc: "Debemos restaurar el ecosistema biológico de este planeta a su gloria original."
 decision_pd_aw_lithoid_planet_cleanup_effects_short: "El ecosistema litotrófico creado artificialmente será eliminado, restaurándolo a su naturaleza biológica."
 decision_pd_aw_lithoid_planet_cleanup_tooltip: "Todos los Modificadores Litoróficos serán eliminados y el planeta será devuelto a un ecosistema biológico."
 decision_pd_aw_lithoid_change_frequency: "Cambiar Frecuencia Litotrófica"
 decision_pd_aw_lithoid_change_frequency_desc: "Cambiaremos la frecuencia de los cristales del ecosistema litotrófico para satisfacer mejor nuestras necesidades."
 decision_pd_aw_lithoid_change_frequency_effects_short: "Podemos cambiar la frecuencia de los cristales de este planeta."
 decision_pd_aw_lithoid_change_frequency_tooltip: "El modificador Litotrófico actual será eliminado, permitiéndonos cambiarlo a una frecuencia diferente."

#Modifiers
 pd_aw_lithoid_planet_cyan: "Mundo Litotrófico"
 pd_aw_lithoid_planet_cyan_desc: "Frecuencia: 500 nm\nLas vibraciones resonantes fomentan la buena voluntad y catalizan una tasa de crecimiento acelerada para los Litoides."
 pd_aw_lithoid_planet_red: "Mundo Litotrófico"
 pd_aw_lithoid_planet_red_desc: "Frecuencia: 650 nm\nLa robusta resonancia cristalina se sinergiza a la perfección con los depósitos minerales, haciéndolos más accesibles para su extracción."
 pd_aw_lithoid_planet_yellow: "Mundo Litotrófico"
 pd_aw_lithoid_planet_yellow_desc: "Frecuencia: 580 nm\nLa dinámica armónica de esta resonancia cristalina se integra perfectamente con nuestras redes de energía, desbloqueando su capacidad total."

#Ascension Perk
 ap_pd_lithoid_worlds: "Mundos Litoróficos"
 ap_pd_lithoid_worlds_desc: "Esculpiremos nuestros mundos en paraísos litoróficos inquebrantables, forjando una base de estabilidad eterna."
 allow_lithoid_worlds: "§HDesbloquea Decisión:§! $decision_pd_aw_lithoid_planet$"
 describe_lithoid_worlds: "§YMundos Litoróficos§! son una clase de planeta especial con ecosistemas de base litotrófica, que permite sintonizar la frecuencia de grandes estructuras cristalinas que pueden mejorar $i_unity$, $i_minerals$ o $i_energy$.\n$MOD_LITHOID_POP_HAPPINESS$: §G25%§!\n$mod_LITHOID_logistic_growth_mult$: §G25%§!\n$MOD_BIOLOGICAL_POP_HAPPINESS$: §R-50%§!\n$MOD_BIO_LOGISTIC_GROWTH_MULT$: §R-50%§!"

#Notification Message
 MESSAGE_PD_AW_LITHOID_DESC:1 "$PLANET|Y$ ahora es un §YMundo Litotrófico§!"
 MESSAGE_PD_AW_LITHOID_MESSAGE_TYPE_TITLE: "Bioma Litotrófico Completo"
 MESSAGE_PD_AW_LITHOID_CLEANUP_DESC:1 "El bioma biológico en $PLANET|Y$ ha sido restaurado."
 MESSAGE_PD_AW_LITHOID_CLEANUP_MESSAGE_TYPE_TITLE: "Bioma Litotrófico Eliminado"

#Choose Event
 pdawlithoidplanets.100.name: "Frecuencia Cristalina"
 pdawlithoidplanets.100.desc: "¿Qué frecuencia resonante sintonizaremos en el bioma litotrófico de §Y[This.GetName]§!?"
 pdawlithoidplanets.100.cyan: "Cian"
 pdawlithoidplanets.100.cyan.tooltip: "Esta frecuencia resonante actúa como una fuerza cohesiva, fomentando la unidad entre nuestra población litoide y nutriendo un aumento armonioso del crecimiento poblacional."
 pdawlithoidplanets.100.red: "Rojo"
 pdawlithoidplanets.100.red.tooltip: "Esta resonancia se sinergiza a la perfección con los depósitos minerales, haciéndolos más accesibles y maduros para su extracción."
 pdawlithoidplanets.100.yellow: "Amarillo"
 pdawlithoidplanets.100.yellow.tooltip: "Esta frecuencia resonante se integra perfectamente con nuestras redes de energía, desbloqueando un aumento en su capacidad total."

