 pc_pd_domed_colony_superhabitable: "Colônia Abobadada Super-habitável"
 pc_pd_domed_colony_superhabitable_desc: "Mundo super-habitável árido e rochoso com uma atmosfera fina ou inexistente, a superfície completamente desprovida de vida e coberta de crateras de impacto de meteoros. Colônias abobadadas foram construídas na superfície, permitindo habitação permanente."
 pc_pd_domed_colony_superhabitable_adj: "$pc_pd_domed_colony_barren_adj$"
