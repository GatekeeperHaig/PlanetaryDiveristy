 trait_pc_pd_domed_colony_frozen_preference_desc: "Placeholder/Should not see."
 pc_pd_domed_colony_toxic: "Colonia Bajo Cúpula Tóxica"
 pc_pd_domed_colony_toxic_desc: "Este mundo es un planeta rocoso con una atmósfera densa letal para todas las formas de vida superiores conocidas. Grandes ciudades flotantes bajo cúpula por encima de las nubes tóxicas permiten la habitación permanente."
