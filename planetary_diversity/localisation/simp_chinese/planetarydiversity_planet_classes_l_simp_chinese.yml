 pc_pd_steppe_desc: "干燥的岩石星球，拥有氮氧大气层。作为半干旱的草原世界，其大部分地表被连绵起伏的丘陵和平原所覆盖。尽管这里几乎不长树木，但降水足以维持灌木和草本植物的生长。"
