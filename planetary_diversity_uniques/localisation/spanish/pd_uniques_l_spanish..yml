l_spanish:
###Floating World
 sr_eludium:0 "Mineral de Eludium"
 sr_eludium_desc:0 "Esta sustancia exótica posee muchas propiedades que desafían las leyes de la física. Solo en este planeta puede alterar la masa de la materia al afectar la gravedad."
 mod_planet_miners_sr_eludium_produces_add: "£sr_eludium£ $sr_eludium$ de £job_miner£ [GetMinerPlural]"
 pd_floating: "Mundo Flotante"
 pd_floating_desc: "Este extraño mundo presenta islas que flotan en el cielo, sostenidas por un mineral raro que solo se encuentra aquí. Las múltiples capas de islas proporcionan al planeta un espacio habitable considerablemente mayor."
 pc_pd_floating: "Mundo Flotante"
 pc_pd_floating_desc: "Un extraño mundo con islas que flotan en el cielo, sostenidas por un mineral raro que solo se encuentra aquí. Las múltiples capas de islas proporcionan al planeta un espacio habitable considerablemente mayor."
 pc_pd_floating_adj: "flotante"
 mod_pc_pd_floating_habitability: "Habitabilidad Flotante"
 trait_pc_pd_floating_preference: "Preferencia Flotante"
 trait_pc_pd_floating_preference_desc: "$trait_pc_arctic_preference_desc$"
 d_pd_floating_the_great_knot: "El Gran Nudo"
 d_pd_floating_the_great_knot_desc: "Un grupo disperso de islas donde árboles milenarios, arrancados de raíz por vientos cambiantes, forman puentes naturales entre las masas terrestres flotantes. Los patrones de viento únicos, los microclimas variados y la fauna rara hacen de este lugar un sitio ideal para estudiar las adaptaciones evolutivas y la resiliencia de la vida en entornos dinámicos."
 d_pd_floating_whispering_glades: "Praderas Susurrantes"
 d_pd_floating_whispering_glades_desc: "Un sereno grupo de islas flotantes verticales se cierne sobre praderas. La suave interacción del viento con los estrechos pasajes crea un sonido tranquilizador, casi musical, ideal para el descanso y la recuperación."
 d_pd_floating_skyfall_islands: "Islas Caídas del Cielo"
 d_pd_floating_skyfall_islands_desc: "Una región de islas en forma de anillo con una fuerte hidrosfera, donde cascadas se precipitan desde los bordes y desaparecen en la bruma inferior. El impresionante paisaje y la belleza natural lo convierten en un destino privilegiado para el comercio y el turismo, atrayendo visitantes y mercaderes de toda la galaxia."
 d_pd_floating_mining_operation: "Operación Minera a Cielo Abierto de Eludium"
 d_pd_floating_mining_operation_desc: "El ecosistema del planeta, que anteriormente bloqueaba las operaciones mineras a gran escala, ha sido despejado para explotar plenamente el raro Mineral de Eludium."
 d_pd_eludium_islands: "Islas de Eludium"
 d_pd_eludium_islands_desc: "Aunque el lecho rocoso de este planeta está saturado de Eludium, muchas islas más pequeñas contienen depósitos concentrados de fácil acceso, lo que permite que las operaciones mineras tengan un impacto ambiental mínimo."
 decision_d_pd_the_great_knot_mining: "Operación Minera de $d_pd_floating_the_great_knot$"
 decision_d_pd_the_great_knot_mining_desc: "La zona conocida como $d_pd_floating_the_great_knot$ será desarrollada en una gran operación minera de Eludium."
 decision_d_pd_whispering_glades_mining: "Operación Minera de $d_pd_floating_whispering_glades$"
 decision_d_pd_whispering_glades_mining_desc: "La zona conocida como las $d_pd_floating_whispering_glades$ será desarrollada en una gran operación minera de Eludium."
 decision_d_pd_skyfall_islands_mining: "Operación Minera de $d_pd_floating_skyfall_islands$"
 decision_d_pd_skyfall_islands_mining_desc: "La zona conocida como las $d_pd_floating_skyfall_islands$ será desarrollada en una gran operación minera de Eludium."
 tech_eludium_research:1 "Refinado de Eludium"
 tech_eludium_research_desc: "Extraer Eludium es sencillo, pero comprender su potencial y su proceso de refinado es mucho más complicado. Como todos los recursos, desvelar todo su potencial llevará tiempo."
 tech_eludium_research_tt_desc: "§HDesbloquea:§! Minería de Eludium\n§HDesbloquea:§! Edictos de Eludium"
 edict_eludium_research:0 "Impulso a la Investigación de Eludium"
 edict_eludium_research_desc:0 "Potenciar nuestros laboratorios con Eludium refinado disparará las capacidades de investigación de nuestros departamentos de física."
 edict_eludium_energy:0 "Red Energética de Eludium"
 edict_eludium_energy_desc:0 "Incorporar el Eludium como material hiperconductor en nuestra red energética amplifica su rendimiento de potencia."
 edict_eludium_weapons:0 "Transistores de Armas de Eludium"
 edict_eludium_weapons_desc:0 "Integrar transistores a base de Eludium en nuestras armas de energía mejora drásticamente su velocidad de descarga y el rendimiento del impacto."
 decision_pd_add_floating_island: "Crear Islas Flotantes Artificiales"
 decision_pd_add_floating_island_desc: "Aprovechando el poder del Eludium, podemos elevar islas enteras hacia los cielos de este mundo, abriendo vastos nuevos espacios para la construcción."
 d_pd_artifical_floating_islands: "Islas Flotantes Artificiales"
 d_pd_artifical_floating_islands_desc: "Aprovechando el poder del Eludium, hemos elevado islas enteras hacia los cielos de este mundo, abriendo vastos nuevos espacios para la construcción."
 tech_eludium_floating_islands: "Formación de Islas Artificiales"
 tech_eludium_floating_islands_desc: "Aunque las islas impregnadas de Eludium flotan de forma natural, se pueden crear dispositivos de flotabilidad bajo las islas de otros mundos, lo que nos permitirá ampliar significativamente el espacio habitable en otros planetas."
 tech_eludium_floating_islands_tt_desc: "§HDesbloquea Decisión:§! $decision_pd_add_floating_island$"
 building_pd_eludium_floating_resort: "Complejo Turístico Flotante"
 building_pd_eludium_floating_resort_desc: "Usando Eludium para mantener esta estructura en el aire, este impresionante complejo ofrece vistas espectaculares gracias a su naturaleza suspendida en el cielo."
 tech_eludium_floating_resort: "Construcción de Complejos Turísticos Flotantes"
 tech_eludium_floating_resort_desc: "Usando Eludium para mantener las estructuras en el aire, podemos crear impresionantes complejos turísticos que ofrecen vistas espectaculares gracias a su naturaleza suspendida en el cielo."
 tech_eludium_floating_overseer: "Estaciones de Supervisión Flotantes"
 tech_eludium_floating_overseer_desc: "Usando Eludium para mantener estructuras en el aire, podemos crear estaciones de supervisión flotantes para vigilar nuestros drones."
 building_pd_eludium_floating_overseer: "Estación de Supervisión Flotante"
 building_pd_eludium_floating_overseer_desc: "Usando Eludium para mantener las estructuras en el aire, estas estaciones de supervisión flotantes recuerdan constantemente a los drones su propósito."
 pd_origin_init_floating_NAME:0 "Sistema Flotante"
 pd_origin_init_floating_DESC:0 "Un sistema inicial que contiene el Mundo Flotante"

 #Events
 pdfloating.100.name: "Islas en el Cielo"
 pdfloating.100.desc: "Tras completar su escáner de §Y[From.GetName]§!, el §Y[Root.GetName]§! informa de un descubrimiento notable. Las masas terrestres de este planeta flotan en el cielo, desafiando las leyes de la física gracias a un mineral único llamado Eludium.\n\nLas propiedades de este extraordinario mineral merecen una investigación más profunda. Asegurar y mantener este planeta será crucial para estudiar el potencial del Eludium y desvelar sus secretos."
 pdfloating.100.a: "Qué asombroso."

 #Origin
 origin_pd_floating_world:0 "Islas en el Cielo"
 origin_pd_floating_world_desc:0 "Esta civilización evolucionó en un mundo sin igual en la galaxia. Gracias al elemento Eludium, las masas terrestres de este planeta flotan sin esfuerzo por el cielo."
