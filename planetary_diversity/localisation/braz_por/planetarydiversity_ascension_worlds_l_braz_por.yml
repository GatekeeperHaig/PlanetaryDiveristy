###PD Tree of Life
 #Deposits
 d_pd_tree_of_life_uncommon: "Árvore da Vida"
 d_pd_tree_of_life_uncommon_desc: "Um rebento da Grande Árvore, transplantado aqui pela Colmeia. Embora as condições sejam hospitaleiras para a Árvore, o incomum ecossistema deste planeta não a permite crescer em seu tamanho completo."
 d_pd_tree_of_life_home: "Árvore da Vida"
 d_pd_tree_of_life_home_desc: "A Árvore da Vida abrigou e sustentou a Colmeia por incontáveis gerações."
 d_pd_tree_of_life_colony: "Muda da Árvore da Vida"
 d_pd_tree_of_life_colony_desc: "Um rebento da Grande Árvore, transplantado aqui pela Colmeia. Levará algum tempo para amadurecer completamente."
 d_pd_tree_of_life_bloomed: "Árvore da Vida em Florescimento"
 d_pd_tree_of_life_bloomed_desc: "A Grande Árvore abrigou e sustentou a Colmeia por incontáveis gerações. Agora em pleno florescimento, seus efeitos benéficos podem ser sentidos por cada drone."

 #Decisions
 decision_pd_replant_tree_of_life: "Replantar a Árvore da Vida"
 decision_pd_replant_tree_of_life_desc: "Devemos estabelecer uma muda da Grande Árvore da Vida aqui para que nossa Colmeia prospere."
 decision_pd_bloom_tree_of_life: "Fazer a Árvore da Vida Florescer"
 decision_pd_bloom_tree_of_life_desc: "Incentivar uma Grande Árvore da Vida a florescer exige tempo e recursos consideráveis, mas fazê-lo desbloqueará seu verdadeiro potencial."
 decision_pd_bloom_tree_of_life_tooltip: "Este planeta será desenvolvido em um §YBloomed $pc_pd_megaflora_hive_bloomed$§!.\n\nDobrando os £pop£ §YEmpregos§! e £housing£ §YHabitações§! que cada distrito fornecerá."

 #Modifiers
 pd_tree_of_life_bloomed: "Mundo da Árvore da Vida em Florescimento"
 pd_tree_of_life_bloomed: "A Grande Árvore neste planeta amadureceu completamente e está em florescimento. Seu enorme sistema de raízes fornece espaço para drones operários adicionais e pode suportar danos consideráveis."
 pd_tree_of_life_growing: "Muda da Árvore da Vida em Crescimento"
 pd_tree_of_life_growing_desc: "Os drones deste planeta estão focados em estabelecer a muda da Grande Árvore que plantamos aqui."
 pd_tree_of_life_home: "Mundo da Árvore da Vida"
 pd_tree_of_life_home_desc: "A Grande Árvore neste planeta está completamente desenvolvida. Seu sistema de raízes fornece espaço para drones operários e resiste naturalmente a danos."
 pd_no_lifetree: "Sem Árvore da Vida"
 pd_no_lifetree_desc: "Sem uma Grande Árvore da Vida, a colmeia está incompleta."

 #Origin
 origin_pd_aw_tree_of_life: "Placeholder Origin - DO NOT USE"
 origin_pd_aw_tree_of_life_desc: "Esta origem é um marcador de posição e não funcionará no Stellaris. Por favor, remova-a antes de iniciar seu jogo, pois causará problemas."

###Wasteland
 #Decisions
 decision_pd_wasteland_planet: "Padrões Industriais Não Regulamentados"
 decision_pd_wasteland_planet_desc: "As preocupações ambientais apenas nos freiam. Ao ignorar o estado do ecossistema natural do planeta, desbloquearemos seu verdadeiro potencial industrial."
 decision_pd_wasteland_planet_effects_short: "Modificador §Y$pd_wasteland_planet$§! adicionado.\n\nAumenta §GProdução Industrial§! mas reduz £mod_pop_environment_tolerance£ §RHabitabilidade§!."
 decision_pd_wasteland_planet_cleanup: "Limpeza Ambiental"
 decision_pd_wasteland_planet_cleanup_desc: "A severa degradação ambiental neste planeta deixou seu ecossistema em estado precário. Corrigiremos os danos causados a este mundo."
 decision_pd_wasteland_planet_cleanup_tooltip: "Restauraremos o ecossistema original deste planeta."

 #Modifiers
 pd_wasteland_planet: "Terra Devastada Industrial"
 pd_wasteland_planet_desc: "As preocupações ambientais apenas nos freiam. Ao ignorar o estado do ecossistema natural do planeta, desbloqueamos o verdadeiro potencial industrial do planeta."
 pd_wasteland_planet_tooltip: "Desbloqueia £district£ §YDistritos Geradores§! e §YDistrito de Mineração§!"
 pd_aw_wasteland_planet: "Terra Devastada Industrial"
 pd_aw_wasteland_planet_desc: "$decision_pd_wasteland_planet_desc$"
 pd_aw_wasteland_planet_tooltip: "Desbloqueia £district£ §YDistritos Geradores§! e §YDistrito de Mineração§!"

 #Notification Message
 MESSAGE_PD_WASTELAND_DESC:1 "$PLANET|Y$ agora tem §Y$decision_pd_wasteland_planet$§!"
 MESSAGE_PD_WASTELAND_MESSAGE_TYPE_TITLE: "Regulamentações Ambientais Abolidas"
 MESSAGE_PD_WASTELAND_CLEANUP_DESC:1 "O ecossistema em $PLANET|Y$ foi reparado."
 MESSAGE_PD_WASTELAND_CLEANUP_MESSAGE_TYPE_TITLE: "Regulamentações Ambientais Restauradas"

###Shroud
 #Decisions
 decision_pd_shroud_planet: "Integração com o Sudário"
 decision_pd_shroud_planet_desc: "Podemos enfraquecer a barreira entre este planeta e O Sudário e criar um equilíbrio entre os reinos material e psiônico."
 decision_pd_shroud_planet_effects_short: "Modificador §Y$pd_aw_shroud_planet$§! adicionado.\n\nAumenta £pop£ §GProdução Psiônica dos Pops§! mas reduz £pop£ §YProdução dos Pops Não Psiônicos§!."
 decision_pd_shroud_planet_cleanup: "Dissociação Planetária do Sudário"
 decision_pd_shroud_planet_cleanup_desc: "Nossos físicos podem fortalecer a barreira entre este planeta e O Sudário, prendendo-o no reino material."
 decision_pd_shroud_planet_cleanup_tooltip: "\nRemoveremos a influência psiônica deste planeta."

 #Modifier
 pd_aw_shroud_planet: "Tocado pelo Sudário"
 pd_aw_shroud_planet_desc: "Neste lugar, a barreira deliberadamente enfraquecida entre o reino material e O Sudário permitiu que indivíduos com habilidades psíquicas remodelassem a realidade até certo ponto. No entanto, para aqueles sem tais dons, a linha entre o pesadelo e a realidade se confunde, dando origem a uma interminável tapeçaria de sofrimento e tormento."
 pd_aw_shroud_planet_tooltip: "§GPsiônico§! £pop£ Pops:\n- $mod_psionic_pop_bonus_workforce_mult$: §G10%§!\n- $MOD_POP_HAPPINESS$: §G25%§!\n\n§YNão Psiônico§! £pop£ Pops:\n- £mod_pop_environment_tolerance£ §YHabitabilidade Planetária§!: §R-50%§!\n- $MOD_POP_HAPPINESS$: §R-25%§!\n- $MOD_LOGISTIC_GROWTH_MULT$: §R-25%§!"

 #Notification Message
 MESSAGE_PD_SHROUD_DESC:1 "$PLANET|Y$ agora está §Y$pd_aw_shroud_planet$§!"
 MESSAGE_PD_SHROUD_MESSAGE_TYPE_TITLE: "Comunhão Planetária com o Sudário Completa"
 MESSAGE_PD_SHROUD_CLEANUP_DESC:1 "A influência do Sudário foi removida em $PLANET|Y$."
 MESSAGE_PD_SHROUD_CLEANUP_MESSAGE_TYPE_TITLE: "Planeta Liberado do Sudário"

###Necro
