 pc_pd_mangrove: "红树林星球"
 pc_pd_mangrove_desc: "拥有氮氧大气层的湿热星球。地表绝大部分被浅海淹没，高于海平面的陆地寥寥无几。在仅有的几座岛屿上，茂密的丛林从海岸线向外延伸数百英里。这里的水圈发达且稳定，孕育了极其丰富的动植物群落。"
 pc_pd_mangrove_adj: "森林"
 mod_pc_pd_mangrove_habitability: "热带星球宜居性"
