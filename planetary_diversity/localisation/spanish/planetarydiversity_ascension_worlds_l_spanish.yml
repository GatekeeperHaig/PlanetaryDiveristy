###PD Tree of Life
 #Deposits
 d_pd_tree_of_life_uncommon: "Árbol de Vida"
 d_pd_tree_of_life_uncommon_desc: "Un retoño del Gran Árbol, transplantado aquí por la Colmena. Aunque las condiciones son favorables para el Árbol, el inusual ecosistema de este planeta no le permite crecer hasta su tamaño completo."
 d_pd_tree_of_life_home: "Árbol de Vida"
 d_pd_tree_of_life_home_desc: "El Árbol de Vida ha cobijado y sustentado a la Colmena durante incontables generaciones."
 d_pd_tree_of_life_colony: "Brote del Árbol de Vida"
 d_pd_tree_of_life_colony_desc: "Un retoño del Gran Árbol, transplantado aquí por la Colmena. Le llevará tiempo madurar por completo."
 d_pd_tree_of_life_bloomed: "Árbol de Vida en Floración"
 d_pd_tree_of_life_bloomed_desc: "El Gran Árbol ha cobijado y sustentado a la Colmena durante incontables generaciones. Ahora en plena floración, sus efectos beneficiosos pueden ser sentidos por cada dron."

 #Decisions
 decision_pd_replant_tree_of_life: "Replantar el Árbol de Vida"
 decision_pd_replant_tree_of_life_desc: "Debemos establecer aquí un brote del Gran Árbol de Vida para que nuestra Colmena prospere."
 decision_pd_bloom_tree_of_life: "Hacer Florecer el Árbol de Vida"
 decision_pd_bloom_tree_of_life_desc: "Inducir la floración de un Gran Árbol de Vida requiere un tiempo y unos recursos considerables, pero hacerlo desbloqueará su verdadero potencial."
 decision_pd_bloom_tree_of_life_tooltip: "Este planeta será desarrollado hasta convertirse en un §YBloomed $pc_pd_megaflora_hive_bloomed$§!.\n\nDuplicando los £pop£ §YPuestos de Trabajo§! y £housing£ §YViviendas§! que cada distrito proporcionará."

 #Modifiers
 pd_tree_of_life_bloomed: "Mundo del Árbol de Vida en Floración"
 pd_tree_of_life_bloomed: "El Gran Árbol de este planeta ha madurado por completo y está en floración. Su enorme sistema de raíces proporciona espacio para drones obreros adicionales y puede resistir daños considerables."
 pd_tree_of_life_growing: "Brote del Árbol de Vida en Crecimiento"
 pd_tree_of_life_growing_desc: "Los drones de este planeta están centrados en establecer el brote del Gran Árbol que hemos plantado aquí."
 pd_tree_of_life_home: "Mundo del Árbol de Vida"
 pd_tree_of_life_home_desc: "El Gran Árbol de este planeta está completamente desarrollado. Su sistema de raíces proporciona espacio para los drones obreros y resiste los daños de forma natural."
 pd_no_lifetree: "Sin Árbol de Vida"
 pd_no_lifetree_desc: "Sin un Gran Árbol de Vida, la colmena está incompleta."

 #Origin
 origin_pd_aw_tree_of_life: "Placeholder Origin - DO NOT USE"
 origin_pd_aw_tree_of_life_desc: "Este origen es un marcador de posición y no funcionará en Stellaris. Por favor, elimínalo antes de comenzar tu partida, ya que causará problemas."

###Wasteland
 #Decisions
 decision_pd_wasteland_planet: "Estándares Industriales Sin Regulación"
 decision_pd_wasteland_planet_desc: "Las preocupaciones medioambientales no hacen más que frenarnos. Al ignorar el estado del ecosistema natural del planeta, desbloquearemos su verdadero potencial industrial."
 decision_pd_wasteland_planet_effects_short: "Modificador §Y$pd_wasteland_planet$§! añadido.\n\nAumenta §GProducción Industrial§! pero reduce £mod_pop_environment_tolerance£ §RHabitabilidad§!."
 decision_pd_wasteland_planet_cleanup: "Limpieza Medioambiental"
 decision_pd_wasteland_planet_cleanup_desc: "La grave degradación medioambiental de este planeta ha dejado su ecosistema en un estado precario. Repararemos el daño infligido a este mundo."
 decision_pd_wasteland_planet_cleanup_tooltip: "Restauraremos el ecosistema original de este planeta."

 #Modifiers
 pd_wasteland_planet: "Tierra Baldía Industrial"
 pd_wasteland_planet_desc: "Las preocupaciones medioambientales no hacen más que frenarnos. Al ignorar el estado del ecosistema natural del planeta, desbloqueamos el verdadero potencial industrial del planeta."
 pd_wasteland_planet_tooltip: "Desbloquea £district£ §YDistritos Generadores§! y §YDistrito Minero§!"
 pd_aw_wasteland_planet: "Tierra Baldía Industrial"
 pd_aw_wasteland_planet_desc: "$decision_pd_wasteland_planet_desc$"
 pd_aw_wasteland_planet_tooltip: "Desbloquea £district£ §YDistritos Generadores§! y §YDistrito Minero§!"

 #Notification Message
 MESSAGE_PD_WASTELAND_DESC:1 "$PLANET|Y$ ahora tiene §Y$decision_pd_wasteland_planet$§!"
 MESSAGE_PD_WASTELAND_MESSAGE_TYPE_TITLE: "Regulaciones Medioambientales Abolidas"
 MESSAGE_PD_WASTELAND_CLEANUP_DESC:1 "El ecosistema en $PLANET|Y$ ha sido reparado."
 MESSAGE_PD_WASTELAND_CLEANUP_MESSAGE_TYPE_TITLE: "Regulaciones Medioambientales Restauradas"

###Shroud
 #Decisions
 decision_pd_shroud_planet: "Integración con el Sudario"
 decision_pd_shroud_planet_desc: "Podemos debilitar la barrera entre este planeta y El Sudario y crear un equilibrio entre los reinos material y psiónico."
 decision_pd_shroud_planet_effects_short: "Modificador §Y$pd_aw_shroud_planet$§! añadido.\n\nAumenta £pop£ §GProducción Psiónica de las Pops§! pero reduce £pop£ §YProducción de Pops No Psiónicas§!."
 decision_pd_shroud_planet_cleanup: "Disociación Planetaria del Sudario"
 decision_pd_shroud_planet_cleanup_desc: "Nuestros físicos pueden reforzar la barrera entre este planeta y El Sudario, encerrándolo en el reino material."
 decision_pd_shroud_planet_cleanup_tooltip: "\nEliminaremos la influencia psiónica de este planeta."

 #Modifier
 pd_aw_shroud_planet: "Tocado por el Sudario"
 pd_aw_shroud_planet_desc: "En este lugar, la barrera deliberadamente debilitada entre el reino material y El Sudario ha permitido a individuos con habilidades psíquicas remodelar la realidad hasta cierto punto. Sin embargo, para aquellos sin tales dones, la línea entre la pesadilla y la realidad se difumina, dando lugar a un interminable tapiz de sufrimiento y tormento."
 pd_aw_shroud_planet_tooltip: "§GPsiónico§! £pop£ Pops:\n- $mod_psionic_pop_bonus_workforce_mult$: §G10%§!\n- $MOD_POP_HAPPINESS$: §G25%§!\n\n§YNo Psiónico§! £pop£ Pops:\n- £mod_pop_environment_tolerance£ §YHabitabilidad Planetaria§!: §R-50%§!\n- $MOD_POP_HAPPINESS$: §R-25%§!\n- $MOD_LOGISTIC_GROWTH_MULT$: §R-25%§!"

 #Notification Message
 MESSAGE_PD_SHROUD_DESC:1 "$PLANET|Y$ ahora está §Y$pd_aw_shroud_planet$§!"
 MESSAGE_PD_SHROUD_MESSAGE_TYPE_TITLE: "Comunión Planetaria con el Sudario Completada"
 MESSAGE_PD_SHROUD_CLEANUP_DESC:1 "La influencia de El Sudario ha sido eliminada en $PLANET|Y$."
 MESSAGE_PD_SHROUD_CLEANUP_MESSAGE_TYPE_TITLE: "Planeta Liberado del Sudario"

###Necro
