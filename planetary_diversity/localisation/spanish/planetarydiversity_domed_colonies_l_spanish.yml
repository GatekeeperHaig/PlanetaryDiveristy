 pc_pd_domed_colony_cave: "Colonia Bajo Cúpula Cavernosa"
 pc_pd_domed_colony_cave_desc: "Mundo árido, rocoso y cavernoso con una atmósfera delgada o inexistente, la superficie completamente desprovista de vida y cubierta de cráteres de impacto de meteoritos. Se han construido colonias bajo cúpula en la superficie, permitiendo la habitación permanente."
