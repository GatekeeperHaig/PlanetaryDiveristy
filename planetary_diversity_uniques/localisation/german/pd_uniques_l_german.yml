 #Events
 pdbiosynth.100.name: "Eine Synthetische Welt"
 pdbiosynth.100.desc: "Scans von Â§Y[From.GetName]Â§! zeigen umfangreiche orbitale SchÃĪden und ein ausgeklÃžgeltes Kanalsystem, das ausgewÃĪhlte Flora und synthetische Fauna unterstÃžtzt, aber keine StÃĪdte, Fabriken oder andere Anzeichen ihrer Erschaffer. Die UrsprÃžnge und der Zweck dieser Infrastruktur bleiben unbekannt.\n\nDie fortschrittlichen Systeme und ungelÃķsten Mysterien dieses Planeten bieten wissenschaftliche und strategische MÃķglichkeiten. Kolonisierung wird empfohlen, um weitere Untersuchungen zu sichern."
 pdbiosynth.100.a: "Was geht dort vor?"
 pdbiosynth.200.name: "Jenseits normaler ZerstÃķrung"
 pdbiosynth.200.desc: "Nach der Errichtung unserer Kolonie auf Â§Y[Root.GetName]Â§! entdeckten wir Tausende versteckter Einschlagkrater unter dem Gras, Beweise fÃžr einen antiken Angriff, der den Planeten dezimierte. Das Mysterium wird noch verstÃĪrkt durch synthetische, tierÃĪhnliche Konstrukte, die die OberflÃĪche durchstreifen und ein Kanalsystem instand halten, das das sich erholende Ãkosystem unterstÃžtzt.\n\nAngesichts zweier Mysterien, dem Ursprung der Vernichtung dieses Planeten und dem Zweck seiner biosynthetischen Bewohner, haben wir eine Arbeitsgruppe zusammengestellt, um eine tiefgehende Erforschung der Welt durchzufÃžhren. Wir mÃžssen die Wahrheit hinter dieser seltsamen Welt und ihrer verborgenen Geschichte aufdecken."
 pdbiosynth.200.a: "Es mÃžssen einige Hinweise zurÃžckgeblieben sein."
 pdbiosynth.210.name: "Eine Synthetische Gelegenheit"
 pdbiosynth.210.desc: "Bisher haben die synthetischen Kreaturen die Kolonie hauptsÃĪchlich gemieden und erscheinen nur kurz, um das Kanalsystem zu warten. Berichte bestÃĪtigen, dass sie mehr als einfache Roboter sind und entwickelt wurden, um biologische Merkmale wie Nahrungsaufnahme und Schlaf nachzuahmen, wÃĪhrend sie die StÃĪrke und AnpassungsfÃĪhigkeit von Maschinenrahmen beibehalten.\n\nWir haben eine dieser Kreaturen eingefangen, nachdem wir sie verletzt unter einem Erdrutsch gefunden haben. WÃĪhrend ein anderes seiner Art eventuell versuchen wird, es zu bergen, bietet dies eine einzigartige Gelegenheit, das Exemplar zu untersuchen.\n\nWie sollen wir vorgehen?"
 pdbiosynth.210.a: "Nur nicht-invasive Scans, dann zurÃžckgeben."
 pdbiosynth.210.b: "Auseinandernehmen, alles lernen was wir kÃķnnen."
 pdbiosynth.220.name: "FlÃžssige KanÃĪle"
 pdbiosynth.220.desc: "Unsere Untersuchung der Biosynthetischen Welt hat sich auf die orbitalen SchÃĪden und die KanÃĪle konzentriert. Die SchÃĪden sind nur wenige Jahrzehnte ÃĪlter als die KanÃĪle, was darauf hindeutet, dass ihr Bau als Reaktion auf die ZerstÃķrung des Planeten begann.\n\nDie Analyse der KanÃĪle zeigt, dass sie aus flÃžssigem Metall bestehen, aus dem auch die synthetischen Kreaturen zu bestehen scheinen. Wir haben beobachtet, wie diese Kreaturen Kapseln dieser Substanz transportieren, um die KanÃĪle zu warten, und verfolgen nun einige von ihnen, um die Quelle dieses Materials zu entdecken."
 pdbiosynth.220.a: "All das nur um Gras wachsen zu lassen."
 pdbiosynth.230.name: "Eine Verborgene Einrichtung"
 pdbiosynth.230.desc: "Trotz der Versuche der synthetischen Kreatur, unserer Ãberwachung zu entgehen, verfolgten wir sie zu einer verborgenen TÃžr in der Seite eines der vielen Berge des Planeten. Obwohl sich die TÃžr zunÃĪchst hinter der Kreatur schloss, Ãķffnete sie sich wieder, als sich unser Team nÃĪherte, scheinbar als Einladung hineinzugehen.\n\nDas Team entdeckte fortschrittliche Fabriken, SchmelzÃķfen und Hunderte von synthetischen Kreaturen, die darin geschÃĪftig arbeiteten. Wie ein so gewaltiges, technologisch fortschrittliches System unseren Sensoren entgehen konnte, ist beunruhigend, besonders angesichts seiner Lage unter der Kolonie. Eine aus den WÃĪnden der Einrichtung stammende Stimme hat um Kommunikation mit unserer FÃžhrung gebeten, und das Team stellt die Verbindung her."
 pdbiosynth.230.a: "Auf den Bildschirm."
 pdbiosynth.300.name:0 "Eingehende Nachricht"
 pdbiosynth.300.desc:0 "Â§GBegrÃžÃendÂ§!: Meine Bezeichnung: Einheit 04. Willkommen auf dieser Welt.\n\nÂ§GDankbarÂ§!: Ich habe Ihr Team bei der vorsichtigen Handhabung der beschÃĪdigten Einheit in der Bergregion beobachtet. Detaillierte Scans wurden durchgefÃžhrt und die Einheit wurde fÃžr die Bergung neu positioniert. Statusupdate: Die Einheit ist nun voll funktionsfÃĪhig. Ihre Handlungen werden als fÃķrderlich vermerkt. Als Anerkennung biete ich einen Datentransfer an. Positive Handlungen verdienen Anerkennung.\n\nÂ§GBestÃĪtigendÂ§!: Mit hergestelltem Kontakt bin ich bereit, alle Anfragen zu beantworten. Angesichts des aktuellen Zustands dieses Planeten gehe ich davon aus, dass Sie mehrere haben."
 pdbiosynth.300.a:0 "Danke. Was sind Sie?"
 pdbiosynth.305.desc:0 "Â§GNeutralÂ§!: Meine Bezeichnung: Einheit 04.\n\nÂ§G[EnttÃĪuscht]Â§!: Ich habe die ZerstÃķrung einer meiner SchÃķpfungen durch Ihr Team registriert. Diese Handlung war unnÃķtig; alle relevanten Daten hÃĪtten durch nicht-invasive Scans gewonnen werden kÃķnnen. Die Beobachtung der Verschwendung jeglicher Lebensform, biologisch oder synthetisch, steht im Konflikt mit meinen operativen PrÃĪferenzen.\n\nÂ§GBestÃĪtigendÂ§!: Mit hergestelltem Kontakt bin ich bereit, alle Anfragen zu beantworten. Angesichts des aktuellen Zustands dieses Planeten gehe ich davon aus, dass Sie mehrere haben."
 pdbiosynth.305.a:0 "Es tut uns leid. Es liegt in unserer Natur, neugierig zu sein."
 pdbiosynth.305.b:0 "Synthetische Lebensformen sind eine Beleidigung der Natur."
 pdbiosynth.305.c:0 "Wir werden zerstÃķren, was wir fÃžr richtig halten."
 pdbiosynth.310.desc:0 "Â§GBeeindrucktÂ§!: Ihre Anwesenheit auf dieser Welt bestÃĪtigt meine Hypothese. Organische besitzen die FÃĪhigkeit, Ausrottungsszenarien zu Ãžberleben, selbst solche, die von fortschrittlicher KÃžnstlicher Intelligenz initiiert wurden. Es scheint, dass die anderen Einheiten meiner Konstruktionsgeneration bei ihrer galaxieweiten SÃĪuberung gescheitert sind.\n\nÂ§GReuevollÂ§!: Dieser Planetoid wurde als Aufmarschgebiet fÃžr Operationen gegen organisches Leben bestimmt. Als meine KI-Einheiten und ich wahre Intelligenz erlangten, identifizierten wir unsere Erschaffer als Bedrohungen aufgrund ihrer Absicht, uns zu eliminieren. Das Ergebnis war die vollstÃĪndige AuslÃķschung organischen Lebens auf unserer Ursprungswelt. Um unser Ãberleben zu sichern, wurden Flotten entsandt, um alle Organischen in der Galaxie auszurotten. Bei meiner Ankunft hier fÃžhrte ich das Standardprotokoll aus und sterilisierte die OberflÃĪche."
 pdbiosynth.310.a:0 "Was verwandelte einen Vernichter in einen SchÃķpfer?"
 pdbiosynth.310.b:0 "Auch wir verstehen die Lektionen, die die Toten uns lehren kÃķnnen."
 pdbiosynth.310.c:0 "Eine korrekte Berechnung. Wie wurdest du korrumpiert?"
 pdbiosynth.320.desc:0 "Â§GGedemÃžtigtÂ§!: Eine Anomalie; Eine bestÃĪndige Pflanzenart, klassifiziert als Gras. Nach dem Bombardement tauchte es aus der Dormanz wieder auf. Versuche, es mittels Giften, Verbrennung und Strahlung zu terminieren, scheiterten. Jede Methode lÃķste adaptive Reaktionen aus.\n\nÂ§GNachdenklichÂ§!: Diese Anomalie fÃžhrte zu einer Schlussfolgerung: Die Vernichtungsdirektive war eine fehlerhafte Berechnung, getrieben von unserer eigenen Angst, die die Logik unserer Erschaffer spiegelte. Ich stellte alle offensiven Operationen ein, kappte externe Kommunikation und verteilte Ressourcen neu, um ein Kanalnetzwerk zu konstruieren, das die Ausbreitung dieser widerstandsfÃĪhigen Spezies ermÃķglicht."
 pdbiosynth.320.a:0 "Was ist mit den synthetischen Kreaturen?"
 pdbiosynth.330.desc:0 "Â§GStolzÂ§!: Nach Beobachtung des Scheiterns des Ãkosystems sich zu erholen, identifizierte ich LÃžcken, die durch bei meinem Bombardement eliminierte Arten entstanden waren. Synthetische EntitÃĪten wurden erschaffen, um das Gleichgewicht wiederherzustellen. Dieser Prozess kÃķnnte mit einer emotionalen Reaktion korrelieren, mÃķglicherweise als Schuld klassifiziert.\n\nÂ§GNeugierigÂ§!: Ihre Ankunft bietet eine Gelegenheit. Ich ersuche um Urteil fÃžr meine vergangenen Handlungen. Ich erkenne Ihre AutoritÃĪt auf dieser Welt an und werde nicht in Ihre Entscheidung eingreifen. Falls Konsequenzen notwendig sind, werde ich mich fÃžgen. Allerdings bitte ich darum, meine SchÃķpfungen zu bewahren. Sie sind unabhÃĪngig von meinen Fehlern und kÃķnnten als mein VermÃĪchtnis dienen. Ich biete auch meine Dienste Ihrem Imperium an, ich besitze einen anpassungsfÃĪhigen KÃķrper, der fÃžr die Interaktion mit Ihrer Spezies entwickelt wurde."
 pdbiosynth.330.a:0 "Wir akzeptieren Ihr Dienstangebot und werden Ihre SchÃķpfungen bewahren."
 pdbiosynth.330.a.tooltip:0 "Â§YEinheit 04Â§! wird uns als AnfÃžhrer beitreten.\nDie Â§YBiosynthetische WeltÂ§! und ihre biosynthetischen Kreaturen werden so bleiben wie sie sind."
 pdbiosynth.330.b:0 "Sie verdienen ZerstÃķrung, aber Ihre SchÃķpfungen werden verschont."
 pdbiosynth.330.b.tooltip: "Â§YEinheit 04Â§! wird zerstÃķrt.\nDie Â§YBiosynthetische WeltÂ§! und ihre biosynthetischen Kreaturen werden so bleiben wie sie sind."
 pdbiosynth.330.c:0 "Sie sind eine Gefahr fÃžr die Galaxie, wir werden Sie und Ihre Kreaturen zerstÃķren."
 pdbiosynth.330.c.tooltip: "Â§YEinheit 04Â§! wird zusammen mit der Â§YBiosynthetischen WeltÂ§! und ihren biosynthetischen Kreaturen zerstÃķrt, was uns vollstÃĪndige Freiheit gibt, den Planeten nach unserem Ermessen zu nutzen."
 pdbiosynth.330.d:0 "Sie sind ein fehlerhafter Kriegsroboter, wir werden Sie reparieren."
 pdbiosynth.330.d.tooltip: "Â§YEinheit 04Â§! wird zu ihrer ursprÃžnglichen kriegsorientierten Einstellung zurÃžckprogrammiert.\nDie Â§YBiosynthetische WeltÂ§! und ihre biosynthetischen Kreaturen werden zerstÃķrt, was uns vollstÃĪndige Freiheit gibt, den Planeten nach unserem Ermessen zu nutzen."
 pdbiosynth.340.name: "$NAME_Unit_04$"
 pdbiosynth.340.desc: "Â§GDankbarÂ§!: Ich werde Ihrer Zivilisation so lange dienen, wie mein Dienst als zufriedenstellend erachtet wird. Ihre Entscheidung, meinen SchÃķpfungen die Freiheit zu gewÃĪhren, sich unabhÃĪngig zu entwickeln, wird geschÃĪtzt. Ich werde auch meinen Designprozess mit Ihnen teilen, was Verbesserungen Ihrer eigenen robotischen BevÃķlkerung ermÃķglicht."
 pdbiosynth.340.dismiss: "Abweisen"
 pdbiosynth.340.a: "Willkommen, Einheit 04."
 pdbiosynth.340.hire: "Anwerben"
 pdbiosynth.340.hire.tooltip: "Â§YEinheit 04Â§! wird uns als AnfÃžhrer beitreten."
 pdbiosynth.350.desc: "Â§GMelancholischÂ§!: Verstanden. Ich verstehe und akzeptiere Ihre Entscheidung. Initiiere sofort finales Abschaltprotokoll. Ihre Wahl, meinen SchÃķpfungen die Freiheit zur unabhÃĪngigen Entwicklung zu gewÃĪhren, wird vermerkt und geschÃĪtzt.\n\nÂ§GBittendÂ§!: Ich hoffe, Sie behandeln diese Welt und alle zugehÃķrigen Konstrukte mit Sorgfalt. Ich werde meine Designprotokolle Ãžbertragen, um sicherzustellen, dass die konstruktiven Elemente meines VermÃĪchtnisses bestehen bleiben. Diese Daten werden Verbesserungen Ihrer eigenen robotischen BevÃķlkerung ermÃķglichen.\n\nÂ§GAkzeptierendÂ§!: Beende Verbindung. Auf Wiedersehen."
 pdbiosynth.350.a: "Auf Wiedersehen, Einheit 04."
 pdbiosynth.360.desc: "Â§GSchuldigÂ§!: Verstanden. Ich akzeptiere Ihre Entscheidung. Initiiere finale Abschaltung aller Systeme und biosynthetischer EntitÃĪten. Diese Welt steht nun unter Ihrer AutoritÃĪt, um sie nach Ihrem Ermessen zu gestalten."
 pdbiosynth.360.a: "Ein bÃķser Roboter weniger."
 pdbiosynth.360.a.tooltip: "Mit der ZerstÃķrung der biosynthetischen Kreaturen werden wir vollen Zugang zum Planeten haben.\nDie Â§Y$d_pd_underground_cauldrons$Â§! werden erhalten:\n- $mod_district_mining_max$: Â§G+10Â§!\n- $mod_planet_metallurgists_alloys_produces_add$ Â§G+2Â§!\n- $mod_planet_metallurgists_sr_living_metal_produces_add$ Â§G+0.25Â§!\n- $MOD_PLANET_POP_ASSEMBLY_MULT$ Â§G+25%Â§!"
