 pc_pd_tidepool: "潮池星球"
 pc_pd_tidepool_desc: "被海洋覆盖的岩石星球，拥有氮氧大气层和广阔的浅海。每日的潮汐涨落会让大片潮池显露出来，造就了充满活力的滨海生态系统，孕育出丰富多样的海洋生物。"
 pc_pd_tidepool_adj: "浅滩"
