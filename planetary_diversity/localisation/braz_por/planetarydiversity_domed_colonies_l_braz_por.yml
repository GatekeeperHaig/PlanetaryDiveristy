#Origem
 origin_pd_interplanetary_settlers: "Colonos Interplanetários"
 origin_pd_interplanetary_settlers_desc: "Antes que as estrelas fossem alcançáveis, este império lançou seus alicerces, erguendo habitats abobadados nas luas e planetas de seu sistema natal. Agora, armados com tecnologia FTL, estão à beira de uma nova era, prontos para expandir seu alcance para os reinos inexplorados do espaço."
 origin_tooltip_pd_interplanetary_settlers_start_effects: "- $INITIAL_POPS$ §G+200§!$NEW_LINE$- $HOMEWORLD$$TABBED_NEW_LINE$- ['concept_pd_network_hub', $d_pd_solar_system_network_hub$]$NEW_LINE$- Lua do Mundo Natal:$TABBED_NEW_LINE$- ['concept_pd_moonbase', $pd_domed_base_0$]$NEW_LINE$- Colônia:$TABBED_NEW_LINE$- ['concept_pd_domed_colony', $pd_domed_colony_0$]$NEW_LINE$- $ADDITONAL_TECHNOLOGIES_STRING$ ['concept_tech_pd_domed_colonies', £engineering£ $tech_pd_domed_colonies$]"
