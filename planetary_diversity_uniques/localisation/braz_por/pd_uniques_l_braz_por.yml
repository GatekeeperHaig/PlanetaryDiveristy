 #Technology
 tech_acean_research: "Processamento de Cristal Aceano"
 tech_acean_research_desc: "Dominar como preservar os poderosos efeitos do Cristal Aceano após a colheita não é tarefa simples e levará tempo para ser plenamente compreendido."
 tech_acean_research_tt_desc: "§HDesbloqueia:§! Mineração Aceana\n§HDesbloqueia:§! Editos Aceanos"
 tech_acean_superorganism_larva: "Larva de Superorganismo Aceano"
 tech_acean_superorganism_larva_desc: "Apesar de levar milhares de anos para amadurecer, podemos transplantar larvas de Superorganismos Aceanos para outros mundos. Embora muito mais fraca que o progenitor, ela melhorará o crescimento de formas de vida orgânicas simples, aumentando significativamente os rendimentos agrícolas."
 tech_acean_superorganism_larva_tt_desc: "§HDesbloqueia Decisão:§! $decision_pd_add_acean_superorganism_larva$"
 decision_pd_add_acean_superorganism_larva: "Plantar Larva de Superorganismo Aceano"
 decision_pd_add_acean_superorganism_larva_desc: "Apesar de levar milhares de anos para amadurecer, podemos transplantar larvas de Superorganismos Aceanos para outros mundos. Embora muito mais fraca que o progenitor, ela melhorará o crescimento de formas de vida orgânicas simples, aumentando significativamente os rendimentos agrícolas."
 d_pd_acean_superorganism_larva: "Larva de Superorganismo Aceano"
 d_pd_acean_superorganism_larva_desc: "Embora leve milhares de anos para amadurecer, o Superorganismo Aceano larval transplantado melhorará o crescimento de formas de vida orgânicas simples, aumentando consideravelmente os rendimentos agrícolas. Com o tempo começará a se alimentar dos colonos, mas isso ainda está muito distante no futuro."
 tech_acean_medical_center: "Teoria Médica Aceana"
 tech_acean_medical_center_desc: "Cristais Aceanos promovem o crescimento e a cura em formas de vida biológicas. Podemos melhorar enormemente os resultados de saúde construindo um centro médico de alta tecnologia com Cristais Aceanos entrelaçados por toda a sua estrutura."
 building_pd_acean_medical_center: "Centro Médico Aceano"
 building_pd_acean_medical_center_desc: "Este centro de alta tecnologia está entrelaçado com Cristais Aceanos, melhorando enormemente os resultados de saúde e possibilitando pesquisa médica de ponta."
 tech_acean_gestation_pools: "Teoria de Gestação Aceana"
 tech_acean_gestation_pools_desc: "Entrelaçar Cristal Aceano tem potencial significativo para reduzir os tempos de gestação na geração de novos drones."
 building_pd_acean_gestation_chamber: "Câmara de Gestação Aceana"
 building_pd_acean_gestation_chamber_desc: "Entrelaçar Cristal Aceano em uma câmara de geração encurta significativamente os tempos de gestação dos drones."
 tech_acean_resonators: "Ressonadores Elétricos Aceanos"
 tech_acean_resonators_desc: "Embora a ressonância do Aceano afete principalmente sistemas orgânicos, sua frequência única oferece inúmeras aplicações potenciais em sistemas robóticos."
 tech_acean_resonators_tt_desc: "§HDesbloqueia Característica:§! $trait_pd_acean_resonators$"
 trait_pd_acean_resonators: "Ressonadores de Cristal Aceano"
