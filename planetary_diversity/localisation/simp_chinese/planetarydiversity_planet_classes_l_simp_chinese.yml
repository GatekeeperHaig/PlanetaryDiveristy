 pc_pd_columnar: "石柱星球"
 pc_pd_columnar_desc: "这颗岩石星球拥有氮氧大气层和广阔的水圈。地表汪洋遍布，间或点缀着由柱状玄武岩构成的陆地，那是漫长岁月中大规模火山活动留下的印记。"
