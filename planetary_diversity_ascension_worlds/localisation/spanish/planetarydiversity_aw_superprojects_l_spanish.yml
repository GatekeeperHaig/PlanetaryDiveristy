#Planetary Superprojects
 #Notification
 MESSAGE_PD_AW_SUPERPROJECT_DESC: "El superproyecto en $PLANET|Y$ está completo."
 MESSAGE_PD_AW_SUPERPROJECT_MESSAGE_TYPE_TITLE: "Superproyecto Planetario Completo"

#Core Tap
 #Planet Class
 pc_pd_core_tap: "Perforación del Núcleo"
 pc_pd_core_tap_desc: "Este mundo rocoso alberga ahora una vasta red de máquinas que excavan hasta su núcleo para extraer energía primordial, un testamento a la destreza ingenieril que ha destruido el ecosistema original del planeta."
 pc_pd_core_tap_adj: "energético"
 mod_pc_pd_core_tap_habitability: "Habitabilidad de Perforación del Núcleo"
 trait_pc_pd_core_tap_preference: "Preferencia de Perforación del Núcleo"
 trait_pc_pd_core_tap_preference_desc: "$trait_pc_arctic_preference_desc$"

 #Decision
 decision_pd_aw_core_tap: "Superproyecto Planetario: Perforación del Núcleo"
 decision_pd_aw_core_tap_desc: "Creando una red de máquinas que excavan hasta el mismísimo núcleo de este mundo, podremos generar una cantidad increíble de energía a expensas del ecosistema del planeta."
 decision_pd_megacoretap_requirements: "£trigger_no£ §RDebe tener §Y3§! o más £district£ §Y$district_generator_plural$§! y ningún otro £district£ §YDistrito Rural§! construido en el planeta."

 #Modifier
 pd_aw_core_tap: "Perforación del Núcleo"
 pd_aw_core_tap_desc: "Este mundo cuenta con una vasta red de máquinas que excavan hasta su núcleo para extraer energía primordial, destruyendo el ecosistema original en el proceso."
 pd_aw_core_tap_tooltip: "£district£ §G$district_generator_plural$§! sin límite máximo"

 #Technology
 tech_pd_planetary_core_tap: "Superproyecto Planetario: Perforación del Núcleo"
 tech_pd_planetary_core_tap_desc: "Creando una red de máquinas que excavan hasta el mismísimo núcleo de un mundo, podremos generar una cantidad increíble de energía a expensas del ecosistema del planeta."
 tech_pd_planetary_core_tap_tooltip: "§HDesbloquea Decisión:§! $decision_pd_aw_core_tap$"

#Agriworld
 #Planet Class
 pc_pd_agriworld: "Mundo Agrícola"
 pc_pd_agriworld_desc: "Este planeta rocoso rebosa de agricultura industrial interminable que depende en gran medida de potentes fertilizantes, complejos sistemas de control meteorológico y sistemas de irrigación avanzados. Si bien sustenta una abundancia incesante, ha reemplazado el ecosistema natural del planeta."
 pc_pd_agriworld_adj: "agrario"
 mod_pc_pd_agriworld_habitability: "Habitabilidad de Mundo Agrícola"
 trait_pc_pd_agriworld_preference: "Preferencia de Mundo Agrícola"
 trait_pc_pd_agriworld_preference_desc: "$trait_pc_arctic_preference_desc$"

 #Decision
 decision_pd_aw_agriworld: "Superproyecto Planetario: Mundo Agrícola"
 decision_pd_aw_agriworld_desc: "Al transformar este planeta en un Mundo Agrícola, crearemos vastos campos de agricultura industrial, reemplazando el ecosistema natural con una expansión agrícola artificial y abundante."
 decision_pd_agriworld_requirements: "£trigger_no£ §RNo puede haber otros distritos salvo§! §Y$district_farming_plural$§!"

 #Modifier
