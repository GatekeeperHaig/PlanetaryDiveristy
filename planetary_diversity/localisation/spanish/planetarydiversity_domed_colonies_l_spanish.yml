 trait_pc_pd_domed_colony_superhabitable_preference_desc: "Placeholder/Should not see."
 pc_pd_domed_colony_tidally_locked: "Colonia Bajo Cúpula con Rotación Sincrónica"
 pc_pd_domed_colony_tidally_locked_desc: "Mundo árido y rocoso con rotación sincrónica y una atmósfera delgada o inexistente, la superficie completamente desprovista de vida y cubierta de cráteres de impacto de meteoritos. Se han construido colonias bajo cúpula en la superficie, permitiendo la habitación permanente."
