###Shroud Planets
#AP
 ap_pd_shroud_worlds: "Desfasagem do Sudário"
 ap_pd_shroud_worlds_desc: "As barreiras entre o reino mortal e O Sudário são mais finas do que o esperado. Concentrando nossa energia psiônica, podemos enfraquecer ainda mais essas barreiras e criar mundos que abranjam ambas as dimensões."
 allow_shroud_worlds: "§YDesbloqueia Decisão:§! $decision_pd_aw_shroud_planet$"
 describe_shroud_worlds: "§Y$decision_pd_aw_shroud_planet$§! modificador:\n$t$- "§GPsiônico§! £pop£ Pops:\n- $mod_planet_psionic_jobs_produces_mult$: §G10%§!\n- $MOD_POP_HAPPINESS$: §G10%§!\n\n§YNão Psiônico§! £pop£ Pops:\n- £mod_pop_environment_tolerance£ §YHabitabilidade Planetária§!: §R-50%§!\n- $MOD_POP_HAPPINESS$: §R-25%§!\n- $MOD_LOGISTIC_GROWTH_MULT$: §R-25%§"

#Decisions
 decision_pd_aw_shroud_planet: "Desfasagem do Sudário"
 decision_pd_aw_shroud_planet_desc: "Podemos enfraquecer a barreira entre este planeta e O Sudário e criar um equilíbrio entre os reinos material e psiônico."
 decision_pd_aw_shroud_planet_effects_short: "Modificador §Y$pd_aw_shroud_planet$§! adicionado.\n\nAumenta a §GProdução de Pops Psiônicos§! £pop£ mas reduz a §YProdução de Pops Não Psiônicos§! £pop£."
 decision_pd_aw_shroud_planet_cleanup: "Bloquear Fase do Planeta"
 decision_pd_aw_shroud_planet_cleanup_desc: "Nossos físicos podem fortalecer a barreira entre este planeta e O Sudário, bloqueando-o no reino material."
 decision_pd_aw_shroud_planet_cleanup_tooltip: "\nRemoveremos a influência psiônica deste planeta."

#Modifiers
 pd_aw_shroud_planet: "Tocado pelo Sudário"
 pd_aw_shroud_planet_desc: "Neste lugar, a barreira deliberadamente enfraquecida entre o reino material e O Sudário permitiu que indivíduos com habilidades psíquicas remodelassem a realidade até certo ponto. No entanto, para aqueles sem tais dons, a linha entre o pesadelo e a realidade se confunde, dando origem a uma tapeçaria interminável de sofrimento e tormento."
 pd_aw_shroud_planet_tooltip: "§GPsiônico§! £pop£ Pops:\n- $mod_psionic_pop_bonus_workforce_mult$: §G10%§!\n- $MOD_POP_HAPPINESS$: §G25%§!\n\n§YNão Psiônico§! £pop£ Pops:\n- £mod_pop_environment_tolerance£ §YHabitabilidade Planetária§!: §R-50%§!\n- $MOD_POP_HAPPINESS$: §R-25%§!\n- $MOD_LOGISTIC_GROWTH_MULT$: §R-25%§!"
 pd_shroud_planet: "$pd_aw_shroud_planet$"
 pd_shroud_planet_desc: "$pd_aw_shroud_planet_desc$"
 pd_shroud_planet_tooltip: "$pd_aw_shroud_planet_tooltip$"

#Notification Message
 MESSAGE_PD_AW_SHROUD_DESC:1 "$PLANET|Y$ agora está §Y$pd_aw_shroud_planet$§!"
 MESSAGE_PD_AW_SHROUD_MESSAGE_TYPE_TITLE: "Comunhão Planetária com O Sudário Completa"
 MESSAGE_PD_AW_SHROUD_CLEANUP_DESC:1 "A influência do Sudário foi removida em $PLANET|Y$."
 MESSAGE_PD_AW_SHROUD_CLEANUP_MESSAGE_TYPE_TITLE: "Planeta Liberado do Sudário"
