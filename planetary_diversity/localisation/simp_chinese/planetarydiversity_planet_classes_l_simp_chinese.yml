 trait_pc_pd_gaia_superhabitable_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_nuked_superhabitable: "超级类地星球（死寂）"
 pc_pd_nuked_superhabitable_desc: "这一超级类地星球是拥有氮氧大气的岩石星球。目前它正处于核冬天，大气中含有乌黑浓厚的悬浮颗粒。表面鲜有生命迹象，强重力环境对于不适应者会是一种折磨。"
 pc_pd_wet_tidally_locked: "潮汐锁定星球（湿润）"
 pc_pd_wet_tidally_locked_desc: "这是一个潮湿的岩石星球，拥有浓厚的氮氧大气层。该行星处于潮汐锁定状态，其温度条件与稳定的水圈使得昼半球及晨昏带得以维持丰富的生物多样性。"
