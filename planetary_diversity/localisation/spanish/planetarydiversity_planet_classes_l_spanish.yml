 pc_pd_barren_tidally_locked: "Mundo Yermo Bloqueado por Marea"
 pc_pd_barren_tidally_locked_desc: "Mundo rocoso y yermo con una atmósfera fina o inexistente que está bloqueado por marea. La superficie está cubierta de cráteres de impacto de meteoritos y completamente desprovista de vida."
 pc_pd_nuked_tidally_locked: "Mundo Tumba Bloqueado por Marea"
 pc_pd_nuked_tidally_locked_desc: "Un mundo rocoso bloqueado por marea con una atmósfera de nitrógeno y oxígeno; este planeta está experimentando actualmente un invierno nuclear, con densas capas de aerosoles tiznados en la atmósfera. Hay mínimas señales de vida."

###Caverna
 pc_pd_cold_cave: "Mundo de Caverna Fría"
 pc_pd_cold_cave_desc: "Mundo rocoso con una atmósfera de nitrógeno y oxígeno. Con una magnetosfera débil, gran parte de la superficie de este mundo es roca estéril. Bajo la superficie hay una interminable serie de cuevas con una hidrosfera congelada que sustenta líquenes y musgos."
 pc_pd_cold_cave_adj: "cavernoso"
 mod_pc_pd_cold_cave_habitability: "Habitabilidad de Caverna Fría"
 trait_pc_pd_cold_cave_preference: "Preferencia de Caverna Fría"
 trait_pc_pd_cold_cave_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_dry_cave: "Mundo de Caverna Seca"
 pc_pd_dry_cave_desc: "Mundo rocoso con una atmósfera de nitrógeno y oxígeno. Con una magnetosfera débil, gran parte de la superficie de este mundo es roca estéril. Bajo la superficie, una interminable serie de cuevas de arenisca sustenta una débil hidrosfera y vegetación resistente a la sequía."
 pc_pd_dry_cave_adj: "cavernoso"
 mod_pc_pd_dry_cave_habitability: "Habitabilidad de Caverna Seca"
 trait_pc_pd_dry_cave_preference: "Preferencia de Caverna Seca"
 trait_pc_pd_dry_cave_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_wet_cave: "Mundo de Caverna Húmeda"
 pc_pd_wet_cave_desc: "Mundo rocoso con una atmósfera de nitrógeno y oxígeno. Con una magnetosfera débil, gran parte de la superficie de este mundo es roca estéril. Bajo la superficie se esconde una interminable serie de cuevas con una rica hidrosfera que incluye ríos y océanos subterráneos."
 pc_pd_wet_cave_adj: "cavernoso"
 mod_pc_pd_wet_cave_habitability: "Habitabilidad de Caverna Húmeda"
 trait_pc_pd_wet_cave_preference: "Preferencia de Caverna Húmeda"
 trait_pc_pd_wet_cave_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_gaia_cave: "Mundo de Caverna Gaia"
 pc_pd_gaia_cave_desc: "Un mundo idóneo y cavernoso templado con una atmósfera de nitrógeno y oxígeno y un ecosistema resiliente. Con una magnetosfera débil, gran parte de la superficie de este mundo es roca estéril pero existen condiciones óptimas para todas las formas de vida superiores conocidas en diferentes latitudes en las cavernas."
 pc_pd_gaia_cave_adj: "cavernoso"
 mod_pc_pd_gaia_cave_habitability: "Habitabilidad"
 trait_pc_pd_gaia_cave_preference: "Preferencia"
 trait_pc_pd_gaia_cave_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_barren_cave: "Mundo de Caverna Yermo"
 pc_pd_barren_cave_desc: "Mundo rocoso yermo y cavernoso con una atmósfera fina o inexistente. La superficie está cubierta de cráteres de impacto de meteoritos y está completamente desprovista de vida, pero esconde una extensa red de cuevas bajo la superficie."
 pc_pd_nuked_cave: "Mundo Tumba de Caverna"
 pc_pd_nuked_cave_desc: "Un mundo rocoso de caverna con una atmósfera de nitrógeno y oxígeno; este planeta está experimentando actualmente un invierno nuclear, con densas capas de aerosoles tiznados en la atmósfera y altos niveles de radiación en la superficie y en su red de cavernas. Hay mínimas señales de vida."

###Uninhabitables - Solo Dummy
 pc_carbon: "Mundo de Carbono"
 pc_carbon_desc: "Mundo yermo y rocoso con una atmósfera fina o inexistente. La superficie está cubierta de cráteres de impacto de meteoritos y completamente desprovista de vida. A diferencia de la mayoría de los mundos basados en compuestos de silicio-oxígeno, tiene una relación carbono-oxígeno mucho mayor."
 pc_iron: "Mundo de Hierro"
 pc_iron_desc: "Mundo yermo y rocoso con una atmósfera fina o inexistente. La superficie está cubierta de cráteres de impacto de meteoritos y completamente desprovista de vida. El planeta consiste principalmente en un núcleo rico en hierro con poco o ningún manto."
 pc_subglacial: "Mundo Subglacial"
 pc_subglacial_desc: "Un mundo rocoso cubierto por una gruesa capa de hielo permanentemente congelado. Las bajas temperaturas y una atmósfera fina impiden la existencia de vida en la superficie. Bajo la sólida superficie de hielo, el calentamiento por mareas o la actividad geotérmica permiten que se forme un océano subsuperficial."
 pc_hydrocarbon: "Mundo de Hidrocarburos"
 pc_hydrocarbon_desc: "Un mundo rocoso cubierto por una gruesa capa de hielo permanentemente congelado y material rocoso. La densa y opaca atmósfera de nubes de nitrógeno, metano y etano. Lagos y mares de hidrocarburos líquidos pueden encontrarse en este mundo sin vida."
 pc_hothouse: "Mundo de Invernadero"
 pc_hothouse_desc: "Un mundo rocoso con una atmósfera que experimenta un efecto invernadero descontrolado. Letal para todas las formas de vida."
 pc_ethane_ocean: "Mundo de Océano de Etano"
 pc_ethane_ocean_desc: "Un planeta rocoso con una espesa atmósfera letal para todas las formas de vida superiores conocidas. Este mundo está cubierto de océanos de etano hidrocarburo líquido."
 pc_diamond: "Mundo de Diamantes"
 pc_diamond_desc: "Mundo yermo y rocoso con una atmósfera fina o inexistente. La superficie está cubierta de cráteres de impacto de meteoritos y completamente desprovista de vida. Con altos niveles de carbono y debido a las altas temperaturas y presión en este planeta, gran parte de este mundo se ha formado en diamantes."
 pc_volcanic_pd: "Mundo Volcánico"
 pc_volcanic_pd_desc: "Mundo rocoso cubierto de volcanes. La atmósfera es fina o inexistente, y la alta actividad geológica del interior provoca erupciones volcánicas constantes. Este tipo de planeta no puede sustentar vida orgánica. Las columnas de azufre pueden alcanzar hasta 500 km sobre la superficie."
 pc_chthonian: "Mundo Ctónico"
 pc_pd_ash: "Mundo de Ceniza"
 pc_pd_ash_desc: "Mundo rocoso con una atmósfera teñida de azufre y vastas llanuras de basalto enfriado enterradas bajo profundas acumulaciones de ceniza volcánica. Lagos de lava aislados y flujos lentos persisten donde la actividad geotérmica ventea a través de campos de dunas de ceniza y conos dormantes. Solo se pueden encontrar formas de vida extremófilas, si las hay."
 pc_pd_ash_adj: "ceniciento"
 mod_pc_pd_ash_habitability: "Habitabilidad Volcánica"
 trait_pc_pd_ash_preference: "Preferencia Volcánica"
 trait_pc_pd_ash_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_chthonian_desc: "Mundo yermo y rocoso con una atmósfera fina o inexistente. La superficie está cubierta de cráteres de impacto de meteoritos y completamente desprovista de vida. Este planeta fue una vez un gigante gaseoso, pero su atmósfera de hidrógeno y helio fue despojada, dejando solo el estéril núcleo metálico."
 pc_hot_gas_giant: "Gigante Gaseoso Caliente"
 pc_hot_gas_giant_desc: "Planeta gaseoso con una atmósfera compuesta principalmente de hidrógeno y helio que rodea un núcleo denso. Las temperaturas de este gigante gaseoso son mucho más altas que el promedio, lo que causa patrones meteorológicos extremos que pueden aprovecharse para la recolección de energía y gases raros."
 pc_cold_gas_giant: "Gigante Gaseoso Frío"
 pc_cold_gas_giant_desc: "Planeta gaseoso con una atmósfera compuesta principalmente de hidrógeno y helio que rodea un núcleo denso. Las temperaturas de este gigante gaseoso son más bajas que el promedio, lo que ofrece oportunidades de investigación más estables."
 pc_cloudless_gas_giant: "Gigante Gaseoso Sin Nubes"
 pc_cloudless_gas_giant_desc: "Planeta gaseoso con una atmósfera que no forma una cobertura nubosa global porque carece de los productos químicos adecuados en la atmósfera para formar nubes."
 pc_dwarf_gas_giant: "Enano Gaseoso"
 pc_dwarf_gas_giant_desc: "Planeta gaseoso con una atmósfera compuesta principalmente de hidrógeno y helio que rodea un núcleo denso. Tiene una gruesa atmósfera de hidrógeno-helio, con capas profundas de hielo, roca u océanos líquidos de agua y amoniaco."

