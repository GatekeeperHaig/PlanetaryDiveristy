 #Habitats

#Modificadores
 hab_terraforming_candidate: "Candidato a Terraformación"
 hab_terraforming_candidate_desc: "Aunque árido y desprovisto de vida, este planeta cuenta con agua en forma congelada y puede haber albergado en otro tiempo un ecosistema próspero. Con la tecnología adecuada, podría terraformarse hasta convertirse en un mundo habitable."
 pd_domed_colony: "Colonia Bajo Cúpula"
 pd_domed_colony_desc: "Los residentes de la colonia viven bajo una red avanzada de domos protectores que los protegen de las inhóspitas condiciones del planeta. Aunque ofrecen seguridad, estas estructuras exigen altos costes de mantenimiento y expansión."
 pd_moon_base_trade: "Puesto Lunar Comercial"
 pd_moon_base_trade_desc: "Barrios comerciales, almacenes y puertos espaciales pueblan esta red avanzada de domos protectores, convirtiéndola en un animado centro comercial. Conectada a su planeta madre, esta base bajo cúpula depende del vínculo vital con el mundo habitable cercano para sobrevivir."
 pd_moon_base_military: "Puesto Lunar Militar"
 pd_moon_base_military_desc: "Arsenales, cuarteles y rampas de lanzamiento dominan el paisaje en torno a esta red avanzada de domos protectores. Esta base bajo cúpula depende del mundo habitable vecino para el apoyo logístico."
 pd_moon_base_factory: "Puesto Lunar Industrial"
 pd_moon_base_factory_desc: "Fábricas, talleres artesanales y centros de fabricación son el corazón de esta red avanzada de domos protectores. Vinculada al mundo habitable cercano, depende de esta conexión para sus recursos y la distribución de sus bienes manufacturados."
 pd_moon_base_foundry: "Puesto Lunar de Fundición"
 pd_moon_base_foundry_desc: "Fundiciones y plantas de procesamiento de aleaciones son el núcleo de esta red avanzada de domos protectores. Estrechamente ligada a su planeta madre, esta base bajo cúpula depende de la conexión esencial con el mundo habitable cercano para obtener materias primas y exportar sus aleaciones acabadas."
 pd_moon_base_admin: "Puesto Lunar Administrativo"
 pd_moon_base_admin_desc: "Oficinas gubernamentales y agencias burocráticas llenan esta red avanzada de domos protectores. Vinculada a su planeta madre, esta base bajo cúpula depende de la conexión crucial con el mundo habitable cercano para suministros y mantenimiento."
 pd_moon_base_priest: "Puesto Lunar Eclesiástico"
 pd_moon_base_priest_desc: "Templos y santuarios ocupan esta red avanzada de domos protectores, distinguiéndola como centro espiritual para los fieles. Esta base bajo cúpula está ligada a su planeta madre y depende de la sagrada conexión con el mundo habitable cercano."
 pd_domed_base_research: "Puesto Planetario de Investigación"
 pd_domed_base_research_desc: "Laboratorios e instalaciones de investigación dominan esta red avanzada de domos protectores. Está vinculada a los planetas del sistema solar y depende de ese vínculo para obtener recursos esenciales."
 pd_domed_base_mining: "Puesto Planetario Minero"
 pd_domed_base_mining_desc: "Minas e instalaciones de extracción son la columna vertebral de esta red avanzada de domos protectores. Está anclada a los planetas del sistema solar, dependiendo de esta conexión para suministrar recursos esenciales y transportar los materiales extraídos."
 pd_domed_base_energy: "Puesto Planetario Generador"
 pd_domed_base_energy_desc: "Plantas de energía y conversores forman el núcleo de esta red avanzada de domos protectores. Vinculada a los planetas del sistema solar, depende de esta conexión para obtener recursos vitales y distribuir créditos de energía."
 pd_domed_base_food: "Puesto Planetario Hidropónico"
 pd_domed_base_food_desc: "Granjas hidropónicas y módulos agrícolas se extienden por esta red avanzada de domos protectores. Conectada a los planetas del sistema solar, depende de esta conexión para suministros y la distribución de alimentos."
 pd_domed_moonbase_site_1: "Sitio de Base Lunar"
 pd_domed_moonbase_site_1_desc: "Esta luna es ideal para establecer un Puesto Planetario, pero requiere un planeta colonizado en el sistema solar para garantizar su abastecimiento y sostenibilidad."
 pd_domed_research_site_1: "Posible Sitio de Puesto Planetario de Investigación"
 pd_domed_research_site_1_desc: "Este planetoide es ideal para establecer una Base de Investigación Bajo Cúpula, pero requiere un planeta colonizado en el sistema solar para garantizar su abastecimiento y sostenibilidad."
 pd_domed_mining_site_1: "Posible Sitio de Puesto Planetario Minero"
 pd_domed_mining_site_1_desc: "Este planetoide es ideal para establecer una Base Minera Bajo Cúpula, pero requiere un planeta colonizado en el sistema solar para garantizar su abastecimiento y sostenibilidad."
 pd_domed_food_site_1: "Posible Sitio de Puesto Planetario Hidropónico"
 pd_domed_food_site_1_desc: "Este planetoide es ideal para establecer una Base Hidropónica Bajo Cúpula, pero requiere un planeta colonizado en el sistema solar para garantizar su abastecimiento y sostenibilidad."
 pd_domed_energy_site_1: "Posible Sitio de Puesto Planetario Generador"
 pd_domed_energy_site_1_desc: "Este planetoide es ideal para establecer una Base Generadora Bajo Cúpula, pero requiere un planeta colonizado en el sistema solar para garantizar su abastecimiento y sostenibilidad."

#Depósitos
 #Depósitos de Terraformación
 d_phab_energy_1: "Isótopos Radiactivos"
 d_phab_energy_1_desc: "Este sitio cuenta con una rica veta de isótopos radiactivos, fácilmente accesibles e ideales para la generación eficiente de energía."
 d_phab_energy_2: "Lagos de Gas Congelado"
 d_phab_energy_2_desc: "Gases antiguos solidificados bajo una inmensa presión en estos lagos gélidos crean un depósito único y valioso de recursos congelados."
 d_phab_energy_3: "Fumarolas Subterráneas"
 d_phab_energy_3_desc: "Sedimentos metalíferos y aguas subterráneas sobrecalentadas se combinan en una reacción volátil, produciendo ventilaciones químicas ricas en energía, ideales para la generación de potencia."
 d_phab_mining_1: "Campos Minerales"
 d_phab_mining_1_desc: "Un levantamiento geológico expuso estos valiosos minerales a la superficie planetaria hace mucho tiempo."
 d_phab_mining_2: "Cavernas Ricas en Minerales"
 d_phab_mining_2_desc: "Estas profundas cavernas están repletas de depósitos de mineral metálico y mineral."
 d_phab_mining_3: "Montaña Rica"
 d_phab_mining_3_desc: "Las laderas de estas montañas brillan con ricos recursos minerales y piedras preciosas."
 d_phab_food_1: "Depósito de Nitrógeno"
 d_phab_food_1_desc: "Los dispersos depósitos de nitrógeno en este planeta podrían ser vitales para transformar su terreno en tierras fértiles para la producción de alimentos tras la terraformación."
 d_phab_food_2: "Depósito de Fósforo"
 d_phab_food_2_desc: "Los dispersos depósitos de fósforo en este planeta podrían ser vitales para transformar su terreno en tierras fértiles para la producción de alimentos tras la terraformación."
 d_phab_food_3: "Depósito de Potasio"
 d_phab_food_3_desc: "Los dispersos depósitos de potasio en este planeta podrían ser vitales para transformar su terreno en tierras fértiles para la producción de alimentos tras la terraformación."
 d_pd_solar_system_network_hub: "Centro de Red Intrasolar"
 d_pd_solar_system_network_hub_desc: "Este centro es un vínculo vital para los puestos planetarios de este sistema solar. Mientras las bases ofrecen empleo y alojamiento, la colonia central proporciona suministros y recursos esenciales para mantener las operaciones."

#Tecnología
 tech_pd_domed_colonies: "Habitación Bajo Cúpula"
 tech_pd_domed_colonies_desc: "Los avances tecnológicos hacen factible el establecimiento de colonias bajo cúpula en fronteras planetarias que antes eran inhóspitas."
 allow_domed_colonies: "§HDesbloquea Megaestructuras:§! §YColonias Bajo Cúpula§! y §YPuestos Planetarios§!"
 allow_domed_colonies_DETAILS: "Esta tecnología permitirá la construcción de Colonias Bajo Cúpula y Bases en algunos mundos inhabitables."

#Decisiones
 decision_build_solar_system_network_hub: "Construir el $d_pd_solar_system_network_hub$"
 decision_build_solar_system_network_hub_desc: "Construiremos un centro que conecte los Puestos Planetarios del sistema solar con la economía de este mundo."
 decision_remove_solar_system_network_hub: "Eliminar el $d_pd_solar_system_network_hub$"
 decision_remove_solar_system_network_hub_desc: "Eliminaremos el centro que conecta los Puestos Planetarios del sistema solar con la economía de este mundo."
 decision_change_moon_base: "Sustituir el Puesto Planetario Lunar"
 decision_change_moon_base_desc: "Esto cambiará el Puesto Planetario en esta luna."
 decision_change_moon_base_effects: "Podremos elegir un uso diferente para el Puesto Planetario de esta luna."
 decision_pd_flood_domed_colony: "Inundar la Colonia Bajo Cúpula"
 decision_pd_flood_domed_colony_desc: "Las Colonias Bajo Cúpula podrían ser ideales para nosotros, si tan solo hubiera suficiente agua. Nuestras redes de extracción de hielo nos permiten cosechar hielo de otros cuerpos celestes e inundar [This.GetName], convirtiéndolo en un acuario bajo cúpula."

