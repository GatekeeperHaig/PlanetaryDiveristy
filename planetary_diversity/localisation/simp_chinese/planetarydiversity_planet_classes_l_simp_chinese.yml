 pc_pd_reef: "珊瑚礁星球"
 pc_pd_reef_desc: "气候温和的岩石星球，拥有氮氧大气层和广阔的水圈。浅海覆盖了99%以上的地表，从轨道上即可清晰看到水下庞大的礁脉系统。唯一露出水面的区域，是那些礁脉向上生长至足够高度后，所形成的零星珊瑚岛链。"
 pc_pd_reef_adj: "珊瑚礁"
 mod_pc_pd_reef_habitability: "海洋星球宜居性"
