 concept_pd_aw_tree_of_life_holding_desc: "- $MOD_MONTHLY_LOYALTY_GAIN$: §G+1§!\n- $MOD_POP_ENVIRONMENT_TOLERANCE$: §G+10%§!\n- £food£ Alimento de £job_farmer£ ['concept_farmer']: §G+1§!\n- £mod_job_ranger_add£ ['concept_overlord_arborist', $job_overlord_arborist$] Empregos: §G+1§!\n\n§L$holding_tree_of_life_sapling_desc$§!"


#Deposits
 d_pd_aw_tree_of_life_home: "Árvore da Vida"
 d_pd_aw_tree_of_life_home_desc: "A Árvore da Vida abrigou e apoiou a Colmeia por incontáveis gerações."
 d_pd_aw_tree_of_life_colony: "Broto da Árvore da Vida"
 d_pd_aw_tree_of_life_colony_desc: "Um rebento da Grande Árvore, transplantado aqui pela Colmeia. Levará tempo para amadurecer completamente."
 d_pd_aw_tree_of_life_bloomed: "Árvore da Vida Florescida"
 d_pd_aw_tree_of_life_bloomed_desc: "A Grande Árvore abrigou e apoiou a Colmeia por incontáveis gerações. Agora florescida, seus efeitos benéficos podem ser sentidos por cada drone."
 d_pd_tree_of_life_habitat: "Habitat da Árvore da Vida"
 d_pd_tree_of_life_habitat_desc: "Um rebento da Grande Árvore, transplantado aqui pela Colmeia. Esta versão em miniatura dentro deste habitat nunca alcançará seu pleno potencial, mas apoiará os drones estacionados aqui."
 d_pd_tree_of_life_ringworld: "Mundo Anelar da Árvore da Vida"
 d_pd_tree_of_life_ringworld_desc: "Um rebento da Grande Árvore, transplantado aqui pela Colmeia. Embora seja capaz de crescer ao longo da superfície do mundo anelar, a profundidade do solo precisaria ser maior para que a árvore atingisse seu tamanho completo."

#Planets
 pc_pd_megaflora_hive: "Mundo Colmeia Megaflora"
 pc_pd_megaflora_hive_desc: "Mundo rochoso com atmosfera de nitrogênio e oxigênio, este mundo é densamente arborizado com uma hidrosfera forte e saudável. Lar de uma árvore de megaflora que cobre sua superfície e conectada psionicamente com a Mente Colmeia que a nutre, o sistema de raízes deste planeta também é a principal forma de construção e habitação da colmeia. Embora seu processo seja lento, suas qualidades regenerativas o tornam fácil de defender e reparar."
 trait_pc_pd_megaflora_hive_preference: "Preferência de Colmeia Megaflora"
 trait_pc_pd_megaflora_hive_preference_desc:1 "$trait_pc_arctic_preference_desc$"
 pc_pd_megaflora_hive_habitability: "Habitabilidade de Colmeia Megaflora"
 mod_pc_pd_megaflora_hive_habitability: "Habitabilidade de Colmeia Megaflora"
 pc_pd_megaflora_hive_bloomed: "Mundo Colmeia Megaflora"
 pc_pd_megaflora_hive_bloomed_desc: "Mundo rochoso com atmosfera de nitrogênio e oxigênio, densamente arborizado com uma hidrosfera forte e saudável. Este planeta abriga uma árvore de megaflora que cobre sua superfície, conectada psionicamente com a Mente Colmeia que a nutre."
 trait_pc_pd_megaflora_hive_bloomed_preference: "Preferência de Colmeia Megaflora"
 trait_pc_pd_megaflora_hive_bloomed_preference_desc:1 "$trait_pc_arctic_preference_desc$"
 pc_pd_megaflora_hive_bloomed_habitability: "Habitabilidade de Colmeia Megaflora"
 mod_pc_pd_megaflora_hive_bloomed_habitability: "Habitabilidade de Colmeia Megaflora"

#Start Text
 START_SCREEN_PD_TREE_OF_LIFE: "Quando despertamos, servimos à Árvore, e a Árvore nos serviu. Cuidamos da Árvore, alimentamos a Árvore, protegemos a Árvore, e a Árvore nos nutre. Pelo bem da Árvore, nos espalhamos por [GetHomeWorldName], plantando e observando rebentos da Árvore onde quer que fôssemos.\n\nNosso mundo serviu à Árvore por séculos, e ainda assim tememos que a Árvore não esteja completamente segura à medida que aprendemos sobre os perigos do universo. Há muito sabemos que este não é o único planeta; a galáxia tem muitos mundos Sem Árvore, e ansiamos por mudar isso.\n\nDevemos proteger a Árvore. A Árvore deve se espalhar. A Árvore deve crescer."

#Modifiers
 pd_aw_tree_of_life_bloomed: "Mundo da Árvore da Vida Florescido"
 pd_aw_tree_of_life_bloomed_desc: "A Grande Árvore neste planeta amadureceu completamente e está florescida. Seu enorme sistema de raízes fornece espaço para drones operários extras e pode resistir a danos consideráveis."
 pd_aw_tree_of_life_growing: "Broto da Árvore da Vida em Crescimento"
 pd_aw_tree_of_life_growing_desc: "Os drones deste planeta estão focados em estabelecer o broto da Grande Árvore que plantamos aqui."
 pd_aw_tree_of_life_home: "Mundo da Árvore da Vida"
 pd_aw_tree_of_life_home_desc: "A Grande Árvore neste planeta está totalmente crescida. Seu sistema de raízes fornece espaço para drones operários e naturalmente resiste a danos."
 d_pd_tree_of_life_ringarc: "Mundo Anelar da Árvore da Vida"
 d_pd_tree_of_life_ringarc_desc: "A Grande Árvore neste mundo anelar está tão crescida quanto possível. Seu sistema de raízes fornece espaço para drones operários e naturalmente resiste a danos. "
 pd_aw_no_lifetree: "Sem Árvore da Vida"
 pd_aw_no_lifetree_desc: "Sem uma Grande Árvore da Vida, a colmeia está incompleta."
 pd_no_lifetree_arcology: "Sem Árvore da Vida"
 pd_no_lifetree_arcology_desc: "Este planeta está coberto por uma expansão urbana interminável, tornando-o inadequado para sustentar uma Árvore da Vida."

#Decisions
 decision_pd_replant_aw_tree_of_life: "Replantar Árvore da Vida"
 decision_pd_replant_aw_tree_of_life_desc: "Devemos estabelecer aqui um broto da Grande Árvore da Vida para que nossa Colmeia prospere."
 decision_pd_aw_bloom_tree_of_life: "Florescer a Árvore da Vida"
 decision_pd_aw_bloom_tree_of_life_desc: "Encorajar uma Grande Árvore da Vida a florescer requer tempo e recursos consideráveis, mas fazê-lo desbloqueará seu verdadeiro potencial."
 decision_pd_aw_bloom_tree_of_life_tooltip: "Este planeta será desenvolvido em um §YFlorescido $pc_pd_megaflora_hive_bloomed$§!.\n\nDobrar os £pop£ §YEmpregos§! e £housing£ §YAlojamento§! que cada distrito fornecerá."

#Ascension Perk
 ap_pd_tree_of_life_bloomed: "Mundos Colmeia Megaflora Florescidos"
 ap_pd_tree_of_life_bloomed_desc: "Podemos encorajar cada Grande Árvore da Vida a florescer, desbloqueando seu verdadeiro potencial."
 allow_tree_of_life_bloomed: "§HDesbloqueia Decisão:§! $decision_pd_aw_bloom_tree_of_life$"
 describe_tree_of_life_bloomed_worlds: "§YFlorescido $pc_pd_megaflora_hive_bloomed$s§! são uma classe de planeta especial que são inabitáveis para Pops que não são de Mente Colmeia, mas não estão limitados em quantos £district£ §YDistritos§! de §YGerador§!, §YMineração§! e §YAgricultura§! podem suportar. Todos os distritos têm seus £pop£ §YEmpregos§! e £housing£ §YAlojamento§! dobrados. £pop£ §YPops§! que vivem em §YFlorescido $pc_pd_megaflora_hive_bloomed$§! têm sua §YProdução de Recursos§! aumentada em §G+10%§!"

#Holdings
 holding_pd_aw_tree_of_life_sapling: "Broto da Árvore da Vida Megaflora"
 holding_pd_aw_tree_of_life_sapling_desc: "O Soberano conviveu com sua Árvore da Vida Megaflora por tanto tempo que não consegue mais imaginar a vida sem ela. Agora, ele quer compartilhar a mesma oportunidade com seus vassalos."

#Arcology - With Arc Sub Mod
 district_pd_flora_hive: "$district_hive$"
 district_pd_flora_hive_desc: "$district_hive_plural$"
 district_pd_flora_hive_plural: "$district_hive_desc$"
 district_pd_flora_hive_industrial: "Distrito Industrial"
 district_pd_flora_hive_industrial_desc: "Instalações de fundição e fábricas preenchem este distrito, criando produtos avançados a partir de matérias-primas."
 district_pd_flora_hive_industrial_plural: "Distritos Industriais"
 district_pd_flora_hive_naval: "Distrito Logístico"
 district_pd_flora_hive_naval_desc: "Os drones aqui otimizam as operações navais com máxima eficiência."
 district_pd_flora_hive_naval_plural: "Distritos Logísticos"
 district_pd_flora_hive_research: "Distrito de Pesquisa"
 district_pd_flora_hive_research_desc: "Incontáveis laboratórios repletos de drones de pesquisa concentrados."
 district_pd_flora_hive_research_plural: "Distritos de Pesquisa"
 district_pd_flora_hive_administrative: "Distrito Sináptico"
 district_pd_flora_hive_administrative_desc: "Um nexo sináptico que amplifica as conexões psiônicas da colmeia, estendendo sua vontade e orientação pelo cosmos."
 district_pd_flora_hive_administrative_plural: "Distritos Sinápticos"
 pc_pd_flora_hive: "Mundo Coroa Megaflora"
 pc_pd_flora_hive_desc: "Esta Colmeia evoluiu em uma relação simbiótica com uma vasta árvore de megaflora cujas raízes se espalharam por cada canto do planeta e mudaram o ecossistema para se adaptar tanto a ela quanto aos drones. Foi desenvolvida como um bastião de processos de pensamento avançados e é altamente defendida pela colmeia que a habita."
 pc_pd_flora_hive_adj: "arborizado"
 mod_pc_pd_flora_hive_habitability: "Habitabilidade Coroa Megaflora"
 trait_pc_pd_flora_hive_preference: "Preferência Coroa Megaflora"
 trait_pc_pd_flora_hive_preference_desc: "$trait_pc_arctic_preference_desc$"
 pd_aw_flora_hive_military: "Mundo Coroa Megaflora"
 pd_aw_flora_hive_military_desc: "Este mundo é fundamental para as funções centrais da Mente Colmeia Megaflora e está fortificado contra ameaças e influências externas. Um formidável escudo envolve o planeta e os drones guerreiros estão prontos para garantir sua proteção."
 decision_pd_flora_hive_crown_project: "Projeto de Colmeia Megaflora - Coroa"
 decision_pd_flora_hive_crown_project_desc: "Este mundo colmeia será desenvolvido em um bastião de processos de pensamento avançados para a mente colmeia."
 decision_pd_flora_hive_crown_project_effects: "Transforma o planeta em §Y$pc_pd_flora_hive$§!, aumentando £housing£ §Y$PLANET_HOUSING_TITLE$§!, §YProdução de Recursos§! e §YCrescimento Populacional§! e desbloqueando especiais £district£ §YDistritos de Arcologia§! à custa dos recursos naturais do planeta tornarem-se §Rinacessíveis§!, impedindo toda construção futura de £district£ §YDistritos§! de §YGerador§!, §YMineração§! e §YAgricultura§!."
 decision_pd_flora_hive_crown_project_effects_short: "Aumenta £housing£ §Y$PLANET_HOUSING_TITLE$§!, §YProdução de Recursos§! e §YCrescimento Populacional§!\nHabilita £district£ §YDistritos de Arcologia§!\nDesabilita a construção de £district£ §YDistritos§! de §YGerador§!, §YMineração§! e §YAgricultura§!"
 decision_pd_megaflora_capital_building: "Construir Grande Árvore da Vida"
 decision_pd_megaflora_capital_building_desc: "Para manifestar a supremacia e o alcance do nosso coletivo, faremos crescer uma poderosa Grande Árvore da Vida. Esta imponente árvore amplificará significativamente nossas operações pelas estrelas."
 decision_pd_megaflora_capital_building_effects: "Adiciona §Y$d_pd_megaflora_capital_building$§! a este mundo capital de megaflora, trocando distritos potenciais para aprimorar as capacidades administrativas de nossa colmeia."
 d_pd_megaflora_capital_building: "Grande Árvore da Vida"
 d_pd_megaflora_capital_building_desc: "Esta árvore se ergue suprema sobre a superfície do planeta, um imponente farol de controle. É o centro de nossa vontade coletiva, onde nossas raízes entre as estrelas começam."

