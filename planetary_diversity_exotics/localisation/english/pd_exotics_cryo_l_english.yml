 # Cryothermal Engineering ascension perk
 ap_pd_cryothermal_engineering: "Cryothermal Engineering"
 ap_pd_cryothermal_engineering_desc: "To prosper in cryogenic conditions demands more than warmer clothing; it requires a fundamental reinvention of materials, biology, and chemistry. We are pioneering the science of the cold."

 # Civ-conditional job-efficiency effect lines shown in the AP card; only one renders per empire type.
 ap_pd_cryothermal_workforce_effect: "$mod_pop_pdexotic_cryo_chemist_bonus_workforce_mult$: §G+20%§!"
 ap_pd_cryothermal_workforce_drone_effect: "$mod_pop_pdexotic_cryo_chemist_drone_bonus_workforce_mult$: §G+20%§!"
 ap_pd_cryothermal_workforce_machine_effect: "$mod_pop_pdexotic_cryo_chemist_machine_bonus_workforce_mult$: §G+20%§!"

 # Single planet-summary line in the AP card; replaces per-planet add_modifier spam. Present tense + "in your empire" implies persistent application without listing edge cases.
 ap_pd_cryothermal_engineered_planets_effect: "['concept_pd_cryogenic_planets'] in your empire gain the §Y$pd_cryothermal_engineered_planet$§! modifier."

 # Cryogenic planet concept (linked from the AP tooltip and reusable across exotic content).
 concept_pd_cryogenic_planet: "Cryogenic Planet"
 concept_pd_cryogenic_planets: "Cryogenic Planets"
 concept_pd_cryogenic_planet_desc: "$concept_pd_cryogenic_planet$ refers to worlds whose biospheres run on cryogenic chemistry rather than liquid water:$NEW_LINE$- $pc_pd_ammonia$$NEW_LINE$- $pc_pd_methane$"

 # Country workforce modifiers (auto-render their constituent mults via the mod_job_* keys below)
 pd_cryothermal_workforce: "Cryothermal Workforce Optimization"
 pd_cryothermal_workforce_desc: "$pd_cryothermal_workforce_shared_desc$"
 pd_cryothermal_workforce_drone: "$pd_cryothermal_workforce$"
 pd_cryothermal_workforce_drone_desc: "$pd_cryothermal_workforce_shared_desc$"
 pd_cryothermal_workforce_machine: "$pd_cryothermal_workforce$"
 pd_cryothermal_workforce_machine_desc: "$pd_cryothermal_workforce_shared_desc$"
 pd_cryothermal_workforce_shared_desc: "Atmosphere-rated training, hardened tooling, and exotic-hydride supply lines raise the productivity of every chemovat workforce."

 # Per-planet modifier granted by the AP to cryo (ammonia/methane) worlds
 pd_cryothermal_engineered_planet: "Cryothermally Engineered"
 pd_cryothermal_engineered_planet_desc: "Atmosphere-rated infrastructure and supercooled processing lines let this world support denser settlement than its natural environment would allow."

 # Vatkeeper job-efficiency modifiers (rendered inside the country workforce modifier's hover breakdown; matches vanilla [job.GetName] Job Efficiency pattern)
 mod_pop_pdexotic_cryo_chemist_bonus_workforce_mult: "[pdexotic_cryo_chemist.GetName] $MOD_POP_BONUS_WORKFORCE_MULT$"
 mod_pop_pdexotic_cryo_chemist_drone_bonus_workforce_mult: "[pdexotic_cryo_chemist_drone.GetName] $MOD_POP_BONUS_WORKFORCE_MULT$"
 mod_pop_pdexotic_cryo_chemist_machine_bonus_workforce_mult: "[pdexotic_cryo_chemist_machine.GetName] $MOD_POP_BONUS_WORKFORCE_MULT$"

 # Pressure Suits tech (AP-only, granted by ap_pd_cryothermal_engineering)
 tech_pd_pressure_suits: "Pressure Suits"
 tech_pd_pressure_suits_desc: "Hardened cold-vac suits and atmosphere-sealed habitats let our colonists endure the oxygen, pressure, and warmth of worlds beyond our own. Other species can in turn survive within our atmospheres."
 tech_pd_pressure_suits_effect_title: "§HUnlocks Colonization:§! ['concept_pd_cryogenic_planet'] for non-cryogenic species"
 tech_pd_pressure_suits_effect_desc: "§HCryogenic Habitation§!\nPressurized habitats and cold-vac suits keep oxygen-breathing colonists alive within methane and ammonia atmospheres."

 # Cryoforming tech (normal research, cryophile-founder empires only; gates ingress terraforming into ammonia and methane)
 tech_pd_cryoforming: "Cryoforming"
 tech_pd_cryoforming_desc: "Advances in cryogenic chemistry and atmospheric reformation give us the means to extend our biosphere onto worlds where it does not naturally form. A temperate planet can be reshaped into the cold, dense atmosphere our kind requires."
 tech_pd_cryoforming_effect_title: "§HUnlocks Feature:§! Cryogenic Terraforming"
 tech_pd_cryoforming_effect_desc: "Allows us to terraform temperate worlds into Ammonia and Methane Worlds."
 tech_pd_cryogenic_terraforming_effect_title: "§HUnlocks Feature:§! Cryogenic Terraforming"
 tech_pd_cryogenic_terraforming_effect_desc: "Allows us to terraform Ammonia and Methane Worlds into temperate worlds."

 # Habitat atmosphere toggle decisions (auto-stamped by on_megastructure_built; these let players add it to inherited habitats or vent it after conquest)
 decision_pd_exotic_habitat_add_ammonia_atmosphere: "Pressurize Ammonia Atmosphere"
 decision_pd_exotic_habitat_add_ammonia_atmosphere_desc: "Flood the habitat's life support with ammonia and nitrogen so our kind can settle here. Only cryogenic-adapted species will be able to live aboard once the atmosphere shifts."
 decision_pd_exotic_habitat_remove_ammonia_atmosphere: "Vent Ammonia Atmosphere"
 decision_pd_exotic_habitat_remove_ammonia_atmosphere_desc: "Scrub the ammonia atmosphere out of this habitat and replace it with a conventional oxygen mix. Cryogenic species will no longer be able to settle here."
 decision_pd_exotic_habitat_add_methane_atmosphere: "Pressurize Methane Atmosphere"
 decision_pd_exotic_habitat_add_methane_atmosphere_desc: "Flood the habitat's life support with nitrogen and methane so our kind can settle here. Only cryogenic-adapted species will be able to live aboard once the atmosphere shifts."
 decision_pd_exotic_habitat_remove_methane_atmosphere: "Vent Methane Atmosphere"
 decision_pd_exotic_habitat_remove_methane_atmosphere_desc: "Scrub the methane atmosphere out of this habitat and replace it with a conventional oxygen mix. Cryogenic species will no longer be able to settle here."

 # Cryogenic SR deposits (volatile motes pair)
 d_pd_cryo_clathrate_pockets: "Clathrate Pockets"
 d_pd_cryo_clathrate_pockets_desc: "Volatile gases trapped inside cages of frozen water and ammonia ice. The lattices break down under mining heat and release usable motes."
 d_pd_cryo_volatile_geyser_fields: "Volatile Geyser Fields"
 d_pd_cryo_volatile_geyser_fields_desc: "Vast plains where pressurized volatiles erupt from cracks in the cryogenic crust. The eruptions deposit a steady supply of refinable motes across the surface."

 # Cryogenic SR deposits (rare crystals pair)
 d_pd_cryo_cryocrystal_caverns: "Cryocrystal Caverns"
 d_pd_cryo_cryocrystal_caverns_desc: "Subsurface caverns lined with rare crystalline lattices that only form at cryogenic temperatures. The deposits are stable so long as the surrounding ice is not disturbed."
 d_pd_cryo_cryocrystal_spires: "Cryocrystal Spires"
 d_pd_cryo_cryocrystal_spires_desc: "Surface formations of needle-like rare crystals grown over thousands of years of slow precipitation. Each spire yields large quantities of rare crystals once harvested."

 # Cryogenic SR deposits (exotic gases pair)
 d_pd_cryo_gas_seeps: "Cryogenic Gas Seeps"
 d_pd_cryo_gas_seeps_desc: "Slow leaks of exotic gases venting from fissures beneath the ice. The output is modest but consistent across the surrounding terrain."
 d_pd_cryo_gas_columns: "Cryogenic Gas Columns"
 d_pd_cryo_gas_columns_desc: "Sustained plumes of exotic gases rising from deep subsurface reservoirs. The output rivals the largest gas fields found on warmer worlds."

 # Cryogenic SR deposits (special)
 d_pd_cryo_betharian_deposit: "Frozen Betharian Field"
 d_pd_cryo_betharian_deposit_desc: "Betharian stones suspended in cryogenic ice across a wide region. The deposits remain inert until thawed and processed."
 d_pd_cryo_alien_pets_deposit: "Sheltered Cryofauna Valley"
 d_pd_cryo_alien_pets_deposit_desc: "A protected lowland where native cryogenic fauna survives in unusual abundance. The local wildlife is docile and well suited to companionship."

 # Cryogenic natural blockers and their clear techs
 d_pd_cryo_toxic_mire: "£blocker£ Toxic Cryo-Mire"
 d_pd_cryo_toxic_mire_desc: "A wide expanse of chemically active slush where toxic compounds concentrate at the freezing point. Settlement infrastructure cannot be safely built across the contaminated terrain."
 d_pd_cryo_glacier_wall: "£blocker£ Frozen Glacial Wall"
 d_pd_cryo_glacier_wall_desc: "An immense wall of dense cryogenic ice cuts across the landscape. The mass is too thick and unstable to build over without dedicated clearance work."

 tech_pd_cryo_toxic_mire: "Cryo-Mire Reclamation"
 tech_pd_cryo_toxic_mire_desc: "Chemical neutralization fluids and low-temperature scrubbers let us drain and decontaminate toxic mires on cryogenic worlds. The reclaimed land is then safe to develop."
 tech_pd_cryo_glacier_wall: "Cryogenic Glacial Boring"
 tech_pd_cryo_glacier_wall_desc: "Heated boring rigs and shaped charges break through the dense ice walls that block colonial expansion on cryogenic worlds. Clearance crews can carve passable terrain in a fraction of the natural melt time."
