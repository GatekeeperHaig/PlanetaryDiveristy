###Crystal World
 sr_acean:0 "Cristal Aceano"
 sr_acean_desc:0 "La resonancia única de este cristal mejora la regeneración de la salud y el crecimiento en las formas de vida orgánicas."
 mod_planet_miners_sr_acean_produces_add: "£sr_acean£ $sr_acean$ de £job_miner£ [GetMinerPlural]"
 pd_crystal: "Mundo de Cristal"
 pd_crystal_desc: "El planeta está cubierto de grandes pilares de Cristal Aceano, cuya resonancia única mejora la regeneración de la salud y el crecimiento en las formas de vida orgánicas."
 pd_dead_crystal: "Mundo de Cristal Muerto"
 pd_dead_crystal_desc: "El superorganismo que creaba el Cristal Aceano ha sido eliminado, poniendo fin a sus efectos positivos sobre la vida orgánica. Sin embargo, la extracción de cristal es ahora mucho más productiva."
 pd_living_crystal: "Mundo de Cristal Restaurado"
 pd_living_crystal_desc: "El superorganismo ha sido restaurado, potenciando sus efectos positivos sobre la vida orgánica. La extracción de cristal ha mejorado, pero la criatura ahora se alimenta de cualquier vida que pueda capturar."
 pc_pd_crystal: "Mundo de Cristal"
 pc_pd_crystal_desc: "$pd_crystal_desc$"
 pc_pd_crystal_adj: "cristalino"
 mod_pc_pd_crystal_habitability: "Habitabilidad Cristalina"
 trait_pc_pd_crystal_preference: "Preferencia Cristalina"
 trait_pc_pd_crystal_preference_desc: "$trait_pc_arctic_preference_desc$"
 d_pd_khel_ruins: "Ruinas Khel"
 d_pd_khel_ruins_desc: "Los restos de una colonia fallida, incluidas gigantescas instalaciones de investigación de perforaciones, se esparcen por una sección de este planeta."
 d_pd_acean_pillars: "Pilares Aceanos"
 d_pd_acean_pillars_desc: "Este planeta está cubierto de grandes pilares de Cristal Aceano que, aunque conectados al planeta, afectan profundamente a la vida orgánica cercana, calmando las emociones y estimulando la fertilidad."

 #Events
 pdcrystal.100.name: "Gema de la Vida"
 pdcrystal.100.desc: "Un escáner profundo de §Y[From.GetName]§! reveló algo extraordinario: imponentes formaciones de cristal dispersas por el paisaje, a las que designamos §YCristal Aceano§!. Estas gemas parecen mejorar la salud de las formas de vida orgánicas cercanas y, notablemente, sus efectos persisten incluso en muestras aisladas.\n\n§Y[Root.Leader.GetName]§! también descubrió señales de un puesto avanzado en la jungla; si podemos mantener el planeta, podremos explorar las ruinas."
 pdcrystal.100.a: "Asombroso."
 pdcrystal.200.name: "Ruinas en la Jungla"
 pdcrystal.200.desc: "A medida que nuestra colonia se establece en §Y[Root.GetName]§!, hemos descubierto que las ruinas encontradas por nuestro equipo inicial no eran en absoluto las únicas. Varios campamentos abandonados, silenciosos y desgastados por la intemperie, se encuentran dispersos por la naturaleza circundante.\n\nQuiénes eran estos primeros habitantes y qué les ocurrió sigue sin estar claro."
 pdcrystal.200.a: "Exploraremos estas ruinas."
 pdcrystal.300.name: "El Destino del Planeta"
 pdcrystal.300.desc: "Ahora conocemos el destino de los Khel y el oscuro secreto del Cristal Aceano. Tenemos tres opciones: dejar el superorganismo como está, eliminarlo o sanarlo hasta su estado original.\n\nEliminarlo aumentaría la extracción de cristal pero pondría fin a sus efectos sobre la vida orgánica. Restaurarlo potenciaría su impacto en la vida pero aumentaría el riesgo de muertes de colonos, aunque las medidas de seguridad podrían ayudar a mitigar esto."
 pdcrystal.300.a: "Fue lobotomizado por una razón."
 pdcrystal.300.a.tooltip: "Dejaremos el superorganismo intacto, sin cambiar nada en la forma en que interactuamos con el planeta."
 pdcrystal.300.b: "Acabaremos con la vida de esta criatura."
 pdcrystal.300.b.tooltip: "Terminaremos lo que los Khel empezaron y eliminaremos el superorganismo. Esto pondrá fin a los efectos del planeta sobre la vida orgánica, pero aumentará significativamente la producción minera de Cristal Aceano."
 pdcrystal.300.c: "Debemos deshacer este crimen injusto."
 pdcrystal.300.c.tooltip: "Revertir la lobotomía de los Khel restaurará el superorganismo, potenciando sus efectos sobre la vida y aumentando ligeramente la extracción de Cristal Aceano, pero también reanudará su alimentación de criaturas vivas, incluidos los colonos."

 #Archaeology Site
 pdcrystal_site: "Las Ruinas Invadidas"
 pdcrystal_site_desc: "Una región del planeta está salpicada de ruinas abandonadas. Una investigación exhaustiva podría ayudarnos a comprender los depósitos de Cristal Aceano únicos de este mundo y su notable influencia sobre el desarrollo de la vida orgánica."
 pdcrystal.250.name: "Las Ruinas Khel"
 pdcrystal.250.desc: "La jungla ha invadido gran parte de las bases en descomposición y su tecnología, pero hemos recuperado información útil. Los Khel, una especie alienígena no nativa de este mundo, realizaban un experimento a escala planetaria con perforaciones profundas en la corteza.\n\nAunque la mayoría de los datos estaban corrompidos, encontramos pistas que indicaban un gran asentamiento Khel sin descubrir cerca de nuestro puesto de investigación."
 pdcrystal.250.a: "Interesante."
 pdcrystal.251.desc: "En el asentamiento, encontramos los restos de una nave generacional que carecía de tecnología de hiperespacio. Los Khel, huyendo de un desastre climático en su mundo natal, vagaron por varios sistemas durante generaciones. Finalmente encontraron este planeta, que parecía satisfacer todas sus necesidades, y comenzaron a construir un nuevo hogar.\n\nContinuaremos revisando los registros Khel."
 ancrel.251.a: "Qué afortunados fueron."
 pdcrystal.252.desc: "La colonia prosperó durante varios años, ayudada por pilares de cristal que mejoraban sus cultivos trasplantados. Pero entonces los colonos comenzaron a desaparecer. Al principio parecía aleatorio, pero la tasa aumentó. Al investigar las desapariciones, su científica principal hizo un descubrimiento impactante: el planeta estaba vivo y se alimentaba de ellos. Sin forma de relanzar su nave, se centraron en comunicarse y pacificar al planeta.\n\nComenzaremos a explorar una de las ubicaciones de perforación a continuación."
 pdcrystal.252.a: "¿Está en riesgo la colonia?"
 pdcrystal.253.desc: "El estudio reveló que el cristal es un superorganismo litoide con inteligencia rudimentaria, que usa el Aceano para atraer animales a sumideros ocultos. Los Khel perforaron pozos y usaron un pulso electromagnético para interrumpir su alimentación mientras preservaban las propiedades del cristal.\n\nTambién hemos descubierto el centro de control del proyecto de perforación."
 pdcrystal.253.a: "Qué desesperados debieron estar."
 pdcrystal.254.desc: "Las perforaciones de los Khel solo aceleraron la alimentación del planeta, quizás como mecanismo de defensa. Para cuando estaban listos para disparar su arma, solo quedaban unas pocas docenas de Khel. Tras la detonación, el planeta liberó una enorme descarga de energía y todos los registros Khel cesaron abruptamente.\n\nAunque los Khel no sobrevivieron para presenciarlo, tenían razón: el planeta había perdido su capacidad de alimentarse de la vida. Este es el sombrío origen de los poderes del Cristal Aceano."
 pdcrystal.254.a: "Qué sombría fue para todos."

