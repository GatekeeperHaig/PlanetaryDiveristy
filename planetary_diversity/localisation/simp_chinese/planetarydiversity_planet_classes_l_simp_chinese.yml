 pc_pd_ferrospring: "含铁泉流星球"
 pc_pd_ferrospring_desc: "拥有氮氧大气的极寒岩石星球，其冰封的地壳因地热活动而布满裂痕。富含铁矿的地下含水层不断上涌，汇成地表的泉水与湖泊；在冰封大地的映衬下，一汪汪水体被染成了深邃的猩红色。"
 pc_pd_ferrospring_adj: "寒冰"
