###Lithoid
 #Decisions
 decision_pd_lithoid_planet: "Crear Ecosistema Litotrófico"
 decision_pd_lithoid_planet_desc: "Este mundo espera ser tallado en uno de cristal y piedra. El frágil ecosistema biológico se interpone en nuestro camino."
 decision_pd_lithoid_planet_effects_short: "Un ecosistema litotrófico será esculpido en este mundo, permitiéndonos ajustar con precisión las frecuencias cristalinas para adaptarlas mejor a nuestras necesidades."
 decision_pd_lithoid_planet_tooltip: "Una vez completado, podremos elegir la frecuencia de los cristales litotróficos de este planeta."
 decision_pd_lithoid_planet_cleanup: "Restaurar Ecosistema Biológico"
 decision_pd_lithoid_planet_cleanup_desc: "Debemos restaurar el ecosistema biológico de este planeta a su gloria original."
 decision_pd_lithoid_planet_cleanup_effects_short: "El ecosistema litotrófico creado artificialmente será eliminado, restaurando su naturaleza biológica."
 decision_pd_lithoid_planet_cleanup_tooltip: "Todos los Modificadores Litotróficos serán eliminados, y el planeta será devuelto a un ecosistema biológico."
 decision_pd_lithoid_change_frequency: "Cambiar Frecuencia Litotrófica"
 decision_pd_lithoid_change_frequency_desc: "Cambiaremos la frecuencia de los cristales del ecosistema litotrófico para adaptarlos mejor a nuestras necesidades."
 decision_pd_lithoid_change_frequency_effects_short: "Podemos cambiar la frecuencia de los cristales de este planeta."
 decision_pd_lithoid_change_frequency_tooltip: "El modificador Litotrófico actual será eliminado, permitiéndonos cambiarlo por una frecuencia diferente."

 #Choose Event
 pdlithoidplanets.100.name: "Frecuencia Cristalina"
 pdlithoidplanets.100.desc: "¿Qué frecuencia resonante sintonizaremos en el bioma litotrófico de §Y[This.GetName]§!?"
 pdlithoidplanets.100.cyan: "Cian"
 pdlithoidplanets.100.cyan.tooltip: "Esta frecuencia resonante actúa como fuerza cohesiva, fomentando la unidad entre nuestra población litoide e impulsando un armonioso aumento del crecimiento poblacional."
 pdlithoidplanets.100.red: "Rojo"
 pdlithoidplanets.100.red.tooltip: "Esta resonancia se combina a la perfección con los depósitos minerales, haciéndolos más accesibles y aptos para la extracción."
 pdlithoidplanets.100.yellow: "Amarillo"
 pdlithoidplanets.100.yellow.tooltip: "Esta frecuencia resonante se integra a la perfección con nuestras redes de energía, desbloqueando un aumento en su capacidad total."

 #Notification Message
 MESSAGE_PD_LITHOID_DESC:1 "$PLANET|Y$ ahora es un §YMundo Litotrófico§!"
 MESSAGE_PD_LITHOID_MESSAGE_TYPE_TITLE: "Bioma Litotrófico Completado"
 MESSAGE_PD_LITHOID_CLEANUP_DESC:1 "El bioma biológico en $PLANET|Y$ ha sido restaurado."
 MESSAGE_PD_LITHOID_CLEANUP_MESSAGE_TYPE_TITLE: "Bioma Litotrófico Eliminado"

 #Modifiers
 pd_aw_lithoid_planet_cyan: "Mundo Litotrófico"
 pd_aw_lithoid_planet_cyan_desc: "Frecuencia: 500 nm\nLas vibraciones resonantes fomentan la buena voluntad y catalizan una tasa de crecimiento acelerada para los Litoides."
 pd_aw_lithoid_planet_red: "Mundo Litotrófico"
 pd_aw_lithoid_planet_red_desc: "Frecuencia: 650 nm\nLa robusta resonancia cristalina se combina a la perfección con los depósitos minerales, haciéndolos más accesibles para la extracción."
 pd_aw_lithoid_planet_yellow: "Mundo Litotrófico"
 pd_aw_lithoid_planet_yellow_desc: "Frecuencia: 580 nm\nLas dinámicas armónicas de esta resonancia cristalina se integran a la perfección con nuestras redes de energía, desbloqueando su capacidad total."

###Infesting Hive
 building_pd_planet_infester_1: "Nodo de Infestación - Primera Fase"
 building_pd_planet_infester_1_desc: "Este nodo, el corazón de la fase inicial de infestación, es vital para la presencia de la colmena en este planeta. Su pérdida desharía el control de la colmena aquí."
 building_pd_planet_infester_2: "Nodo de Infestación - Segunda Fase"
 building_pd_planet_infester_2_desc: "Este enorme nodo, ahora en la fase intermedia de infestación, posee una conexión con la colmena lo suficientemente robusta como para manipular procesos planetarios críticos. Su pérdida desharía el control de la colmena aquí."
 building_pd_planet_infester_3: "Nodo de Infestación Planetaria"
 building_pd_planet_infester_3_desc: "Habiendo alcanzado su cénit, este formidable nodo ejerce un dominio total sobre todos los procesos planetarios. Su pérdida desharía el control de la colmena aquí."
 building_pd_planet_infester_3_effect_desc: "Este planeta será transformado en un §Y$pc_hive$§!"
 pdplanetaryinfesters.120.name: "Colmena Planetaria Completada"
 pdplanetaryinfesters.120.desc: "Mientras el nodo alcanza su pleno potencial, resonamos con un profundo sentido de logro.\n\nEste momento marca un salto significativo en el control de la colmena sobre [Root.GetName], solidificando su dominio sobre el planeta."
 pdplanetaryinfesters.120.a: "Un hogar más para la colmena."
 civic_hive_pd_planetary_infesters: "Infestadores Planetarios"
 civic_hive_pd_planetary_infesters_desc: "Esta mente de colmena se incrusta en los ecosistemas de un planeta. Cada mundo se convierte en una extensión de sí misma, floreciendo como una red unificada bajo su guía."