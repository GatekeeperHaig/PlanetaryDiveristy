 l_english:

 # Species class
 CRYO: "Cryophiles"
 CRYO_desc: "Cryophiles are organisms evolved on worlds dominated by cryogenic chemistry: liquid methane seas, ammonia-laced atmospheres, and temperatures far below the freezing point of water. Their biology runs on low-temperature reactions, so they live for centuries but every process they undertake unfolds slowly."

 # Homeworld column header
 climate_cryogenic: "Cryogenic"
 # Planet tooltip climate label (matches `climate = "cryogenic"` on the planet class)
 cryogenic: "§B(Cryogenic Climate)§!"

 # Planet classes
 pc_pd_methane: "Methane World"
 pc_pd_methane_desc: "Frigid, rocky world with a thick nitrogen-methane atmosphere. Liquid methane and ethane seas cover much of the surface, with continuous hydrocarbon haze tinting the sky orange. Native life relies on hydrocarbon-based biochemistry rather than water."
 pc_pd_ammonia: "Ammonia World"
 pc_pd_ammonia_desc: "Cold, rocky world with a thick nitrogen-ammonia atmosphere. Liquid ammonia oceans cover much of the surface, with persistent ammonia-water ice at the poles. Native life relies on ammonia-based biochemistry rather than water."

 # Planet-class static modifier (applied at game start to flag ammonia worlds)
 pd_ammonia: "Ammonia World"
 pd_ammonia_desc: "This cold planet has a thick atmosphere of nitrogen and ammonia, with liquid ammonia oceans and ammonia-water ice covering much of the surface. Native life relies on ammonia-based biochemistry rather than water."

 # Planet-class static modifier (applied at game start to flag methane worlds)
 pd_methane: "Methane World"
 pd_methane_desc: "This frigid planet has a thick nitrogen-methane atmosphere over seas of liquid methane and ethane. Tholin haze and methane precipitation drive the surface chemistry, and native life relies on hydrocarbon-based biochemistry rather than water."

 # Core trait
 trait_cryophile: "Cryophile"
 trait_cryophile_desc: "The slow, low-temperature metabolism of this species requires a mix of exotic hydrides alongside ordinary nutrients. They outlive other species by generations, but every task they undertake takes far longer to complete."
 TRAIT_CRYOPHILE_EFFECT: "$r_exotic_gases$ Upkeep per $pop_group_unit$ £pop£ Pops: §R+0.05§!"

 # Preference traits
 trait_pc_pd_methane_preference: "Methane World Preference"
 trait_pc_pd_methane_preference_desc: "This species evolved alongside the liquid hydrocarbon seas of methane worlds. They are thoroughly optimized for liquid-methane biochemistry and can technically survive on ammonia worlds, though they will never truly thrive there. They cannot endure the warmer, wetter biospheres of conventional life."
 trait_pc_pd_ammonia_preference: "Ammonia World Preference"
 trait_pc_pd_ammonia_preference_desc: "This species evolved in the dense ammonia-cloud atmospheres of ammonia worlds. They are thoroughly optimized for ammonia-compound biochemistry and can technically survive on methane worlds, though they will never truly thrive there. They cannot endure the warmer, wetter biospheres of conventional life."

 # Habitability modifiers
 mod_pc_pd_methane_habitability: "Methane World Habitability"
 mod_pc_pd_ammonia_habitability: "Ammonia World Habitability"

 # Ammonia atmosphere zone gate (planet-side modifier applied by arcology atmosphere checks)
 pd_ammonia_atmosphere:0 "Ammonia Atmosphere"
 pd_ammonia_atmosphere_desc:0 "Dense nitrogen and gaseous ammonia at low temperatures. Traces of methanol and frozen hydrocarbon vapors are suspended throughout."

 # Methane atmosphere zone gate (planet-side modifier applied by arcology atmosphere checks)
 pd_methane_atmosphere:0 "Methane Atmosphere"
 pd_methane_atmosphere_desc:0 "Dense nitrogen, methane, and ethane at very low temperatures. Suspended tholin aerosols give the air its characteristic orange tint."

 # Start screen intro (PART_ONE per planet class)
 START_SCREEN_PART_ONE_PD_METHANE: "In the eons since the first primitive [GetSpeciesName] communities took shape on the liquid hydrocarbon shores of [GetHomeWorldName], our civilization has spread and prospered."
 START_SCREEN_PART_ONE_PD_AMMONIA: "In the eons since the first primitive [GetSpeciesName] communities took shape beneath the ammonia clouds of [GetHomeWorldName], our civilization has spread and prospered."

 # Ammonia world planet features
 d_pd_ammonia_lightning_storms: "Nitrogen Lightning Fronts"
 d_pd_ammonia_lightning_storms_desc: "Where ammonia and nitrogen fronts collide, the sky discharges in a near-constant cascade of lightning. The current can be drawn straight from the air."
 d_pd_ammonia_thermocline: "Ammonia Cloud Stratification"
 d_pd_ammonia_thermocline_desc: "The atmosphere settles into sharply layered cloud decks, each colder than the one above. Power can be drawn from the gradient between them."
 d_pd_ammonia_salt_dunes: "Ammonium Salt Dunes"
 d_pd_ammonia_salt_dunes_desc: "Wind-sculpted dunes of pure ammonium salt stretch across the surface, ready to be scooped up and processed for their minerals."
 d_pd_ammonia_brine_caverns: "Ammonia Solution Caverns"
 d_pd_ammonia_brine_caverns_desc: "A deep cavern network where seeping ammonia has plated the walls with rich veins of ore over the ages."
 d_pd_ammonia_chemosynthetic_pools: "Liquid Ammonia Pools"
 d_pd_ammonia_chemosynthetic_pools_desc: "Wide, still basins of liquid ammonia covered in thick microbial mats. The biomass is a primary food source for any cryophile colony."
 d_pd_ammonia_organic_haze: "Ammoniated Snowfall"
 d_pd_ammonia_organic_haze_desc: "Soft flurries of ammonia ice drift down from the upper clouds in continuous snowfall, carrying edible organics with them."
 d_pd_ammonia_pure_gas_vents: "Ammonia-Nitrogen Vents"
 d_pd_ammonia_pure_gas_vents_desc: "Deep fissures vent plumes of ammonia and nitrogen gas, pure enough to feed refineries with no preprocessing."
 d_pd_ammonia_polar_ion_columns: "Polar Ionization Columns"
 d_pd_ammonia_polar_ion_columns_desc: "At the poles, ammonia-laden air ionizes into towering columns of current that climb hundreds of kilometers skyward. The discharge can be tapped for raw electricity."
 d_pd_ammonia_cryolite_reefs: "Cryolite Reefs"
 d_pd_ammonia_cryolite_reefs_desc: "Vast seabed banks of crystallized cryolite, laid down over geological time and laced throughout with rare-earth and lithium ores."
 d_pd_ammonia_ammoniated_kelp_forests: "Ammoniated Kelp Forests"
 d_pd_ammonia_ammoniated_kelp_forests_desc: "Towering submerged forests draw ammonia straight from the sea and convert it into thick edible biomass. The richest harvest on any cryogenic world."

 # Methane world planet features
 d_pd_methane_tholin_storm_belts: "Tholin Storm Belts"
 d_pd_methane_tholin_storm_belts_desc: "Charged tholin aerosols churn through the upper atmosphere in continuous storm belts, shedding static across the cloud layer. The discharge can be drawn down through conductive towers."
 d_pd_methane_cryovolcanic_vents: "Cryovolcanic Vents"
 d_pd_methane_cryovolcanic_vents_desc: "Fissures erupt slurries of liquid methane and water-ammonia magma into the freezing air. The thermal gradient drives turbines installed over each vent."
 d_pd_methane_supercooled_geysers: "Supercooled Geysers"
 d_pd_methane_supercooled_geysers_desc: "Subsurface reservoirs of pressurized ethane vent through fault lines in towering jets of supercooled spray. Each plume is a standing column of recoverable energy."
 d_pd_methane_carbonate_caverns: "Carbonate Caverns"
 d_pd_methane_carbonate_caverns_desc: "Cave networks etched into ammonia-water bedrock by ancient methane flows, walls plated with crystalline carbonates and complex organics."
 d_pd_methane_clathrate_shelves: "Methane Clathrate Shelves"
 d_pd_methane_clathrate_shelves_desc: "Vast shelves of methane clathrate ice cap the continental margins, the lattice trapping useful metals and salts in extractable quantities."
 d_pd_methane_ice_diamonds: "Methane Ice Diamonds"
 d_pd_methane_ice_diamonds_desc: "Lightning storms in the upper atmosphere have compressed atmospheric carbon into showers of microdiamonds, raining down across the polar plateaus."
 d_pd_methane_tholin_haze: "Tholin Haze"
 d_pd_methane_tholin_haze_desc: "Suspended hydrocarbon aerosols settle out of the sky as a continuous edible precipitate. Surface fauna feed directly on the fallout."
 d_pd_methane_liquid_methane_seas: "Liquid Methane Seas"
 d_pd_methane_liquid_methane_seas_desc: "Wide seas of liquid methane and ethane support thick mats of native microbiology along their shallows. The biomass is a primary food source for any cryophile colony."
 d_pd_methane_hydrocarbon_marshes: "Hydrocarbon Marshes"
 d_pd_methane_hydrocarbon_marshes_desc: "Vast tidal marshes of native methane-fed flora line the coasts, converting atmospheric hydrocarbons into thick edible biomass. The richest harvest on any cryogenic world."
 d_pd_methane_pure_gas_vents: "Methane-Ethane Vents"
 d_pd_methane_pure_gas_vents_desc: "Deep fissures vent plumes of methane and heavier hydrocarbon gases, pure enough to feed refineries with no preprocessing."

 # Urban districts (link to vanilla city/hive/nexus loc so submods stay compatible)

 # Rural districts
 district_pdexotic_cryo_riftvent: "Riftvent Station"
 district_pdexotic_cryo_riftvent_plural: "Riftvent Stations"
 district_pdexotic_cryo_riftvent_desc: "Cryovolcanic vents release supercooled brine and trapped gas. Turbine arrays installed over the rifts draw power from the steep thermal gradient between subsurface heat and surface air."
 district_pdexotic_cryo_sublimation: "Sublimation Pit"
 district_pdexotic_cryo_sublimation_plural: "Sublimation Pits"
 district_pdexotic_cryo_sublimation_desc: "Open-cut excavations where vast volumes of volatile ice are flash-sublimated to free the metals and salts trapped within. Drifting curtains of vapor mark each working face."
 district_pdexotic_cryo_chemovat: "Chemovat Garden"
 district_pdexotic_cryo_chemovat_plural: "Chemovat Gardens"
 district_pdexotic_cryo_chemovat_desc: "Pressurized tank-fields cultivating native chemosynthetic life. The organisms metabolize the planet's atmosphere into edible biomass and vent rare gases as a byproduct."
 pdexotic_cryo_chemovat_basic: "Basic Chemovats"
 pdexotic_cryo_chemovat_basic_desc: "Baseline chemovat operations: native chemosynthetic biomass culture, awaiting specialization."

 # District cap modifiers (auto-generated by engine; loc must match vanilla style)
 mod_district_pdexotic_cryo_riftvent_max_add: "Max $district_pdexotic_cryo_riftvent_plural$"
 mod_district_pdexotic_cryo_sublimation_max_add: "Max $district_pdexotic_cryo_sublimation_plural$"
 mod_district_pdexotic_cryo_chemovat_max_add: "Max $district_pdexotic_cryo_chemovat_plural$"

 # Chemovat zones
 zone_pdexotic_cryo_chemovat_refinement: "Vat Cultivation"
 zone_pdexotic_cryo_chemovat_refinement_desc: "Pressure tanks across the chemovat fields cultivate native chemosynthetic strains, converting the trapped atmosphere into edible biomass at industrial scale."
 zone_pdexotic_cryo_chemovat_hydride_synthesis: "Hydride Distillation"
 zone_pdexotic_cryo_chemovat_hydride_synthesis_desc: "Each chemovat is fitted with distillation columns that condense volatile hydrides into containment. Biomass yield decreases in proportion as gas production rises."
 zone_unavailable_tech_mine_exotic_gases: "$society_research_icon_with_space$$tech_mine_exotic_gases$"

 # Cryo chemist job-add modifiers (auto-generated by engine; vanilla pattern: "[job.GetName] Jobs")
 mod_job_pdexotic_cryo_chemist_add: "[pdexotic_cryo_chemist.GetName] Jobs"
 mod_job_pdexotic_cryo_chemist_drone_add: "[pdexotic_cryo_chemist_drone.GetName] Jobs"
 mod_job_pdexotic_cryo_chemist_machine_add: "[pdexotic_cryo_chemist_machine.GetName] Jobs"

 # Cryo chemist jobs (worked at Chemovat Gardens)
 job_pdexotic_cryo_chemist: "Vatkeeper"
 job_pdexotic_cryo_chemist_plural: "Vatkeepers"
 job_pdexotic_cryo_chemist_desc: "Vatkeepers cultivate the pressurized chemovats where native chemosynthetic life is reared on the planet's own atmosphere. The work is half farming, half low-temperature chemistry: the organisms yield edible biomass and vent rare gases as a byproduct."

 job_pdexotic_cryo_chemist_drone: "Vatkeeper Drone"
 job_pdexotic_cryo_chemist_drone_plural: "Vatkeeper Drones"
 job_pdexotic_cryo_chemist_drone_desc: "Vatkeeper Drones tend the pressurized chemovats of the hive, channeling cultivated chemosynthetic biomass into the food stream and recovering vented gases for the swarm's industries."

 job_pdexotic_cryo_chemist_machine: "Vatkeeper Unit"
 job_pdexotic_cryo_chemist_machine_plural: "Vatkeeper Units"
 job_pdexotic_cryo_chemist_machine_desc: "Vatkeeper Units operate the pressurized chemovats as gas-extraction infrastructure, drawing volatile byproducts from the cryogenic biomass cycle. Where the empire still requires organic intake, biomass is recovered as a secondary output."

 # Cryophile livestock variant. Aliases to vanilla livestock loc so flavor text stays consistent across phenotypes.
 job_livestock_cryophile: "$job_livestock$"
 job_livestock_cryophile_plural: "$job_livestock_plural$"
 job_livestock_cryophile_desc: "$job_livestock_desc$"

 # Cryogenic terraforming tech (mirrors vanilla volcanic; covers ammonia and methane)
 tech_pd_cryogenic_terraforming: "Cryogenic Terraforming"
 tech_pd_cryogenic_terraforming_desc: "Advances in cryogenic engineering and exotic-solvent chemistry allow geo-engineering at previously unthinkable temperatures and pressures. We can terraform a Cryogenic World into a temperate planet."

