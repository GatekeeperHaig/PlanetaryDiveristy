 trait_pc_pd_cold_superhabitable_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_dry_superhabitable: "超级类地星球（干燥）"
 pc_pd_dry_superhabitable_desc: "这是一颗干燥的岩质超级类地行星，拥有浓厚的氮氧大气层。尘土覆盖的地表主要分布着台地与峡谷。这里拥有富饶茂盛的灌木地带与浅水河谷，是生命进化的完美摇篮。尽管如此，对于不习惯这种环境的人来说，这里的高重力依然是一大挑战。"
