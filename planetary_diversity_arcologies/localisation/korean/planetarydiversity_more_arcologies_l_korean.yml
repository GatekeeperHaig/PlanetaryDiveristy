 zone_pd_command_nexus_desc: "요새화된 행성의 군사 행정 중심부입니다. 전략 계획 및 작전 조정, 타협 없는 감독을 통해 전쟁 교리를 유지합니다."
 decision_commercial_arcology_project_effects: "이 행성을 §Y$pc_city$§!으로 바꿉니다. £housing£ §Y$PLANET_HOUSING_TITLE$§!, §Y자원 생산량,§!, §Y 팝 성장률§!이 증가하고 특별한 £district£§Y아콜로지 지구§!가 잠금 해제되는 대신, 행성의 천연 자원을 이용할 수 §R없으며§!, £district£ §Y발전§!, §Y채굴§! 및 §Y농업 지구§!를 더 이상 건설할 수 없게 됩니다."
 district_pd_commercial_arcology_housing: "상업 중심 아콜로지"
 district_pd_commercial_arcology_housing_desc: "이 아콜로지는 고급 주거시설과 상업 시설이 결합된 형태로, 쇼핑 거리, 스파, 오락 중심지를 품은 세련된 타워들이 늘어서 있습니다. 경제적 여유가 있는 이들에게 이 복합 단지는 손쉽고 호화로운 리조트식 생활을 제공합니다."
 district_pd_commercial_arcology_housing_plural: "상업 중심 아콜로지"
