 trait_pc_pd_dry_tidally_locked_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_cold_tidally_locked: "潮汐锁定星球（寒冷）"
 pc_pd_cold_tidally_locked_desc: "这是一个拥有氮氧大气层的湿润岩石星球，整体处于冰封状态，并被其母恒星潮汐锁定。星球的向阳面是一片解冻的海洋，持续承受着阳光的暴晒；而背阴面则被冰冻的冰川所覆盖。在这两个截然不同的半球交界处，狂风与强劲的洋流激烈交汇。"
