###Edifícios Raros
 building_megalfora_mine: "Mineração de Raízes de Megaflora"
 building_megalfora_mine_desc: "As gigantescas raízes das árvores de megaflora penetram profundamente na crosta, expondo depósitos minerais de difícil acesso."
 building_megalfora_lab: "Laboratório de Pesquisa de Megaflora"
 building_megalfora_lab_desc: "Há muito que podemos aprender com a estrutura única das árvores de megaflora e das florestas ao redor."
 building_megalfora_grid: "Torneira de Seiva de Megaflora"
 building_megalfora_grid_desc: "O sistema de seiva das árvores de megaflora contém uma abundância de energia que pode ser aproveitada sem efeito negativo sobre as próprias árvores, melhorando nossa produção de energia."
 building_petrified_mine: "Operação de Mineração Petrificada"
 building_petrified_mine_desc: "A abundância de madeira petrificada no planeta permite fácil acesso aos minerais."
 building_petrified_guild: "Marcenaria Petrificada"
 building_petrified_guild_desc: "A composição rara da madeira petrificada permite a criação de impressionantes produtos de consumo."
 building_petrified_lab: "Rede de Pesquisa Petrificada"
 building_petrified_lab_desc: "O turbulento passado do planeta oferece abundantes oportunidades de pesquisa."
 building_reef_lab: "Pesquisa Aquática em Recifes"
 building_reef_lab_desc: "As estruturas únicas dos recifes e a rica biodiversidade permitem à nossa pesquisa realizar descobertas singulares."
 building_reef_guild: "Guilda de Artesãos do Recife"
 building_reef_guild_desc: "O recife pode ser usado para criar bens de consumo originais e belos."
 building_reef_mine: "Consórcio de Mineração do Recife"
 building_reef_mine_desc: "Os recifes ricos em minerais podem ser explorados, melhorando a produção mineral do planeta."
 building_archipelago_foundry: "Fundição de Lava do Arquipélago"
 building_archipelago_foundry_desc: "A rica atividade vulcânica pode melhorar consideravelmente nossas fundições."
 building_archipelago_farm: "Agricultura Vulcânica do Arquipélago"
 building_archipelago_farm_desc: "O alto teor de solo vulcânico pode ser aproveitado para melhorar os rendimentos agrícolas."
 building_archipelago_resort: "Rede de Complexos de Praia do Arquipélago"
 building_archipelago_resort_desc: "Muitas das ilhas são belas e seguras, tornando-as destinos ideais para resorts e spas."
 building_biolumen_lab: "Estação de Pesquisa Bioluminescente"
 building_biolumen_lab_desc: "As selvas bioluminescentes abrigam uma incrível variedade de formas de vida únicas e estão repletas de descobertas médicas e industriais por explorar."
 building_biolumen_resort: "Resort Planetário Bioluminescente"
 building_biolumen_resort_desc: "As selvas bioluminescentes são belas. Este sistema de resorts oferece tudo o que qualquer pessoa poderia desejar sob o brilho quente das plantas bioluminescentes."
 building_biolumen_farm: "Rede Agrícola Bioluminescente"
 building_biolumen_farm_desc: "A abundância de vida vegetal aqui desenvolvida permite aos nossos agricultores utilizar cultivos bioluminescentes, tornando a agricultura mais eficiente neste planeta."
 building_geothermal_grid: "Rede de Energia Geotérmica"
 building_geothermal_grid_desc: "Ao conectar nossa rede elétrica à poderosa atividade geotérmica deste planeta, podemos aumentar a produção de nossos técnicos."
 building_geothermal_foundry: "Filtração de Lama Geotérmica"
 building_geothermal_foundry_desc: "A lama geotérmica está repleta de recursos raros e valiosos; com a filtragem adequada, pode ser usada para melhorar a produção de nossas fundições."
 building_geothermal_lab: "Departamento de Engenharia Geotérmica"
 building_geothermal_lab_desc: "A intensa atividade geotérmica e as extremas diferenças de temperatura obrigam os engenheiros a empregar soluções únicas para problemas de engenharia comuns."
 building_salt_lab: "Laboratório de Análise de Sal"
 building_salt_lab_desc: "As raras formações de sal deste planeta têm muitos usos industriais e técnicos possíveis; estudá-las melhora a qualidade da pesquisa realizada aqui."
 building_salt_mine: "Mineração de Cristais de Sal"
 building_salt_mine_desc: "Os raros cristais de sal aqui permitem que as operações de mineração encontrem minerais raros e novos com facilidade."
 building_salt_foundry: "Fundições Aprimoradas com Sal"
 building_salt_foundry_desc: "Alguns dos sais raros podem ser usados para melhorar a qualidade e a quantidade de ligas produzidas."
 building_aquifer_farm: "Rede Agrícola do Aquífero"
 building_aquifer_farm_desc: "Ao aproveitar a rede de aquíferos para a produção de alimentos, podemos melhorar enormemente a produção agrícola deste mundo."
 building_aquifer_resort: "Serviços de Férias do Aquífero"
 building_aquifer_resort_desc: "Estes resorts permitem aos turistas desfrutar da beleza natural do aquífero e de suas águas frescas e ricas."
 building_aquifer_lab: "Laboratório Subterrâneo do Aquífero"
 building_aquifer_lab_desc: "Este laboratório estuda as formas de vida únicas encontradas no sistema de aquíferos subterrâneos."
 mod_building_aquifer_lab_max: "Máx. $building_aquifer_lab$s"
 building_primal_foundry: "Fundição de Magma Primevo"
 building_primal_foundry_desc: "A atividade vulcânica de fácil acesso pode ser usada para melhorar a produção da fundição."
 building_primal_grid: "Rede de Energia Primeva"
 building_primal_grid_desc: "Os altos níveis de atividade vulcânica podem ser aproveitados para melhorar a geração de energia."
 building_primal_mine: "Mineração em Pirodutos Primevos"
 building_primal_mine_desc: "Os altos níveis de atividade vulcânica criaram numerosos pirodutos antigos que dão acesso a ricas veias minerais."
 building_coral_resort: "Resort Planetário das Florestas de Coral"
 building_coral_resort_desc: "O clima seco e as coloridas florestas de coral constituem espetaculares destinos de férias."
 building_coral_lab: "Postos de Pesquisa da Floresta de Coral"
 building_coral_lab_desc: "O coral terrestre único guarda muitos segredos para biólogos e engenheiros."
 building_coral_guild: "Guilda de Artesãos do Coral"
 building_coral_guild_desc: "O coral terrestre encontrado neste planeta é belo e tem muitos usos de consumo."
 building_supercon_farm: "Sistema de Irrigação Supercontinental"
 building_supercon_farm_desc: "Este mundo tem muito espaço aberto para cultivar e água, mas não no mesmo lugar. Este avançado sistema de irrigação permite melhorar a produção agrícola."
 building_supercon_lab: "Rede de Pesquisa Supercontinental"
 building_supercon_lab_desc: "O supercontinente oferece oportunidades de pesquisa únicas, estudando a coleção de flora e fauna e o estado da tectônica de placas."
 building_supercon_grid: "Rede de Energia Supercontinental"
 building_supercon_grid_desc: "O interior deste supercontinente é seco, aberto e árido. Um lugar perfeito para instalar uma grande rede solar e melhorar a produção de energia planetária."
 building_pd_sinkhole_mine: "Guilda de Mineração de Sumidouros"
 building_pd_sinkhole_mine_desc: "Os sumidouros oferecem numerosas e ricas oportunidades de mineração."
 building_pd_sinkhole_guild: "Bens Subterrâneos de Sumidouros"
 building_pd_sinkhole_guild_desc: "As cavernas e sumidouros permitem acesso a materiais valiosos."
 building_pd_sinkhole_lab: "Rede de Pesquisa de Sumidouros"
 building_pd_sinkhole_lab_desc: "Os sumidouros abrigam formas de vida únicas e apresentam numerosos desafios de engenharia para serem aproveitados."
 building_storm_lab: "Laboratórios de Meteorologia de Tempestades"
 building_storm_lab_desc: "O clima extremo deste planeta permite o estudo prático de novas técnicas de engenharia e estudos de padrões meteorológicos."
 building_storm_grid: "Rede de Parques Eólicos de Tempestade"
 building_storm_grid_desc: "Os ventos extremos deste planeta aumentam a produção de energia da rede elétrica planetária."
 building_storm_mine: "Mineração em Fossos Erodidos por Tempestades"
 building_storm_mine_desc: "O clima extremo deste planeta erode partes da superfície a níveis tão baixos que há muitas oportunidades de mineração de fácil acesso."
 building_iceberg_lab: "Rede de Laboratórios de Estudo de Icebergs"
 building_iceberg_lab_desc: "Os icebergs constantes oferecem oportunidades únicas de pesquisa em engenharia e biologia."
 building_iceberg_farm: "Cultivo de Kelp em Icebergs"
 building_iceberg_farm_desc: "O kelp deste mundo cresce em tal abundância que qualquer atividade agrícola aqui é altamente produtiva."
 building_iceberg_foundry: "Fundição de Icebergs"
 building_iceberg_foundry_desc: "A água salgada fria e a abundância de sais permitem melhorar a produção de ligas."
 building_cryo_lab: "Rede de Pesquisa Criogênica"
 building_cryo_lab_desc: "Estudar a flora e fauna deste mundo ampliará as oportunidades de nossos pesquisadores."
 building_cryo_guild: "Guilda de Artesãos Criogênicos"
 building_cryo_guild_desc: "A criopriteína tem muitas aplicações industriais e os artesãos deste planeta podem criar incríveis produtos únicos."
 building_cryo_grid: "Rede de Aproveitamento de Crioproteína"
 building_cryo_grid_desc: "Aqui processamos a Cryoflora para obter suas proteínas raras e melhorar a geração de energia."
 building_lichen_farm: "Fazenda de Líquens"
 building_lichen_farm_desc: "Essas fazendas aproveitam os líquens aqui presentes para melhorar a produção."
 building_lichen_grid: "Biorreator de Líquens"
 building_lichen_grid_desc: "Ao adicionar o excesso de líquens aos biorreatores, podemos melhorar a produção de energia."
 building_lichen_lab: "Centro de Pesquisa de Líquens"
 building_lichen_lab_desc: "Esta instalação de pesquisa estuda a biodiversidade única e os usos industriais da floresta de líquens."
 building_cryo_resort: "Resort de Cryoflora"
 building_cryo_resort_desc: "Este enorme resort é construído em torno das ricas e belas florestas de Cryoflora, criando oportunidades turísticas para todo o planeta."
 building_glacio_foundry: "Forjas de Magma Glaciovulcânicas"
 building_glacio_foundry_desc: "As forjas especializadas aproveitam a alta energia vulcânica para melhorar a produção de nossas fundições."
 building_glacio_resort: "Resorts de Fontes Termais Glaciovulcânicas"
 building_glacio_resort_desc: "Esta rede de resorts aproveita as abundantes fontes termais aqui presentes."
 building_glacio_mine: "Minas em Pirodutos Glaciovulcânicos"
 building_glacio_mine_desc: "Os pirodutos inativos deste mundo permitem aos nossos mineiros acessar minerais de difícil extração."
 building_lanthanide_guild: "Bens de Consumo de Lantanídeos"
 building_lanthanide_guild_desc: "Esta guilda de artesãos aproveita a rara abundância de metais lantanídeos para criar únicos bens de consumo."
 building_lanthanide_lab: "Rede de Pesquisa de Lantanídeos"
 building_lanthanide_lab_desc: "Esta rede de laboratórios e locais de teste permite aos nossos pesquisadores encontrar novas e inovadoras formas de usar os lantanídeos."
 building_lanthanide_mine: "Mineração de Depósitos de Lantanídeos"
 building_lanthanide_mine_desc: "Os ricos depósitos de lantanídeos tornam a mineração especialmente produtiva neste mundo."
 building_wet_td_farm: "Complexo Agrícola de Bloqueio por Marés"
 building_wet_td_farm_desc: "A luz solar constante torna o cultivo de alimentos incrivelmente eficiente."
 building_wet_td_grid: "Energia Renovável de Bloqueio por Marés"
 building_wet_td_grid_desc: "A luz solar e o vento constantes permitem redes de energia eficientes."
 building_wet_td_bio_lab: "Laboratórios de Estudo Biológico de Bloqueio por Marés"
 building_wet_td_bio_lab_desc: "Cada zona do planeta tem zonas ambientais tão únicas que a flora e a fauna divergiram de formas singulares e inovadoras."
 building_karst_grid: "Captação Geotérmica em Cavernas"
 building_karst_grid_desc: "As cavernas profundas permitem fácil acesso à rica energia geotérmica, melhorando a geração de energia planetária."
 building_karst_lab: "Guilda de Engenharia de Cavernas"
 building_karst_lab_desc: "Construir cidades no subsolo não é tarefa simples. Esta guilda coordena com pesquisadores locais melhorando o rendimento de engenharia aqui."
 building_karst_mine: "Consórcio de Mineração Cárstica"
 building_karst_mine_desc: "As cavernas profundas permitem fácil acesso a ricas veias de minério, melhorando a produção mineral planetária."
 building_superhab_lab: "Laboratórios de Evolução Superabitável"
 building_superhab_lab_desc: "Embora os mundos superabitáveis não sejam ideais para todas as criaturas, são ideais para que a vida biológica evolua. A frequência de descobertas melhora a pesquisa social em escala planetária."
 building_superhab_farm: "Rede Agrícola Superabitável"
 building_superhab_farm_desc: "As condições de crescimento ideais neste planeta permitem níveis de produção agrícola superiores ao normal."
 building_superhab_foundry: "Fundições de Alta Gravidade Superabitáveis"
 building_superhab_foundry_desc: "Fabricar ligas com esta alta gravidade significa que ligas densas de alta qualidade são mais fáceis de produzir."

 #Edifícios Gaia
 building_gaia_lab: "Centro de Pesquisa Gaia"
 building_gaia_lab_desc: "Deste centro, os pesquisadores controlam e mantêm o ambiente ideal do planeta, frequentemente oferecendo novas oportunidades de pesquisa."
 building_gaia_unity_admin: "Coordenação Burocrática Gaia"
 building_gaia_unity_admin_desc: "Os labirínticos escritórios deste centro de coordenação são complementados por vistas deslumbrantes e áreas comuns idílicas, melhorando significativamente o rendimento dos burocratas planetários."
 building_gaia_unity_temple: "Coordenação Eclesiástica Gaia"
 building_gaia_unity_temple_desc: "Este palaciano edifício administrativo de templo está situado no coração da vegetação idílica. As vistas deslumbrantes rejuvenescem e inspiram os membros do clero que o visitam."
 building_gaia_unity_robot: "Centro de Coordenação Gaia"
 building_gaia_unity_robot_desc: "Os sistemas ideais de controle de temperatura e clima deste planeta melhoram o poder de processamento dos Coordenadores alojados aqui."
 building_gaia_unity_servitor: "Paraíso de Bio-Troféus Gaia"
 building_gaia_unity_servitor_desc: "Com um ambiente tão ideal como este, satisfazer cada necessidade de um ser orgânico sapiente é muito mais fácil, e os casos de expressão de autodeterminação diminuem drasticamente. Os orgânicos no interior têm suas necessidades de habitação completamente satisfeitas."
 building_gaia_unity_hive: "Nó de Coordenação Gaia"
 building_gaia_unity_hive_desc: "Os sistemas ideais de controle de temperatura e clima deste planeta proporcionam tal conforto para os drones que eles podem concentrar muito mais de sua capacidade mental na coesão da colmeia."
 building_gaia_resort: "Resort Idílico Gaia"
 building_gaia_resort_desc: "O clima controlado e as vistas de tirar o fôlego permitem atingir o ápice dos resorts tanto para entretenimento quanto para necessidades médicas."

 #Decisão: Nukear o próprio planeta
 decision_nuked_own_planet: "Nukear o Ambiente"
 decision_nuked_own_planet_desc: "Precisamos de um ambiente radioativo para prosperar. Podemos transformar este mundo às nossas necessidades atuais usando ogivas nucleares convencionais."

 #Ascensão por Inundação
 decision_pd_flood_planet: "Expandir o Mar Planetário"
 decision_pd_flood_planet_desc: "Este planeta oceânico tem o potencial de ser um lar ideal para nosso povo. Ao ajustar os níveis do mar e mover as cidades para baixo d'água, podemos garantir que a vida floresça para aqueles adaptados a viver sob as ondas."
 decision_pd_flood_planet_tooltip: "O gelo será extraído de um sistema com uma §Y$sm_ice_mining_station$§!\nModificador §Y$pd_aw_flooded_planet$§! adicionado:\n$pd_aw_flooded_planet_tooltip$"
 pd_aw_flooded_planet: "Planeta Inundado"
 decision_pd_unflood_planet: "Drenar o Mundo"
 decision_pd_unflood_planet_desc: "Isso removerá o ecossistema inundado deste mundo, devolvendo-o ao seu estado original."

 ICE_MINING_PD_PLANET_SUCCESS_TITLE: "Planeta Inundado"
 ICE_MINING_PD_PLANET_SUCCESS_DESC: "Usando gelo extraído do sistema $SYSTEM|Y$, conseguimos inundar §Y[This.GetName]§!."

 decision_pd_build_dayside_farm: "$decision_build_dayside_farm$"
 decision_pd_build_dayside_farm_desc: "$decision_build_dayside_farm_desc$"
 decision_pd_build_dayside_farm_effects_short: "$decision_build_dayside_farm_effects_short$"

 #Terraformação Gaia
 policy_pd_gaia_modifier: "Modelagem de Mundos"
 policy_pd_gaia_modifier_desc: "Embora custoso, podemos aplicar nossas técnicas avançadas de terraformação a cada projeto planetário, garantindo que cada planeta terraformado seja moldado à perfeição."
 pd_expensive_gaia_terraforming_name: "Terraformação Modeladora de Mundos"
 pd_expensive_gaia_terraforming: "Terraformação Modeladora de Mundos"
 pd_expensive_gaia_terraforming_desc: "Todos os projetos de terraformação ganharão o §Y$engineered_environment_gaia$ Modificador§!. Isso tornará todos os projetos de terraformação mais caros."
 pd_normal_terraforming_name: "Padrão de Terraformação Normal"
 pd_normal_terraforming: "Padrão de Terraformação Normal"
 pd_normal_terraforming_desc: "Os custos de terraformação permanecerão padrão; usaremos o Modelador de Mundos nos planetas que escolhermos."

 #Mundo Nemma
 pd_nemma: "Mundo Nemma"
 pd_nemma_desc: "As ilhas deste planeta são na verdade répteis anfíbios colossais com carapaça mineral. Chamados de Nemmas, flutuam na superfície e permanecem dóceis se não forem perturbados."
 #Alpha Centauri
 pd_alpha_centauri: "Mundo Chiron"
 pd_alpha_centauri_desc: "O planeta está coberto de crescimentos xeno-fúngicos e assolado por condições meteorológicas extremas e instabilidade sísmica. Apesar desses perigos, seus ricos recursos e biosfera resiliente oferecem valiosas oportunidades de pesquisa e exploração."

 #Zonas
 zone_pd_hive_spawning: "Zona de Reprodução da Colmeia"
 zone_pd_hive_spawning_desc: "Uma zona dedicada à reprodução de novos drones."
 zone_pd_machine_replication: "Zona de Replicação de Máquinas"
 zone_pd_machine_replication_desc: "Uma zona dedicada à construção de novas unidades de máquinas."

 #Planeta Pelágico
 pd_pelagic_planet: "Pelágico"
 pd_pelagic_planet_desc: "Este planeta está quase completamente envolto por um oceano global, com quase nenhuma massa terrestre emergindo à superfície."
