l_spanish:

#Origin
 origin_pd_aw_tree_of_life: "Megaflora Árbol de la Vida"
 origin_pd_aw_tree_of_life_desc: "Esta Colmena evolucionó en una relación simbiótica con un vasto árbol de megaflora cuyas raíces se han extendido a cada rincón del planeta y cambiaron el ecosistema para adaptarse tanto a él como a los drones. La colmena tendría dificultades para sobrevivir sin el apoyo del árbol."
 origin_tooltip_pd_aw_tree_of_life_start_effects: "- $HOMEWORLD$$TABBED_NEW_LINE$- Característica Planetaria: ['concept_tree_of_life']$TABBED_NEW_LINE$- Modificadores Planetarios: ['concept_pd_aw_tree_of_life_modifier']$NEW_LINE$- Planetas Colonizados:$TABBED_NEW_LINE$- Característica Planetaria: ['concept_pd_aw_tree_of_life_sapling']$NEW_LINE$- Colonias sin el §YRetoño del Árbol de la Vida§!:$TABBED_NEW_LINE$- Decisión Planetaria: ['concept_transplant_pd_aw_tree_of_life']$NEW_LINE$- $AVAILABLE_HOLDINGS$ ['concept_pd_aw_tree_of_life_holding', £building£ $holding_tree_of_life_sapling$] en colonias Sujetas"
 origin_tooltip_pd_aw_tree_of_life_start_negative_effects: "- No se pueden terraformar planetas"

