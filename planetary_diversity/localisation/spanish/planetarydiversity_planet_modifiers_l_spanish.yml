 l_spanish:

###Modificadores
 #Mundos Húmedos
 pd_continental: "Mundo Continental"
 pd_continental_desc: "Grandes masas terrestres están separadas por océanos, con amplias variaciones climáticas según la latitud y las precipitaciones."
 pd_retinal: "Mundo Retinal"
 pd_retinal_desc: "La vida vegetal de este mundo está basada en retinaldehído en lugar de clorofila, lo que otorga al planeta un tono morado distintivo."
 pd_lake: "Mundo Lacustre"
 pd_lake_desc: "El terreno del planeta es un mosaico de innumerables lagos, que varían en tamaño desde los más pequeños hasta los más grandes."
 pd_forest: "Mundo Forestal"
 pd_forest_desc: "Densos bosques cubren la superficie de este planeta, formando un mar ininterrumpido de vegetación boscosa que abarca toda su masa terrestre."
 pd_tepid: "Mundo Tibio"
 pd_tepid_desc: "Debido a su mínima inclinación axial, las condiciones ideales de este mundo han impulsado la evolución de diversos procesos fotosintéticos, resultando en una vibrante variedad de colores en su flora."
 pd_mushroom: "Mundo de Hongos"
 pd_mushroom_desc: "La vida fúngica domina el ecosistema del planeta, cubriendo extensas regiones con bosques y campos de hongos."
 pd_temperate: "Mundo Templado"
 pd_temperate_desc: "Este mundo disfruta de un clima suave que sustenta una rica biodiversidad en casi todos sus continentes."
 pd_sakura: "Mundo Sakura"
 pd_sakura_desc: "Grandes masas terrestres, separadas por océanos y frondosos bosques de hermosos árboles floridos, cubren la superficie."
 pd_moss: "$pc_pd_moss$"
 pd_moss_desc: "$pc_pd_moss_desc$"
 pd_marsh: "$pc_pd_marsh$"
 pd_marsh_desc: "$pc_pd_marsh_desc$"
 pd_carotene: "$pc_pd_carotene$"
 pd_carotene_desc: "$pc_pd_carotene_desc$"
 pd_megaflora: "Mundo de Megaflora"
 pd_megaflora_desc: "La colosal flora arbórea de este mundo envuelve la superficie, con extensas raíces que se adentran kilómetros bajo la tierra. Navegar la construcción alrededor de esta rara vegetación presenta desafíos significativos."
 pd_petrified: "Mundo de Bosques Petrificados"
 pd_petrified_desc: "Otrora cubierto por una vasta megaflora, este planeta muestra ahora enormes restos petrificados de su antigua vegetación. El singular material similar a la madera tiene potencial constructivo, aunque su extracción requiere un esfuerzo considerable."

 #Océano
 pd_ocean: "Mundo Oceánico"
 pd_ocean_desc: "Los océanos cubren más del §Y90%§! de la superficie, con islas dispersas que conforman el porcentaje restante."
 pd_cascadian: "Mundo Cascadiano"
 pd_cascadian_desc: "Bosques costeros subtemplados y cordilleras imponentes definen este paisaje. La hidrosfera activa y tormentosa del planeta exhibe marcados contrastes entre inviernos suaves y veranos breves y más cálidos."
 pd_swamp: "Mundo Pantanoso"
 pd_swamp_desc: "Los humedales densamente boscosos dominan la mayor parte del planeta, con una hidrosfera robusta y estable de mares poco profundos, pantanos y ciénagas. Este ambiente húmedo sustenta una rica abundancia de vida vegetal y animal."
 pd_crag: "Mundo Escarpado"
 pd_crag_desc: "Este planeta cuenta con vastos océanos y casquetes de hielo polar que cubren la mayor parte de su superficie. Islas sísmicamente activas dispersan las características ambientales dinámicas y distintivas de la región."
 pd_fog: "Mundo Neblinoso"
 pd_fog_desc: "Aunque los océanos dominan la superficie, la humedad generalizada genera niebla y neblina casi constantes que se desplazan sobre la tierra y sustentan frondosos bosques y amplias praderas más allá de las costas."
 pd_kelp: "Mundo de Algas Marinas"
 pd_kelp_desc: "La superficie del planeta es principalmente oceánica, con aguas poco profundas ricas en nutrientes que fomentan extensos bosques de algas. Este próspero ecosistema submarino sustenta una notable biodiversidad en todo el planeta."
 pd_algae: "Mundo de Algas Rosadas"
 pd_algae_desc: "Los ricos mares poco profundos y los lagos de este planeta sustentan brillantes proliferaciones de algas rosadas, creando un espectáculo visual impresionante que puede verse desde el espacio."
 pd_columnar: "$pc_pd_columnar$"
 pd_columnar_desc: "$pc_pd_columnar_desc$"
 pd_tidepool: "$pc_pd_tidepool$"
 pd_tidepool_desc: "$pc_pd_tidepool_desc$"
 pd_barnacle: "$pc_pd_barnacle$"
 pd_barnacle_desc: "$pc_pd_barnacle_desc$"
 pd_reef: "Mundo de Arrecifes"
 pd_reef_desc: "Extensos océanos poco profundos envuelven todo el planeta, exponiendo importantes sistemas de arrecifes justo bajo la superficie cuando se observa desde la órbita. Cadenas de islas formadas por coral emergen donde los arrecifes rompen la línea de flotación."
 pd_archipelago: "Mundo Archipiélago"
 pd_archipelago_desc: "Islas dispersas salpican un único océano que abarca todo el planeta. La intensa actividad volcánica provoca la rápida aparición y desaparición de nuevas islas, creando un paisaje en constante cambio."

 #Tropical
 pd_tropical: "Mundo Tropical"
 pd_tropical_desc: "El planeta atraviesa estaciones alternadas, con precipitaciones significativas y períodos más secos, y una densa vegetación cubre sus masas terrestres."
 pd_atoll: "Mundo de Atolones"
 pd_atoll_desc: "Una abundancia de lagunas poco profundas, intrincados arrecifes de coral e islas tropicales frondosas define este planeta. Junto a sus idílicas temperaturas, este mundo favorece una biosfera próspera."
 pd_tepui: "Mundo de Tepuyes"
 pd_tepui_desc: "Con una hidrosfera sustancial y densa vegetación, este planeta distingue entre los tepuyes más frescos y lluviosos y la jungla húmeda y cálida en las tierras bajas."
 pd_mangrove: "Mundo de Manglares"
 pd_mangrove_desc: "Los mares poco profundos dominan la mayor parte de la superficie de este planeta, dejando una mínima tierra sobre el nivel del mar. Las selvas de manglares se extienden cientos de kilómetros más allá de las costas de las pocas islas existentes."
 pd_cenote: "Mundo de Cenotes"
 pd_cenote_desc: "Escasos bosques tropicales cubren las masas de tierra superficiales mientras la mayor parte de la hidrosfera se filtra hacia un intrincado sistema subterráneo, sustentando ecosistemas interconectados y una rica biodiversidad."
 pd_fungal: "Mundo de Jungla Fúngica"
 pd_fungal_desc: "La vegetación fúngica de este planeta forma la base de una biosfera próspera y diversa, que va desde microscópicas esporas hasta colosales hongos de megaflora."
 pd_aerial: "Mundo de Semillas Aéreas"
 pd_aerial_desc: "Muy por encima de las masas terrestres envueltas en densa vegetación, colosales vainas de semillas, portadas por la flora única del planeta, se deslizan por los cielos como nubes."
 pd_lilypad: "Mundo de Nenúfares"
 pd_lilypad_desc: "Los cálidos y poco profundos océanos de este planeta sustentan una vibrante biodiversidad. En la superficie, hojas resistentes de la flora acuática forman un ecosistema secundario basado en la superficie."
 pd_obsidian: "$pc_pd_obsidian$"
 pd_obsidian_desc: "$pc_pd_obsidian_desc$"
 pd_thunder: "$pc_pd_thunder$"
 pd_thunder_desc: "$pc_pd_thunder_desc$"
 pd_geothermal: "Geotérmico"
 pd_geothermal_desc: "En este planeta, vibrantes grietas tropicales emergen entre imponentes acantilados de hielo. Bajo la superficie, una potente actividad geotérmica sustenta millones de pozas cálidas, alimentando una próspera biodiversidad."
 pd_biolumen: "Mundo Bioluminiscente"
 pd_biolumen_desc: "Partículas atmosféricas envuelven este planeta, pero casi todas las formas de vida se adaptan con bioluminiscencia, creando un espectáculo impresionante visible desde la órbita."

 #Desierto
 pd_desert: "Mundo Desértico"
 pd_desert_desc: "Las precipitaciones infrecuentes y las variaciones de temperatura del ciclo diurno caracterizan este planeta. La vegetación escasa florece con las ocasionales lluvias en el desierto."
 pd_dune: "Mundo de Dunas"
 pd_dune_desc: "Interminables dunas de arena dominan este mundo desértico. La escasa hidrosfera existe principalmente en acuíferos subterráneos, emergiendo esporádicamente como oasis y manantiales de montaña."
 pd_oasis: "Mundo de Oasis"
 pd_oasis_desc: "La hidrosfera sustenta un vasto cuerpo de agua con una franja de densa vegetación. Las precipitaciones apenas alcanzan el desierto interior que cubre la mayor parte del planeta."
 pd_outback: "Mundo Outback"
 pd_outback_desc: "La superficie planetaria está dominada por matorrales áridos y semiáridos y desiertos, con mayor vegetación cerca de las fuentes de agua. La hidrosfera se limita a mares interiores selectos y manantiales subterráneos."
 pd_coastal: "Mundo Costero"
 pd_coastal_desc: "Los océanos profundos inducen una alta estabilidad atmosférica, limitando las precipitaciones superficiales. La niebla y la neblina prevalentes sustentan diversas suculentas y arbustos."
 pd_fungi: "Mundo de Hongos Desérticos"
 pd_fungi_desc: "Seco y cubierto de cenizas volcánicas, este mundo alberga hongos desérticos que resisten las altas temperaturas, la sequía y la escasa nutrición."
 pd_ironsand: "$pc_pd_ironsand$"
 pd_ironsand_desc: "$pc_pd_ironsand_desc$"
 pd_cactus: "$pc_pd_cactus$"
 pd_cactus_desc: "$pc_pd_cactus_desc$"
 pd_dust: "$pc_pd_dust$"
 pd_dust_desc: "$pc_pd_dust_desc$"
 pd_sodalite: "$pc_pd_sodalite$"
 pd_sodalite_desc: "$pc_pd_sodalite_desc$"
 pd_salt: "Mundo Salino"
 pd_salt_desc: "Ricos depósitos minerales se extienden por este planeta, pero el alto contenido de sal en la mayor parte de la superficie resulta inhóspito para muchas formas de vida vegetal y animal."
 pd_aquifer: "Mundo de Acuíferos"
 pd_aquifer_desc: "Aunque el terreno arenoso ofrece poco alivio al intenso calor, las lagunas en constante movimiento y los sistemas de ríos subacuáticos albergan una diversa variedad de ecosistemas y biodiversidad únicos."

 #Árido
 pd_arid: "Mundo Árido"
 pd_arid_desc: "El terreno cubierto de polvo comprende principalmente mesetas y cañones. La vegetación es escasa, pero los bosques prosperan en las regiones polares."
 pd_mesa: "Mundo de Mesetas"
 pd_mesa_desc: "Las mesetas ecuatoriales y los bosques polares definen el terreno. La hidrosfera consiste en grandes ríos en cañones con lechos cubiertos de vegetación, formando un paisaje diverso."
 pd_fog_desert: "Mundo de Desierto Brumoso"
 pd_fog_desert_desc: "Los picos de altitud extrema crean sombras de lluvia en la mayor parte de la superficie. Las salinas y los valles áridos dominan las mesetas, mientras que algunos lagos y manantiales de montaña representan la hidrosfera."
 pd_mediterranean: "Mundo Mediterráneo"
 pd_mediterranean_desc: "La hidrosfera de este planeta sustenta extensos mares interiores, rodeados por escasa vegetación. Las áreas del interior presentan paisajes áridos con escasas precipitaciones."
 pd_badlands: "Mundo de Tierras Baldías"
 pd_badlands_desc: "El terreno árido presenta rocas sedimentarias y suelos ricos en arcilla moldeados por la erosión eólica e hídrica. La vegetación, principalmente arbustos y gramíneas resistentes, prospera a la sombra de las colinas."
 pd_succulent: "Mundo de Suculentas"
 pd_succulent_desc: "Las temperaturas elevadas y las lluvias infrecuentes pero esporádicas han impulsado a la vegetación a desarrollar técnicas de retención de agua para prosperar en las condiciones difíciles de este planeta."
 pd_striped: "Mundo Rayado"
 pd_striped_desc: "Este planeta exhibe una composición mineralógica cautivadora. El paisaje ostenta profundas franjas coloridas, añadiendo una capa hipnotizante al terreno árido y cubierto de polvo."
 pd_amethyst: "Mundo Amatista"
 pd_amethyst_desc: "Este mundo árido tuvo un pasado geológico muy activo, lo que resultó en extensos depósitos de cuarzo amatista en toda la corteza del planeta."
 pd_opal: "$pc_pd_opal$"
 pd_opal_desc: "$pc_pd_opal_desc$"
 pd_superbloom: "$pc_pd_superbloom$"
 pd_superbloom_desc: "$pc_pd_superbloom_desc$"
 pd_coral: "Mundo de Coral"
 pd_coral_desc: "Otrora cubierto por océanos, la disminuida hidrosfera de este planeta, debida a cambios ecológicos, ha llevado a la adaptación de los corales al ambiente seco."
 pd_primal: "Mundo Primigenio"
 pd_primal_desc: "A medida que la actividad volcánica se reduce en este joven planeta, surgen intrincadas flora y fauna, contribuyendo al desarrollo de una atmósfera respirable y una hidrosfera estabilizada."

 #Sabana
 pd_savannah: "Mundo de Sabana"
 pd_savannah_desc: " La hidrosfera limitada da lugar a breves estaciones lluviosas. La vegetación, compuesta principalmente por gramíneas omnipresentes, se concentra alrededor de oasis poco profundos."
 pd_steppe: "Mundo de Estepa"
 pd_steppe_desc: "Esta pradera semiárida presenta amplias colinas ondulantes y llanuras. La ausencia de árboles es notable, pero las lluvias intermitentes sustentan el crecimiento de arbustos y gramíneas."
 pd_prairie: "Mundo de Pradera"
 pd_prairie_desc: "Caracterizado por una hidrosfera estacional, este planeta cuenta con una única y vasta masa terrestre, grandes mares interiores, breves veranos secos e inviernos fríos y rigurosos."
 pd_veld: "Mundo de Veld"
 pd_veld_desc: "Con una atmósfera seca de nitrógeno y oxígeno, este planeta subtropical presenta matorrales y sabanas con inviernos suaves y largos veranos calurosos."
 pd_semi_arid: "Mundo Semiárido"
 pd_semi_arid_desc: "La hidrosfera permite una estación lluviosa breve pero significativa, con vegetación concentrada en valles protegidos y cerca de grandes masas de agua."
 pd_aspen: "Mundo de Álamos"
 pd_aspen_desc: "Seco y rocoso con una atmósfera de nitrógeno y oxígeno, este mundo tiene arboledas entre pastizales. Una pequeña pero estable hidrosfera de arroyos sustenta los bosques y la densa maleza."
 pd_sandstone: "$pc_pd_sandstone$"
 pd_sandstone_desc: "Este planeta cuenta con vastas praderas y formaciones de arenisca esculpidas por el viento. Su hidrosfera sustenta gramíneas resistentes adaptadas para prosperar en este entorno."
 pd_turquoise: "$pc_pd_turquoise$"
 pd_turquoise_desc: "Este planeta de praderas subtropicales está salpicado de vastos depósitos de gemas de turquesa, que se encuentran casi por todas partes en su superficie."
 pd_calcite: "$pc_pd_calcite$"
 pd_calcite_desc: "$pc_pd_calcite_desc$"
 pd_monsoon: "$pc_pd_monsoon$"
 pd_monsoon_desc: "$pc_pd_monsoon_desc$"
 pd_silvergrass: "$pc_pd_silvergrass$"
 pd_silvergrass_desc: "$pc_pd_silvergrass_desc$"
 pd_supercontinent: "Mundo Supercontinente"
 pd_supercontinent_desc: "Este planeta tiene actualmente un supercontinente debido a su tectónica de placas. Las áreas costeras son frondosas, mientras que el terreno interior transita de praderas a grandes desiertos áridos."
 pd_sinkhole: "Mundo de Sumideros"
 pd_sinkhole_desc: "La superficie tiene una hidrosfera pequeña y estable, pero un océano subterráneo que abarca todo el planeta se esconde debajo, creando enormes sumideros en toda la superficie del mundo."

 #Ártico
 pd_arctic: "Mundo Ártico"
 pd_arctic_desc: "Los polos son extensos, con significativos depósitos de agua congelada en forma de hielo glacial. A pesar de las variaciones estacionales, la franja ecuatorial cuenta con abundante vegetación."
 pd_cold_desert: "Mundo de Desierto Frío"
 pd_cold_desert_desc: "Escasas precipitaciones y raras masas de agua superficiales caracterizan este planeta. Las temperaturas medias diurnas permanecen frecuentemente muy por debajo del punto de congelación."
 pd_glacial: "Mundo Glacial"
 pd_glacial_desc: "La hidrosfera permanece atrapada en hielo glacial la mayor parte del año, pero los meses de verano presentan un deshielo significativo, y la nieve es bastante común."
 pd_antarctic: "Mundo Antártico"
 pd_antarctic_desc: "Aunque los vientos pueden alcanzar más de 25 km por hora en invierno, la vida se aferra a bolsas aisladas bajo el hielo marino, en cuevas y valles protegidos."
 pd_aeolian: "Mundo Eólico"
 pd_aeolian_desc: "Los vientos de este planeta alcanzan rutinariamente velocidades superiores a 300 km por hora. Estos vientos han creado sumideros, cañones en ranura y depresiones, que han permitido que la vida prospere en su interior, resguardada de las inclemencias del tiempo."
 pd_ice_spike: "Mundo de Agujas de Hielo"
 pd_ice_spike_desc: "La intensa actividad tectónica bajo la superficie golpea contra la profunda capa de hielo, creando los imponentes picos de hielo que dominan el paisaje."
 pd_crevasse: "Mundo de Grietas Glaciales"
 pd_crevasse_desc: "Aunque la superficie de este planeta helado es inhóspita, la energía geotérmica del núcleo del planeta mantiene habitable el fondo de sus numerosas grietas glaciales."
 pd_supraglacial_lakes: "$pc_pd_supraglacial_lakes$"
 pd_supraglacial_lakes_desc: "$pc_pd_supraglacial_lakes_desc$"
 pd_ice_dunes: "Mundo de Dunas de Hielo"
 pd_ice_dunes_desc: "Con temperaturas bajo cero durante la mayor parte del año, partículas de hielo similares a la arena crean las dunas de este planeta."
 pd_ferrospring: "$pc_pd_ferrospring$"
 pd_ferrospring_desc: "$pc_pd_ferrospring_desc$"
 pd_storm: "Tormenta"
 pd_storm_desc: "Las masas terrestres del planeta se encuentran en cada uno de sus polos, separadas por un enorme océano que genera poderosas tormentas durante todo el año. Debido a las condiciones extremas, la mayor parte de la vida del planeta se encuentra bajo la superficie del océano."
 pd_iceberg: "Mundo de Icebergs"
 pd_iceberg_desc: "A pesar de las temperaturas bajo cero, el altamente salino océano que cubre todo el planeta permanece líquido. El agua que se separa de la sal forma icebergs semipermanentes, mientras que colonias de algas marinas de agua salada prosperan en estas condiciones heladas."

 #Alpino
 pd_alpine: "Mundo Alpino"
 pd_alpine_desc: "Este planeta tiene cimas nevadas y lagos helados que salpican los valles. Aunque el planeta experimenta mínimas variaciones estacionales, el agua aún líquida bajo la superficie congelada de los lagos es suficiente para sustentar algo de vegetación resistente."
 pd_boreal: "Mundo Boreal"
 pd_boreal_desc: "Este planeta subártico experimenta un amplio rango de temperaturas, con bosques boreales en regiones más cálidas y tundra y hielo cerca de los polos."
 pd_snow: "Mundo Nevado"
 pd_snow_desc: "Este planeta está atravesando actualmente una era glacial. Mientras los glaciares cubren la mayor parte de las latitudes polares y medias, bosques subtemplados cubren la franja ecuatorial."
 pd_highland: "Mundo de Tierras Altas"
 pd_highland_desc: "Persistentes precipitaciones y frecuente niebla envuelven este planeta. La estable hidrosfera, enclavada entre cordilleras heladas y vastos mares interiores, sustenta gramíneas y líquenes resistentes."
 pd_dune_forest: "Mundo de Bosque de Dunas"
 pd_dune_forest_desc: "Este planeta experimenta niebla frecuente pero precipitaciones mínimas. Las tierras bajas consisten principalmente en dunas secas, mientras que la hidrosfera sustenta montañas nevadas y boscosas."
 pd_fjord: "Mundo de Fiordos"
 pd_fjord_desc: "Los extensos océanos de este planeta crean profundas ensenadas, fomentando selvas tropicales subárticas a lo largo de la costa y praderas alpinas a mayores elevaciones."
 pd_blossom: "Mundo en Flor"
 pd_blossom_desc: "Las ricas praderas de este planeta están adornadas con una vibrante flora florida, presentando un espectáculo visible desde la órbita."
 pd_taiga: "$pc_pd_taiga$"
 pd_taiga_desc: "$pc_pd_taiga_desc$"
 pd_craton: "$pc_pd_craton$"
 pd_craton_desc: "$pc_pd_craton_desc$"
 pd_ravine: "$pc_pd_ravine$"
 pd_ravine_desc: "$pc_pd_ravine_desc$"
 pd_glaciovolcanic: "Mundo GlacioVolcánico"
 pd_glaciovolcanic_desc: "Este planeta experimenta intensa actividad volcánica, lo que resulta en numerosos lagos calentados geotérmicamente que aportan minerales raros y energía a un paisaje de otro modo helado."
 pd_lanthanide: "Mundo de Lantánidos"
 pd_lanthanide_desc: "Los metales de tierras raras y la actividad magnética de este planeta dan forma a impresionantes cimas de montaña en forma de anillo. Con mínima variación estacional, la hidrosfera solo puede sustentar parches de vegetación resistente."

 #Tundra
 pd_tundra: "Mundo de Tundra"
 pd_tundra_desc: "Este mundo mantiene una hidrosfera estable y temperaturas bajas predecibles, fomentando vastos bosques de líquenes en todo el planeta entre escarpadas montañas y glaciares."
 pd_bog: "Mundo de Turberas"
 pd_bog_desc: "Este planeta experimenta breves veranos húmedos, largos inviernos fríos y precipitaciones anuales considerables. Una robusta hidrosfera cubre las masas terrestres con densas turberas y pantanos."
 pd_mycelium: "Mundo de Micelios"
 pd_mycelium_desc: "Este planeta tiene veranos cortos y frescos e inviernos secos y helados. Vastas llanuras presentan imponentes bosques de hongos y densas redes miceliales subterráneas."
 pd_mud: "Mundo de Lodo"
 pd_mud_desc: "Este planeta tiene estaciones infrecuentes con precipitaciones significativas, y la actividad geotérmica de bajo nivel en la superficie forma numerosos lagos de lodo y volcanes de barro en el paisaje helado."
 pd_basalt: "Mundo de Basalto"
 pd_basalt_desc: "Las estaciones estables prevalecen en este planeta, donde la actividad volcánica intermitente crea extensos campos de lava. Los musgos y líquenes que prosperan en el basalto enfriado sustentan la biosfera."
 pd_tuya: "Mundo de Tuyas"
 pd_tuya_desc: "Con estaciones limitadas e inviernos rigurosos, la estable biosfera de este mundo prospera gracias a los nutrientes del suelo volcánico, y volcanes subglaciares salpican la superficie."
 pd_cryovolcano: "Mundo de Criovolcanes"
 pd_cryovolcano_desc: "La vida persiste en este mundo gracias a los nutrientes liberados por los criovolcanes, que eyectan agua, amoníaco y metano desde debajo de la superficie helada."
 pd_treeline: "$pc_pd_treeline$"
 pd_treeline_desc: "$pc_pd_treeline_desc$"
 pd_peatland: "$pc_pd_peatland$"
 pd_peatland_desc: "$pc_pd_peatland_desc$"
 pd_travertine: "$pc_pd_travertine$"
 pd_travertine_desc: "$pc_pd_travertine_desc$"
 pd_cryoflora: "Mundo de Crioflora"
 pd_cryoflora_desc: "La hidrosfera del planeta está mayormente congelada, con temperaturas que raramente superan el punto de congelación. No obstante, la flora y la fauna se han adaptado con proteínas anticongelantes, creando un hermoso ecosistema luminiscente."
 pd_lichen: "Mundo de Líquenes"
 pd_lichen_desc: "Este mundo sustenta extensos bosques de líquenes en toda su estable hidrosfera y con temperaturas bajas predecibles. Los bosques de líquenes, enclavados entre escarpadas montañas y glaciares, extraen nutrientes de los minerales."

###Superhábitable
 pd_wet_superhabitable: "Mundo Superhábitable Húmedo"
 pd_wet_superhabitable_desc: "Este húmedo mundo superhábitable cuenta con una robusta hidrosfera y condiciones agrícolas óptimas, con temperaturas medias más cálidas y cuencas oceánicas poco profundas. La fuerte gravedad desafía a los no acostumbrados."
 pd_dry_superhabitable: "Mundo Superhábitable Árido"
 pd_dry_superhabitable_desc: "Este árido mundo superhábitable cuenta con una robusta hidrosfera y condiciones agrícolas óptimas, con temperaturas medias más cálidas y cuencas oceánicas poco profundas. La fuerte gravedad desafía a los no acostumbrados."
 pd_cold_superhabitable: "Mundo Superhábitable Frío"
 pd_cold_superhabitable_desc: "Este frío mundo superhábitable cuenta con una robusta hidrosfera y condiciones agrícolas óptimas, con temperaturas medias más cálidas y cuencas oceánicas poco profundas. La fuerte gravedad desafía a los no acostumbrados."
 pd_gaia_superhabitable: "Mundo Gaia Superhábitable"
 pd_gaia_superhabitable_desc: "Este magistralmente diseñado mundo superhábitable, con una atmósfera de nitrógeno y oxígeno y un ecosistema resiliente, ofrece condiciones óptimas para diversas formas de vida. Temperaturas más cálidas y cuencas oceánicas poco profundas caracterizan su paisaje, pero la fuerte gravedad desafía a los no acostumbrados."
 pd_arcology_superhabitable: "Arcología Superhábitable"
 pd_arcology_superhabitable_desc: "Un mundo superhábitable completamente engullido por la expansión urbano-industrial. Este planeta tiene temperaturas medias más cálidas, pero la fuerte gravedad desafía a los no acostumbrados."
 pd_nuked_superhabitable: "Mundo Superhábitable Devastado"
 pd_nuked_superhabitable_desc: "Este mundo superhábitable atraviesa un invierno nuclear, marcado por densas capas de aerosoles de hollín en la atmósfera y altos niveles de radiación. Los signos de vida son mínimos, y la fuerte gravedad desafía a los no acostumbrados."

###Bloqueo de Mareas
 pd_wet_tidally_locked: "Mundo Solar"
 pd_wet_tidally_locked_desc: "Este húmedo mundo con bloqueo de mareas presenta abundantes oportunidades energéticas con luz solar constante y fuertes vientos. La temperatura del planeta y su estable hidrosfera permiten una rica biodiversidad en sus zonas del lado diurno y del crepúsculo."
 pd_dry_tidally_locked: "Mundo Crepuscular"
 pd_dry_tidally_locked_desc: "Este seco mundo con bloqueo de mareas presenta abundantes oportunidades energéticas con luz solar constante y fuertes vientos. La zona habitable se limita a las regiones crepusculares."
 pd_cold_tidally_locked: "Mundo Ocular"
 pd_cold_tidally_locked_desc: "Este frío mundo con bloqueo de mareas presenta abundantes oportunidades energéticas con luz solar constante y fuertes vientos. La zona habitable se limita a las regiones del lado diurno."
 pd_gaia_tidally_locked: "Mundo Gaia con Bloqueo de Mareas"
 pd_gaia_tidally_locked_desc: "Un mundo con bloqueo de mareas idealmente creado, con atmósfera de nitrógeno y oxígeno y un ecosistema resiliente. Las condiciones óptimas para todas las formas de vida superiores conocidas existen en las limitadas regiones habitables del crepúsculo."
 pd_arcology_tidally_locked: "Arcología con Bloqueo de Mareas"
 pd_arcology_tidally_locked_desc: "Un mundo con bloqueo de mareas completamente engullido por la expansión urbano-industrial. La zona habitable se limita a las regiones crepusculares."
 pd_nuked_tidally_locked: "Mundo Devastado con Bloqueo de Mareas"
 pd_nuked_tidally_locked_desc: "Este mundo con bloqueo de mareas atraviesa un invierno nuclear, caracterizado por densas capas de aerosoles de hollín y altos niveles de radiación atmosférica. Los signos de vida son mínimos, y la zona habitable se limita a las regiones crepusculares."

###Caverna
 pd_wet_cave: "Mundo de Cuevas Kársticas"
 pd_wet_cave_desc: "Este planeta cuenta con una red de cuevas subterráneas que abarca todo el planeta con un clima húmedo. Aunque construir instalaciones subterráneas es costoso, ofrece colonias defendibles."
 pd_dry_cave: "Mundo de Cuevas de Arenisca"
 pd_dry_cave_desc: "Este planeta cuenta con una red de cuevas subterráneas que abarca todo el planeta con un clima seco. Aunque construir instalaciones subterráneas es costoso, ofrece colonias defendibles."
 pd_cold_cave: "Mundo de Cuevas de Hielo"
 pd_cold_cave_desc: "Este planeta cuenta con una red de cuevas subterráneas que abarca todo el planeta con un clima frío. Aunque construir instalaciones subterráneas es costoso, ofrece colonias defendibles."
 pd_gaia_cave: "Mundo Gaia de Cuevas"
 pd_gaia_cave_desc: "Un mundo cavernoso idealmente creado con una atmósfera de nitrógeno y oxígeno y un ecosistema resiliente. Condiciones óptimas para todas las formas de vida superiores conocidas en diferentes latitudes. Aunque construir instalaciones subterráneas es costoso, ofrece colonias defendibles."
 pd_arcology_cave: "Arcología Cavernosa"
 pd_arcology_cave_desc: "Un mundo cavernoso completamente engullido por la expansión urbano-industrial. Aunque construir instalaciones subterráneas es costoso, ofrece colonias defendibles."
 pd_nuked_cave: "Mundo Cavernoso Devastado"
 pd_nuked_cave_desc: "Este mundo cavernoso atraviesa un invierno nuclear, con densas capas de aerosoles de hollín en la atmósfera. Altos niveles de radiación. Mínimos signos de vida."

###Gaia
 pd_gaia_world: "Mundo Gaia"
 pd_gaia_world_desc: "Un mundo húmedo idealmente creado con una atmósfera de nitrógeno y oxígeno y un ecosistema resiliente. Condiciones óptimas para todas las formas de vida superiores conocidas en diferentes latitudes."
 pd_dry_gaia_world: "Mundo Gaia Árido"
 pd_dry_gaia_world_desc: "Un mundo árido idealmente creado con una atmósfera de nitrógeno y oxígeno y un ecosistema resiliente. Condiciones óptimas para todas las formas de vida superiores conocidas en diferentes latitudes."
 pd_cold_gaia_world: "Mundo Gaia Helado"
 pd_cold_gaia_world_desc: "Un mundo helado idealmente creado con una atmósfera de nitrógeno y oxígeno y un ecosistema resiliente. Condiciones óptimas para todas las formas de vida superiores conocidas en diferentes latitudes."
 pd_uncommon_gaia_world: "Mundo Gaia"
 pd_uncommon_gaia_world_desc: "Un mundo húmedo idealmente creado con una atmósfera de nitrógeno y oxígeno y un ecosistema resiliente. Condiciones óptimas para todas las formas de vida superiores conocidas en diferentes latitudes."

###Arcología/Reliquia
 pc_pd_nuked_arcology: "Mundo Reliquia Devastado"
 pc_pd_nuked_arcology_desc: "Una ciudad que antaño se extendía por todo este mundo. Atraviesa un invierno nuclear, con densas capas de aerosoles de hollín en la atmósfera. Altos niveles de radiación superficial. Mínimos signos de vida."
 pc_pd_nuked_arcology_tooltip: "Habitabilidad: §R-100%§!\nHabitabilidad: §G+100%§! con §Y$trait_pc_nuked_preference$§! o §Y$trait_survivor$§! rasgo"

###Modificadores Inhabitables
 pd_diamond: "Mundo de Diamante"
 pd_diamond_desc: "Debido a las altas temperaturas y la presión planetaria, gran parte de este mundo se ha transformado en diamantes."
 pd_carbon: "Mundo de Carbono"
 pd_carbon_desc: "A diferencia de la mayoría de los mundos basados en compuestos de silicio y oxígeno, tiene una proporción carbono-oxígeno significativamente mayor."
 pd_chthonian: "Mundo Ctónico"
 pd_chthonian_desc: "Este planeta fue en su día un gigante gaseoso, pero los vientos estelares han despojado su atmósfera de hidrógeno y helio, dejando solo el núcleo metálico desnudo."
 pd_iron: "Mundo de Hierro"
 pd_iron_desc: "El planeta consiste principalmente en un núcleo rico en hierro con poco o ningún manto."
 pd_volcano: "Mundo Volcánico"
 pd_volcano_desc: "Este planeta experimenta constantes erupciones volcánicas debido a la alta actividad geológica, con penachos de azufre que alcanzan hasta 500 km de altura sobre la superficie."
 pd_hydrocarbon: "Mundo de Hidrocarburos"
 pd_hydrocarbon_desc: "Este planeta posee una densa y opaca atmósfera compuesta de nitrógeno y metano, con nubes de etano y cuerpos estables de hidrocarburos líquidos."
 pd_hot_gas_giant: "Mundo de Gigante Gaseoso Caliente"
 pd_hot_gas_giant_desc: "Este gigante gaseoso experimenta temperaturas significativamente superiores a la media, proporcionando patrones climáticos explotables para la recolección de energía y gases raros."
 pd_cloudless_gas_giant: "Mundo de Gigante Gaseoso sin Nubes"
 pd_cloudless_gas_giant_desc: "El planeta gaseoso carece de los productos químicos necesarios en la atmósfera para formar una cubierta global de nubes, creando una vista sin rasgos desde la órbita."
 pd_cold_gas_giant: "Mundo de Gigante Gaseoso Frío"
 pd_cold_gas_giant_desc: "Las menores temperaturas y los vientos estables del gigante gaseoso brindan oportunidades de investigación para la exploración."
 pd_ethane_ocean: "Mundo de Océano de Etano"
 pd_ethane_ocean_desc: "Este mundo está cubierto por océanos líquidos de etano hidrocarburo."
 pd_dwarf_gas: "Mundo Enano Gaseoso"
 pd_dwarf_gas_desc: "El planeta presenta una densa atmósfera de hidrógeno y helio con capas profundas de hielo, roca y océanos líquidos de agua y amoníaco."
 pd_subglacial: "Mundo Subglacial"
 pd_subglacial_desc: "La gruesa capa de hielo permanente del planeta, las bajas temperaturas y la delgada atmósfera hacen imposible la vida en la superficie. Sin embargo, el calentamiento por mareas y la actividad geotérmica crean un océano subsuperficial bajo el hielo sólido."
 pd_hothouse: "Mundo de Invernadero"
 pd_hothouse_desc: "Un mundo rocoso cuya atmósfera experimenta actualmente un efecto invernadero descontrolado. Letal para todas las formas de vida."

#Entorno Diseñado
 decision_engineered_environment_gaia: "Proyecto Modelador de Mundos"
 decision_engineered_environment_gaia_desc: "Utilizaremos técnicas avanzadas de terraformación para dar forma a este mundo como un paraíso, dotándolo de condiciones óptimas para todas las formas de vida superiores conocidas."
 engineered_environment_gaia: "Mundo Perfectamente Modelado"
 engineered_environment_gaia_desc: "Las técnicas avanzadas de terraformación han dado forma a este mundo, y su ecosistema ahora tiene condiciones óptimas para todas las formas de vida superiores conocidas."

