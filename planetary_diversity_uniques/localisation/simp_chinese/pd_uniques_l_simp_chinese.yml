 concept_eludium_floating_overseer_desc: "$i_unlocks_building$ ['building:building_pd_eludium_floating_overseer']\n\n§L$tech_eludium_floating_overseer_desc$§!"
 sr_acean:0 "艾森水晶"
 sr_acean_desc:0 "这种晶体的独特共振可以促进有机生命的康复和生长。"
 mod_planet_miners_sr_acean_produces_add: "由£job_miner£[GetMinerPlural]产出的£sr_acean£$sr_acean$"
 pd_crystal: "水晶星球"
 pd_crystal_desc: "星球表面覆盖着巨大的艾森水晶柱，它们散发出的独特共振，能加速有机生命的伤愈并促进其繁衍生长。"
 pd_dead_crystal: "凋零的水晶世界"
 pd_dead_crystal_desc: "创造艾森水晶的超级晶群已被击杀，其对有机生命的积极影响也随之终止。不过，目前的水晶开采产能获得了大幅提升。"
 pd_living_crystal: "痊愈的水晶世界"
 pd_living_crystal_desc: "这一超级晶群已经恢复，其对有机生命的积极影响亦有所增强。水晶的开采状况有所改善，但这一生物现在会捕食它所能捕获的任何猎物。"
 pc_pd_crystal: "水晶星球"
 pc_pd_crystal_desc: "$pd_crystal_desc$"
 pc_pd_crystal_adj: "水晶"
 mod_pc_pd_crystal_habitability: "水晶世界宜居性"
 trait_pc_pd_crystal_preference: "水晶世界偏好"
 trait_pc_pd_crystal_preference_desc: "$trait_pc_arctic_preference_desc$"
 d_pd_khel_ruins: "凯尔遗址"
 d_pd_khel_ruins_desc: "这颗星球的部分区域散落着一个消亡殖民地的遗迹，其中包括巨大的钻孔研究设施。"
 d_pd_acean_pillars: "艾森水晶柱"
 d_pd_acean_pillars_desc: "这颗星球被巨大的艾森水晶柱所覆盖。只要这些水晶柱还扎根于大地，就会对周遭的有机生物产生奇妙而深远的影响——它们不仅能安抚焦躁的情绪，还能极大促进生命的繁衍。"
 pdcrystal.100.name: "生命宝石"
 pdcrystal.100.desc: "对§Y[From.GetName]§!的深度扫描揭示了一项非同寻常的发现：巨大的水晶簇散布在整个地表上，我们将其命名为§Y艾森水晶§!。这些宝石似乎能够增进附近有机生命的健康，而且令人惊奇的是，即使是在分离出来的样本中，这种效果也依然存在。\n\n§Y[Root.Leader.GetName]§!还在丛林中发现了一处前哨站的痕迹，如果我们能控制这颗星球，就能对这些废墟展开探索。"
 pdcrystal.100.a: "真不错。"
 pdcrystal.200.name: "林中遗迹"
 pdcrystal.200.desc: "随着位于§Y[Root.GetName]§!的殖民地逐渐站稳脚跟，我们发现最初找到的废墟绝非孤例。在周围的荒野中，还散布着数个废弃的营地，它们寂静无声且饱经风霜。\n\n这些早期的居民究竟是谁？他们最终遭遇了什么？这至今仍是一个谜。"
 pdcrystal.200.a: "我们将探索这些遗迹。"
 pdcrystal.300.name: "行星的命运"
 pdcrystal.300.desc: "我们现在知道了凯尔人的命运，以及艾森水晶背后的黑暗秘密。摆在我们面前的有三个选择：维持该超级晶群的现状、杀死它，或是将其治愈并恢复至初始状态。\n\n杀死它将提升水晶的开采量，但会彻底终结其对有机生命体的影响；让其恢复原状则会增强它对生命体的影响力，但同时也会增加殖民者死亡的风险——尽管采取安全措施有助于降低这种风险。"
 pdcrystal.300.a: "让它变得驽钝是有理由的。"
 pdcrystal.300.a.tooltip: "我们不会去动这个超级晶群，跟这个星球打交道的方式也不会有任何改变。"
 pdcrystal.300.b: "结束这家伙的生命。"
 pdcrystal.300.b.tooltip: "我们将完成凯尔人未竟的事业、杀死这个超级晶群。这将终结这颗星球对有机生命的影响，但会显著提高艾森水晶的开采产能。"
 pdcrystal.300.c: "应该消除这种不合理的罪行。"
 pdcrystal.300.c.tooltip: "逆转凯尔人的“额叶切除术”将恢复这个超级晶群，这会增强其对生命体的影响，并略微提升艾森水晶的开采量；但这也会使其重新开始捕食包括殖民者在内的各种活物。"
 pdcrystal_site: "杂草丛生的遗迹"
 pdcrystal_site_desc: "这个星球上的某个区域中散布着废弃的遗迹。一次彻底的调查或许有助于我们理解这个世界独有的艾森水晶矿藏，以及它们在有机生命发育中不容忽视的影响。"
 pdcrystal.250.name: "凯尔遗址"
 pdcrystal.250.desc: "丛林已经吞没了大部分荒废的基地及其技术设备，但我们依然恢复了一些有用的信息。凯尔人——一种并非这个星球原住民的外星物种——曾在这里进行一项覆盖全球的实验，该实验涉及向地壳深处打下钻孔。\n\n尽管大部分数据已经损坏，但我们发现的线索表明，在我们的研究站附近隐藏着一个尚未被发现的大型凯尔人定居点。"
 pdcrystal.250.a: "有趣。"
 pdcrystal.251.desc: "在这处定居点，我们发现了一艘缺乏超空间技术的世代飞船残骸。为了逃离母星的气候灾难，凯尔人历经数代，在多个恒星系间辗转流浪。最终，他们找到了这颗似乎能满足其所有需求的星球，并开始建设新的家园。\n\n我们将继续梳理凯尔人留下的记录。"
 ancrel.251.a: "他们还真是走运。"
 pdcrystal.252.desc: "殖民地繁荣发展了数年，这要归功于那些水晶柱的帮助，它们促进了移栽农作物的生长。但随后，殖民者开始接连失踪。起初这似乎只是偶然事件，但失踪的频率却越来越高。在调查这些失踪事件时，他们的首席科学家有了一个令人震惊的发现：这颗星球竟然是个活物，并且正在以他们为食。由于飞船已经无法再次升空，他们只能将重心转向与这颗星球进行沟通，并试图安抚它。\n\n接下来，我们将开始探索其中一处钻探地点。"
 pdcrystal.252.a: "殖民地有危险？"
 pdcrystal.253.desc: "研究结果表明，这种水晶是一种具有初级智能的岩石类超级生物，它利用艾森水晶将动物引诱到隐蔽的天坑中。凯尔人钻出深孔并释放电磁脉冲来干扰它的进食，同时完好地保留了这种水晶的特性。\n\n我们还发现了这项钻探工程的控制中心。"
 pdcrystal.253.a: "他们肯定非常绝望。"
 pdcrystal.254.desc: "凯尔人的钻探反而加速了星球的吞噬，这或许是它的一种防御机制。当他们终于准备好启动武器时，凯尔族已仅存数十人。引爆过后，星球释放出一股巨大的能量狂潮，而所有来自凯尔人的记录都就此戛然而止。\n\n尽管凯尔人未能幸存下来亲眼见证这一切，但他们是对的：这颗星球确实丧失了吞噬生命的能力。这，便是艾森水晶那残酷而阴暗的力量源头。"
 pdcrystal.254.a: "所有人的结局都何其悲惨。"
 pd_origin_init_crystal_NAME:0 "水晶恒星系"
 pd_origin_init_crystal_DESC:0 "包含水晶星球的初始恒星系"
 origin_pd_crystal_world:0 "生于水晶"
 origin_pd_crystal_world_desc:0 "这个文明诞生于一个郁郁葱葱的世界，那里到处矗立着由罕见的艾森水晶构成的参天巨柱。"
