l_simp_chinese:
 pd_continental: "陆地星球"
 pd_continental_desc: "被海洋分割开的大陆，随经纬度不同有不同的季节温度。"
 pd_retinal: "视黄醛星球"
 pd_retinal_desc: "植物依靠视黄醛而非叶绿素进行光合作用，赋予了这颗星球与众不同的紫色外观。"
 pd_lake: "湖泊星球"
 pd_lake_desc: "这个星球的地貌宛如一幅由无数湖泊拼成的镶嵌画，它们大小各异，有的小巧玲珑，有的浩瀚壮阔。"
 pd_forest: "森林星球"
 pd_forest_desc: "这颗星球的地表被繁茂的密林所覆盖，化作一片绵延不绝的林海，蔓延至整片大陆。"
 pd_tepid: "温煦星球"
 pd_tepid_desc: "由于地轴倾角极小，这个世界理想的条件促进了多种光合作用机制的演化，使得植物群呈现出丰富鲜艳的色彩。"
 pd_mushroom: "蕈菌星球（陆地）"
 pd_mushroom_desc: "真菌生物统治着该星球的生态系统，肆意生长的蕈林与菌野将大片疆域笼罩其中。"
 pd_temperate: "温带星球"
 pd_temperate_desc: "这个星球气候温和，几乎每一块陆地都有丰富的生物多样性。"
 pd_sakura: "樱花星球"
 pd_sakura_desc: "它的表面覆盖着被海洋分隔的广袤陆地，以及开满美丽鲜花的葱郁森林。"
 pd_megaflora: "巨树星球"
 pd_megaflora_desc: "巨大的树状植物覆盖着这个星球的地表，其发达的根系深入地下数英里。穿梭于这些珍稀植被间进行施工规划，是一项极其艰巨的挑战。"
 pd_petrified: "木化石星球"
 pd_petrified_desc: "这颗星球曾覆满遮天蔽日的巨型植物，如今却只余下昔日绿植的无垠石化遗迹。这种独特的类木材料具有用作建筑的潜力，但开采起来需要费一番功夫。"
 pd_ocean: "海洋星球"
 pd_ocean_desc: "海洋覆盖了§Y90%§!以上的表面，剩下的陆地均为岛屿。"
 pd_cascadian: "海洋雨林星球"
 pd_cascadian_desc: "亚温带沿海森林与高耸的山脉是此地的标志性景观。星球水圈活跃且多风暴，使得温和的冬季与短暂温暖的夏季形成了强烈的对比。"
 pd_swamp: "沼泽星球（树沼）"
 pd_swamp_desc: "茂密的森林湿地覆盖了该星球的大部分区域，这里拥有发达且稳定的水圈，浅海、沼泽与泥潭交织其中。这一湿润的环境孕育了极为丰富的动植物群落。"
 pd_crag: "峭壁星球"
 pd_crag_desc: "这颗星球拥有浩瀚的海洋与极地冰盖，覆盖了绝大部分地表。地震活跃的岛屿散布其间，构成了该区域动态且鲜明的环境特征。"
 pd_fog: "云雾星球"
 pd_fog_desc: "大洋主宰着地表，弥漫的湿气化作终年不散的浓雾。雾气向内陆飘去，孕育了海岸之外繁茂的林地与无垠的草场。"
 pd_kelp: "巨藻星球"
 pd_kelp_desc: "该行星表面以海洋为主，营养充沛的浅水海域滋养着绵延不绝的巨藻森林。这片繁荣的海底生态系统为整个星球孕育出了令人惊叹的生物多样性。"
 pd_algae: "粉藻华星球"
 pd_algae_desc: "该星球富饶的浅海与湖泊孕育了绚丽夺目的粉红色藻华，造就了从太空中俯瞰依然清晰可见的视觉奇观。"
 pd_reef: "珊瑚礁星球"
 pd_reef_desc: "广袤的浅海包裹着整个星球。从轨道上俯瞰，水面下方庞大的礁脉系统清晰可见。而在礁脉冲破海面的地方，则浮现出一串串的珊瑚岛链。"
 pd_archipelago: "火山列岛星球"
 pd_archipelago_desc: "散落的岛屿点缀在一片覆盖整个星球的海洋上。剧烈的火山活动导致岛屿迅速地形成与消失，塑造出不断变化的地貌。"
 pd_tropical: "热带星球"
 pd_tropical_desc: "气候变化巨大，旱季和雨季交替明显。绝大部分大陆上都覆盖着茂盛的植被。"
 pd_atoll: "环礁星球"
 pd_atoll_desc: "遍布的浅水泻湖、错综复杂的珊瑚礁以及葱郁的热带岛屿构成了这颗星球的独特风貌。加上宜人的气温，这个世界孕育出了一个欣欣向荣的生物圈。"
 pd_tepui: "台地星球（热带）"
 pd_tepui_desc: "这颗星球拥有丰富的水圈与茂密的植被，其生态层次分明：高处是凉爽多雨的平顶山，下方则是温暖潮湿的地面丛林。"
 pd_mangrove: "红树林星球"
 pd_mangrove_desc: "浅海覆盖了这颗星球的绝大部分表面，露出海面的陆地微乎其微。在仅有的几座岛屿边缘，茂密的红树林向外延伸达数百英里。"
 pd_cenote: "溶井星球"
 pd_cenote_desc: "稀疏的热带丛林点缀着地表，而绝大多数的水流则隐没于庞杂的地下暗网中，滋养出环环相扣的生态系统与繁盛的生物多样性。"
 pd_fungal: "蕈菌星球（热带）"
 pd_fungal_desc: "这颗星球的真菌型植被奠定了一个繁荣而多元的生物圈基础，从肉眼难辨的微型孢子，到宛如巨树的参天巨蕈，形态无所不包。"
 pd_aerial: "浮荚星球"
 pd_aerial_desc: "广袤的陆地被茂密的植被所覆盖，而在其高空之上，由该星球独特植物所孕育的巨大种荚，正宛如云朵般在天际间飘行。"
 pd_lilypad: "睡莲星球"
 pd_lilypad_desc: "这颗星球温暖的浅海蕴含着极其丰富的生物群落。而在水面之上，水生植物坚韧的枝叶交织成片，又衍生出了一个构建于水面的次生生态系统。"
 pd_geothermal: "地热星球"
 pd_geothermal_desc: "在这颗星球上，巍峨的冰崖之间横亘着生机盎然的热带裂谷。地表之下，澎湃的地热活动维系着数以百万计的温泉，孕育了繁盛的生物多样性。"
 pd_biolumen: "生物光星球"
 pd_biolumen_desc: "尽管这颗行星被大气悬浮颗粒笼罩，但几乎所有生物都通过生物发光效应适应了环境，形成了一种即使在轨道上也清晰可见的惊人奇观。"
 pd_desert: "沙漠星球"
 pd_desert_desc: "稀少的降水、昼夜循环的温度变化是这里的标志。凭借偶尔的降雨，稀疏的植被在沙漠中顽强生存。"
 pd_dune: "沙丘星球"
 pd_dune_desc: "无边无际的沙丘主宰着这个沙漠世界。这里的水资源极其匮乏，主要蛰伏于地下蓄水层中，仅以绿洲和山泉的形式零星涌现。"
 pd_oasis: "绿洲星球"
 pd_oasis_desc: "水圈维系着一片广袤的水域，以及一条茂密的植被带。降水几乎无法到达覆盖星球大部分地区的内陆沙漠。"
 pd_outback: "荒原星球"
 pd_outback_desc: "这颗星球的表面被干旱与半干旱的灌丛和荒漠所占据，只有靠近水源的地带才显现出较多的植被。这里的水圈仅限于特定的内陆海与地下泉。"
 pd_coastal: "海岸漠境星球"
 pd_coastal_desc: "深海促成了高度稳定的大气环境，致使地表降雨稀少。频发的雾霭为多种多肉植物和灌木提供了赖以生存的水分。"
 pd_fungi: "蕈菌星球（沙漠）"
 pd_fungi_desc: "这个世界干燥且布满火山灰，生长着能够耐受高温、干旱和贫瘠的沙漠真菌。"
 pd_salt: "盐晶星球"
 pd_salt_desc: "这颗星球上遍布着丰富的矿产资源，然而大部分地表的高盐环境使得许多动植物都难以在此生存。"
 pd_aquifer: "蓄水层星球"
 pd_aquifer_desc: "尽管这片沙地几乎无法让人在酷热中觅得一丝喘息之机，但那些变幻莫测的潟湖与地下暗河系统，却孕育了一系列独特而丰富的生态系统与生物多样性。"
 pd_arid: "干旱星球"
 pd_arid_desc: "沙尘飞扬的星球表面多是峭壁和峡谷。植被稀少，但是极地地区森林繁茂。"
 pd_mesa: "台地星球（干旱）"
 pd_mesa_desc: "赤道高原与极地森林勾勒出了这里的地貌。其水系主要由流经峡谷的宽阔河流构成，长满植被的河床点缀其中，造就了丰富多彩的自然景观。"
 pd_fog_desert: "雾漠星球"
 pd_fog_desert_desc: "极高海拔的群峰在绝大部分地表投下雨影。盐滩与干涸的幽谷盘踞于高原中，仅剩零星的湖泊与山泉维系着这里的水圈。"
 pd_mediterranean: "陆间海星球"
 pd_mediterranean_desc: "这个星球的水圈孕育了广阔的内海，其四周植被稀疏。内陆地区则呈现出干旱的地貌，降水极为稀少。"
 pd_badlands: "恶地星球"
 pd_badlands_desc: "这片干旱的土地上分布着沉积岩和富含黏土的土壤，它们经由风蚀和水蚀作用形成。在山丘的背阴处，植被茂盛生长，主要是灌木和耐旱的草本植物。"
 pd_succulent: "肉质植物星球"
 pd_succulent_desc: "高温以及稀少且零星的降雨，促使这里的植被演化出了保水机制，以便在这颗星球严酷的环境中繁衍生息。"
 pd_striped: "彩色丘陵星球"
 pd_striped_desc: "这颗星球的矿物构造引人入胜。深邃而绚丽的条纹点缀着地貌，为沙尘覆盖的干旱荒原披上了一层令人沉醉的色彩。"
 pd_amethyst: "紫水晶星球"
 pd_amethyst_desc: "这颗干旱的星球在历史上曾有过极为剧烈的地质运动，使得整个地壳中遍布着储量丰富的紫水晶矿。"
 pd_coral: "陆珊瑚星球"
 pd_coral_desc: "这颗星球曾经被海洋覆盖，但由于生态的变迁，其水圈不断缩减，最终迫使珊瑚适应了干燥的环境。"
 pd_primal: "原始星球"
 pd_primal_desc: "随着这颗年轻星球上的火山活动逐渐平息，复杂多样的动植物相继涌现，促成了可供呼吸的大气层的形成以及水圈的稳定。"
 pd_savannah: "草原星球"
 pd_savannah_desc: "较小的水圈只能支持短暂的雨季。植被主要为比较普遍的杂草，大多存在于绿洲附近。"
 pd_steppe: "干草原星球"
 pd_steppe_desc: "这片半干旱草原上分布着辽阔的平原与连绵起伏的丘陵。这里最显著的特点是几乎没有树木，但间歇性的降雨依然滋养着灌木和野草的生长。"
 pd_prairie: "茂草原星球"
 pd_prairie_desc: "这颗行星的特点在于其季节性变化的水圈。它拥有一片广袤无垠的单一陆块和众多巨大的内陆海，这里的夏天短暂干燥，冬天则凛冽而严酷。"
 pd_veld: "灌木草原星球"
 pd_veld_desc: "这颗亚热带行星拥有干燥的氮氧大气层，地表以灌丛林地和稀树草原为主，冬季气候温和，夏季漫长炎热。"
 pd_semi_arid: "半干旱星球"
 pd_semi_arid_desc: "得益于水圈的作用，这里会迎来短暂却充沛的雨季；植被大多聚生于隐蔽的山谷和大型水体附近。"
 pd_aspen: "森林草原星球"
 pd_aspen_desc: "这个世界干燥且多岩石，拥有氮氧大气层，草原之中分布着片片树林。由溪流构成的小型但稳定的水圈，滋养着这里的森林与茂密的灌木丛。"
 pd_sandstone: "$pc_pd_sandstone$"
 pd_sandstone_desc: "这颗星球拥有辽阔的草原和风蚀砂岩地貌。它的水圈滋养着生命力顽强的草类，使它们能够在这种环境中茁壮成长。"
 pd_turquoise: "$pc_pd_turquoise$"
 pd_turquoise_desc: "这颗亚热带草原星球上布满了巨大的绿松石矿藏，这些宝石在其表面几乎随处可见。"
 pd_supercontinent: "超大陆星球"
 pd_supercontinent_desc: "由于板块构造运动，这颗星球目前拥有一块超大陆。沿海地区植被茂盛，而内陆地形则从草原逐渐过渡为广阔的干旱沙漠。"
 pd_sinkhole: "地陷星球"
 pd_sinkhole_desc: "地表仅拥有微小且稳定的水圈，但其下方却隐藏着一片覆盖全球的地下海洋，致使星球表面各处形成了巨大的天坑。"
 pd_arctic: "极地星球"
 pd_arctic_desc: "极地范围很大，冰雪覆盖了大部分的表面，但仍然有四季变化，同时赤道地区也有植被。"
 pd_cold_desert: "寒漠星球"
 pd_cold_desert_desc: "这颗星球降水极少，也几乎看不到地表水。即使在白天，平均温度也经常远在冰点之下。"
 pd_glacial: "冰河星球"
 pd_glacial_desc: "。全年大部分时间水圈均处于冰川封冻状态，夏季有显著融冰现象，且降雪频繁。"
 pd_antarctic: "冰原星球"
 pd_antarctic_desc: "尽管冬季时风速可达25km/h以上，生命依然在海冰之下、洞穴之中以及避风山谷等零星的庇护所内顽强存活。"
 pd_aeolian: "风蚀星球"
 pd_aeolian_desc: "该星球地表的风速动辄超过每小时300公里。这些狂风造就了中空的天坑、狭缝峡谷和洼地，使得生命能够安全躲避地表天气，在这些环境内部茁壮成长。 "
 pd_ice_spike: "冰刺星球"
 pd_ice_spike_desc: "地底深处剧烈的地壳运动不断挤压厚重的冰层，造就了高耸入云、遍布荒野的冰锥奇观。"
 pd_crevasse: "冰裂星球"
 pd_crevasse_desc: "虽然这颗星球的表面极度不适宜生存，但在源自地核的地热能维持下，众多裂谷的底部依然保有宜居条件。"
 pd_ice_dunes: "冰尘星球"
 pd_ice_dunes_desc: "由于全年大部分时间气温都低于冰点，状如细沙的冰粒构成了这颗星球上的“沙丘”。"
 pd_storm: "风暴星球"
 pd_storm_desc: "该星球的陆块分布于两极地带，被辽阔无垠的汪洋隔开，海面上终年肆虐着猛烈的风暴。由于环境极其恶劣，该星球上的绝大多数生命都栖息于海面之下。"
 pd_iceberg: "冰山星球"
 pd_iceberg_desc: "尽管气温处于零下，包裹着这颗星球的高盐分海洋却依然维持着液态。任何脱去盐分的水都会凝结成半永久性的冰山，与此同时，成片的咸水海带却在这极寒条件下繁茂地生长着。"
 pd_alpine: "高山星球"
 pd_alpine_desc: "积雪终年覆盖山顶，山谷点缀着冻结的湖泊。虽然这个行星只有微小的季节变化，但在冻结的湖面底下仍然流动着液态水，并且足以维持一些耐寒植物的日常所需。 "
 pd_boreal: "亚寒带星球"
 pd_boreal_desc: "这颗亚寒带行星有着巨大的温差，气候较暖的地带生长着寒带针叶林，两极附近则被苔原与冰层覆盖。"
 pd_snow: "霜雪星球"
 pd_snow_desc: "这颗星球目前正处于冰河时期。尽管极地和中纬度的大部分地区都被冰川覆盖，但赤道地带仍分布着亚温带森林。"
 pd_highland: "高原星球"
 pd_highland_desc: "该行星常年被持续性降水和高频雾气所笼罩。位于冰封山脉与广阔内陆海之间的稳定水圈，维持着耐寒草本及地衣的生长。"
 pd_dune_forest: "森林沙丘星球"
 pd_dune_forest_desc: "这颗星球经常起雾，但降水量极低。低地主要由干燥的沙丘组成，而其水圈则滋养了白雪皑皑的森林群山。"
 pd_fjord: "峡湾星球"
 pd_fjord_desc: "这颗星球广袤的海洋冲刷出极深的海湾。受此影响，其沿海地区生长着亚极地雨林，较高海拔处则分布着高山草原。"
 pd_blossom: "花簇星球"
 pd_blossom_desc: "这颗星球丰茂的草原上点缀着绚丽的繁花，呈现出一幅从太空轨道上都清晰可见的壮丽奇观。"
 pd_glaciovolcanic: "冰川火山星球"
 pd_glaciovolcanic_desc: "这颗星球上火山活动剧烈，形成了众多由地热加热的湖泊，为原本冰封的环境带来了稀有矿物与能量。"
 pd_lanthanide: "镧星"
 pd_lanthanide_desc: "这颗星球上的稀土金属与磁场活动，塑造出了令人惊叹的环状山巅。由于季节变化极小，这里的水圈只能维持零星分布的顽强植被。"
 pd_tundra: "苔原星球"
 pd_tundra_desc: "此地拥有稳定的水体与平稳的低温。在险峻的山岭和冰川之间生长着大量地衣。"
 pd_bog: "沼泽星球（酸沼）"
 pd_bog_desc: "这颗星球夏季短暂而潮湿，冬季漫长而严寒，全年降水丰沛。活跃的水圈将各个大陆笼罩在密布的泥潭与沼泽之中。"
 pd_mycelium: "蕈菌星球（苔原）"
 pd_mycelium_desc: "该星球夏季短促凉爽，冬季则干燥且严寒。辽阔的平原上矗立着巨型蘑菇林，地下则蔓延着错综复杂的菌丝网络。"
 pd_mud: "泥浆星球"
 pd_mud_desc: "该星球鲜有季节交替，且伴有大量降水。地表低强度的地热活动在冰冻的大地上造就了无数的泥湖与火山。"
 pd_basalt: "玄武岩星球"
 pd_basalt_desc: "这颗星球四季稳定，间歇性的火山活动造就了广袤的熔岩平原。在冷却的玄武岩上，繁茂生长的苔藓与地衣维系着整个生物圈的运转。"
 pd_tuya: "平顶火山星球"
 pd_tuya_desc: "这个世界的季节变化有限且冬季严酷，其稳定的生物圈主要仰仗火山土壤的养分，地表上散布着众多的冰下火山。"
 pd_cryoflora: "冰雪植物星球"
 pd_cryoflora_desc: "这个星球的水圈大多呈现冰封状态，气温极少越过冰点。尽管如此，这里的动植物凭借体内的抗冻蛋白适应了严寒，孕育出了一个绚丽而迷人的生态系统。"
 pd_lichen: "地衣星球"
 pd_lichen_desc: "得益于稳定的水圈与规律的低温，这个世界孕育了广袤的地衣林。这些地衣林依偎在嶙峋的群山与冰川之间，从矿物质中汲取养分。"
 pd_wet_superhabitable: "超级类地星球（湿润）"
 pd_wet_superhabitable_desc: "这是一颗湿润的超级类地星球，拥有发达的水圈。较高的平均气温和浅海盆地为其造就了绝佳的农业条件。不过，这里的高重力环境对尚未适应的人来说是一个严峻的考验。"
 pd_dry_superhabitable: "超级类地星球（干燥）"
 pd_dry_superhabitable_desc: "这是一颗干燥的超级类地星球，拥有发达的水圈。较高的平均气温和浅海盆地为其造就了绝佳的农业条件。不过，这里的高重力环境对尚未适应的人来说是一个严峻的考验。"
 pd_cold_superhabitable: "超级类地星球（寒冷）"
 pd_cold_superhabitable_desc: "这是一颗寒冷的超级类地星球，拥有发达的水圈。较高的平均气温和浅海盆地为其造就了绝佳的农业条件。不过，这里的高重力环境对尚未适应的人来说是一个严峻的考验。"
 pd_gaia_superhabitable: "超级类地星球（盖亚）"
 pd_gaia_superhabitable_desc: "这类超级类地星球是环境理想的人造星球，拥有氮氧大气层和能够自我修复的生态系统。各纬度环境对高等生命都是极佳的生活空间。其平均气温较为温暖，有着地势较浅的海洋盆地。不过，这里对于不适应强重力环境的生物会是一种折磨。"
 pd_arcology_superhabitable: "超级类地星球（理想城）"
 pd_arcology_superhabitable_desc: "这颗超级类地星球整体都被都市与工业集群覆盖。其平均气温较为温暖，不过，这里对于不适应强重力环境的生物会是一种折磨。"
 pd_nuked_superhabitable: "超级类地星球（死寂）"
 pd_nuked_superhabitable_desc: "一颗大气中充斥着氮氧元素的超级类地星球。目前它正处于核冬天，大气中含有乌黑浓厚的悬浮颗粒。表面辐射水平高。鲜有生命迹象。对于不适应强重力环境的生物会是一种折磨。"
 pd_wet_tidally_locked: "白昼星球（潮汐锁定·湿润）"
 pd_wet_tidally_locked_desc: "这个潮湿的潮汐锁定星球拥有持续的光照与强劲的风力，蕴含着丰富的能源潜力。该星球的温度和稳定的水圈，使其向阳面与晨昏圈得以孕育丰富的生物多样性。"
 pd_dry_tidally_locked: "暮光星球（潮汐锁定·干燥）"
 pd_dry_tidally_locked_desc: "这个干旱且潮汐锁定的世界拥有持续的日照和强风，带来了广阔的能源前景。其宜居带仅局限于晨昏交界地带。"
 pd_cold_tidally_locked: "冰洋星球（潮汐锁定·寒冷）"
 pd_cold_tidally_locked_desc: "这个寒冷且被潮汐锁定的星球拥有持续的日照和强劲的风力，蕴藏着丰富的能源机遇。其宜居带仅限于向阳面区域。"
 pd_gaia_tidally_locked: "潮汐锁定星球（盖亚）"
 pd_gaia_tidally_locked_desc: "这类潮汐锁定星球是环境理想的人造星球，拥有氮氧大气层和能够自我修复的生态系统。其暮光区对高等生命都是极佳的生活空间。"
 pd_arcology_tidally_locked: "潮汐锁定星球（理想城）"
 pd_arcology_tidally_locked_desc: "这颗潮汐锁定星球整体都被都市与工业集群覆盖。宜居区域都位于暮光区中。"
 pd_nuked_tidally_locked: "潮汐锁定星球（死寂）"
 pd_nuked_tidally_locked_desc: "一颗大气中充斥着氮氧元素的潮汐锁定星球。目前它正处于核冬天，大气中含有乌黑浓厚的悬浮颗粒。表面辐射水平高。鲜有生命迹象。宜居区域都位于暮光区中。"
 pd_wet_cave: "溶洞星球（岩洞·湿润）"
 pd_wet_cave_desc: "这颗星球拥有遍及全星的地下洞穴网络，气候湿润。尽管建造地下设施成本高昂，却能提供易守难攻的殖民地。"
 pd_dry_cave: "砂岩洞星球（岩洞·干燥）"
 pd_dry_cave_desc: "这颗星球气候干燥，拥有遍布全球的地下洞穴网络。尽管建造地下设施成本高昂，却能提供易守难攻的殖民地。"
 pd_cold_cave: "冰洞星球（岩洞·寒冷）"
 pd_cold_cave_desc: "这颗星球气候寒冷，拥有遍布全球的地下洞穴网络。虽然建造地下设施成本高昂，却能提供易于防守的殖民地。"
 pd_gaia_cave: "岩洞星球（盖亚）"
 pd_gaia_cave_desc: "这类岩洞星球是环境理想的人造星球，拥有氮氧大气层和能够自我修复的生态系统。各纬度环境对高等生命都是极佳的生活空间。尽管地下建设成本相当高昂，这里确为殖民地提供了精良的防御。"
 pd_arcology_cave: "岩洞星球（理想城）"
 pd_arcology_cave_desc: "这颗岩洞星球整体都被都市与工业集群覆盖。尽管地下建设成本相当高昂，这里确为殖民地提供了精良的防御。 "
 pd_nuked_cave: "岩洞星球（死寂）"
 pd_nuked_cave_desc: "一颗大气中充斥着氮氧元素的岩洞星球。目前它正处于核冬天，大气中含有乌黑浓厚的悬浮颗粒。表面辐射水平高。鲜有生命迹象。"
 pd_gaia_world: "盖亚星球"
 pd_gaia_world_desc: "这类星球是环境理想的人造星球，拥有氮氧大气层和能够自我修复的生态系统。各纬度环境对所有既存高等生命都是极佳的生活空间。"
 pd_dry_gaia_world: "盖亚星球（干燥）"
 pd_dry_gaia_world_desc: "这类星球是环境理想的人造星球，拥有氮氧大气层和能够自我修复的生态系统。各纬度环境对所有既存高等生命都是极佳的生活空间。"
 pd_cold_gaia_world: "盖亚星球（寒冷）"
 pd_cold_gaia_world_desc: "这类星球是环境理想的人造星球，拥有氮氧大气层和能够自我修复的生态系统。各纬度环境对所有既存高等生命都是极佳的生活空间。"
 pd_uncommon_gaia_world: "盖亚星球"
 pd_uncommon_gaia_world_desc: "这类星球是环境理想的人造星球，拥有氮氧大气层和能够自我修复的生态系统。各纬度环境对所有既存高等生命都是极佳的生活空间。"
 pc_pd_nuked_arcology: "遗落星球（死寂）"
 pc_pd_nuked_arcology_desc: "这曾是一座星球规模的巨城。目前它正处于核冬天，大气中含有乌黑浓厚的悬浮颗粒。表面辐射水平高。鲜有生命迹象。"
 pc_pd_nuked_arcology_tooltip: "宜居性：§R-100%§!\n如有§Y$trait_pc_nuked_preference$§!或§Y$trait_survivor$§!特质，宜居性：§G+100%§!"
 pd_diamond: "金刚石星球"
 pd_diamond_desc: "这里碳元素含量极高，加上高温高压条件，该星球的大部分物质都被塑造成了金刚石。"
 pd_carbon: "碳星"
 pd_carbon_desc: "不同于大部分以硅-氧作为主要组分的星球，这类星球拥有高得多的碳-氧比。"
 pd_chthonian: "气陨星核"
 pd_chthonian_desc: "这曾是一颗气态巨行星，但是氢氦大气层已经消失殆尽，只剩下光秃秃的金属核心。"
 pd_iron: "铁星"
 pd_iron_desc: "它主要由富含铁元素的地核构成，地幔少到几乎没有。"
 pd_volcanic: "$pc_volcanic$"
 pd_volcanic_desc: "$pc_volcanic_desc$"
 pd_hydrocarbon: "烃星"
 pd_hydrocarbon_desc: "氮气、甲烷与乙烷的云层形成了致密的晦暗大气。液态碳氢化合物构成了稳定的海洋和湖泊。"
 pd_hot_gas_giant: "热气态巨星"
 pd_hot_gas_giant_desc: "该行星的温度要比一般气态巨行星高得多，因此形成了极端的天气模式，可以用于采集能源和稀有天然气。"
 pd_cloudless_gas_giant: "无云气态巨星"
 pd_cloudless_gas_giant_desc: "这是一颗气态行星，其大气缺少形成云层所必须的化学组分，因而从轨道上看来毫无特征。"
 pd_cold_gas_giant: "冷气态巨星"
 pd_cold_gas_giant_desc: "该气态巨行星拥有更低的温度和稳定的气流，为科研探索提供了机会。"
 pd_ethane_ocean: "乙烷海洋星球"
 pd_ethane_ocean_desc: "这里被包裹在一层液态乙烷海洋中。"
 pd_dwarf_gas: "气态矮行星"
 pd_dwarf_gas_desc: "外面是厚厚的氢氦大气层，深处则是水冰、岩石，以及水与氨构成的液态海洋。"
 pd_subglacial: "冰下星球"
 pd_subglacial_desc: "厚厚的冰层、极低的温度与稀薄的大气使得生命无法在地表生存。然而，潮汐加热和地热活动在坚冰下塑造出一片冰下海洋。"
 pd_hothouse: "温室星球"
 pd_hothouse_desc: "这颗星球的大气圈正在经历严重的温室效应，对任何生命都足以致命。"
 decision_engineered_environment_gaia: "星球塑形师计划"
 decision_engineered_environment_gaia_desc: "我们会动用高级环境改造手段，将这颗星球塑造成一个天堂，创造出极其适宜高等生命的宜人环境。"
 engineered_environment_gaia: "完美塑形星球"
 engineered_environment_gaia_desc: "先进的环境改造技术重塑了这颗星球，这里的生态系统对高等生命是极佳的生存空间。"
