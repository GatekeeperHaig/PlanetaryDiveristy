l_braz_por:

#Origin
 origin_pd_aw_tree_of_life: "Megaflora Árvore da Vida"
 origin_pd_aw_tree_of_life_desc: "Esta Colmeia evoluiu em uma relação simbiótica com uma vasta árvore de megaflora cujas raízes se espalharam por cada canto do planeta e mudaram o ecossistema para se adaptar tanto a ela quanto aos drones. A colmeia teria muita dificuldade para sobreviver sem o apoio da árvore."
 origin_tooltip_pd_aw_tree_of_life_start_effects: "- $HOMEWORLD$$TABBED_NEW_LINE$- Característica Planetária: ['concept_tree_of_life']$TABBED_NEW_LINE$- Modificadores Planetários: ['concept_pd_aw_tree_of_life_modifier']$NEW_LINE$- Planetas Colonizados:$TABBED_NEW_LINE$- Característica Planetária: ['concept_pd_aw_tree_of_life_sapling']$NEW_LINE$- Colônias sem o §YBroto da Árvore da Vida§!:$TABBED_NEW_LINE$- Decisão Planetária: ['concept_transplant_pd_aw_tree_of_life']$NEW_LINE$- $AVAILABLE_HOLDINGS$ ['concept_pd_aw_tree_of_life_holding', £building£ $holding_tree_of_life_sapling$] em colônias Súditas"
 origin_tooltip_pd_aw_tree_of_life_start_negative_effects: "- Não é possível terraformar planetas"

 #Concepts
 concept_pd_aw_tree_of_life: "$d_tree_of_life_home$"
