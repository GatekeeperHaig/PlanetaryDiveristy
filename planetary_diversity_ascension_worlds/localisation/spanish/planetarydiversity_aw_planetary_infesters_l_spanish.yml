l_spanish:

###Planetary Infesters
#Civic
 civic_hive_pd_planetary_infesters: "Infestadores Planetarios"
 civic_hive_pd_planetary_infesters_desc: "Esta mente colmena se incrusta en los ecosistemas de un planeta. Cada mundo se convierte en una extensión de sí misma, floreciendo como una red unificada bajo su guía."
 civic_tooltip_pd_planetary_infesters_effects: "Puede construir £building£ $building_pd_aw_planet_infester_1$\n- $building_pd_planet_infestor_desc$\n- El mundo natal es un $pc_hive$"

#Buildings
 building_pd_planet_infestor_desc: "Los §YNodos de Infestación§! evolucionan a través de tres fases de mejora, convirtiendo progresivamente el planeta en un §YMundo Colmena§!."
 building_pd_aw_planet_infester_1: "Nodo de Infestación - Primera Fase"
 building_pd_aw_planet_infester_1_desc: "Este nodo, el corazón de la etapa inicial de infestación, es vital para la presencia de la colmena en este planeta. Su pérdida desharía el control de la colmena aquí."
 building_pd_aw_planet_infester_2: "Nodo de Infestación - Segunda Fase"
 building_pd_aw_planet_infester_2_desc: "Este masivo nodo, ahora en la etapa intermedia de infestación, ejerce una conexión con la colmena lo suficientemente robusta como para manipular procesos planetarios críticos. Su pérdida desharía el control de la colmena aquí."
 building_pd_aw_planet_infester_3: "Nodo de Infestación Planetaria"
 building_pd_aw_planet_infester_3_desc: "Habiendo alcanzado su cénit, este formidable nodo ejerce un dominio total sobre todos los procesos planetarios. Su pérdida desharía el control de la colmena aquí."
 building_pd_aw_planet_infester_3_effect_desc: "Este planeta será transformado en un §Y$pc_hive$§!."

#Dummy Class
 pc_hive_dummy: "$pc_hive$"
 pc_hive_dummy_desc: "$pc_hive_desc$"
 pc_hive_dummy_adj: "$pc_hive_adj$"
 mod_pc_hive_dummy_habitability: "$mod_pc_hive_habitability$"
 trait_pc_hive_dummy_preference: "$trait_pc_hive_preference$"
 trait_pc_hive_dummy_preference_desc: "$trait_pc_hive_preference_desc$"

#Events
 pdawplanetaryinfesters.120.name: "Mundo Colmena Planetario Completo"
 pdawplanetaryinfesters.120.desc: "A medida que el nodo alcanza su pleno potencial, resonamos con una profunda sensación de logro.\n\nEste momento marca un salto significativo en el control de la colmena sobre [Root.GetName], solidificando su dominio sobre el planeta."
 pdawplanetaryinfesters.120.a: "Otro hogar para la colmena."
