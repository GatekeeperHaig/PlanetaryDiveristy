 pc_pd_craton: "克拉通星球"
 pc_pd_craton_desc: "这颗地质结构稳定的星球拥有氮氧大气层，地表分布着广袤的古老基岩区，以及镶嵌在缓慢移动的岩石圈中的克拉通盆地。"
