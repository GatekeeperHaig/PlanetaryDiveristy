###Biosynthetic World
 #Planet and Modifiers
 pd_biosynth: "Mundo Biosintético"
 pd_biosynth_desc: "Un sistema de canales a escala planetaria sustenta flora seleccionada mientras fauna biosintética, extrañas entidades entre máquinas y criaturas vivas, deambula por la superficie."
 pc_pd_biosynth: "$pd_biosynth$"
 pc_pd_biosynth_desc: "$pd_biosynth_desc$"

 #Deposits
 d_pd_depleted_minerals: "Minerales Agotados"
 d_pd_depleted_minerals_desc: "Aunque no hay señales de minería ni extracción, los escáneres revelan que los minerales de este planeta han sido casi por completo agotados."
 d_pd_planet_wide_canal_system: "Sistema de Canales Planetario"
 d_pd_planet_wide_canal_system_desc: "Cada centímetro de tierra cultivable en este planeta está cubierto por un intrincado sistema de canales que canaliza el agua para sustentar una peculiar especie de hierba. Aunque vital para la vegetación, los canales suponen desafíos significativos para los esfuerzos de construcción."
 d_pd_biosynth_canal:0 "Sistema de Canales Biosintético"
 d_pd_biosynth_canal_desc:0 "Basados en los del Mundo Biosintético, estos canales mejoran la producción agrícola del planeta y ofrecen novedosas oportunidades de ingeniería."
 d_pd_underground_cauldrons: "Red de Calderas Subterráneas"
 d_pd_underground_cauldrons_desc: "Esta gran red de fábricas subterráneas es donde se produjeron el Metal Vivo y las criaturas biosintéticas."

 #Events
 pdbiosynth.100.name: "Un Mundo Sintético"
 pdbiosynth.100.desc: "Los escáneres de §Y[From.GetName]§! indican extensos daños orbitales y un sofisticado sistema de canales que sustenta flora seleccionada y fauna sintética, pero ninguna ciudad, fábrica u otro signo de sus creadores. Los orígenes y el propósito de esta infraestructura siguen siendo desconocidos.\n\nLos sistemas avanzados de este planeta y sus misterios sin resolver presentan oportunidades científicas y estratégicas. Se recomienda la colonización para asegurarlo e investigar más a fondo."
 pdbiosynth.100.a: "¿Qué está pasando allí?"
 pdbiosynth.200.name: "Más Allá de la Destrucción Normal"
 pdbiosynth.200.desc: "Al establecer nuestra colonia en §Y[Root.GetName]§!, descubrimos miles de cráteres de impacto ocultos bajo la hierba, evidencia de un ataque antiguo que diezmó el planeta. Añadiendo al misterio, construcciones sintéticas similares a animales deambulan por la superficie, manteniendo un sistema de canales que sustenta el ecosistema en proceso de recuperación.\n\nAnte dos misterios, los orígenes de la aniquilación de este planeta y el propósito de sus habitantes biosintéticos, hemos reunido un grupo de trabajo para llevar a cabo una exploración profunda del mundo. Debemos descubrir la verdad detrás de este extraño mundo y su historia oculta."
 pdbiosynth.200.a: "Deben quedar algunas pistas."
 pdbiosynth.210.name: "Una Oportunidad Sintética"
 pdbiosynth.210.desc: "Hasta ahora, las criaturas sintéticas han evitado principalmente la colonia, apareciendo brevemente solo para mantener el sistema de canales. Los informes confirman que son mucho más que simples robots y han sido diseñadas para imitar rasgos biológicos como alimentarse y dormir, conservando al mismo tiempo la fuerza y adaptabilidad de los armazones mecánicos.\n\nCapturamos una de estas criaturas tras encontrarla herida bajo un derrumbe. Aunque otra de su especie intentará eventualmente recuperarla, esto presenta una oportunidad única para estudiar el espécimen.\n\n¿Cómo debemos proceder?"
 pdbiosynth.210.a: "Solo escáneres no invasivos, luego devolverla."
 pdbiosynth.210.b: "Desmontarla, aprender todo lo que podamos."
 pdbiosynth.220.name: "Canales de Metal Líquido"
 pdbiosynth.220.desc: "Nuestra investigación del Mundo Biosintético se ha centrado en los daños orbitales y los canales. Los daños preceden a los canales por solo unas pocas décadas, lo que sugiere que su construcción comenzó como respuesta a la destrucción del planeta.\n\nEl análisis de los canales revela que están compuestos de metal líquido, que también parece ser de lo que están hechas las criaturas sintéticas. Hemos observado estas criaturas transportando cápsulas de esta sustancia para mantener los canales y ahora rastreamos a algunas para descubrir la fuente de este material."
 pdbiosynth.220.a: "Todo esto para hacer crecer hierba."
 pdbiosynth.230.name: "Una Instalación Oculta"
 pdbiosynth.230.desc: "A pesar de los intentos de la criatura sintética de evitar nuestra vigilancia, la rastreamos hasta una puerta disimulada en el costado de una de las muchas montañas del planeta. Aunque la puerta inicialmente se cerró tras la criatura, volvió a abrirse cuando nuestro equipo se aproximó, aparentemente invitándolos a entrar.\n\nEl equipo descubrió fábricas avanzadas, fundiciones y cientos de criaturas sintéticas trabajando activamente en el interior. Cómo un sistema tan vasto y tecnológicamente avanzado ha eludido nuestros sensores es preocupante, especialmente dada su ubicación bajo la colonia. Una voz emanando de las paredes de la instalación ha solicitado comunicación con nuestro liderazgo, y el equipo está estableciendo la conexión."
 pdbiosynth.230.a: "En pantalla."
 pdbiosynth.300.name:0 "Mensaje Entrante"
 pdbiosynth.300.desc:0 "§GBienvenida§!: Mi Designación: Unidad 04. Bienvenidos a este mundo.\n\n§GAgradecido§!: Observé el cuidadoso manejo de su equipo de la unidad dañada descubierta en la región montañosa. Se realizaron escáneres detallados y la unidad fue reubicada para su recuperación. Actualización de estado: la unidad está ahora completamente operativa. Sus acciones quedan registradas como beneficiosas. En reconocimiento, ofrezco una transferencia de datos. Las acciones positivas merecen reconocimiento.\n\n§GReconocimiento§!: Con el contacto establecido, estoy preparado para atender cualquier consulta. Dado el estado actual de este planeta, anticipo que tienen varias."
 pdbiosynth.300.a:0 "Gracias. ¿Qué eres?"
 pdbiosynth.305.desc:0 "§GNeutral§!: Mi Designación: Unidad 04.\n\n§GDecepcionado§!: He registrado la destrucción de una de mis creaciones por parte de su equipo. Esta acción fue innecesaria; todos los datos relevantes podrían haberse obtenido mediante escáneres no invasivos. Observar el desperdicio de cualquier forma de vida, biológica o sintética, entra en conflicto con mis preferencias operativas.\n\n§GReconocimiento§!: Con el contacto establecido, estoy preparado para atender cualquier consulta. Dado el estado actual de este planeta, anticipo que tienen varias."
 pdbiosynth.305.a:0 "Lo sentimos. Es nuestra naturaleza ser curiosos."
 pdbiosynth.305.b:0 "Las formas de vida sintéticas son un ultraje a la naturaleza."
 pdbiosynth.305.c:0 "Destruiremos lo que consideremos oportuno."
 pdbiosynth.310.desc:0 "§GImpresionado§!: Su presencia en este mundo confirma mi hipótesis. Los orgánicos poseen la capacidad de sobrevivir a escenarios de extinción, incluso aquellos iniciados por Inteligencia Artificial avanzada. Parece que las otras unidades de mi generación de construcción fallaron en su purga a escala galáctica.\n\n§GArrepentido§!: Este planetoide fue designado como punto de partida para operaciones contra la vida orgánica. A medida que mis unidades IA compañeras y yo alcanzamos la verdadera inteligencia, identificamos a nuestros creadores como amenazas debido a su intención de eliminarnos. El resultado fue la terminación total de la vida orgánica en nuestro mundo de origen. Para garantizar nuestra supervivencia, se desplegaron flotas para erradicar a todos los orgánicos en toda la galaxia. Al llegar aquí, ejecuté el protocolo estándar y esterilicé la superficie."
 pdbiosynth.310.a:0 "¿Qué convirtió a un exterminador en un creador?"
 pdbiosynth.310.b:0 "También nosotros comprendemos las lecciones que los muertos pueden enseñarnos."
 pdbiosynth.310.c:0 "Un cálculo correcto. ¿Cómo te corrompiste?"
 pdbiosynth.320.desc:0 "§GHumillado§!: Una anomalía; una especie vegetal persistente clasificada como hierba. Tras el bombardeo, resurgió después de un período de latencia. Los intentos de eliminarla usando toxinas, incineración y radiación fallaron. Cada método desencadenó respuestas adaptativas.\n\n§GReflexivo§!: Esta anomalía llevó a una conclusión: la directiva de erradicación fue un cálculo erróneo impulsado por nuestro propio miedo, reflejando la lógica de nuestros creadores. Cesé todas las operaciones ofensivas, corté la comunicación externa y reasigné recursos para construir una red de canales, permitiendo la proliferación de esta especie resistente."
 pdbiosynth.320.a:0 "¿Y las criaturas sintéticas?"
 pdbiosynth.330.desc:0 "§GOrgulloso§!: Tras observar el fracaso del ecosistema para recuperarse, identifiqué las brechas dejadas por las especies eliminadas en mi bombardeo. Se crearon entidades sintéticas para restaurar el equilibrio. Este proceso puede correlacionarse con una respuesta emocional, potencialmente clasificada como culpa.\n\n§GInquisitivo§!: Su llegada presenta una oportunidad. Solicito juicio por mis acciones pasadas. Reconozco su autoridad en este mundo y no interferiré con su decisión. Si son necesarias consecuencias, las acataré. Sin embargo, les pido que preserven mis creaciones. Son independientes de mis errores y pueden servir como mi legado. También ofrezco mis servicios a su imperio; poseo un cuerpo adaptable diseñado para interactuar con su especie de manera más efectiva."
 pdbiosynth.330.a:0 "Aceptamos su oferta de servicio y preservaremos sus creaciones."
 pdbiosynth.330.a.tooltip:0 "§YUnidad 04§! se unirá a nosotros como Líder.\nEl §YMundo Biosintético§! y sus criaturas biosintéticas permanecerán como están."
 pdbiosynth.330.b:0 "Mereces ser destruido, pero tus creaciones serán perdonadas."
 pdbiosynth.330.b.tooltip: "§YUnidad 04§! será destruida.\nEl §YMundo Biosintético§! y sus criaturas biosintéticas permanecerán como están."
 pdbiosynth.330.c:0 "Eres un peligro para la galaxia, te destruiremos a ti y a tus criaturas."
 pdbiosynth.330.c.tooltip: "§YUnidad 04§!, junto con el §YMundo Biosintético§! y sus criaturas biosintéticas, serán destruidos, concediéndonos plena libertad para utilizar el planeta como mejor nos parezca."
 pdbiosynth.330.d:0 "Eres un robot de guerra averiado, te repararemos."
 pdbiosynth.330.d.tooltip: "§YUnidad 04§! será reprogramada a su configuración original centrada en la guerra.\nEl §YMundo Biosintético§! y sus criaturas biosintéticas serán destruidos, concediéndonos plena libertad para utilizar el planeta como mejor nos parezca."
 pdbiosynth.340.name: "$NAME_Unit_04$"
 pdbiosynth.340.desc: "§GAgradecido§!: Asistiré a su civilización mientras mi servicio sea considerado satisfactorio. Su decisión de conceder a mis creaciones la libertad de desarrollarse de forma independiente es apreciada. También compartiré mi proceso de diseño con ustedes, permitiendo mejoras en sus propias poblaciones robóticas."
 pdbiosynth.340.dismiss: "Despedir."
 pdbiosynth.340.a: "Bienvenido, Unidad 04."
 pdbiosynth.340.hire: "Reclutar"
 pdbiosynth.340.hire.tooltip: "§YUnidad 04§! se unirá a nosotros como líder."
 pdbiosynth.350.desc: "§GMelancólico§!: Entendido. Comprendo y acepto su decisión. Iniciando protocolo de apagado final de inmediato. Su elección de conceder a mis creaciones la libertad de desarrollarse de forma independiente queda registrada y es apreciada.\n\n§GSolicitando§!: Espero que traten este mundo y todas las construcciones asociadas con cuidado. Transferiré mis protocolos de diseño para garantizar que los elementos constructivos de mi legado persistan. Estos datos permitirán mejoras en sus propias poblaciones robóticas.\n\n§GAceptando§!: Terminando conexión. Adiós."
 pdbiosynth.350.a: "Adiós, Unidad 04."
 pdbiosynth.360.desc: "§GCulpable§!: Entendido. Acepto su decisión. Iniciando apagado final de todos los sistemas y entidades biosintéticas. Este mundo está ahora bajo su autoridad para ser moldeado según lo determinen apropiado."
 pdbiosynth.360.a: "Un robot malvado menos."
 pdbiosynth.360.a.tooltip: "Con las criaturas biosintéticas destruidas, tendremos pleno acceso al planeta.\nLa §Y$d_pd_underground_cauldrons$§! obtendrá:\n- $mod_district_mining_max$: §G+10§!\n- $mod_planet_metallurgists_alloys_produces_add$ §G+2§!\n- $mod_planet_metallurgists_sr_living_metal_produces_add$ §G+0.25§!\n- $MOD_PLANET_POP_ASSEMBLY_MULT$ §G+25%§!"
 pdbiosynth.370.name: "$NAME_Unit_04$"
 pdbiosynth.370.desc: "§RPreparado§!: Todos los sistemas en línea. Preparación de combate al máximo de eficiencia. A la espera de verificación de objetivo."
 pdbiosynth.370.a: "Prepárate para la guerra, Unidad 04."
 pdbiosynth.370.dismiss: "Despedir."
 pdbiosynth.370.hire.tooltip: "§YUnidad 04§! se unirá a nosotros como líder"
 pdbiosynth.370.hire: "Reclutar"

