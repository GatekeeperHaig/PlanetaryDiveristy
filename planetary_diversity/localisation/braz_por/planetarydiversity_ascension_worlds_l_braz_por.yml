###Lithoid
 #Decisions
 decision_pd_lithoid_planet: "Criar Ecossistema Litotrófico"
 decision_pd_lithoid_planet_desc: "Este mundo aguarda ser esculpido em um de cristal e pedra. O frágil ecossistema biológico está em nosso caminho."
 decision_pd_lithoid_planet_effects_short: "Um ecossistema litotrófico será talhado neste mundo, permitindo-nos ajustar com precisão as frequências cristalinas para melhor atender às nossas necessidades."
 decision_pd_lithoid_planet_tooltip: "Uma vez concluído, poderemos escolher a frequência dos cristais litotróficos deste planeta."
 decision_pd_lithoid_planet_cleanup: "Restaurar Ecossistema Biológico"
 decision_pd_lithoid_planet_cleanup_desc: "Devemos restaurar o ecossistema biológico deste planeta à sua glória original."
 decision_pd_lithoid_planet_cleanup_effects_short: "O ecossistema litotrófico criado artificialmente será removido, restaurando sua natureza biológica."
 decision_pd_lithoid_planet_cleanup_tooltip: "Todos os Modificadores Litotróficos serão removidos, e o planeta será devolvido a um ecossistema biológico."
 decision_pd_lithoid_change_frequency: "Alterar Frequência Litotrófica"
 decision_pd_lithoid_change_frequency_desc: "Alteraremos a frequência dos cristais do ecossistema litotrófico para melhor atender às nossas necessidades."
 decision_pd_lithoid_change_frequency_effects_short: "Podemos alterar a frequência dos cristais deste planeta."
 decision_pd_lithoid_change_frequency_tooltip: "O modificador Litotrófico atual será removido, permitindo-nos alterá-lo para uma frequência diferente."

 #Choose Event
 pdlithoidplanets.100.name: "Frequência Cristalina"
 pdlithoidplanets.100.desc: "Qual frequência ressonante sintonizaremos no bioma litotrófico em §Y[This.GetName]§!?"
 pdlithoidplanets.100.cyan: "Ciano"
 pdlithoidplanets.100.cyan.tooltip: "Esta frequência ressonante age como uma força coesiva, fomentando a unidade entre nossa população litoide e impulsionando um aumento harmonioso no crescimento populacional."
 pdlithoidplanets.100.red: "Vermelho"
 pdlithoidplanets.100.red.tooltip: "Esta ressonância se combina perfeitamente com os depósitos minerais, tornando-os mais acessíveis e propícios para extração."
 pdlithoidplanets.100.yellow: "Amarelo"
 pdlithoidplanets.100.yellow.tooltip: "Esta frequência ressonante se integra perfeitamente às nossas redes de energia, desbloqueando um aumento em sua capacidade total."

 #Notification Message
 MESSAGE_PD_LITHOID_DESC:1 "$PLANET|Y$ agora é um §YMundo Litotrófico§!"
 MESSAGE_PD_LITHOID_MESSAGE_TYPE_TITLE: "Bioma Litotrófico Concluído"
 MESSAGE_PD_LITHOID_CLEANUP_DESC:1 "O bioma biológico em $PLANET|Y$ foi restaurado."
 MESSAGE_PD_LITHOID_CLEANUP_MESSAGE_TYPE_TITLE: "Bioma Litotrófico Removido"

 #Modifiers
 pd_aw_lithoid_planet_cyan: "Mundo Litotrófico"
 pd_aw_lithoid_planet_cyan_desc: "Frequência: 500 nm\nAs vibrações ressonantes fomentam a boa vontade e catalisam uma taxa de crescimento acelerada para os Litoides."
 pd_aw_lithoid_planet_red: "Mundo Litotrófico"
 pd_aw_lithoid_planet_red_desc: "Frequência: 650 nm\nA robusta ressonância cristalina se combina perfeitamente com os depósitos minerais, tornando-os mais acessíveis para extração."
 pd_aw_lithoid_planet_yellow: "Mundo Litotrófico"
 pd_aw_lithoid_planet_yellow_desc: "Frequência: 580 nm\nAs dinâmicas harmônicas desta ressonância cristalina se integram perfeitamente às nossas redes de energia, desbloqueando sua capacidade total."

###Infesting Hive
 building_pd_planet_infester_1: "Nó de Infestação - Primeira Fase"
 building_pd_planet_infester_1_desc: "Este nó, o coração da fase inicial de infestação, é vital para a presença da colmeia neste planeta. Sua perda desfaria o controle da colmeia aqui."
 building_pd_planet_infester_2: "Nó de Infestação - Segunda Fase"
 building_pd_planet_infester_2_desc: "Este enorme nó, agora na fase intermediária de infestação, possui uma conexão com a colmeia robusta o suficiente para manipular processos planetários críticos. Sua perda desfaria o controle da colmeia aqui."
 building_pd_planet_infester_3: "Nó de Infestação Planetária"
 building_pd_planet_infester_3_desc: "Tendo atingido seu auge, este formidável nó exerce domínio total sobre todos os processos planetários. Sua perda desfaria o controle da colmeia aqui."
 building_pd_planet_infester_3_effect_desc: "Este planeta será transformado em um §Y$pc_hive$§!"
 pdplanetaryinfesters.120.name: "Colmeia Planetária Concluída"
 pdplanetaryinfesters.120.desc: "Enquanto o nó atinge seu pleno potencial, ressoamos com um profundo senso de realização.\n\nEste momento marca um salto significativo no controle da colmeia sobre [Root.GetName], solidificando seu domínio sobre o planeta."
 pdplanetaryinfesters.120.a: "Mais um lar para a colmeia."
 civic_hive_pd_planetary_infesters: "Infestadores Planetários"
 civic_hive_pd_planetary_infesters_desc: "Esta mente de colmeia se incorpora nos ecossistemas de um planeta. Cada mundo se torna uma extensão de si mesma, prosperando como uma rede unificada sob sua orientação."