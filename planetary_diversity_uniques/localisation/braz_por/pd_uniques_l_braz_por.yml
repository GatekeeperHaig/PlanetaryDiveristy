l_braz_por:
###Floating World
 sr_eludium:0 "Minério de Eludium"
 sr_eludium_desc:0 "Esta substância exótica possui muitas propriedades que desafiam as leis da física. Apenas neste planeta ela pode alterar a massa da matéria ao afetar a gravidade."
 mod_planet_miners_sr_eludium_produces_add: "£sr_eludium£ $sr_eludium$ de £job_miner£ [GetMinerPlural]"
 pd_floating: "Mundo Flutuante"
 pd_floating_desc: "Este estranho mundo apresenta ilhas que flutuam no céu, sustentadas por um minério raro encontrado apenas aqui. As múltiplas camadas de ilhas proporcionam ao planeta um espaço habitável consideravelmente maior."
 pc_pd_floating: "Mundo Flutuante"
 pc_pd_floating_desc: "Um estranho mundo com ilhas que flutuam no céu, sustentadas por um minério raro encontrado apenas aqui. As múltiplas camadas de ilhas proporcionam ao planeta um espaço habitável consideravelmente maior."
 pc_pd_floating_adj: "flutuante"
 mod_pc_pd_floating_habitability: "Habitabilidade Flutuante"
 trait_pc_pd_floating_preference: "Preferência Flutuante"
 trait_pc_pd_floating_preference_desc: "$trait_pc_arctic_preference_desc$"
 d_pd_floating_the_great_knot: "O Grande Nó"
 d_pd_floating_the_great_knot_desc: "Um grupo disperso de ilhas onde árvores ancestrais, arrancadas pelas raízes por ventos sempre mutáveis, formam pontes naturais entre as massas terrestres flutuantes. Os padrões de vento únicos, os microclimas variados e a fauna rara tornam este local ideal para o estudo das adaptações evolutivas e da resiliência da vida em ambientes dinâmicos."
 d_pd_floating_whispering_glades: "Clareiras Sussurrantes"
 d_pd_floating_whispering_glades_desc: "Um sereno conjunto de ilhas flutuantes verticais paira sobre pradarias. A suave interação do vento com as passagens estreitas cria um som tranquilizador, quase musical, ideal para o descanso e a recuperação."
 d_pd_floating_skyfall_islands: "Ilhas da Queda do Céu"
 d_pd_floating_skyfall_islands_desc: "Uma região de ilhas em forma de anel com uma forte hidrosfera, onde cascatas precipitam-se das bordas e desaparecem na névoa abaixo. A paisagem deslumbrante e a beleza natural tornam este local um destino privilegiado para o comércio e o turismo, atraindo visitantes e comerciantes de toda a galáxia."
 d_pd_floating_mining_operation: "Operação de Mineração a Céu Aberto de Eludium"
 d_pd_floating_mining_operation_desc: "O ecossistema do planeta, que anteriormente bloqueava as operações de mineração em grande escala, foi removido para explorar plenamente o raro Minério de Eludium."
 d_pd_eludium_islands: "Ilhas de Eludium"
 d_pd_eludium_islands_desc: "Embora o leito rochoso deste planeta esteja saturado de Eludium, muitas ilhas menores contêm depósitos concentrados de fácil acesso, permitindo que as operações de mineração tenham impacto ambiental mínimo."
 decision_d_pd_the_great_knot_mining: "Operação de Mineração de $d_pd_floating_the_great_knot$"
 decision_d_pd_the_great_knot_mining_desc: "A área conhecida como $d_pd_floating_the_great_knot$ será desenvolvida em uma grande operação de mineração de Eludium."
 decision_d_pd_whispering_glades_mining: "Operação de Mineração de $d_pd_floating_whispering_glades$"
 decision_d_pd_whispering_glades_mining_desc: "A área conhecida como as $d_pd_floating_whispering_glades$ será desenvolvida em uma grande operação de mineração de Eludium."
 decision_d_pd_skyfall_islands_mining: "Operação de Mineração de $d_pd_floating_skyfall_islands$"
 decision_d_pd_skyfall_islands_mining_desc: "A área conhecida como as $d_pd_floating_skyfall_islands$ será desenvolvida em uma grande operação de mineração de Eludium."
 tech_eludium_research:1 "Refinamento de Eludium"
 tech_eludium_research_desc: "Minerar Eludium é simples, mas compreender seu potencial e seu processo de refinamento é muito mais complicado. Como todos os recursos, desbloquear todo o seu potencial levará tempo."
 tech_eludium_research_tt_desc: "§HDesbloqueia:§! Mineração de Eludium\n§HDesbloqueia:§! Editos de Eludium"
 edict_eludium_research:0 "Impulso de Pesquisa de Eludium"
 edict_eludium_research_desc:0 "Potencializar nossos laboratórios com Eludium refinado irá turbinar as capacidades de pesquisa de nossos departamentos de física."
 edict_eludium_energy:0 "Rede de Energia de Eludium"
 edict_eludium_energy_desc:0 "Incorporar o Eludium como material hiperconductor em nossa rede de energia amplifica sua taxa de transferência de potência."
 edict_eludium_weapons:0 "Transistores de Armas de Eludium"
 edict_eludium_weapons_desc:0 "Integrar transistores à base de Eludium em nossas armas de energia melhora drasticamente sua velocidade de descarga e o rendimento do impacto."
 decision_pd_add_floating_island: "Criar Ilhas Flutuantes Artificiais"
 decision_pd_add_floating_island_desc: "Aproveitando o poder do Eludium, podemos elevar ilhas inteiras aos céus deste mundo, abrindo vastos novos espaços para a construção."
 d_pd_artifical_floating_islands: "Ilhas Flutuantes Artificiais"
 d_pd_artifical_floating_islands_desc: "Aproveitando o poder do Eludium, elevamos ilhas inteiras aos céus deste mundo, abrindo vastos novos espaços para a construção."
 tech_eludium_floating_islands: "Formação de Ilhas Artificiais"
 tech_eludium_floating_islands_desc: "Embora as ilhas impregnadas de Eludium flutuem naturalmente, dispositivos de flutuabilidade podem ser criados sob as ilhas de outros mundos, permitindo-nos expandir significativamente o espaço habitável em outros planetas."
 tech_eludium_floating_islands_tt_desc: "§HDesbloqueia Decisão:§! $decision_pd_add_floating_island$"
 building_pd_eludium_floating_resort: "Resort Flutuante"
 building_pd_eludium_floating_resort_desc: "Usando Eludium para manter esta estrutura no ar, este resort deslumbrante oferece vistas espetaculares graças à sua natureza suspensa nos céus."
 tech_eludium_floating_resort: "Construção de Resorts Flutuantes"
 tech_eludium_floating_resort_desc: "Usando Eludium para manter as estruturas no ar, podemos criar resorts deslumbrantes que oferecem vistas espetaculares graças à sua natureza suspensa nos céus."
 tech_eludium_floating_overseer: "Estações de Supervisão Flutuantes"
 tech_eludium_floating_overseer_desc: "Usando Eludium para manter estruturas no ar, podemos criar estações de supervisão flutuantes para vigiar nossos drones."
 building_pd_eludium_floating_overseer: "Estação de Supervisão Flutuante"
 building_pd_eludium_floating_overseer_desc: "Usando Eludium para manter as estruturas no ar, estas estações de supervisão flutuantes lembram constantemente aos drones o seu propósito."
 pd_origin_init_floating_NAME:0 "Sistema Flutuante"
 pd_origin_init_floating_DESC:0 "Um sistema inicial contendo o Mundo Flutuante"

 #Events
 pdfloating.100.name: "Ilhas no Céu"
 pdfloating.100.desc: "Após concluir seu escaneamento de §Y[From.GetName]§!, o §Y[Root.GetName]§! reporta uma descoberta notável. As massas terrestres deste planeta flutuam no céu, desafiando as leis da física graças a um minério único chamado Eludium.\n\nAs propriedades deste extraordinário minério merecem investigação adicional. Assegurar e manter este planeta será crucial para estudar o potencial do Eludium e desvendar seus segredos."
 pdfloating.100.a: "Que incrível."

 #Origin
 origin_pd_floating_world:0 "Ilhas no Céu"
 origin_pd_floating_world_desc:0 "Esta civilização evoluiu em um mundo sem igual na galáxia. Graças ao elemento Eludium, as massas terrestres deste planeta flutuam sem esforço pelos céus."
