 decision_pd_necro_planet: "Construir Necrópole Planetária"
 decision_pd_necro_planet_desc: "Este mundo anseia por se tornar um templo descomunal que ecoa com os sussurros de nosso legado de eterna significância."
 decision_pd_necro_planet_effects_short: "Modificador §Y$district_pd_aw_necro$§! adicionado.\nConstrução de §Y$district_farming_plural$§! substituída por §G$district_pd_aw_necro_plural$§!"
 decision_pd_necro_planet_cleanup: "Remover Necrópole Planetária"
 decision_pd_necro_planet_cleanup_desc: "Devemos remover os templos e túmulos deixados pelos anteriores proprietários deste planeta."
 decision_pd_necro_planet_cleanup_effects_short: "O modificador §Y$pd_aw_necro_planet$§! será removido."
