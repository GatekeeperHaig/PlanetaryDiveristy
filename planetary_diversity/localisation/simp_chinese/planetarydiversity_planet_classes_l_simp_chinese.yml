 pc_pd_barnacle: "藤壶星球"
 pc_pd_barnacle_desc: "广阔的海洋世界，拥有氮氧大气层和零星分布的岩石岛屿。各种规模的藤壶附着并覆盖了海岸与浅滩，从沿海岩石上的小型簇群，到占据海岸线的高耸古老构造，应有尽有。"
