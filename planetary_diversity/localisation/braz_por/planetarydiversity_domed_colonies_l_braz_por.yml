 pc_pd_domed_colony_tidally_locked: "Colônia Abobadada com Rotação Síncrona"
 pc_pd_domed_colony_tidally_locked_desc: "Mundo árido e rochoso com rotação síncrona e uma atmosfera fina ou inexistente, a superfície completamente desprovida de vida e coberta de crateras de impacto de meteoros. Colônias abobadadas foram construídas na superfície, permitindo habitação permanente."
