 #Rogue Rangers
 job_pd_robo_ranger: "Drone de Biodiversité"
 job_pd_robo_ranger_plural: "Drones de Biodiversité"
 job_pd_robo_ranger_desc: "Les Drones de Biodiversité sont spécialisés pour garantir que nos planètes restent propres et naturelles pour nos Bio-Trophies."
 mod_job_pd_robo_ranger_add: "Emplois $job_pd_robo_ranger$"
 mod_job_pd_robo_ranger_per_pop: "§G+1§! Emploi $job_pd_robo_ranger$ par $VALUE$ Habitants"
