 #Technology
 tech_acean_research: "Procesamiento de Cristal Aceano"
 tech_acean_research_desc: "Dominar cómo conservar los poderosos efectos del Cristal Aceano tras la cosecha no es tarea fácil y llevará tiempo comprenderlo por completo."
 tech_acean_research_tt_desc: "§HDesbloquea:§! Minería Aceana\n§HDesbloquea:§! Edictos Aceanos"
 tech_acean_superorganism_larva: "Larva de Superorganismo Aceano"
 tech_acean_superorganism_larva_desc: "A pesar de que tarda miles de años en madurar, podemos trasplantar larvas de Superorganismos Aceanos a otros mundos. Aunque mucho más débil que el progenitor, mejorará el crecimiento de la vida orgánica simple, aumentando significativamente los rendimientos agrícolas."
 tech_acean_superorganism_larva_tt_desc: "§HDesbloquea Decisión:§! $decision_pd_add_acean_superorganism_larva$"
 decision_pd_add_acean_superorganism_larva: "Plantar Larva de Superorganismo Aceano"
 decision_pd_add_acean_superorganism_larva_desc: "A pesar de que tarda miles de años en madurar, podemos trasplantar larvas de Superorganismos Aceanos a otros mundos. Aunque mucho más débil que el progenitor, mejorará el crecimiento de la vida orgánica simple, aumentando significativamente los rendimientos agrícolas."
 d_pd_acean_superorganism_larva: "Larva de Superorganismo Aceano"
 d_pd_acean_superorganism_larva_desc: "Aunque tarda miles de años en madurar, el Superorganismo Aceano larval trasplantado mejorará el crecimiento de la vida orgánica simple, aumentando en gran medida los rendimientos agrícolas. Con el tiempo comenzará a alimentarse de los colonos, pero eso queda muy lejos en el futuro."
 tech_acean_medical_center: "Teoría Médica Aceana"
 tech_acean_medical_center_desc: "Los Cristales Aceanos promueven el crecimiento y la curación en las formas de vida biológicas. Podemos mejorar enormemente los resultados de salud construyendo un centro médico de alta tecnología con Cristales Aceanos entretejidos por todo él."
 building_pd_acean_medical_center: "Centro Médico Aceano"
 building_pd_acean_medical_center_desc: "Este centro de alta tecnología está entretejido con Cristales Aceanos, mejorando enormemente los resultados de salud y posibilitando la investigación médica de vanguardia."
 tech_acean_gestation_pools: "Teoría de Gestación Aceana"
 tech_acean_gestation_pools_desc: "Entrelazar Cristal Aceano tiene un potencial significativo para reducir los tiempos de gestación en la generación de nuevos drones."
 building_pd_acean_gestation_chamber: "Cámara de Gestación Aceana"
 building_pd_acean_gestation_chamber_desc: "Entrelazar Cristal Aceano en una cámara de generación acorta significativamente los tiempos de gestación de los drones."
 tech_acean_resonators: "Resonadores Eléctricos Aceanos"
 tech_acean_resonators_desc: "Aunque la resonancia del Aceano afecta principalmente a los sistemas orgánicos, su frecuencia única ofrece numerosas aplicaciones potenciales en sistemas robóticos."
 tech_acean_resonators_tt_desc: "§HDesbloquea Rasgo:§! $trait_pd_acean_resonators$"
 trait_pd_acean_resonators: "Resonadores de Cristal Aceano"
 trait_pd_acean_resonators_desc: "Al integrar Cristal Aceano en nuestros patrones de ensamblaje, podemos garantizar una construcción de sistemas más rápida y eficiente."
 trait_pd_acean_resonators_tt: "£sr_acean£ §Y$sr_acean$§! Mantenimiento: §R+0.02§!\n$r_energy$ Mantenimiento: §G-1§!"

 #Edicts
 edict_acean_pop_growth: "Infraestructura Urbana Aceana"
 edict_acean_pop_growth_desc: "Cristales Aceanos integrados en la infraestructura de la ciudad mejoran el bienestar, con calles y espacios diseñados para maximizar los efectos positivos del Aceano en la salud física y emocional."
 edict_acean_shield_resonance: "Resonancia de Escudo Aceana"
