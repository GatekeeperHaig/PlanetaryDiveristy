 pc_pd_swamp: "沼泽星球（树沼）"
 pc_pd_swamp_desc: "拥有氮氧大气层的潮湿富水星球。地表绝大部分被葱郁的森林湿地覆盖，几乎找不到干涸的寸土。其强大的水圈系统极其稳定，以浅海、沼泽与泥潭为主要地貌，滋养着万千繁盛的动植物生命。"
 pc_pd_swamp_adj: "沼泽"
