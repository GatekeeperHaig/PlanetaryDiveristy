 pc_pd_archipelago_desc: "拥有氮氧大气和庞大的水圈的岩石星球。地表被一片遍布群岛的全球性大洋覆盖。极其活跃的火山运动致使岛屿频繁地升起与沉没，塑造出变幻无常的地貌。"
