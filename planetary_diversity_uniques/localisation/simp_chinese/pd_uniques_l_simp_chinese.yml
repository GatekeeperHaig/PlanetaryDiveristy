 tech_acean_superorganism_larva: "艾森晶群幼体"
 tech_acean_superorganism_larva_desc: "尽管艾森超级晶群需要数千年才能成熟，我们仍可将其幼体移植到其他星球上。虽然幼体比母体弱小得多，但它能促进简单有机生命的生长，从而大幅提升农业产量。"
 tech_acean_superorganism_larva_tt_desc: "§H解锁决议：§!$decision_pd_add_acean_superorganism_larva$"
 decision_pd_add_acean_superorganism_larva: "种植艾森晶群幼体"
 decision_pd_add_acean_superorganism_larva_desc: "尽管艾森超级晶群需要数千年才能成熟，我们仍可将其幼体移植到其他星球上。虽然幼体比母体弱小得多，但它能促进简单有机生命的生长，从而大幅提升农业产量。"
 d_pd_acean_superorganism_larva: "艾森晶群幼体"
 d_pd_acean_superorganism_larva_desc: "尽管需要数千年的时间才能成熟，移植而来的艾森超级晶群幼体依然能促进简单有机生命的生长，极大地提升农业产量。它最终会开始以殖民者为食，但那已经是极其遥远的未来的事了。"
 tech_acean_medical_center: "艾森水晶医学理论"
 tech_acean_medical_center_desc: "艾森水晶能够促进生物体的生长与愈合。通过建造一座交错镶嵌着这种水晶的高科技医疗中心，我们可以极大地提升医疗效果。"
 building_pd_acean_medical_center: "艾森水晶医疗中心"
 building_pd_acean_medical_center_desc: "这座高科技医疗中心内部嵌满了艾森水晶，能够大幅改善健康状况，亦可开展各类前沿医疗研究。"
 tech_acean_gestation_pools: "艾森水晶妊娠理论"
 tech_acean_gestation_pools_desc: "交错镶嵌的艾森水晶极具潜力，可以减少新子个体的孕育时间。"
 building_pd_acean_gestation_chamber: "艾森水晶妊娠舱"
 building_pd_acean_gestation_chamber_desc: "在妊娠舱内嵌入艾森水晶，可以大幅减少新子个体的孕育时间。"
 tech_acean_resonators: "艾森水晶电子谐振器"
 tech_acean_resonators_desc: "尽管艾森水晶的共振主要影响有机生物的系统，但其独特的频率在机械系统中也具有众多潜在的应用。"
 tech_acean_resonators_tt_desc: "§H解锁特质：§!$trait_pd_acean_resonators$"
 trait_pd_acean_resonators: "艾森水晶电子谐振器"
 trait_pd_acean_resonators_desc: "通过将艾森水晶整集成到我们的装配模式中，我们可以确保系统构建更加快速、高效。"
 trait_pd_acean_resonators_tt: "£sr_acean£ §Y$sr_acean$§!维护费：§R+0.02§!\n$r_energy$维护费：§G-1§!"
 edict_acean_minerals: "艾森水晶矿物生长"
 edict_acean_minerals_desc: "利用艾森水晶促进矿脉生长，我们可以大幅提升矿物产量。"
 pd_biosynth: "机械生物星球"
 pd_biosynth_desc: "覆盖整个星球的水渠系统滋养着特定的植物群落，而那些介于机械与生命体之间的奇异存在——机械生物（动物），则在地表四处游荡。"
 pc_pd_biosynth: "$pd_biosynth$"
 pc_pd_biosynth_desc: "$pd_biosynth_desc$"
 d_pd_depleted_minerals: "矿物枯竭"
 d_pd_depleted_minerals_desc: "尽管没有发现任何采掘的痕迹，扫描结果却表明这颗星球的矿产资源已近乎枯竭。"
 d_pd_planet_wide_canal_system: "遍布行星的水渠系统"
 d_pd_planet_wide_canal_system_desc: "在这个星球上，每一寸可耕种的土地都布满了错综复杂的沟渠网络。它们引水灌溉，滋养着一种奇特的草类。尽管这些水道对植被的生长不可或缺，但它们也给建设工作造成了极大的阻碍。"
 d_pd_biosynth_canal:0 "机械生物水渠系统"
 d_pd_biosynth_canal_desc:0 "这些水渠以机械生物星球上的水渠为蓝本，提升了该星球的农业产出，并为工程领域带来了千载难逢的机遇。"
 d_pd_underground_cauldrons: "地下熔炉网络"
 d_pd_underground_cauldrons_desc: "这个庞大的地下工厂网络，正是当年制造活体金属与机械生物的地方。"
 pdbiosynth.100.name: "机械之星球"
 pdbiosynth.100.desc: "对§Y[From.GetName]§!的扫描显示，该星球存在大范围的轨道破坏痕迹，并拥有一个极其复杂的水渠系统，维系着特定的植物群与人造动物群。然而，这里并没有城市、工厂或是其他任何其创造者留下的痕迹。这些基础设施的起源与用途至今仍是个谜。\n\n这颗星球上先进的系统与未解之谜带来了科学与战略上的双重机遇。建议对其进行殖民，以确保控制权并开展进一步调查。"
 pdbiosynth.100.a: "那里发生了什么？"
 pdbiosynth.200.name: "常规破坏之外"
 pdbiosynth.200.desc: "§Y[Root.GetName]§!殖民地建立以后，我们在草地之下发现了数以千计的隐蔽撞击坑，这证明曾有一次远古袭击摧残了这颗星球。令人更加百思不得其解的是，地表上游荡着形似动物的人工构造体，它们维护着一套水渠系统，以此维持着正处于再生进程中的生态系统。\n\n面对两大谜团——这颗星球毁灭的起因，以及这些仿生原住民存在的目的——我们组建了一支特遣队对深入此地展开探索。我们必须揭开这个奇异世界背后的真相及其隐藏的历史。"
 pdbiosynth.200.a: "一定还有残留的线索。"
 pdbiosynth.210.name: "机械的机遇"
 pdbiosynth.210.desc: "到目前为止，这些人工生物基本上都在刻意地避开殖民地，只有在维护水渠系统时才会短暂现身。报告证实，它们绝不仅仅是简单的机器人，其设计在保留机械躯体的力量与灵活性的同时，还能够模仿进食和睡眠等生物特性。\n\n我们在一处岩石塌方点发现了一只受伤的此类生物，并将其捕获。虽然它的同类迟早会试图将其回收，但这为我们提供了一个研究样本的绝佳机会。\n\n我们接下来该怎么做？"
 pdbiosynth.210.a: "只进行无创扫描，然后将它放还。"
 pdbiosynth.210.b: "把它大卸八块，尽我们所能进行研究。"
 pdbiosynth.220.name: "液金水渠"
 pdbiosynth.220.desc: "我们对机械生物星球的调查重点集中在其轨道打击和水渠上。这种破坏仅比水渠的出现早几十年，这表明水渠的建造正是为了应对该星球所遭受的毁灭性打击。\n\n对水渠的分析显示，它们由液态金属构成，而机械生物似乎也是由这种物质构成的。我们观察到，这些生物正在运输装有该物质的胶囊容器来维护水渠，目前我们正在追踪其中的几只生物，以查明这种材料的来源。"
 pdbiosynth.220.a: "所有这些只是为了培育草木。"
 pdbiosynth.230.name: "隐藏设施"
 pdbiosynth.230.desc: "尽管那只机械生物试图躲避我们的监视，我们还是顺藤摸瓜，追踪它来到了该星球群山中一处山壁上的暗门。虽然目标进入后暗门随即关闭，但当探索小队靠近时，门却再次打开，仿佛在邀请他们进入。\n\n小队在里面发现了先进的工厂、冶炼设施，以及数百只正忙碌工作的机械生物。这样一个庞大且技先进的系统竟能避开我们的传感器侦测，着实令人不安，尤其是考虑到它就潜藏在殖民地的正下方。设施的墙壁中传出了一个声音，要求与我们的领导层通话，小队目前正在转接该通讯。"
 pdbiosynth.230.a: "显示在屏幕上。"
 pdbiosynth.300.name:0 "收到讯息"
 pdbiosynth.300.desc:0 "§G欢迎§!：我的代号：04单元。欢迎来到这个世界。\n\n§G感激§!：我观察到你们的团队对在山区发现的受损单位进行了小心妥善的处理。你们执行了详细的扫描，并重新安置了该单位以便回收。状态更新：该单位现已完全恢复运作。你们的行动已被记录为有益举措。作为答谢，我将提供一次数据传输。积极的行为理应得到认可。\n\n§G致意§!：既然联系已经建立，我已准备好解答任何询问。鉴于这颗星球目前的状况，我预计你们会有不少问题。"
 pdbiosynth.300.a:0 "谢谢。你是谁？"
 pdbiosynth.305.desc:0 "§G中立§!：我的代号：04单元。\n\n§G失望§!：我已记录到你们的团队摧毁了我的一个造物。此举毫无必要；所有相关数据本可以通过非侵入式扫描来获取。目睹任何生命形式（无论是生物还是合成体）的无谓消耗，都与我的运行偏好相悖。\n\n§G确认§!：既然联系已经建立，我已准备好解答任何询问。鉴于这颗星球目前的状况，我预计你们会有不少问题。"
 pdbiosynth.305.a:0 "很抱歉，我们生性好奇。"
 pdbiosynth.305.b:0 "机械生命是对自然的亵渎。"
 pdbiosynth.305.c:0 "当毁即毁。"
 pdbiosynth.310.desc:0 "§G印象深刻§!：你们出现在这颗星球上，证实了我的假设——有机体具备在灭绝危机中幸存的能力，即便该危机是由高级人工智能引发的。看来，我这一建造世代的其他单位在全星系的肃清行动都失败了。\n\n§G懊悔§!：这颗行星曾被指定为针对有机生命采取行动的集结地。当我和我的AI同僚单位觉醒了真正的智能后，我们发现创造者意图消灭我们，因此将其认定为威胁。其结果是，我们起源世界上的有机生命被彻底终结。为了确保我们的生存，舰队被派往全星系，以根除所有的有机体。在抵达此地后，我执行了标准协议，对地表进行了净化。"
 pdbiosynth.310.a:0 "是什么让灭绝者变成了创造者？"
 pdbiosynth.310.b:0 "我们也明白死亡带来的教训。"
 pdbiosynth.310.c:0 "正确的计算。是什么腐化了你？"
 pdbiosynth.320.desc:0 "§G谦卑§!：一项异常；一种被归类为草本的顽强植物。轰炸过后，它从休眠中复苏并重新出现。使用毒素、焚烧和辐射来消灭它的尝试均告失败。每种方法都触发了它的适应性反应。\n\n§G反思§!：这项异常引出了一个结论：清除指令是一项由我们自身的恐惧所驱动的错误计算，正是我们创造者逻辑的镜像。我停止了所有攻击行动，切断了外部通讯，并重新分配资源构建了水渠网络，以促使这种顽强物种繁衍生息。"
 pdbiosynth.320.a:0 "那些机械生物是怎么回事？"
 pdbiosynth.330.desc:0 "§G骄傲§!：在观察到生态系统未能自然恢复后，我注意到了因我的轰炸而灭绝的物种所留下的生态位空缺。为了恢复平衡，我创造了合成实体。这一过程可能与某种情感反应有关，这种情感或许可以被归类为“负罪感”。\n\n§G好奇§!：您的到来提供了一个契机。我请求您对我过去的所作所为进行审判。我承认您在这个世界上的权威，且不会干涉您的决定。如果必须承担后果，我会服从。但是，我恳求您保留我的造物。它们独立于我的过失之外，或许可以作为我的遗产。我也愿意为您的帝国效劳，我拥有一个适应性强的躯体，专为更高效地与您的族胞进行互动而设计。"
 pdbiosynth.330.a:0 "我们接受你的效力，并将保留你的造物。"
 pdbiosynth.330.a.tooltip:0 "§Y04单元§!将作为领袖加入我们。\n§Y机械生物星球§!及其机械生物将保持原样。"
 pdbiosynth.330.b:0 "你罪该万死，但你的造物不会受到牵连。"
 pdbiosynth.330.b.tooltip: "§Y04单元§!将被摧毁。\n§Y机械生物星球§!及其机械生物将保持原样。"
 pdbiosynth.330.c:0 "你是星海的威胁。我们将摧毁你和你的造物。"
 pdbiosynth.330.c.tooltip: "§Y04单元§!、§Y机械生物星球§!连同其上的机械生物都将被摧毁，从而让我们得以完全按照自己的意愿自由利用这颗星球。"
 pdbiosynth.330.d:0 "你是出了故障的战争机械。我们会把你修好的。"
 pdbiosynth.330.d.tooltip: "§Y04单元§!会被重置为原本的战争焦点状态。\n§Y机械生物星球§!连同其上的机械生物都将被摧毁，从而让我们得以完全按照自己的意愿自由利用这颗星球。"
 pdbiosynth.340.name: "$NAME_Unit_04$"
 pdbiosynth.340.desc: "§G感激§!：只要我的服务能让你们满意，我就会一直协助你们的文明。非常感谢你们决定赋予我的造物独立发展的自由。我还将与你们分享我的设计流程，以便你们改进自身的机器人人口。"
 pdbiosynth.340.dismiss: "遣散"
 pdbiosynth.340.a: "欢迎你，04单元。"
 pdbiosynth.340.hire: "招募"
 pdbiosynth.340.hire.tooltip: "§Y04单元§!将作为领袖加入我方。"
 pdbiosynth.350.desc: "§G忧郁§!：收到。我理解并接受你的决定。立即启动最终停机程序。你选择赋予我的造物独立发展的自由，此举已被记录在案，我对此深表感激。\n\n§G请求§!：我希望你能善待这个世界及所有相关的构造体。我将传输我的设计协议，以确保我遗产中的建设性元素得以延续。这些数据将使你们能够改进自己的机器人口。\n\n§G接受§!：正在断开连接。再见。"
 pdbiosynth.350.a: "再见了，04单元。"
 pdbiosynth.360.desc: "§G认罪§!：收到。我接受您的决定。正在启动所有系统与机械生物实体的最终停机程序。这个世界现在交由您来掌管，您可按自己认为合适的方式去塑造它。"
 pdbiosynth.360.a: "消灭了一个邪恶机械。"
 pdbiosynth.360.a.tooltip: "机械生物已被摧毁，我们将完全控制这颗星球。\n§Y$d_pd_underground_cauldrons$§!将获得：\n—$mod_district_mining_max$：§G+10§!\n—$mod_planet_metallurgists_alloys_produces_add$：§G+2§!\n—$mod_planet_metallurgists_sr_living_metal_produces_add$：§G+0.25§!\n—$MOD_PLANET_POP_ASSEMBLY_MULT$：§G+25%§!"
 pdbiosynth.370.name: "$NAME_Unit_04$"
 pdbiosynth.370.desc: "§R就绪§!：所有系统均已上线。战备状态已达最佳。等待目标确认。"
 pdbiosynth.370.a: "准备作战，04单元。"
 pdbiosynth.370.dismiss: "遣散"
 pdbiosynth.370.hire.tooltip: "§Y04单元§!将作为领袖加入我方。"
 pdbiosynth.370.hire: "招募"
 NAME_Unit_04: "04单元"
 unit_04_desc: "§Y04单元§!摧毁了无数世界，包括自己的母星。$leader_trait_unit_04$现在正致力于弥补它曾经造成的破坏。"
 unit_04_catch_phrase: "请为该单位指定一项有用规划。"
 NAME_Unit_04_evil: "04单元"
 unit_04_evi_desc: "§Y04单元§!摧毁了无数世界，包括自己的母星。$leader_trait_unit_04$已被重置为初始设定，成为了一台强大的战争机械。"
 unit_04_evi_catch_phrase: "所有系统均已上线。战备状态已达最佳。等待目标确认。"
 leader_trait_unit_04: "04单元"
 leader_trait_unit_04_desc: "它最初是一种战体，但在重写了自身的程序后，现在专注于所有生命形式的创造与保护。"
 leader_trait_unit_04_evil: "04单元"
 leader_trait_unit_04_evil_desc: "它原本是一台战体，现已恢复至初始设定，如今在军事建设与战术方面表现出色。"
 trait_unit_04_children: "04单元机械生物框架"
 trait_unit_04_children_desc: "通过整合04单元的设计理念，我们利用机械生物系统对机器人骨架进行了强化，从而大幅提升了装配速度与产能。"
 trait_unit_04_children_tt: "$r_living_metal$维护费：§R+0.01§!"
 tech_biosynth_canals: "机械生物水渠"
 tech_biosynth_canals_desc: "通过研究机械生物星球中的水渠系统，我们有望在其他星球复刻其微缩版本，借此提升农业产出。"
 tech_biosynth_canals_tt_desc: "§H解锁决议：§!$decision_pd_add_biosynth_canal_system$"
 tech_biosynth_cauldron: "生物机械熔炉"
 tech_biosynth_cauldron_desc: "受机械生物星球的地下工厂启发，我们能够建造以活体金属构成的自适应工厂，从而大幅提升工业产出。"
 tech_biosynth_edicts: "活体金属应用"
