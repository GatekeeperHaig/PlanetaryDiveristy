l_braz_por:

###Planetary Infesters
#Civic
 civic_hive_pd_planetary_infesters: "Infestadores Planetários"
 civic_hive_pd_planetary_infesters_desc: "Esta mente colmeia se incorpora nos ecossistemas de um planeta. Cada mundo se torna uma extensão de si mesma, florescendo como uma rede unificada sob sua orientação."
 civic_tooltip_pd_planetary_infesters_effects: "Pode construir £building£ $building_pd_aw_planet_infester_1$\n- $building_pd_planet_infestor_desc$\n- O mundo natal é um $pc_hive$"

#Buildings
 building_pd_planet_infestor_desc: "Os §YNós de Infestação§! evoluem por três fases de atualização, convertendo progressivamente o planeta em um §YMundo Colmeia§!."
 building_pd_aw_planet_infester_1: "Nó de Infestação - Primeira Fase"
 building_pd_aw_planet_infester_1_desc: "Este nó, o coração da etapa inicial de infestação, é vital para a presença da colmeia neste planeta. Sua perda desfaria o controle da colmeia aqui."
 building_pd_aw_planet_infester_2: "Nó de Infestação - Segunda Fase"
 building_pd_aw_planet_infester_2_desc: "Este enorme nó, agora na etapa intermediária de infestação, exerce uma conexão com a colmeia robusta o suficiente para manipular processos planetários críticos. Sua perda desfaria o controle da colmeia aqui."
 building_pd_aw_planet_infester_3: "Nó de Infestação Planetária"
 building_pd_aw_planet_infester_3_desc: "Tendo atingido seu zênite, este formidável nó exerce domínio total sobre todos os processos planetários. Sua perda desfaria o controle da colmeia aqui."
 building_pd_aw_planet_infester_3_effect_desc: "Este planeta será transformado em um §Y$pc_hive$§!."

#Dummy Class
 pc_hive_dummy: "$pc_hive$"
 pc_hive_dummy_desc: "$pc_hive_desc$"
 pc_hive_dummy_adj: "$pc_hive_adj$"
 mod_pc_hive_dummy_habitability: "$mod_pc_hive_habitability$"
 trait_pc_hive_dummy_preference: "$trait_pc_hive_preference$"
 trait_pc_hive_dummy_preference_desc: "$trait_pc_hive_preference_desc$"

#Events
 pdawplanetaryinfesters.120.name: "Mundo Colmeia Planetário Completo"
 pdawplanetaryinfesters.120.desc: "À medida que o nó atinge seu pleno potencial, ressoamos com um profundo senso de realização.\n\nEste momento marca um salto significativo no controle da colmeia sobre [Root.GetName], solidificando seu domínio sobre o planeta."
 pdawplanetaryinfesters.120.a: "Outro lar para a colmeia."
