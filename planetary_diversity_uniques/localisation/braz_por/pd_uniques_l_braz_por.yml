 trait_organic_fourschildren:0 "Bio-Sintético"
 trait_organic_fourschildren_desc:0 "Criado pela IA 'Unidade 04' e que combina inteligência orgânica e artificial para criar uma verdadeira forma de vida bio-sintética."
