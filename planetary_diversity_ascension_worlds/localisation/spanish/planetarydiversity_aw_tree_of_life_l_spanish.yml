#Deposits
 d_pd_aw_tree_of_life_home: "Árbol de la Vida"
 d_pd_aw_tree_of_life_home_desc: "El Árbol de la Vida ha cobijado y apoyado a la Colmena durante incontables generaciones."
 d_pd_aw_tree_of_life_colony: "Retoño del Árbol de la Vida"
 d_pd_aw_tree_of_life_colony_desc: "Un vástago del Gran Árbol, trasplantado aquí por la Colmena. Llevará tiempo que madure por completo."
 d_pd_aw_tree_of_life_bloomed: "Árbol de la Vida Florecido"
 d_pd_aw_tree_of_life_bloomed_desc: "El Gran Árbol ha cobijado y apoyado a la Colmena durante incontables generaciones. Ahora florecido, sus efectos beneficiosos pueden ser sentidos por cada drone."
 d_pd_tree_of_life_habitat: "Hábitat del Árbol de la Vida"
 d_pd_tree_of_life_habitat_desc: "Un vástago del Gran Árbol, trasplantado aquí por la Colmena. Esta versión en miniatura dentro de este hábitat nunca alcanzará su pleno potencial, pero apoyará a los drones estacionados aquí."
 d_pd_tree_of_life_ringworld: "Mundo Anular del Árbol de la Vida"
 d_pd_tree_of_life_ringworld_desc: "Un vástago del Gran Árbol, trasplantado aquí por la Colmena. Si bien puede crecer a lo largo de la superficie del mundo anular, la profundidad del suelo necesitaría ser mayor para que el árbol alcance su tamaño completo."

#Planets
 pc_pd_megaflora_hive: "Mundo Colmena Megaflora"
 pc_pd_megaflora_hive_desc: "Mundo rocoso con atmósfera de nitrógeno y oxígeno, este mundo está densamente boscoso con una hidrósfera fuerte y saludable. Hogar de un árbol de megaflora que cubre su superficie y conectado psíquicamente con la Mente Colmena que lo nutre, el sistema de raíces de este planeta es también la forma principal de construcción y vivienda de la colmena. Aunque su proceso es lento, sus cualidades regenerativas lo hacen fácil de defender y reparar."
 trait_pc_pd_megaflora_hive_preference: "Preferencia de Colmena Megaflora"
 trait_pc_pd_megaflora_hive_preference_desc:1 "$trait_pc_arctic_preference_desc$"
 pc_pd_megaflora_hive_habitability: "Habitabilidad de Colmena Megaflora"
 mod_pc_pd_megaflora_hive_habitability: "Habitabilidad de Colmena Megaflora"
 pc_pd_megaflora_hive_bloomed: "Mundo Colmena Megaflora"
 pc_pd_megaflora_hive_bloomed_desc: "Mundo rocoso con atmósfera de nitrógeno y oxígeno, densamente boscoso con una hidrósfera fuerte y saludable. Este planeta alberga un árbol de megaflora que cubre su superficie, conectado psíquicamente con la Mente Colmena que lo nutre."
 trait_pc_pd_megaflora_hive_bloomed_preference: "Preferencia de Colmena Megaflora"
 trait_pc_pd_megaflora_hive_bloomed_preference_desc:1 "$trait_pc_arctic_preference_desc$"
 pc_pd_megaflora_hive_bloomed_habitability: "Habitabilidad de Colmena Megaflora"
 mod_pc_pd_megaflora_hive_bloomed_habitability: "Habitabilidad de Colmena Megaflora"

#Start Text
 START_SCREEN_PD_TREE_OF_LIFE: "Cuando despertamos, servimos al Árbol, y el Árbol nos sirvió. Cuidamos del Árbol, alimentamos al Árbol, protegemos al Árbol, y el Árbol nos nutre. Por el bien del Árbol, nos extendimos por [GetHomeWorldName], plantando y observando vástagos del Árbol dondequiera que fuimos.\n\nNuestro mundo ha servido al Árbol durante siglos, y sin embargo tememos que el Árbol no esté completamente a salvo a medida que hemos aprendido sobre los peligros del universo. Hace tiempo que sabemos que este no es el único planeta; la galaxia tiene muchos mundos Sin Árbol, y ansiamos cambiar esto.\n\nDebemos proteger al Árbol. El Árbol debe extenderse. El Árbol debe crecer."

#Modifiers
 pd_aw_tree_of_life_bloomed: "Mundo del Árbol de la Vida Florecido"
 pd_aw_tree_of_life_bloomed_desc: "El Gran Árbol de este planeta ha madurado completamente y está florecido. Su enorme sistema de raíces proporciona espacio para drones obreros adicionales y puede resistir daños considerables."
 pd_aw_tree_of_life_growing: "Retoño del Árbol de la Vida en Crecimiento"
 pd_aw_tree_of_life_growing_desc: "Los drones de este planeta están centrados en establecer el retoño del Gran Árbol que hemos plantado aquí."
 pd_aw_tree_of_life_home: "Mundo del Árbol de la Vida"
 pd_aw_tree_of_life_home_desc: "El Gran Árbol de este planeta está completamente crecido. Su sistema de raíces proporciona espacio para drones obreros y naturalmente resiste daños."
 d_pd_tree_of_life_ringarc: "Mundo Anular del Árbol de la Vida"
 d_pd_tree_of_life_ringarc_desc: "El Gran Árbol en este mundo anular está tan crecido como es posible. Su sistema de raíces proporciona espacio para drones obreros y naturalmente resiste daños. "
 pd_aw_no_lifetree: "Sin Árbol de la Vida"
 pd_aw_no_lifetree_desc: "Sin un Gran Árbol de la Vida, la colmena está incompleta."
 pd_no_lifetree_arcology: "Sin Árbol de la Vida"
 pd_no_lifetree_arcology_desc: "Este planeta está cubierto de una expansión urbana interminable, lo que lo hace inadecuado para sostener un Árbol de la Vida."

#Decisions
 decision_pd_replant_aw_tree_of_life: "Replantar Árbol de la Vida"
 decision_pd_replant_aw_tree_of_life_desc: "Debemos establecer aquí un retoño del Gran Árbol de la Vida para que nuestra Colmena prospere."
 decision_pd_aw_bloom_tree_of_life: "Florecer el Árbol de la Vida"
 decision_pd_aw_bloom_tree_of_life_desc: "Alentar a un Gran Árbol de la Vida a florecer requiere tiempo y recursos considerables, pero hacerlo desbloqueará su verdadero potencial."
 decision_pd_aw_bloom_tree_of_life_tooltip: "Este planeta crecerá hasta convertirse en un §YFlorecido $pc_pd_megaflora_hive_bloomed$§!.\n\nDoblando los £pop£ §YEmpleos§! y el £housing£ §YAlojamiento§! que cada distrito proporcionará."

#Ascension Perk
 ap_pd_tree_of_life_bloomed: "Mundos Colmena Megaflora Florecidos"
 ap_pd_tree_of_life_bloomed_desc: "Podemos alentar a cada Gran Árbol de la Vida a florecer, desbloqueando su verdadero potencial."
 allow_tree_of_life_bloomed: "§HDesbloquea Decisión:§! $decision_pd_aw_bloom_tree_of_life$"
 describe_tree_of_life_bloomed_worlds: "§YFlorecido $pc_pd_megaflora_hive_bloomed$s§! son una clase de planeta especial que no es habitable para Pops que no son de Mente Colmena, pero no están limitados en cuántos £district£ §YDistritos§! de §YGeneradores§!, §YMinería§! y §YAgricultura§! pueden soportar. Todos los distritos tienen sus £pop£ §YEmpleos§! y £housing£ §YAlojamiento§! duplicados. £pop£ §YPops§! que viven en §YFlorecido $pc_pd_megaflora_hive_bloomed$§! tienen su §YProducción de Recursos§! aumentada en §G+10%§!"

#Holdings
 holding_pd_aw_tree_of_life_sapling: "Brote del Árbol de la Vida Megaflora"
 holding_pd_aw_tree_of_life_sapling_desc: "El Señor ha existido con su Árbol de la Vida Megaflora durante tanto tiempo que ya no puede imaginar la vida sin él. Ahora, quiere compartir la misma oportunidad con sus vasallos."

