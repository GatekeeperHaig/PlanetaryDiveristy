l_spanish:

###Continental
 pc_pd_retinal: "Mundo Retinal"
 pc_pd_retinal_desc: "Mundo rocoso con una atmósfera de nitrógeno y oxígeno. Hidrosfera activa y estable con grandes masas terrestres separadas por océanos. La vida vegetal está basada en retinaldehído en lugar de clorofila, lo que da al planeta un distintivo tono púrpura."
 pc_pd_retinal_adj: "púrpura"
 mod_pc_pd_retinal_habitability: "Habitabilidad Continental"
 trait_pc_pd_retinal_preference: "Preferencia Continental"
 trait_pc_pd_retinal_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_lake: "Mundo Lacustre"
 pc_pd_lake_desc: "Mundo rocoso con una atmósfera de nitrógeno y oxígeno. Hidrosfera extremadamente activa y estable. La masa continental es una única zona cubierta de millones de lagos de todos los tamaños, mientras el clima varía de subtropical a subártico."
 pc_pd_lake_adj: "lacustre"
 mod_pc_pd_lake_habitability: "Habitabilidad Continental"
 trait_pc_pd_lake_preference: "Preferencia Continental"
 trait_pc_pd_lake_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_forest: "Mundo Forestal"
 pc_pd_forest_desc: "Mundo rocoso con una atmósfera de nitrógeno y oxígeno. Hidrosfera activa y estable. Las grandes masas terrestres están casi completamente cubiertas de bosques densos."
 pc_pd_forest_adj: "boscoso"
 mod_pc_pd_forest_habitability: "Habitabilidad Continental"
 trait_pc_pd_forest_preference: "Preferencia Continental"
 trait_pc_pd_forest_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_tepid: "Mundo Tibio"
 pc_pd_tepid_desc: "Mundo rocoso con una atmósfera de nitrógeno y oxígeno. Hidrosfera activa y estable con grandes masas terrestres separadas por océanos. Al tener casi ninguna inclinación axial, las condiciones de crecimiento ideales de este mundo han permitido la evolución de muchos tipos de procesos fotosintéticos."
 pc_pd_tepid_adj: "idílico"
 mod_pc_pd_tepid_habitability: "Habitabilidad Continental"
 trait_pc_pd_tepid_preference: "Preferencia Continental"
 trait_pc_pd_tepid_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_temperate: "Mundo Templado"
 pc_pd_temperate_desc: "Mundo rocoso con una atmósfera de nitrógeno y oxígeno. Hidrosfera activa y estable con grandes masas terrestres separadas por océanos."
 pc_pd_temperate_adj: "templado"
 mod_pc_pd_temperate_habitability: "Habitabilidad Continental"
 trait_pc_pd_temperate_preference: "Preferencia Continental"
 trait_pc_pd_temperate_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_sakura: "Mundo Sakura"
 pc_pd_sakura_desc: "Mundo rocoso con una atmósfera de nitrógeno y oxígeno. Hidrosfera activa y estable con grandes masas terrestres separadas por océanos. La superficie está cubierta de exuberantes bosques de árboles en flor."
 pc_pd_sakura_adj: "sakura"
 mod_pc_pd_sakura_habitability: "Habitabilidad Continental"
 trait_pc_pd_sakura_preference: "Preferencia Continental"
 trait_pc_pd_sakura_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_moss: "Mundo de Musgo"
 pc_pd_moss_desc: "La superficie del planeta está completamente cubierta por musgo denso y extendido. Esta implacable flora cubre la tierra creando un ecosistema esponjoso que estabiliza la hidrosfera."
 pc_pd_moss_adj: "musgoso"
 mod_pc_pd_moss_habitability: "Habitabilidad Continental"
 trait_pc_pd_moss_preference: "Preferencia Continental"
 trait_pc_pd_moss_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_marsh: "Mundo Pantanoso"
 pc_pd_marsh_desc: "Densas marismas saladas templadas cubren la superficie del planeta. Pozas salobres se extienden hasta el horizonte, donde la vegetación fibrosa filtra el agua y ancla el suelo."
 pc_pd_marsh_adj: "pantanoso"
 mod_pc_pd_marsh_habitability: "Habitabilidad Continental"
 trait_pc_pd_marsh_preference: "Preferencia Continental"
 trait_pc_pd_marsh_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_carotene: "Mundo Carotenoso"
 pc_pd_carotene_desc: "Vastas llanuras y tierras altas dominadas por vegetación rica en pigmentos carotenoides, bañando el paisaje en ámbar y ocre. El clima templado del planeta sustenta una biosfera diversa y estable a pesar de la casi ausencia de vida basada en clorofila."
 pc_pd_carotene_adj: "carotenoso"
 mod_pc_pd_carotene_habitability: "Habitabilidad Continental"
 trait_pc_pd_carotene_preference: "Preferencia Continental"
 trait_pc_pd_carotene_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_petrified: "Mundo de Bosques Petrificados"
 pc_pd_petrified_desc: "Mundo rocoso con una atmósfera de nitrógeno y oxígeno e hidrosfera activa y estable. Grandes masas terrestres están separadas por océanos con grandes variaciones climáticas. Debido al efecto de una inundación planetaria tras una era glacial, restos petrificados de árboles gigantes pueden encontrarse tanto en la superficie como enterrados bajo tierra."
 pc_pd_petrified_adj: "petrificado"
 mod_pc_pd_petrified_habitability: "Habitabilidad Continental"
 trait_pc_pd_petrified_preference: "Preferencia Continental"
 trait_pc_pd_petrified_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_megaflora: "Mundo de Megaflora"
 pc_pd_megaflora_desc: "Mundo rocoso con una atmósfera de nitrógeno y oxígeno. Densamente boscoso con una hidrosfera fuerte y saludable. Este planeta alberga megaflora gigante que cubre la superficie del planeta."
 pc_pd_megaflora_adj: "boscoso"
 mod_pc_pd_megaflora_habitability: "Habitabilidad Continental"
 trait_pc_pd_megaflora_preference: "Preferencia Continental"
 trait_pc_pd_megaflora_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_mushroom: "Mundo de Hongos"
 pc_pd_mushroom_desc: "Mundo rocoso con una atmósfera de nitrógeno y oxígeno. Densamente boscoso con una hidrosfera fuerte y saludable. Este planeta alberga enormes hongos."
 pc_pd_mushroom_adj: "fúngico"
 mod_pc_pd_mushroom_habitability: "Habitabilidad Continental"
 trait_pc_pd_mushroom_preference: "Preferencia Continental"
 trait_pc_pd_mushroom_preference_desc: "$trait_pc_arctic_preference_desc$"

###Oceánico
 pc_pd_cascadian: "Mundo Cascadiano"
 pc_pd_cascadian_desc: "Mundo montañoso subtemplado con una atmósfera de nitrógeno y oxígeno, compuesto de bosques costeros e imponentes cordilleras. Una hidrosfera activa y tormentosa con grandes diferencias entre los inviernos nevados y los cortos veranos más cálidos."
 pc_pd_cascadian_adj: "escarpado"
 mod_pc_pd_cascadian_habitability: "Habitabilidad Oceánica"
 trait_pc_pd_cascadian_preference: "Preferencia Oceánica"
 trait_pc_pd_cascadian_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_swamp: "Mundo de Pantanos"
 pc_pd_swamp_desc: "Un mundo húmedo con una atmósfera de nitrógeno y oxígeno. La mayor parte del planeta está cubierta de densas zonas húmedas boscosas con muy poca superficie terrestre fuera del agua. La hidrosfera es fuerte y estable principalmente en mares poco profundos, pantanos y turberas, y sustenta una gran abundancia de vida vegetal y animal."
 pc_pd_swamp_adj: "pantanoso"
 mod_pc_pd_swamp_habitability: "Habitabilidad Oceánica"
 trait_pc_pd_swamp_preference: "Preferencia Oceánica"
 trait_pc_pd_swamp_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_crag: "Mundo de Escarpados"
 pc_pd_crag_desc: "Mundo frío y rocoso con una atmósfera de nitrógeno y oxígeno e hidrosfera significativa. Los océanos y las capas de hielo polares cubren más del §Y99%§! de la superficie, con islas escarpadas y dispersas que salpican su superficie. Hay una abundancia de actividad volcánica y geotérmica que sustenta ecosistemas marinos."
 pc_pd_crag_adj: "subártico"
 mod_pc_pd_crag_habitability: "Habitabilidad Oceánica"
 trait_pc_pd_crag_preference: "Preferencia Oceánica"
 trait_pc_pd_crag_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_fog: "Mundo de Niebla"
 pc_pd_fog_desc: "Mundo rocoso con una atmósfera de nitrógeno y oxígeno e hidrosfera significativa. Los océanos cubren gran parte de la superficie y la humedad extrema provoca niebla casi constante que se desplaza sobre los exuberantes bosques y praderas."
 pc_pd_fog_adj: "neblinoso"
 mod_pc_pd_fog_habitability: "Habitabilidad Oceánica"
 trait_pc_pd_fog_preference: "Preferencia Oceánica"
 trait_pc_pd_fog_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_kelp: "Mundo de Algas Pardas"
 pc_pd_kelp_desc: "Mundo rocoso con una atmósfera de nitrógeno y oxígeno e hidrosfera significativa. Ricos océanos llenos de bosques de algas pardas cubren gran parte de la superficie."
 pc_pd_kelp_adj: "algoso"
 mod_pc_pd_kelp_habitability: "Habitabilidad Oceánica"
 trait_pc_pd_kelp_preference: "Preferencia Oceánica"
 trait_pc_pd_kelp_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_algae: "Mundo de Algas Rosas"
 pc_pd_algae_desc: "Un mundo rocoso con una atmósfera de nitrógeno y oxígeno e hidrosfera significativa, los ricos mares poco profundos y lagos de este planeta sustentan brillantes floraciones de algas rosas, creando un espectáculo visual visible desde el espacio."
 pc_pd_algae_adj: "rosáceo"
 mod_pc_pd_algae_habitability: "Habitabilidad Oceánica"
 trait_pc_pd_algae_preference: "Preferencia Oceánica"
 trait_pc_pd_algae_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_columnar: "Mundo Columnar"
 pc_pd_columnar_desc: "Un mundo rocoso con una atmósfera de nitrógeno y oxígeno e hidrosfera extensa. La superficie está cubierta de océanos e intercalada con masas terrestres formadas por estructuras de basalto columnar resultantes de eones de intensa actividad volcánica."
 pc_pd_columnar_adj: "columnado"
 mod_pc_pd_columnar_habitability: "Habitabilidad Oceánica"
 trait_pc_pd_columnar_preference: "Preferencia Oceánica"
 trait_pc_pd_columnar_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_tidepool: "Mundo de Pozas de Marea"
 pc_pd_tidepool_desc: "Un mundo oceánico rocoso con una atmósfera de nitrógeno y oxígeno y mares poco profundos. Los cambios de marea diarios exponen vastos campos de pozas de marea, creando dinámicos ecosistemas litorales que sustentan una variada gama de vida marina."
 pc_pd_tidepool_adj: "somero"
 mod_pc_pd_tidepool_habitability: "Habitabilidad Oceánica"
 trait_pc_pd_tidepool_preference: "Preferencia Oceánica"
 trait_pc_pd_tidepool_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_barnacle: "Mundo de Percebes"
 pc_pd_barnacle_desc: "Un vasto mundo oceánico con una atmósfera de nitrógeno y oxígeno e islas rocosas dispersas. Percebes de toda escala incrustan las orillas y las aguas poco profundas, desde pequeñas agrupaciones en rocas costeras hasta imponentes formaciones antiguas que dominan la costa."
 pc_pd_barnacle_adj: "incrustado"
 mod_pc_pd_barnacle_habitability: "Habitabilidad Oceánica"
 trait_pc_pd_barnacle_preference: "Preferencia Oceánica"
 trait_pc_pd_barnacle_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_reef: "Mundo de Arrecifes"
 pc_pd_reef_desc: "Mundo templado rocoso con una atmósfera de nitrógeno y oxígeno e hidrosfera significativa. Los océanos poco profundos cubren más del 99% de la superficie y bajo la superficie se pueden ver extensos sistemas de arrecifes desde la órbita. Las únicas áreas sobre el agua son donde el sistema de arrecifes ha crecido lo suficiente para crear cadenas de islas coralinas dispersas."
 pc_pd_reef_adj: "arrecifado"
 mod_pc_pd_reef_habitability: "Habitabilidad Oceánica"
 trait_pc_pd_reef_preference: "Preferencia Oceánica"
 trait_pc_pd_reef_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_archipelago: "Mundo de Archipiélagos"
 pc_pd_archipelago_desc: "Mundo rocoso con una atmósfera de nitrógeno y oxígeno e hidrosfera significativa. Un océano a escala planetaria con archipiélagos de islas dispersas cubre la superficie. La rica actividad volcánica hace que las islas aparezcan y desaparezcan a una tasa comparativamente alta, creando un paisaje siempre cambiante."
 pc_pd_archipelago_adj: "insular"
 mod_pc_pd_archipelago_habitability: "Habitabilidad Oceánica"
 trait_pc_pd_archipelago_preference: "Preferencia Oceánica"
 trait_pc_pd_archipelago_preference_desc: "$trait_pc_arctic_preference_desc$"

###Tropical
 pc_pd_atoll: "Mundo de Atolones"
 pc_pd_atoll_desc: "Un planeta oceánico con una atmósfera de nitrógeno y oxígeno. Lagunas poco profundas, arrecifes de coral e islas tropicales conforman la mayor parte de este planeta, con temperaturas cálidas que sustentan una biosfera muy grande."
 pc_pd_atoll_adj: "tropical"
 mod_pc_pd_atoll_habitability: "Habitabilidad Tropical"
 trait_pc_pd_atoll_preference: "Preferencia Tropical"
 trait_pc_pd_atoll_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_tepui: "Mundo Tepui"
 pc_pd_tepui_desc: "Mundo rocoso montañoso y exuberante con una atmósfera de nitrógeno y oxígeno. Con una hidrosfera significativa y cubierto de densa vegetación, hay una diferencia notable entre las mesetas lluviosas y más frescas de los tepuyes y la jungla húmeda y más cálida del suelo."
 pc_pd_tepui_adj: "montañoso"
 mod_pc_pd_tepui_habitability: "Habitabilidad Tropical"
 trait_pc_pd_tepui_preference: "Preferencia Tropical"
 trait_pc_pd_tepui_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_mangrove: "Mundo de Manglares"
 pc_pd_mangrove_desc: "Un mundo húmedo con una atmósfera de nitrógeno y oxígeno. La mayor parte del planeta está cubierta de mares poco profundos con muy poca tierra sobre el nivel del mar. Las selvas se extienden cientos de kilómetros más allá de las orillas de las pocas islas existentes. La hidrosfera es fuerte y estable, y sustenta una gran abundancia de vida vegetal y animal."
 pc_pd_mangrove_adj: "boscoso"
 mod_pc_pd_mangrove_habitability: "Habitabilidad Tropical"
 trait_pc_pd_mangrove_preference: "Preferencia Tropical"
 trait_pc_pd_mangrove_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_cenote: "Mundo de Cenotes"
 pc_pd_cenote_desc: "Mundo húmedo y rocoso con una gruesa atmósfera de nitrógeno y oxígeno. Grandes sumideros y sistemas de ríos subterráneos serpentean bajo la superficie de este mundo. La mayoría de las masas terrestres están cubiertas de densa vegetación."
 pc_pd_cenote_adj: "perforado"
 mod_pc_pd_cenote_habitability: "Habitabilidad Tropical"
 trait_pc_pd_cenote_preference: "Preferencia Tropical"
 trait_pc_pd_cenote_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_fungal: "Mundo Fúngico"
 pc_pd_fungal_desc: "Un mundo húmedo y rocoso con una gruesa atmósfera de nitrógeno y oxígeno, este planeta tiene temporadas de precipitaciones significativas. Las masas terrestres están cubiertas de vegetación de base fúngica y rebosantes de vida."
 pc_pd_fungal_adj: "fúngico"
 mod_pc_pd_fungal_habitability: "Habitabilidad Tropical"
 trait_pc_pd_fungal_preference: "Preferencia Tropical"
 trait_pc_pd_fungal_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_aerial: "Mundo Aéreo"
 pc_pd_aerial_desc: "Un mundo húmedo y rocoso con una gruesa atmósfera de nitrógeno y oxígeno, este planeta tiene precipitaciones significativas. Muy por encima de las masas terrestres envueltas en densa vegetación, colosales vainas de semillas, transportadas por la flora única del planeta, planean por los cielos como nubes."
 pc_pd_aerial_adj: "flotante"
 mod_pc_pd_aerial_habitability: "Habitabilidad Tropical"
 trait_pc_pd_aerial_preference: "Preferencia Tropical"
 trait_pc_pd_aerial_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_lilypad: "Mundo de Nenúfares"
 pc_pd_lilypad_desc: "Este exuberante mundo rocoso envuelto en una gruesa atmósfera de nitrógeno y oxígeno alberga océanos cálidos y poco profundos con vibrante biodiversidad. En la superficie, las robustas hojas de la flora acuática forman un ecosistema secundario basado en la superficie."
 pc_pd_lilypad_adj: "flotante"
 mod_pc_pd_lilypad_habitability: "Habitabilidad Tropical"
 trait_pc_pd_lilypad_preference: "Preferencia Tropical"
 trait_pc_pd_lilypad_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_obsidian: "Mundo de Obsidiana"
 pc_pd_obsidian_desc: "Este mundo húmedo tiene una atmósfera de nitrógeno y oxígeno y mares tropicales poco profundos bordeados por extensos depósitos de obsidiana, con flora resiliente establecida en el terreno volcánico."
 pc_pd_obsidian_adj: "obsidiana"
 mod_pc_pd_obsidian_habitability: "Habitabilidad Tropical"
 trait_pc_pd_obsidian_preference: "Preferencia Tropical"
 trait_pc_pd_obsidian_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_thunder: "Mundo de Tormentas Eléctricas"
 pc_pd_thunder_desc: "Este mundo tropical está azotado por tormentas eléctricas casi constantes. La densa cobertura nubosa y las lluvias incesantes alimentan vastos sistemas de tormentas que ruedan sin fin por sus océanos y selvas, creando un ciclo hidrológico muy activo."
 pc_pd_thunder_adj: "tormentoso"
 mod_pc_pd_thunder_habitability: "Habitabilidad Tropical"
 trait_pc_pd_thunder_preference: "Preferencia Tropical"
 trait_pc_pd_thunder_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_geothermal: "Mundo Geotérmico"
 pc_pd_geothermal_desc: "Planeta frío y helado con grietas tropicales que rompen las extensiones de hielo, calentadas por respiraderos geotérmicos naturales con una atmósfera de nitrógeno y oxígeno. La hidrosfera se encuentra en agua de deshielo y vapor que sube de los respiraderos."
 pc_pd_geothermal_adj: "geotérmico"
 mod_pc_pd_geothermal_habitability: "Habitabilidad Tropical"
 trait_pc_pd_geothermal_preference: "Preferencia Tropical"
 trait_pc_pd_geothermal_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_biolumen: "Mundo Bioluminiscente"
 pc_pd_biolumen_desc: "Un mundo tropical rocoso con una atmósfera de nitrógeno y oxígeno. Partículas exóticas pero no tóxicas en la atmósfera causan una cobertura nubosa casi constante en este planeta. A pesar de ello, debido al efecto invernadero y la actividad geotérmica, la vida prospera en la superficie. Casi toda la flora y fauna exhiben rasgos bioluminiscentes."
 pc_pd_biolumen_adj: "luminoso"
 mod_pc_pd_biolumen_habitability: "Habitabilidad Tropical"
 trait_pc_pd_biolumen_preference: "Preferencia Tropical"
 trait_pc_pd_biolumen_preference_desc: "$trait_pc_arctic_preference_desc$"

###Desierto
 pc_pd_dune: "Mundo de Dunas"
 pc_pd_dune_desc: "Planeta rocoso caliente y seco con una atmósfera de nitrógeno y oxígeno. Mares de dunas cubren una parte considerable de la superficie. La hidrosfera se encuentra principalmente en acuíferos subterráneos que afloran en oasis y manantiales de montaña."
 pc_pd_dune_adj: "arenoso"
 mod_pc_pd_dune_habitability: "Habitabilidad Desértica"
 trait_pc_pd_dune_preference: "Preferencia Desértica"
 trait_pc_pd_dune_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_oasis: "Mundo de Oasis"
 pc_pd_oasis_desc: "Mundo rocoso con una atmósfera de nitrógeno y oxígeno. La hidrosfera solo sustenta un gran cuerpo de agua con una banda de vegetación a su alrededor, y la lluvia a menudo no alcanza el desierto interior que cubre la mayor parte del planeta."
 pc_pd_oasis_adj: "seco"
 mod_pc_pd_oasis_habitability: "Habitabilidad Desértica"
 trait_pc_pd_oasis_preference: "Preferencia Desértica"
 trait_pc_pd_oasis_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_outback: "Mundo del Outback"
 pc_pd_outback_desc: "Un mundo caliente y seco con una atmósfera de nitrógeno y oxígeno. La mayor parte del planeta está cubierta de matorrales áridos o semiáridos y desiertos, mientras que las zonas cercanas al agua tienen más vegetación. La hidrosfera se encuentra principalmente en unos pocos mares interiores y manantiales subterráneos naturales."
 pc_pd_outback_adj: "reseco"
 mod_pc_pd_outback_habitability: "Habitabilidad Desértica"
 trait_pc_pd_outback_preference: "Preferencia Desértica"
 trait_pc_pd_outback_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_coastal: "Mundo Costero"
 pc_pd_coastal_desc: "Un mundo seco subtropical con una atmósfera de nitrógeno y oxígeno. Los profundos océanos fríos tienen corrientes que provocan una alta estabilidad atmosférica, reduciendo las precipitaciones en tierra pero permitiendo la niebla, que proporciona suficiente humedad para sustentar una variedad de líquenes, suculentas y arbustos."
 pc_pd_coastal_adj: "costero"
 mod_pc_pd_coastal_habitability: "Habitabilidad Desértica"
 trait_pc_pd_coastal_preference: "Preferencia Desértica"
 trait_pc_pd_coastal_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_fungi: "Mundo de Hongos Desérticos"
 pc_pd_fungi_desc: "Mundo rocoso con una atmósfera de nitrógeno y oxígeno. El terreno cubierto de ceniza volcánica sustenta grandes colonias de hongos desérticos, y gran parte de la superficie es inhóspita para la mayoría de las formas de vida vegetal y animal."
 pc_pd_fungi_adj: "fúngico"
 mod_pc_pd_fungi_habitability: "Habitabilidad Desértica"
 trait_pc_pd_fungi_preference: "Preferencia Desértica"
 trait_pc_pd_fungi_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_ironsand: "Mundo de Arena de Hierro"
 pc_pd_ironsand_desc: "Este planeta desértico tiene depósitos de hierro inusualmente elevados, lo que resulta en arenas de un vivo color rojo por el hierro oxidado y rocas oscuras ricas en minerales sin oxidar."
 pc_pd_ironsand_adj: "arenoso"
 mod_pc_pd_ironsand_habitability: "Habitabilidad Desértica"
 trait_pc_pd_ironsand_preference: "Preferencia Desértica"
 trait_pc_pd_ironsand_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_cactus: "Mundo de Cactus"
 pc_pd_cactus_desc: "Este planeta desértico está dominado por cactus imponentes que almacenan vastas reservas de agua dentro de sus gruesos y espinosos troncos."
 pc_pd_cactus_adj: "espinoso"
 mod_pc_pd_cactus_habitability: "Habitabilidad Desértica"
 trait_pc_pd_cactus_preference: "Preferencia Desértica"
 trait_pc_pd_cactus_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_dust: "Mundo de Tormentas de Polvo"
 pc_pd_dust_desc: "Los inestables ciclos de humedad y las poderosas corrientes de viento de este mundo desértico impulsan vastos frentes de polvo a través de la superficie. Estas tormentas barren el planeta con lentas pero poderosas tempestades, enterrando el terreno y remodelando el paisaje."
 pc_pd_dust_adj: "polvoriento"
 mod_pc_pd_dust_habitability: "Habitabilidad Desértica"
 trait_pc_pd_dust_preference: "Preferencia Desértica"
 trait_pc_pd_dust_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_sodalite: "Mundo de Sodalita"
 pc_pd_sodalite_desc: "Un mundo desértico rocoso con una atmósfera de nitrógeno y oxígeno. Vastos depósitos minerales de sodalita surcan las llanuras estériles y las paredes de los cañones, interrumpidos por afloramientos rocosos dispersos a través del árido terreno."
 pc_pd_sodalite_adj: "mineral"
 mod_pc_pd_sodalite_habitability: "Habitabilidad Desértica"
 trait_pc_pd_sodalite_preference: "Preferencia Desértica"
 trait_pc_pd_sodalite_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_salt: "Mundo de Sal"
 pc_pd_salt_desc: "Mundo rocoso con una atmósfera de nitrógeno y oxígeno. El terreno cubierto de minerales consiste principalmente en salinas y cadenas montañosas y grandes formaciones cristalinas. Gran parte de la superficie es inhóspita para la mayoría de las formas de vida vegetal y animal."
 pc_pd_salt_adj: "salado"
 mod_pc_pd_salt_habitability: "Habitabilidad Desértica"
 trait_pc_pd_salt_preference: "Preferencia Desértica"
 trait_pc_pd_salt_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_aquifer: "Mundo de Acuíferos"
 pc_pd_aquifer_desc: "Mundo seco y rocoso con una atmósfera de nitrógeno y oxígeno. Este planeta tiene una rica hidrosfera bajo la superficie, e incontables lagunas salpican la superficie. Aunque la arena seca y caliente no sustenta mucha vida, las lagunas y los ríos subterráneos son ricos en biodiversidad."
 pc_pd_aquifer_adj: "lagunado"
 mod_pc_pd_aquifer_habitability: "Habitabilidad Desértica"
 trait_pc_pd_aquifer_preference: "Preferencia Desértica"
 trait_pc_pd_aquifer_preference_desc: "$trait_pc_arctic_preference_desc$"

###Árido
 pc_pd_mesa: "Mundo de Mesas"
 pc_pd_mesa_desc: "Mundo rocoso caliente y seco con una atmósfera de nitrógeno y oxígeno. Grandes mesetas y mesas son comunes alrededor del ecuador, con regiones polares más frescas y boscosas. La hidrosfera se encuentra principalmente en grandes ríos que cortan cañones y vegetación que cubre los lechos fluviales."
 pc_pd_mesa_adj: "árido"
 mod_pc_pd_mesa_habitability: "Habitabilidad Árida"
 trait_pc_pd_mesa_preference: "Preferencia Árida"
 trait_pc_pd_mesa_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_fog_desert: "Mundo Desértico Neblinoso"
 pc_pd_fog_desert_desc: "Mundo rocoso frío y seco con una atmósfera de nitrógeno y oxígeno. Los picos de altitud extrema crean sombras pluviométricas para la mayor parte de la superficie. Las salinas y los valles áridos comprenden la mayor parte de las mesetas, y la hidrosfera se encuentra en unos pocos lagos y manantiales de montaña."
 pc_pd_fog_desert_adj: "impasable"
 mod_pc_pd_fog_desert_habitability: "Habitabilidad Árida"
 trait_pc_pd_fog_desert_preference: "Preferencia Árida"
 trait_pc_pd_fog_desert_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_mediterranean: "Mundo Mediterráneo"
 pc_pd_mediterranean_desc: "Mundo rocoso seco con una atmósfera de nitrógeno y oxígeno. La hidrosfera sustenta varios grandes mares interiores, rodeados de vegetación escasa y arbustos. Lejos de las masas de agua, el terreno es árido."
 pc_pd_mediterranean_adj: "caluroso"
 mod_pc_pd_mediterranean_habitability: "Habitabilidad Árida"
 trait_pc_pd_mediterranean_preference: "Preferencia Árida"
 trait_pc_pd_mediterranean_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_badlands: "Mundo de Badlands"
 pc_pd_badlands_desc: "Mundo rocoso seco con una atmósfera de nitrógeno y oxígeno. El árido terreno consiste principalmente en rocas sedimentarias y suelos ricos en arcilla erosionados por el viento y el agua. La vegetación es principalmente de arbustos y pastos resistentes."
 pc_pd_badlands_adj: "escarpado"
 mod_pc_pd_badlands_habitability: "Habitabilidad Árida"
 trait_pc_pd_badlands_preference: "Preferencia Árida"
 trait_pc_pd_badlands_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_succulent: "Mundo de Suculentas"
 pc_pd_succulent_desc: "Mundo rocoso seco con una atmósfera de nitrógeno y oxígeno, con un árido terreno cubierto de polvo. Las altas temperaturas y las escasas precipitaciones esporádicas han hecho que la vegetación se adapte a técnicas de retención de agua."
 pc_pd_succulent_adj: "suculento"
 mod_pc_pd_succulent_habitability: "Habitabilidad Árida"
 trait_pc_pd_succulent_preference: "Preferencia Árida"
 trait_pc_pd_succulent_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_coral: "Mundo de Coral"
 pc_pd_coral_desc: "Mundo rocoso seco con una atmósfera de nitrógeno y oxígeno. Otrora cubierto de océanos, ha perdido casi por completo su hidrosfera debido a factores ecológicos. Los corales de este mundo se han adaptado al entorno seco."
 pc_pd_coral_adj: "coralino"
 mod_pc_pd_coral_habitability: "Habitabilidad Árida"
 trait_pc_pd_coral_preference: "Preferencia Árida"
 trait_pc_pd_coral_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_primal: "Mundo Primigenio"
 pc_pd_primal_desc: "Mundo rocoso con una atmósfera de nitrógeno y oxígeno. La actividad volcánica de este joven mundo ha disminuido, dando lugar a una flora y fauna cada vez más complejas, que han ayudado a crear una atmósfera respirable y una hidrosfera estabilizadora."
 pc_pd_primal_adj: "primigenio"
 mod_pc_pd_primal_habitability: "Habitabilidad Árida"
 trait_pc_pd_primal_preference: "Preferencia Árida"
 trait_pc_pd_primal_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_striped: "Mundo Rayado"
 pc_pd_striped_desc: "Este mundo tiene una llamativa composición mineralógica en un mundo rocoso seco con una atmósfera de nitrógeno y oxígeno, con un árido terreno cubierto de polvo."
 pc_pd_striped_adj: "rayado"
 mod_pc_pd_striped_habitability: "Habitabilidad Árida"
 trait_pc_pd_striped_preference: "Preferencia Árida"
 trait_pc_pd_striped_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_amethyst: "Mundo de Amatista"
 pc_pd_amethyst_desc: "Este mundo árido tuvo un pasado geológico muy activo, lo que resultó en extensos depósitos de cuarzo amatista a lo largo de la corteza del planeta."
 pc_pd_amethyst_adj: "cuarcítico"
 mod_pc_pd_amethyst_habitability: "Habitabilidad Árida"
 trait_pc_pd_amethyst_preference: "Preferencia Árida"
 trait_pc_pd_amethyst_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_opal: "Mundo de Ópalo"
 pc_pd_opal_desc: "Aguas ricas en sílice se filtraron a través de la corteza de este mundo árido, llenando fracturas y cavidades. Al secarse el planeta, los depósitos se endurecieron formando colosales formaciones de ópalo que ahora dominan el paisaje."
 pc_pd_opal_adj: "opalino"
 mod_pc_pd_opal_habitability: "Habitabilidad Árida"
 trait_pc_pd_opal_preference: "Preferencia Árida"
 trait_pc_pd_opal_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_superbloom: "Mundo de Superflor"
 pc_pd_superbloom_desc: "Mundo rocoso seco con una atmósfera de nitrógeno y oxígeno. Los suelos ricos en nutrientes y las lluvias estacionales raras pero intensas desencadenan floraciones en cascada a lo largo de la superficie, alfombrando llanuras y suelos de cañones en densas oleadas de vegetación florida."
 pc_pd_superbloom_adj: "job_foundry_plural"
 mod_pc_pd_superbloom_habitability: "Habitabilidad Árida"
 trait_pc_pd_superbloom_preference: "Preferencia Árida"
 trait_pc_pd_superbloom_preference_desc: "$trait_pc_arctic_preference_desc$"

###Sabana
 pc_pd_steppe: "Mundo de Estepa"
 pc_pd_steppe_desc: "Mundo rocoso seco con una atmósfera de nitrógeno y oxígeno. Esta pradera semiárida tiene colinas onduladas y llanuras que cubren gran parte de la superficie. Aunque casi no crecen árboles, las precipitaciones pueden sustentar arbustos y hierbas."
 pc_pd_steppe_adj: "de pradera"
 mod_pc_pd_steppe_habitability: "Habitabilidad de Sabana"
 trait_pc_pd_steppe_preference: "Preferencia de Sabana"
 trait_pc_pd_steppe_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_prairie: "Mundo de Pradera"
 pc_pd_prairie_desc: "Mundo rocoso con una atmósfera de nitrógeno y oxígeno. Hidrosfera estacional con una sola gran masa continental, grandes mares interiores, cortos y secos veranos e inviernos fríos y duros."
 pc_pd_prairie_adj: "de pradera"
 mod_pc_pd_prairie_habitability: "Habitabilidad de Sabana"
 trait_pc_pd_prairie_preference: "Preferencia de Sabana"
 trait_pc_pd_prairie_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_veld: "Mundo de Veld"
 pc_pd_veld_desc: "Mundo rocoso seco con una atmósfera de nitrógeno y oxígeno; este paisaje subtropical está cubierto de matorrales y sabanas abiertas. Este mundo tiene inviernos suaves y largos veranos calurosos."
 pc_pd_veld_adj: "de veld"
 mod_pc_pd_veld_habitability: "Habitabilidad de Sabana"
 trait_pc_pd_veld_preference: "Preferencia de Sabana"
 trait_pc_pd_veld_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_semi_arid: "Mundo Semiárido"
 pc_pd_semi_arid_desc: "Mundo rocoso cubierto de páramos y valles rocosos con una atmósfera de nitrógeno y oxígeno, y la hidrosfera permite una temporada de lluvias breve pero significativa. Aun así, aparte de algunos tipos de hierba omnipresentes, la vegetación se concentra principalmente alrededor de valles protegidos y cerca de grandes masas de agua."
 pc_pd_semi_arid_adj: "árido"
 mod_pc_pd_semi_arid_habitability: "Habitabilidad de Sabana"
 trait_pc_pd_semi_arid_preference: "Preferencia de Sabana"
 trait_pc_pd_semi_arid_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_aspen: "Mundo de Álamos"
 pc_pd_aspen_desc: "Mundo rocoso seco con una atmósfera de nitrógeno y oxígeno, compuesto de arboledas de árboles intercaladas con praderas. Una pequeña pero estable hidrosfera de arroyos y valles fluviales sustenta los bosques y los densos matorrales."
 pc_pd_aspen_adj: "arbolado"
 mod_pc_pd_aspen_habitability: "Habitabilidad de Sabana"
 trait_pc_pd_aspen_preference: "Preferencia de Sabana"
 trait_pc_pd_aspen_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_sandstone: "Mundo de Arenisca"
 pc_pd_sandstone_desc: "Un mundo seco y rocoso con una atmósfera de nitrógeno y oxígeno que presenta vastas praderas y formaciones de arenisca esculpidas por los incesantes vientos. Su hidrosfera sustenta las resistentes hierbas que se han adaptado para prosperar en este entorno."
 pc_pd_sandstone_adj: "ventoso"
 mod_pc_pd_sandstone_habitability: "Habitabilidad de Sabana"
 trait_pc_pd_sandstone_preference: "Preferencia de Sabana"
 trait_pc_pd_sandstone_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_turquoise: "Mundo de Turquesa"
 pc_pd_turquoise_desc: "Este planeta de praderas subtropicales está salpicado de vastos depósitos de piedras preciosas de turquesa, que se encuentran casi en todas partes de su superficie."
 pc_pd_turquoise_adj: "turquesa"
 mod_pc_pd_turquoise_habitability: "Habitabilidad de Sabana"
 trait_pc_pd_turquoise_preference: "Preferencia de Sabana"
 trait_pc_pd_turquoise_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_calcite: "Mundo de Calcita"
 pc_pd_calcite_desc: "Este planeta de sabana está salpicado de imponentes formaciones rocosas de calcita puntiagudas. La calcita enriquece el suelo, creando condiciones ideales para las hierbas y otras plantas."
 pc_pd_calcite_adj: "fragmentado"
 mod_pc_pd_calcite_habitability: "Habitabilidad de Sabana"
 trait_pc_pd_calcite_preference: "Preferencia de Sabana"
 trait_pc_pd_calcite_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_monsoon: "Mundo de Monzones"
 pc_pd_monsoon_desc: "Un mundo rocoso con una atmósfera de nitrógeno y oxígeno. Los patrones de circulación estacional impulsan intensos sistemas de monzones a través de la superficie, inundando vastas llanuras antes de retroceder hacia períodos de calor seco."
 pc_pd_monsoon_adj: "fragmentado"
 mod_pc_pd_monsoon_habitability: "Habitabilidad de Sabana"
 trait_pc_pd_monsoon_preference: "Preferencia de Sabana"
 trait_pc_pd_monsoon_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_silvergrass: "Mundo de Hierba Plateada"
 pc_pd_silvergrass_desc: "Un mundo de sabana con una atmósfera de nitrógeno y oxígeno y radiación ultravioleta elevada. Sus interminables llanuras están cubiertas de hierba cuyas hojas están revestidas con una cera reflectante, una adaptación a las severas estaciones secas del planeta."
 pc_pd_silvergrass_adj: "plateado"
 mod_pc_pd_silvergrass_habitability: "Habitabilidad de Sabana"
 trait_pc_pd_silvergrass_preference: "Preferencia de Sabana"
 trait_pc_pd_silvergrass_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_supercontinent: "Mundo Supercontinente"
 pc_pd_supercontinent_desc: "Mundo rocoso de praderas y desiertos con una atmósfera de nitrógeno y oxígeno; la tectónica de placas de este planeta se encuentra actualmente en el estado de un supercontinente. Las áreas costeras inmediatas son exuberantes, pero gran parte del interior son praderas que se convierten lentamente en grandes desiertos áridos."
 pc_pd_supercontinent_adj: "supercontinental"
 mod_pc_pd_supercontinent_habitability: "Habitabilidad de Sabana"
 trait_pc_pd_supercontinent_preference: "Preferencia de Sabana"
 trait_pc_pd_supercontinent_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_sinkhole: "Mundo de Sumideros"
 pc_pd_sinkhole_desc: "Mundo rocoso dominado por llanuras secas y áridas cubiertas por una atmósfera de nitrógeno y oxígeno. Aunque la superficie tiene una hidrosfera pequeña y estable, un océano subterráneo a escala planetaria se esconde debajo, creando gigantescos sumideros que salpican la superficie de este mundo."
 pc_pd_sinkhole_adj: "perforado"
 mod_pc_pd_sinkhole_habitability: "Habitabilidad de Sabana"
 trait_pc_pd_sinkhole_preference: "Preferencia de Sabana"
 trait_pc_pd_sinkhole_preference_desc: "$trait_pc_arctic_preference_desc$"

###Ártico
 pc_pd_cold_desert: "Mundo de Desierto Frío"
 pc_pd_cold_desert_desc: "Mundo rocoso gélido con una atmósfera de nitrógeno y oxígeno. Las precipitaciones son bajas, y los grandes cuerpos de agua superficiales son raros. Incluso durante el día las temperaturas medias suelen estar muy por debajo del punto de congelación."
 pc_pd_cold_desert_adj: "frío"
 mod_pc_pd_cold_desert_habitability: "Habitabilidad Ártica"
 trait_pc_pd_cold_desert_preference: "Preferencia Ártica"
 trait_pc_pd_cold_desert_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_glacial: "Mundo Glacial"
 pc_pd_glacial_desc: "Mundo gélido y helado con una atmósfera de nitrógeno y oxígeno; la hidrosfera está bloqueada en hielo glacial la mayor parte del año, pero los meses de verano tienen deshielo significativo y la nieve es bastante común. La actividad geotérmica crea agujeros permanentes en el hielo y ayuda a sustentar abundante vida marina bajo la gruesa capa de hielo superficial."
 pc_pd_glacial_adj: "glacial"
 mod_pc_pd_glacial_habitability: "Habitabilidad Ártica"
 trait_pc_pd_glacial_preference: "Preferencia Ártica"
 trait_pc_pd_glacial_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_antarctic: "Mundo Antártico"
 pc_pd_antarctic_desc: "Mundo rocoso gélido con una atmósfera de nitrógeno y oxígeno y bajas temperaturas, y la hidrosfera está principalmente congelada. Aunque los vientos pueden alcanzar más de 25 km por hora en invierno, la vida se aferra a bolsas aisladas bajo el hielo marino, en cuevas y en valles protegidos."
 pc_pd_antarctic_adj: "congelado"
 mod_pc_pd_antarctic_habitability: "Habitabilidad Ártica"
 trait_pc_pd_antarctic_preference: "Preferencia Ártica"
 trait_pc_pd_antarctic_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_aeolian: "Mundo Eólico"
 pc_pd_aeolian_desc: "Mundo rocoso gélido con una atmósfera de nitrógeno y oxígeno; los vientos de este planeta alcanzan rutinariamente velocidades de más de 300 km por hora. Estos vientos han creado sumideros ahuecados, cañones en ranura y depresiones que han permitido que la vida prospere en su interior, a salvo del clima."
 pc_pd_aeolian_adj: "ventoso"
 mod_pc_pd_aeolian_habitability: "Habitabilidad Ártica"
 trait_pc_pd_aeolian_preference: "Preferencia Ártica"
 trait_pc_pd_aeolian_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_ice_spike: "Mundo de Picos de Hielo"
 pc_pd_ice_spike_desc: "Mundo rocoso gélido con una atmósfera de nitrógeno y oxígeno; este planeta tiene una hidrosfera mayormente congelada. La intensa actividad tectónica bajo la superficie golpea contra la profunda capa de hielo, creando los imponentes picos de hielo que dominan el paisaje."
 pc_pd_ice_spike_adj: "espigado"
 mod_pc_pd_ice_spike_habitability: "Habitabilidad Ártica"
 trait_pc_pd_ice_spike_preference: "Preferencia Ártica"
 trait_pc_pd_ice_spike_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_crevasse: "Mundo de Grietas"
 pc_pd_crevasse_desc: "Mundo rocoso gélido con una atmósfera de nitrógeno y oxígeno; este planeta tiene una hidrosfera mayormente congelada. Aunque la superficie es inhóspita, la energía geotérmica del núcleo del planeta mantiene habitable el fondo de las numerosas grietas de este planeta."
 pc_pd_crevasse_adj: "agrietado"
 mod_pc_pd_crevasse_habitability: "Habitabilidad Ártica"
 trait_pc_pd_crevasse_preference: "Preferencia Ártica"
 trait_pc_pd_crevasse_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_supraglacial_lakes: "Mundo de Lagos Supraglaciares"
 pc_pd_supraglacial_lakes_desc: "Mundo gélido y helado con una atmósfera de nitrógeno y oxígeno; este planeta tiene una superficie mayormente congelada interrumpida por vastos lagos de agua de deshielo que se acumulan sobre gruesas capas de hielo glacial. Sostenidos por la energía solar estacional, estos lagos supraglaciares están ampliamente distribuidos por el paisaje."
 pc_pd_supraglacial_lakes_adj: "glacial"
 mod_pc_pd_supraglacial_lakes_habitability: "Habitabilidad Ártica"
 trait_pc_pd_supraglacial_lakes_preference: "Preferencia Ártica"
 trait_pc_pd_supraglacial_lakes_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_ice_dunes: "Mundo de Dunas de Hielo"
 pc_pd_ice_dunes_desc: "Mundo rocoso gélido con una atmósfera de nitrógeno y oxígeno; este planeta tiene una hidrosfera mayormente congelada. Con temperaturas bajo el punto de congelación la mayor parte del año, partículas de hielo similares a la arena crean las dunas de este planeta."
 pc_pd_ice_dunes_adj: "helado"
 mod_pc_pd_ice_dunes_habitability: "Habitabilidad Ártica"
 trait_pc_pd_ice_dunes_preference: "Preferencia Ártica"
 trait_pc_pd_ice_dunes_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_ferrospring: "Mundo de Manantiales de Hierro"
 pc_pd_ferrospring_desc: "Mundo rocoso gélido con una atmósfera de nitrógeno y oxígeno; su corteza helada está fracturada por la actividad geotérmica. Los acuíferos subterráneos ricos en depósitos de hierro alimentan manantiales y lagos en la superficie, tiñendo las aguas de un intenso rojo sobre el terreno congelado."
 pc_pd_ferrospring_adj: "helado"
 mod_pc_pd_ferrospring_habitability: "Habitabilidad Ártica"
 trait_pc_pd_ferrospring_preference: "Preferencia Ártica"
 trait_pc_pd_ferrospring_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_storm: "Mundo de Tormentas"
 pc_pd_storm_desc: "Mundo rocoso gélido con una atmósfera de nitrógeno y oxígeno; este planeta tiene una fuerte hidrosfera. Las masas terrestres del planeta se encuentran en ambos polos, separadas por un océano masivo que genera poderosas tormentas durante todo el año. Debido a las condiciones extremas, la mayor parte de la vida del planeta se encuentra bajo la superficie del océano."
 pc_pd_storm_adj: "tormentoso"
 mod_pc_pd_storm_habitability: "Habitabilidad Ártica"
 trait_pc_pd_storm_preference: "Preferencia Ártica"
 trait_pc_pd_storm_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_iceberg: "Mundo de Icebergs"
 pc_pd_iceberg_desc: "Mundo rocoso gélido con una atmósfera de nitrógeno y oxígeno; este planeta tiene una robusta hidrosfera salina. A pesar de las temperaturas bajo el punto de congelación, el alto océano salado cubre toda la superficie y permanece líquido. El agua que puede separarse de la sal termina en icebergs semipermanentes, y las colonias de algas pardas de agua salada prosperan."
 pc_pd_iceberg_adj: "helado"
 mod_pc_pd_iceberg_habitability: "Habitabilidad Ártica"
 trait_pc_pd_iceberg_preference: "Preferencia Ártica"
 trait_pc_pd_iceberg_preference_desc: "$trait_pc_arctic_preference_desc$"

###Alpino
 pc_pd_boreal: "Mundo Boreal"
 pc_pd_boreal_desc: "Un mundo rocoso con una atmósfera de nitrógeno y oxígeno; este planeta tiene un clima subártico con un amplio rango de temperatura entre el largo y frío invierno y el corto y cálido verano. Los bosques boreales cubren las latitudes más cálidas del planeta, con tundra y hielo cerca de los polos."
 pc_pd_boreal_adj: "montañoso"
 mod_pc_pd_boreal_habitability: "Habitabilidad Alpina"
 trait_pc_pd_boreal_preference: "Preferencia Alpina"
 trait_pc_pd_boreal_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_snow: "Mundo de Nieve"
 pc_pd_snow_desc: "Mundo rocoso gélido con una atmósfera de nitrógeno y oxígeno; este planeta está experimentando actualmente una era glacial significativa. Mientras los glaciares cubren la mayoría de las latitudes polares y medias, densos bosques templados cubren la franja ecuatorial."
 pc_pd_snow_adj: "montañoso"
 mod_pc_pd_snow_habitability: "Habitabilidad Alpina"
 trait_pc_pd_snow_preference: "Preferencia Alpina"
 trait_pc_pd_snow_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_highland: "Mundo de Tierras Altas"
 pc_pd_highland_desc: "Un mundo frío y húmedo con una atmósfera de nitrógeno y oxígeno; el tiempo es impredecible y la niebla y la cobertura nubosa son típicas. La hidrosfera es generalmente estable entre cordilleras heladas y grandes mares interiores, que sustentan pastos resistentes y líquenes."
 pc_pd_highland_adj: "montañoso"
 mod_pc_pd_highland_habitability: "Habitabilidad Alpina"
 trait_pc_pd_highland_preference: "Preferencia Alpina"
 trait_pc_pd_highland_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_dune_forest: "Mundo de Dunas Boscosas"
 pc_pd_dune_forest_desc: "Mundo montañoso frío con una atmósfera de nitrógeno y oxígeno; este planeta recibe altos niveles de niebla pero bajas precipitaciones. Gran parte de las tierras bajas son dunas secas, pero la hidrosfera sustenta montañas nevadas y boscosas."
 pc_pd_dune_forest_adj: "montañoso"
 mod_pc_pd_dune_forest_habitability: "Habitabilidad Alpina"
 trait_pc_pd_dune_forest_preference: "Preferencia Alpina"
 trait_pc_pd_dune_forest_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_fjord: "Mundo de Fiordos"
 pc_pd_fjord_desc: "Mundo montañoso con una atmósfera de nitrógeno y oxígeno; este planeta tiene una hidrosfera significativa con océanos que cortan profundas entradas estrechas en las masas terrestres. La variación estacional permite productivos bosques lluviosos subárticos a lo largo de la costa y climas alpinos de hierba en elevaciones más altas."
 pc_pd_fjord_adj: "montañoso"
 mod_pc_pd_fjord_habitability: "Habitabilidad Alpina"
 trait_pc_pd_fjord_preference: "Preferencia Alpina"
 trait_pc_pd_fjord_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_blossom: "Mundo en Flor"
 pc_pd_blossom_desc: "Este mundo montañoso presenta una atmósfera de nitrógeno y oxígeno e hidrosfera limitada, sometido a dinámicos cambios estacionales. Las ricas praderas, adornadas con vibrante flora florida, ofrecen un espectáculo visible desde la órbita."
 pc_pd_blossom_adj: "florido"
 mod_pc_pd_blossom_habitability: "Habitabilidad Alpina"
 trait_pc_pd_blossom_preference: "Preferencia Alpina"
 trait_pc_pd_blossom_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_taiga: "Mundo de Taiga"
 pc_pd_taiga_desc: "Con su atmósfera de nitrógeno y oxígeno, este planeta de bosques montañosos alberga una hidrosfera activa pero gélida, con largos y fríos inviernos y cortos y frescos veranos."
 pc_pd_taiga_adj: "montañoso"
 mod_pc_pd_taiga_habitability: "Habitabilidad Alpina"
 trait_pc_pd_taiga_preference: "Preferencia Alpina"
 trait_pc_pd_taiga_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_craton: "Mundo de Craton"
 pc_pd_craton_desc: "Con su atmósfera de nitrógeno y oxígeno, este mundo geológicamente estable presenta amplias regiones de roca base antigua, cuencas de craton anidadas dentro de una litosfera que se desplaza perezosamente."
 mod_pc_pd_craton_habitability: "Habitabilidad Alpina"
 trait_pc_pd_craton_preference: "Preferencia Alpina"
 trait_pc_pd_craton_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_ravine: "Mundo de Barrancos"
 pc_pd_ravine_desc: "Este mundo alpino está tallado por vastas redes de barrancos que se adentran profundamente en su corteza. El agua de deshielo de los glaciares de las tierras altas alimenta innumerables arroyos que serpentean por valles empinados y acantilados verticales, dando forma a un paisaje definido por la erosión constante."
 mod_pc_pd_ravine_habitability: "Habitabilidad Alpina"
 trait_pc_pd_ravine_preference: "Preferencia Alpina"
 trait_pc_pd_ravine_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_glaciovolcanic: "Mundo GlacioVolcánico"
 pc_pd_glaciovolcanic_desc: "Mundo montañoso y congelado con una atmósfera de nitrógeno y oxígeno; este planeta tiene altos niveles de actividad volcánica. Esto resulta en grandes lagos calentados geotérmicamente que cubren la superficie, aportando minerales raros y energía a la superficie por lo demás congelada."
 pc_pd_glaciovolcanic_adj: "volcánico"
 mod_pc_pd_glaciovolcanic_habitability: "Habitabilidad Alpina"
 trait_pc_pd_glaciovolcanic_preference: "Preferencia Alpina"
 trait_pc_pd_glaciovolcanic_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_lanthanide: "Mundo de Lantánidos"
 pc_pd_lanthanide_desc: "Mundo montañoso con una atmósfera de nitrógeno y oxígeno; este planeta tiene niveles inusualmente altos de metales de tierras raras y actividad magnética. Este fenómeno natural crea espectaculares cimas de montañas en forma de anillo, pero con un clima helado y variación estacional mínima, la hidrosfera solo puede sustentar parches de vegetación resistente."
 pc_pd_lanthanide_adj: "magnético"
 mod_pc_pd_lanthanide_habitability: "Habitabilidad Alpina"
 trait_pc_pd_lanthanide_preference: "Preferencia Alpina"
 trait_pc_pd_lanthanide_preference_desc: "$trait_pc_arctic_preference_desc$"

###Tundra
 pc_pd_bog: "Mundo de Turberas"
 pc_pd_bog_desc: "Mundo frío y fangoso con una gruesa atmósfera de nitrógeno y oxígeno. El planeta tiene cortos veranos húmedos, largos inviernos fríos y precipitaciones anuales significativas. Una fuerte hidrosfera cubre las masas terrestres en densa y resistente vegetación empapada."
 pc_pd_bog_adj: "pantanoso"
 mod_pc_pd_bog_habitability: "Habitabilidad de Tundra"
 trait_pc_pd_bog_preference: "Preferencia de Tundra"
 trait_pc_pd_bog_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_mycelium: "Mundo de Micelio"
 pc_pd_mycelium_desc: "Un mundo rocoso frío con una atmósfera de nitrógeno y oxígeno; este planeta tiene cortos veranos frescos en torno a inviernos secos y congelados. Vastas zonas, bosques de hongos gigantes y densas redes de micelio subterráneo cubren la mayor parte de las latitudes medias de este planeta."
 pc_pd_mycelium_adj: "congelado"
 mod_pc_pd_mycelium_habitability: "Habitabilidad de Tundra"
 trait_pc_pd_mycelium_preference: "Preferencia de Tundra"
 trait_pc_pd_mycelium_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_mud: "Mundo de Barro"
 pc_pd_mud_desc: "Mundo congelado y fangoso con una atmósfera de nitrógeno y oxígeno; este planeta tiene estaciones limitadas con precipitaciones significativas. Una elevada abundancia de actividad geotérmica de bajo nivel en la superficie ha creado innumerables lagos de barro caliente y volcanes de barro en este páramo congelado."
 pc_pd_mud_adj: "fangoso"
 mod_pc_pd_mud_habitability: "Habitabilidad de Tundra"
 trait_pc_pd_mud_preference: "Preferencia de Tundra"
 trait_pc_pd_mud_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_basalt: "Mundo de Basalto"
 pc_pd_basalt_desc: "Mundo frío y rocoso con una atmósfera de nitrógeno y oxígeno; este planeta tiene variación estacional limitada. Debido a la actividad volcánica intermitente, vastos campos de lava de basalto cubren este mundo. Una biosfera estable existe en los musgos y líquenes que crecen sobre el basalto enfriado."
 pc_pd_basalt_adj: "congelado"
 mod_pc_pd_basalt_habitability: "Habitabilidad de Tundra"
 trait_pc_pd_basalt_preference: "Preferencia de Tundra"
 trait_pc_pd_basalt_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_tuya: "Mundo de Tuya"
 pc_pd_tuya_desc: "Mundo frío y rocoso con una atmósfera de nitrógeno y oxígeno. Aunque tiene variación estacional limitada e inviernos largos y duros, este mundo tiene una biosfera estable principalmente gracias a los nutrientes del suelo volcánico. Las extensas capas glaciales y la alta actividad volcánica han creado incontables volcanes subglaciares que salpican la superficie."
 pc_pd_tuya_adj: "congelado"
 mod_pc_pd_tuya_habitability: "Habitabilidad de Tundra"
 trait_pc_pd_tuya_preference: "Preferencia de Tundra"
 trait_pc_pd_tuya_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_cryovolcano: "Mundo de Criovolcanes"
 pc_pd_cryovolcano_desc: "Un planeta rocoso y gélido con una atmósfera de nitrógeno y oxígeno. La vida persiste en este mundo gracias a los nutrientes liberados por los criovolcanes, que expulsan agua, amoniaco y metano desde debajo de la superficie congelada."
 pc_pd_cryovolcano_adj: "criovolcánico"
 mod_pc_pd_cryovolcano_habitability: "Habitabilidad de Tundra"
 trait_pc_pd_cryovolcano_preference: "Preferencia de Tundra"
 trait_pc_pd_cryovolcano_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_treeline: "Mundo del Límite Arbóreo"
 pc_pd_treeline_desc: "Un planeta rocoso y gélido con una atmósfera de nitrógeno y oxígeno, donde los páramos helados dominan la mayor parte de la superficie, excepto por un exuberante ecosistema forestal que florece a lo largo de la franja ecuatorial."
 pc_pd_treeline_adj: "gélido"
 mod_pc_pd_treeline_habitability: "Habitabilidad de Tundra"
 trait_pc_pd_treeline_preference: "Preferencia de Tundra"
 trait_pc_pd_treeline_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_peatland: "Mundo de Turbales"
 pc_pd_peatland_desc: "Un planeta rocoso con una atmósfera de nitrógeno y oxígeno, donde extensos turbales se extienden por los continentes. Gruesas capas de musgo y vegetación en descomposición forman una corteza viva que almacena inmensas reservas de materia orgánica, liberando lentas mareas de gas y humedad al aire."
 pc_pd_peatland_adj: "turboso"
 mod_pc_pd_peatland_habitability: "Habitabilidad de Tundra"
 trait_pc_pd_peatland_preference: "Preferencia de Tundra"
 trait_pc_pd_peatland_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_travertine: "Mundo de Travertino"
 pc_pd_travertine_desc: "Un mundo rocoso frío con una atmósfera de nitrógeno y oxígeno, donde manantiales termales ricos en minerales han esculpido terrazas en cascada de caliza travertina pálida sobre la superficie congelada. La vida se aferra a las pozas cálidas entre los niveles, protegida de la tundra circundante."
 pc_pd_travertine_adj: "calcáreo"
 mod_pc_pd_travertine_habitability: "Habitabilidad de Tundra"
 trait_pc_pd_travertine_preference: "Preferencia de Tundra"
 trait_pc_pd_travertine_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_cryoflora: "Mundo de Crioflora"
 pc_pd_cryoflora_desc: "Mundo frío y rocoso con una atmósfera de nitrógeno y oxígeno. Aunque las temperaturas suelen estar por debajo del punto de congelación, la mayor parte de la hidrosfera está bloqueada en nieve y hielo. A pesar de ello, la flora y fauna de este planeta se han adaptado mediante proteínas anticongelantes para crear un ecosistema exuberante y vibrante."
 pc_pd_cryoflora_adj: "luminoso"
 mod_pc_pd_cryoflora_habitability: "Habitabilidad de Tundra"
 trait_pc_pd_cryoflora_preference: "Preferencia de Tundra"
 trait_pc_pd_cryoflora_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_lichen: "Mundo de Líquenes"
 pc_pd_lichen_desc: "Mundo frío y rocoso con una atmósfera de nitrógeno y oxígeno. Este mundo tiene una hidrosfera muy estable y temperaturas bajas generalmente predecibles, lo que permite que gigantescos bosques de líquenes que abarcan todo el planeta crezcan entre montañas escarpadas y glaciares que extraen minerales locales para sus nutrientes."
 pc_pd_lichen_adj: "liquenoso"
 mod_pc_pd_lichen_habitability: "Habitabilidad de Tundra"
 trait_pc_pd_lichen_preference: "Preferencia de Tundra"
 trait_pc_pd_lichen_preference_desc: "$trait_pc_arctic_preference_desc$"

###Superhabilitable
 pc_pd_wet_superhabitable: "Mundo Superhabilitable Húmedo"
 pc_pd_wet_superhabitable_desc: "Un mundo súper-terrestre rocoso y húmedo; este planeta tiene una densa atmósfera de nitrógeno y oxígeno. Es una cuna perfecta para la evolución de la vida, con temperaturas medias de unos 25 grados Celsius y cuencas oceánicas poco profundas. Sin embargo, la fuerte gravedad es un desafío para quienes no están acostumbrados a ella."
 pc_pd_wet_superhabitable_adj: "súper-terrestre"
 mod_pc_pd_wet_superhabitable_habitability: "Habitabilidad Superhabilitable Húmeda"
 trait_pc_pd_wet_superhabitable_preference: "Preferencia Superhabilitable Húmeda"
 trait_pc_pd_wet_superhabitable_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_cold_superhabitable: "Mundo Superhabilitable Frío"
 pc_pd_cold_superhabitable_desc: "Un mundo súper-terrestre frío y rocoso; este planeta tiene una densa atmósfera de nitrógeno y oxígeno. Es una cuna perfecta para la evolución de la vida, con ricas y productivas tundras y cuencas oceánicas poco profundas. Sin embargo, la fuerte gravedad es un desafío para quienes no están acostumbrados a ella."
 pc_pd_cold_superhabitable_adj: "súper-terrestre"
 mod_pc_pd_cold_superhabitable_habitability: "Habitabilidad Superhabilitable Fría"
 trait_pc_pd_cold_superhabitable_preference: "Preferencia Superhabilitable Fría"
 trait_pc_pd_cold_superhabitable_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_dry_superhabitable: "Mundo Superhabilitable Seco"
 pc_pd_dry_superhabitable_desc: "Un mundo súper-terrestre seco y rocoso; este planeta tiene una densa atmósfera de nitrógeno y oxígeno. El terreno cubierto de polvo consiste principalmente en mesas y cañones. Es una cuna perfecta para la evolución de la vida, con ricos y productivos matorrales y cuencas fluviales poco profundas. Sin embargo, la fuerte gravedad es un desafío para quienes no están acostumbrados a ella."
 pc_pd_dry_superhabitable_adj: "súper-terrestre"
 mod_pc_pd_dry_superhabitable_habitability: "Habitabilidad Superhabilitable Seca"
 trait_pc_pd_dry_superhabitable_preference: "Preferencia Superhabilitable Seca"
 trait_pc_pd_dry_superhabitable_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_barren_superhabitable: "Mundo Superhabilitable Yermo"
 pc_pd_barren_superhabitable_desc: "Mundo súper-terrestre yermo y rocoso con una atmósfera fina o inexistente. La superficie está cubierta de cráteres de impacto de meteoritos y está completamente desprovista de vida."
 pc_pd_gaia_superhabitable: "Mundo Gaia Superhabilitable"
 pc_pd_gaia_superhabitable_desc: "Un mundo súper-terrestre idóneo y templado con una atmósfera de nitrógeno y oxígeno y un ecosistema resiliente. Condiciones óptimas para todas las formas de vida superiores conocidas en diferentes latitudes. Es una cuna perfecta para la evolución de la vida, con ricos y productivos matorrales y cuencas fluviales poco profundas. Sin embargo, la fuerte gravedad es un desafío para quienes no están acostumbrados a ella."
 pc_pd_gaia_superhabitable_adj: "súper-terrestre"
 mod_pc_pd_gaia_superhabitable_habitability: "Habitabilidad Gaia Superhabilitable"
 trait_pc_pd_gaia_superhabitable_preference: "Preferencia Gaia Superhabilitable"
 trait_pc_pd_gaia_superhabitable_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_nuked_superhabitable: "Mundo Tumba Superhabilitable"
 pc_pd_nuked_superhabitable_desc: "Un mundo superhabilitable rocoso con una atmósfera de nitrógeno y oxígeno; este planeta está experimentando actualmente un invierno nuclear, con densas capas de aerosoles tiznados en la atmósfera. Hay mínimas señales de vida y la fuerte gravedad es un desafío para quienes no están acostumbrados a ella."

###Bloqueado por Marea
 pc_pd_wet_tidally_locked: "Mundo Húmedo Bloqueado por Marea"
 pc_pd_wet_tidally_locked_desc: "Un mundo húmedo y rocoso con una gruesa atmósfera de nitrógeno y oxígeno; la temperatura y la estable hidrosfera de este planeta bloqueado por marea permiten una rica biodiversidad en sus zonas diurna y crepuscular."
 pc_pd_wet_tidally_locked_adj: "bloqueado por marea"
 mod_pc_pd_wet_tidally_locked_habitability: "Habitabilidad Húmeda Bloqueada por Marea"
 trait_pc_pd_wet_tidally_locked_preference: "Preferencia Húmeda Bloqueada por Marea"
 trait_pc_pd_wet_tidally_locked_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_dry_tidally_locked: "Mundo Seco Bloqueado por Marea"
 pc_pd_dry_tidally_locked_desc: "Un mundo rocoso con una atmósfera de nitrógeno y oxígeno; este planeta bloqueado por marea tiene un lado en luz diurna constante mientras el otro está en noche continua. Una estrecha zona habitable existe en la región crepuscular. La luz solar y el viento constantes son ideales para la generación de alimentos y energía."
 pc_pd_dry_tidally_locked_adj: "bloqueado por marea"
 mod_pc_pd_dry_tidally_locked_habitability: "Habitabilidad Seca Bloqueada por Marea"
 trait_pc_pd_dry_tidally_locked_preference: "Preferencia Seca Bloqueada por Marea"
 trait_pc_pd_dry_tidally_locked_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_cold_tidally_locked: "Mundo Frío Bloqueado por Marea"
 pc_pd_cold_tidally_locked_desc: "Un mundo rocoso congelado y húmedo con una atmósfera de nitrógeno y oxígeno; este planeta está bloqueado por marea a su estrella madre. El lado diurno es un océano descongelado constantemente bombardeado por la luz solar, mientras que su lado nocturno consiste en glaciares congelados. Fuertes vientos y poderosas corrientes se encuentran en el borde de estos dos lados distintos."
 pc_pd_cold_tidally_locked_adj: "bloqueado por marea"
 mod_pc_pd_cold_tidally_locked_habitability: "Habitabilidad Fría Bloqueada por Marea"
 trait_pc_pd_cold_tidally_locked_preference: "Preferencia Fría Bloqueada por Marea"
 trait_pc_pd_cold_tidally_locked_preference_desc: "$trait_pc_arctic_preference_desc$"
