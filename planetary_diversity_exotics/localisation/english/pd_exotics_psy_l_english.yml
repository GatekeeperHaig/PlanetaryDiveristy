 l_english:

 # Species class
 CRYO: "Cryophiles"
 CRYO_desc: "Cryophiles are organisms evolved on worlds dominated by cryogenic chemistry: frozen methane seas, ammonia-laced atmospheres, and temperatures far below the freezing point of water. Their biology runs on slow, low-temperature reactions, so they live for centuries but everything they do unfolds at a glacier's pace."

 # Homeworld column header
 climate_cryogenic: "Cryogenic"
 # Planet tooltip climate label (matches `climate = "cryogenic"` on the planet class)
 cryogenic: "§B(Cryogenic Climate)§!"

 # Planet classes
 pc_pd_methane: "Methane World"
 pc_pd_methane_desc: "A frigid world whose surface is dominated by liquid methane seas and hydrocarbon haze. Temperatures hover near −180°C, and the thick orange atmosphere filters out most visible light."
 pc_pd_ammonia: "Ammonia World"
 pc_pd_ammonia_desc: "A cold world with a dense atmosphere of ammonia and nitrogen compounds. Persistent cloud cover and chemical precipitation make these planets hostile to conventional life, but uniquely hospitable to ammonia-based biochemistry."

 # Core trait
 trait_cryophile: "Cryophile"
 trait_cryophile_desc: "The slow, low-temperature metabolism of this species requires a mix of exotic hydrides alongside ordinary nutrients. They outlive other species by generations, but everything they do unfolds at a glacial pace."
 TRAIT_CRYOPHILE_EFFECT: "$r_exotic_gases$ Upkeep per $pop_group_unit$ £pop£ Pops: §R+0.05§!"

 # Preference traits
 trait_pc_pd_methane_preference: "Methane-World Preference"
 trait_pc_pd_methane_preference_desc: "This species evolved on the frozen hydrocarbon seas of methane worlds. They are thoroughly optimised for liquid-methane biochemistry and can technically survive on ammonia worlds, though they will never truly thrive there. They cannot endure the warmer, wetter biospheres of conventional life."
 trait_pc_pd_ammonia_preference: "Ammonia-World Preference"
 trait_pc_pd_ammonia_preference_desc: "This species evolved in the dense ammonia-cloud atmospheres of ammonia worlds. They are thoroughly optimised for ammonia-compound biochemistry and can technically survive on methane worlds, though they will never truly thrive there. They cannot endure the warmer, wetter biospheres of conventional life."

 # Habitability modifiers
 mod_pc_pd_methane_habitability: "Methane World Habitability"
 mod_pc_pd_ammonia_habitability: "Ammonia World Habitability"

 # Start screen intro (PART_ONE per planet class)
 START_SCREEN_PART_ONE_PD_METHANE: "In the eons since the first primitive [GetSpeciesName] communities took shape on the frozen hydrocarbon shores of [GetHomeWorldName], our civilization has spread and prospered."
 START_SCREEN_PART_ONE_PD_AMMONIA: "In the eons since the first primitive [GetSpeciesName] communities took shape beneath the ammonia clouds of [GetHomeWorldName], our civilization has spread and prospered."

 # Ammonia world planet features
 d_pd_ammonia_lightning_storms: "Nitrogen Lightning Fronts"
 d_pd_ammonia_lightning_storms_desc: "The nitrogen-heavy atmosphere of this world ionises with extraordinary ease, producing standing fronts of near-continuous electrical discharge wherever ammonia and nitrogen pressure systems collide. Tethered collector arrays harvest the steady bleed."
 d_pd_ammonia_thermocline: "Ammonia Cloud Stratification"
 d_pd_ammonia_thermocline_desc: "The ammonia and nitrogen cloud decks of this world are layered into sharply defined strata, each at a different temperature. A grid of suspended thermocouples drifts along the boundaries, drawing usable current from the gradient."
 d_pd_ammonia_salt_dunes: "Ammonium Salt Dunes"
 d_pd_ammonia_salt_dunes_desc: "Wind-sculpted dunes of crystallised ammonium compounds stretch across this region. The salts are pure enough to be harvested directly without distillation, yielding minerals at unusually low cost."
 d_pd_ammonia_brine_caverns: "Ammonia Solution Caverns"
 d_pd_ammonia_brine_caverns_desc: "A subsurface network of caverns where slow-draining ammonia solution has plated the walls with rich ore concentrations over the ages."
 d_pd_ammonia_chemosynthetic_pools: "Liquid Ammonia Pools"
 d_pd_ammonia_chemosynthetic_pools_desc: "Stable basins of liquid ammonia bloom with dense mats of chemosynthetic microbe colonies that use the ammonia itself as their cellular solvent. These pools are the foundational biomass of any cryophile agricultural system."
 d_pd_ammonia_organic_haze: "Ammoniated Snowfall"
 d_pd_ammonia_organic_haze_desc: "Soft flurries of ammonia-ice crystals carry extremophile organics down from the upper cloud decks in continuous, harvestable snowfall. Wide collector fields catch the drift."
 d_pd_ammonia_pure_gas_vents: "Ammonia-Nitrogen Vents"
 d_pd_ammonia_pure_gas_vents_desc: "Deep fissures discharge unprocessed ammonia and nitrogen gases at industrial concentrations. The output is pure enough to feed an exotic gas refinery without intermediate filtration."
 d_pd_ammonia_polar_ion_columns: "Polar Ionisation Columns"
 d_pd_ammonia_polar_ion_columns_desc: "Where the planetary magnetic field bends down through ammonia-saturated polar atmosphere, columns of cascading ionisation rise hundreds of kilometres skyward in continuous discharge. Suspended capacitor lattices harvest the bleed at industrial scale."
 d_pd_ammonia_cryolite_reefs: "Cryolite Reefs"
 d_pd_ammonia_cryolite_reefs_desc: "Massive seafloor banks of crystallised cryolite: sodium-aluminium fluoride co-precipitated with ammonia ices over geological time, formed only where liquid ammonia and dissolved silicates have cycled in concert. Concentrated rare-earth and lithium complexes lace the formations throughout."
 d_pd_ammonia_ammoniated_kelp_forests: "Ammoniated Kelp Forests"
 d_pd_ammonia_ammoniated_kelp_forests_desc: "Submerged forests of ammonia-tolerant biomass: towering structural growths that cycle nitrogen, phosphorus, and dissolved organics directly out of the surrounding liquid ammonia. The richest harvest niche on any cryogenic world."

 # Urban districts (link to vanilla city/hive/nexus loc so submods stay compatible)
 district_pdexotic_cryo_city: "$district_city$"
 district_pdexotic_cryo_city_plural: "$district_city_plural$"
 district_pdexotic_cryo_city_desc: "$district_city_desc$"
 district_pdexotic_cryo_hive: "$district_hive$"
 district_pdexotic_cryo_hive_plural: "$district_hive_plural$"
 district_pdexotic_cryo_hive_desc: "$district_hive_desc$"
 district_pdexotic_cryo_nexus: "$district_nexus$"
 district_pdexotic_cryo_nexus_plural: "$district_nexus_plural$"
 district_pdexotic_cryo_nexus_desc: "$district_nexus_desc$"

 # Rural districts
 district_pdexotic_cryo_riftvent: "Riftvent Station"
 district_pdexotic_cryo_riftvent_plural: "Riftvent Stations"
 district_pdexotic_cryo_riftvent_desc: "Cryovolcanic vents discharge supercooled brine and trapped gas with extraordinary thermal contrast against the surface. Turbine arrays straddle the rifts, drawing power from the gradient between the deep warmth and the frozen sky."
 district_pdexotic_cryo_sublimation: "Sublimation Pit"
 district_pdexotic_cryo_sublimation_plural: "Sublimation Pits"
 district_pdexotic_cryo_sublimation_desc: "Open-cut excavations where vast volumes of volatile ice are flash-sublimated to free the metals and salts trapped within. Drifting curtains of vapour mark each working face."
 district_pdexotic_cryo_chemovat: "Chemovat Garden"
 district_pdexotic_cryo_chemovat_plural: "Chemovat Gardens"
 district_pdexotic_cryo_chemovat_desc: "Pressurised tank-fields cultivating native chemosynthetic life. The organisms metabolise the planet's atmosphere into edible biomass and vent its signature gases as byproduct."

 # District cap modifiers (auto-generated by engine; loc must match vanilla style)
 mod_district_pdexotic_cryo_riftvent_max_add: "Max $district_pdexotic_cryo_riftvent_plural$"
 mod_district_pdexotic_cryo_sublimation_max_add: "Max $district_pdexotic_cryo_sublimation_plural$"
 mod_district_pdexotic_cryo_chemovat_max_add: "Max $district_pdexotic_cryo_chemovat_plural$"

 # Cryo chemist job-add modifiers (auto-generated by engine; vanilla pattern: "[job.GetName] Jobs")
 mod_job_pdexotic_cryo_chemist_add: "[pdexotic_cryo_chemist.GetName] Jobs"
 mod_job_pdexotic_cryo_chemist_drone_add: "[pdexotic_cryo_chemist_drone.GetName] Jobs"
 mod_job_pdexotic_cryo_chemist_machine_add: "[pdexotic_cryo_chemist_machine.GetName] Jobs"

 # Cryo chemist jobs (worked at Chemovat Gardens)
 job_pdexotic_cryo_chemist: "Vatkeeper"
 job_pdexotic_cryo_chemist_plural: "Vatkeepers"
 job_pdexotic_cryo_chemist_desc: "Vatkeepers cultivate the pressurised chemovats where native chemosynthetic life is reared on the planet's own atmosphere. The work is half farming, half low-temperature chemistry: the organisms yield edible biomass, and vent the planet's signature gases as a clean byproduct."

 job_pdexotic_cryo_chemist_drone: "Vatkeeper Drone"
 job_pdexotic_cryo_chemist_drone_plural: "Vatkeeper Drones"
 job_pdexotic_cryo_chemist_drone_desc: "Vatkeeper Drones tend the pressurised chemovats of the hive, channelling cultivated chemosynthetic biomass into the food stream and recovering vented gases for the swarm's industries."

 job_pdexotic_cryo_chemist_machine: "Vatkeeper Unit"
 job_pdexotic_cryo_chemist_machine_plural: "Vatkeeper Units"
 job_pdexotic_cryo_chemist_machine_desc: "Vatkeeper Units operate the pressurised chemovats as gas-extraction infrastructure, harvesting the cryogenic life cycle for its volatile byproducts. Where the empire still requires organic intake, biomass is recovered as a secondary output."
