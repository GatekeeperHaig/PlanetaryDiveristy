 trait_pc_pd_cryoflora_preference: "苔原星球偏好"
 trait_pc_pd_cryoflora_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_lichen: "地衣星球"
 pc_pd_lichen_desc: "拥有氮氧大气的寒冷岩石星球。该星球拥有高度稳定的水圈与总体规律的低温环境，孕育出了覆盖全球的巨型地衣森林。这些森林生长在嶙峋的山脉与冰川之间，靠汲取当地的矿物质来获取养分。"
 pc_pd_lichen_adj: "地衣"
 mod_pc_pd_lichen_habitability: "苔原星球宜居性"
 trait_pc_pd_lichen_preference: "苔原星球偏好"
 trait_pc_pd_lichen_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_wet_superhabitable: "超级类地星球（湿润）"
 pc_pd_wet_superhabitable_desc: "这是一颗潮湿的岩质超级类地行星，拥有浓厚的氮氧大气层。这里的平均气温在25摄氏度左右，分布着浅海盆地，是孕育生命的完美摇篮。尽管如此，对于不习惯这种环境的人来说，这里的高重力依然是一大挑战。"
 pc_pd_wet_superhabitable_adj: "超级类地"
 mod_pc_pd_wet_superhabitable_habitability: "超级类地星球宜居性（湿润）"
 trait_pc_pd_wet_superhabitable_preference: "超级类地星球偏好（湿润）"
 trait_pc_pd_wet_superhabitable_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_cold_superhabitable: "超级类地星球（寒冷）"
 pc_pd_cold_superhabitable_desc: "这是一颗寒冷的岩质超级类地行星，拥有浓厚的氮氧大气层。凭借富饶多产的苔原与浅海盆地，这里成为了生命演化的完美摇篮。尽管如此，对于不习惯这种环境的人来说，这里的高重力依然是一大挑战。"
 pc_pd_cold_superhabitable_adj: "超级类地"
 mod_pc_pd_cold_superhabitable_habitability: "超级类地星球宜居性（寒冷）"
