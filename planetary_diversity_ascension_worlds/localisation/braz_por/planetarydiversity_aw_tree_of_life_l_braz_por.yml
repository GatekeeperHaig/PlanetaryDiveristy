 job_pd_tol_naval_admin_gestalt: "Drone Logístico"
 job_pd_tol_naval_admin_gestalt_plural: "Drones Logísticos"
 job_pd_tol_naval_admin_gestalt_desc: "Altamente especializado em gestão de suprimentos, esses drones garantem operações navais eficientes mantendo e rastreando as linhas de suprimento essenciais."
 mod_job_pd_tol_naval_admin_gestalt_add: "Emprego de $job_pd_tol_naval_admin_gestalt$"
