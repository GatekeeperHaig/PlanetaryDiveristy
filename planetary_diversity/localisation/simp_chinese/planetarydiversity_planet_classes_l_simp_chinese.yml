 pc_pd_algae: "粉藻华星球"
 pc_pd_algae_desc: "拥有氮氧大气层和广阔水圈的岩石星球。其富饶的浅海与湖泊孕育了绚丽夺目的粉红色藻华，造就了从太空中俯瞰依然清晰可见的视觉奇观。"
 pc_pd_algae_adj: "粉色"
