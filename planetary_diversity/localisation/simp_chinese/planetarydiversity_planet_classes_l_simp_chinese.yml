 pc_pd_cryovolcano: "冰火山星球"
 pc_pd_cryovolcano_desc: "这是一颗拥有氮氧大气层的酷寒岩石行星。这里的生命之所以得以存续，全靠冰火山释放的养分——它们将水、氨与甲烷从冰封的地层深处不断喷射而出。"
