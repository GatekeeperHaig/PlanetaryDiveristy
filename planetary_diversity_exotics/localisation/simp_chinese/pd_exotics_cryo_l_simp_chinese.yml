l_simp_chinese:
 CRYO: "嗜冷生物"
 CRYO_desc: "物种类别对你的帝国没有太大影响，但与其他类别相比，同是嗜冷生物的物种，双方认同感会更强。"
 climate_cryogenic: "深冷"
 cryogenic: "§B（深冷气候）§!"
 pc_pd_methane: "甲烷星球"
 pc_pd_methane_desc: "一颗极度寒冷的岩石星球，有着厚实的氮-甲烷大气。液态甲烷与乙烷形成的海洋覆盖了它的大部分表面，终年不散的烃类雾霾把天空染成了橙色。这里的本土生命依赖于以碳氢化合物为基础的生物化学反应。"
 pc_pd_ammonia: "氨星球"
 pc_pd_ammonia_desc: "一颗寒冷的岩石星球，有着厚实的氮-氨大气。液氨海洋覆盖了大部分表面，两极笼罩着终年不化的氨水冰。这里的本土生命依赖于以氨为基础的生物化学反应。 "
 pc_pd_nitrogen: "氮星球"
 pc_pd_nitrogen_desc: "一颗冰封的岩石星球，有着稀薄的氮大气。液氮海洋聚积在低地之中，冰壳的裂缝里有氮间歇泉喷涌而出。这里的本土生命依赖于以氮为基础的生物化学反应。"
 pd_ammonia: "氨星球"
 pd_ammonia_desc: "这颗寒冷的行星拥有浓密的氮-氨大气，液氨海洋和氨水冰覆盖了大部分表面。这里的本土生命依赖于以氨为基础的生物化学反应。  "
 pd_methane: "甲烷星球"
 pd_methane_desc: "这颗极寒的行星拥有浓密的氮-甲烷大气，大气之下是液态甲烷和乙烷的海洋。托林雾霾和甲烷“降水”驱动着地表的化学过程，这里的本土生命依赖于以碳氢化合物为基础的生物化学反应。 "
 pd_nitrogen: "氮星球"
 pd_nitrogen_desc: "这颗冰封的行星拥有一层稀薄的氮大气，其下方是液氮的海洋，冰壳的裂隙中有冰火山间歇泉喷涌而出。这里的本土生命依赖于以氮为基础的生物化学反应。"
 trait_cryophile: "嗜冷生物"
 trait_cryophile_desc: "该物种的低温代谢过程极为缓慢，除去普通的营养成分之外，还需要摄入多种奇异的氢化物。它们的寿命比其他物种长好几代，但每一项行动都要花费漫长得多的时间。"
 TRAIT_CRYOPHILE_EFFECT: "每$pop_group_unit$£pop£人口的$r_exotic_gases$维护费：§R+0.05§!"
 trait_pc_pd_methane_preference: "甲烷星球偏好"
 trait_pc_pd_methane_preference_desc: "该物种发端于甲烷星球的液烃海洋，在极寒的环境中繁衍壮大，其新陈代谢已彻底适应以液态甲烷为基础的生物化学机制。"
 trait_pc_pd_ammonia_preference: "氨星球偏好"
 trait_pc_pd_ammonia_preference_desc: "该物种发端于氨星球的致密氨云大气中，在极寒的环境中茁壮成长，其新陈代谢已彻底适应以氨化物为基础的生物化学机制。"
 trait_pc_pd_nitrogen_preference: "氮星球偏好"
 trait_pc_pd_nitrogen_preference_desc: "该物种发端于氮星球的液氮海洋与冰火山间歇泉，在极寒的环境中繁衍壮大，其新陈代谢已彻底适应以液氮为基础的生物化学机制。"
 mod_pc_pd_methane_habitability: "甲烷星球宜居性"
 mod_pc_pd_ammonia_habitability: "氨星球宜居性"
 mod_pc_pd_nitrogen_habitability: "氮星球宜居性"
 pd_ammonia_atmosphere:0 "氨大气"
 pd_ammonia_atmosphere_desc:0 "低温下，大气由稠密的氮气与氨气组成，其中悬浮着微量的甲醇与冻结的碳氢化合物微粒。"
 pd_methane_atmosphere:0 "甲烷大气"
 pd_methane_atmosphere_desc:0 "在极低的温度下，大气由稠密的氮气、甲烷和乙烷组成，其中悬浮的托林气溶胶使空气呈现为标志性的橙色。"
 pd_nitrogen_atmosphere:0 "氮大气"
 pd_nitrogen_atmosphere_desc:0 "在极端的深冷温度下，大气由稀薄的氮分子组成。悬浮的冰微粒与微量的氖为空气染上了一层淡蓝色。"
 START_SCREEN_PART_ONE_PD_METHANE: "亿万年前，最初的原始[GetSpeciesName]物种在[GetHomeWorldName]液态烃类海洋的岸边诞生。从那时起，我们的文明就开始传播并慢慢走向繁荣。"
 START_SCREEN_PART_ONE_PD_AMMONIA: "亿万年前，最初的原始[GetSpeciesName]物种在[GetHomeWorldName]的氨云之下诞生。从那时起，我们的文明就开始传播并慢慢走向繁荣。"
 START_SCREEN_PART_ONE_PD_NITROGEN: "亿万年前，最初的原始[GetSpeciesName]物种在[GetHomeWorldName]的液氮海洋中诞生。从那时起，我们的文明就开始传播并慢慢走向繁荣。"
 d_pd_ammonia_lightning_storms: "氮闪电锋"
 d_pd_ammonia_lightning_storms_desc: "氨锋与氮锋碰撞之处，天空几乎持续不断地倾泻着闪电，可以直接从大气中汲取电流。"
 d_pd_ammonia_thermocline: "分层氨云"
 d_pd_ammonia_thermocline_desc: "大气形成了层次分明的云层，每一层都比上层更加温暖，可以从它们之间的温度梯度中汲取能量。"
 d_pd_ammonia_salt_dunes: "铵盐沙丘"
 d_pd_ammonia_salt_dunes_desc: "风蚀形成的纯铵盐沙丘遍布地表，随时可以开采和加工，从中提取矿物。"
 d_pd_ammonia_brine_caverns: "氨水溶洞"
 d_pd_ammonia_brine_caverns_desc: "幽深的洞穴网络，历经漫长的岁月，渗出的氨水已在岩壁上沉积出了富饶的矿脉。"
 d_pd_ammonia_chemosynthetic_pools: "液氨池"
 d_pd_ammonia_chemosynthetic_pools_desc: "宽广无波的液氨池表面覆盖着厚厚的微生物垫。对任何适应严寒的聚居地而言，这种生物质都是首要的食物来源。"
 d_pd_ammonia_organic_haze: "含氨降雪"
 d_pd_ammonia_organic_haze_desc: "柔软的氨冰雪花从高层云团中纷纷扬扬地飘落，形成持续不断的降雪，其中还夹带着可食用的有机物。"
 d_pd_ammonia_pure_gas_vents: "氨氮喷口"
 d_pd_ammonia_pure_gas_vents_desc: "深层裂缝中喷涌出一股股氨与氮气，其纯度极高，无需任何预处理即可直接供给精炼厂。"
 d_pd_ammonia_polar_ion_columns: "极地电离柱"
 d_pd_ammonia_polar_ion_columns_desc: "在极地地区，富含氨的空气会发生电离，形成高耸的电流柱，直冲数百公里的高空。可以直接收集这些放电来获取电能。"
 d_pd_ammonia_cryolite_reefs: "冰晶石礁"
 d_pd_ammonia_cryolite_reefs_desc: "广阔的海底冰晶石结晶层，经过漫长的地质年代沉积而成，其间遍布着稀土和锂矿石。"
 d_pd_ammonia_ammoniated_kelp_forests: "氨化巨藻林"
 d_pd_ammonia_ammoniated_kelp_forests_desc: "高耸的水下海藻林直接从海洋中吸收氨，并将其转化为大量的可食用生物质。对于任何冰冻星球，这都堪称是最丰饶的收成。"
 d_pd_methane_tholin_storm_belts: "托林风暴带"
 d_pd_methane_tholin_storm_belts_desc: "带电的托林气溶胶在高层大气中持续翻滚，形成永不停歇的风暴带，在云层间释放出大量静电。这些放电可通过导电塔引下并加以收集。"
 d_pd_methane_cryovolcanic_vents: "冰火山喷口"
 d_pd_methane_cryovolcanic_vents_desc: "裂隙将液态甲烷与水氨岩浆的浆状混合物猛烈喷入严寒的大气中。这种温度梯度可用于驱动安装于喷口上方的涡轮机。"
 d_pd_methane_supercooled_geysers: "过冷间歇泉"
 d_pd_methane_supercooled_geysers_desc: "地下的高压乙烷储层顺着断层线喷涌而出，形成高耸的过冷喷流。每一道喷流都是一根稳定矗立的能量柱，可以从中回收能源。"
 d_pd_methane_carbonate_caverns: "碳酸盐洞穴"
 d_pd_methane_carbonate_caverns_desc: "由远古甲烷流在氨水基岩中侵蚀而成的洞穴网络，洞壁上覆盖着结晶的碳酸盐和复杂有机物。"
 d_pd_methane_clathrate_shelves: "甲烷水合物冰架"
 d_pd_methane_clathrate_shelves_desc: "大陆边缘覆盖着广袤的甲烷水合物冰层，冰晶格中封存着有用的金属和盐类，可进行大规模开发。"
 d_pd_methane_ice_diamonds: "甲烷冰钻石"
 d_pd_methane_ice_diamonds_desc: "巨大的气压将甲烷衍生的碳压缩成微钻石阵雪，洒落在极地高原上。"
 d_pd_methane_tholin_haze: "托林雾霾"
 d_pd_methane_tholin_haze_desc: "悬浮的烃类气溶胶从天空中持续沉降，形成可食用的沉淀物。地表动物直接以这些落尘为食。"
 d_pd_methane_liquid_methane_seas: "液态甲烷海"
 d_pd_methane_liquid_methane_seas_desc: "液态甲烷与乙烷形成的广袤海洋，浅水区域覆盖着厚厚的原生微生物毯。对任何适应严寒的聚居地而言，这种生物质都是首要的食物来源。"
 d_pd_methane_hydrocarbon_marshes: "烃类沼泽"
 d_pd_methane_hydrocarbon_marshes_desc: "广阔的潮汐沼泽沿著海岸延伸，其中生长着依赖甲烷的原生植物，它们将大气中的碳氢化合物转化为充裕的可食用生物质。对于任何冰冻星球，这都堪称是最丰饶的收成。 "
 d_pd_methane_pure_gas_vents: "甲烷-乙烷喷口"
 d_pd_methane_pure_gas_vents_desc: "深层裂缝中喷涌出一股股甲烷及更重的烃类气体，其纯度极高，无需任何预处理即可直接供给精炼厂。 "
 d_pd_nitrogen_geyser_fields: "氮间歇泉原野"
 d_pd_nitrogen_geyser_fields_desc: "广袤的平原上，地下的高压氮气以稳定过冷蒸汽喷流的形式喷涌而出。安装在喷口上方的涡轮机可以从喷流柱中汲取能量。"
 d_pd_nitrogen_aurora_curtains: "极光帷幕"
 d_pd_nitrogen_aurora_curtains_desc: "太阳风穿透稀薄的高层大气，激荡起几乎持续不断的极光。可以通过接地天线从这些带电的光幕中汲取电能。"
 d_pd_nitrogen_plasma_columns: "极地等离子柱"
 d_pd_nitrogen_plasma_columns_desc: "电离氮气在磁极附近升腾，形成高耸的等离子柱，直冲数百公里的高空。可以直接收集这些放电来获取电能。"
 d_pd_nitrogen_frost_caverns: "冰晶洞穴"
 d_pd_nitrogen_frost_caverns_desc: "深邃的洞穴网络，洞壁上覆盖着封存于远古氮冰之中的金属矿物。只需加热到可进行加工的温度，就能从洞壁中提取出丰富的矿物。"
 d_pd_nitrogen_nitrate_flats: "封冻的硝酸盐滩"
 d_pd_nitrogen_nitrate_flats_desc: "宽阔的结晶硝酸盐滩，由远古的氮海洋沉积而成。矿床深厚，矿物产出稳定。"
 d_pd_nitrogen_diamond_rinds: "钻石壳层"
 d_pd_nitrogen_diamond_rinds_desc: "远古的氮冰将大气中的碳压成厚实的结晶碳壳，散落在极地高原上。这些矿层紧邻地表，可直接开采。"
 d_pd_nitrogen_frost_blooms: "氮霜花簇"
 d_pd_nitrogen_frost_blooms_desc: "一片片原生低温植物生长在冰封的低地上，直接从空气中吸收氮。这些生物质可作为食物原料加以收获。"
 d_pd_nitrogen_nitrogen_seas: "液氮海洋"
 d_pd_nitrogen_nitrogen_seas_desc: "液氮形成的广袤流域，浅水区域覆盖着厚厚的原生微生物毯。对任何适应严寒的聚居地而言，这种生物质都是首要的食物来源。"
 d_pd_nitrogen_cryoplankton_drifts: "低温浮游生物漂流带"
 d_pd_nitrogen_cryoplankton_drifts_desc: "大片随波漂流的原生低温浮游生物群落，将液态氮代谢为充裕的可食用生物质。对于任何冰冻星球，这都堪称是最丰饶的收成。 "
 d_pd_nitrogen_pure_gas_vents: "纯氮喷口"
 d_pd_nitrogen_pure_gas_vents_desc: "深层裂缝中喷涌出一股股纯氮与以及微量的异星天然气，其纯度极高，无需任何预处理即可直接供给精炼厂。"
 district_pdexotic_cryo_riftvent: "裂隙喷口站"
 district_pdexotic_cryo_riftvent_plural: "裂隙喷口站"
 district_pdexotic_cryo_riftvent_desc: "冰火山喷口喷发出过冷卤水与被困锁的气体，与地表形成了惊人的温度反差。涡轮机阵列被安装于裂隙之上，利用地下热量与地表空气之间的温度梯度来汲取能量。"
 district_pdexotic_cryo_sublimation: "升华矿坑"
 district_pdexotic_cryo_sublimation_plural: "升华矿坑"
 district_pdexotic_cryo_sublimation_desc: "这是一种露天矿坑。在这里，海量的挥发性冰被急速升华，以提取出封存于其中的金属与盐类。游移的蒸汽帷幕标示着每一处开采面的所在。"
 district_pdexotic_cryo_chemovat: "化能培养园圃"
 district_pdexotic_cryo_chemovat_plural: "化能培养园圃"
 district_pdexotic_cryo_chemovat_desc: "培育原生化能合成生命的加压培养槽阵列。这些生物通过新陈代谢将星球的大气转化为可食用的生物质，并排放出稀有气体作为副产品。"
 pdexotic_cryo_chemovat_basic: "基础化能培养槽"
 pdexotic_cryo_chemovat_basic_desc: "基础培养槽作业：培育原生化学合成生物质，正在等候特化。"
 mod_district_pdexotic_cryo_riftvent_max_add: "$district_pdexotic_cryo_riftvent_plural$上限"
 mod_district_pdexotic_cryo_sublimation_max_add: "$district_pdexotic_cryo_sublimation_plural$上限"
 mod_district_pdexotic_cryo_chemovat_max_add: "$district_pdexotic_cryo_chemovat_plural$上限"
 zone_pdexotic_cryo_chemovat_refinement: "罐体栽培"
 zone_pdexotic_cryo_chemovat_refinement_desc: "化能培养区内林立的压力罐用于培育原生化能合成菌株，以工业规模将捕获的大气转化为可食用生物质。"
 zone_pdexotic_cryo_chemovat_hydride_synthesis: "氢化物蒸馏"
 zone_pdexotic_cryo_chemovat_hydride_synthesis_desc: "每个化能培养槽都配有蒸馏塔，将挥发性氢化物冷凝并收集起来。生物质产量会随气体产量的增加而成比例下降。"
 zone_unavailable_tech_mine_exotic_gases: "$society_research_icon_with_space$$tech_mine_exotic_gases$"
 mod_job_pdexotic_cryo_chemist_add: "[pdexotic_cryo_chemist.GetName]岗位"
 mod_job_pdexotic_cryo_chemist_drone_add: "[pdexotic_cryo_chemist_drone.GetName]岗位"
 mod_job_pdexotic_cryo_chemist_machine_add: "[pdexotic_cryo_chemist_machine.GetName]岗位"
 job_pdexotic_cryo_chemist: "培养槽管理员"
 job_pdexotic_cryo_chemist_plural: "培养槽管理员"
 job_pdexotic_cryo_chemist_desc: "培养槽管理员照料着加压化学培养槽，利用星球自身的大气在其中饲育原生的化能合成生物。这份工作一半是农业养殖，一半是低温化学：这些生物在产出可食用生物质的同时，还会将稀有气体作为副产品排放出来。"
 job_pdexotic_cryo_chemist_drone: "培养槽管理子个体"
 job_pdexotic_cryo_chemist_drone_plural: "培养槽管理子个体"
 job_pdexotic_cryo_chemist_drone_desc: "培养槽管理子个体负责维护巢穴内的加压化学培养槽。它们将培育出的化能合成生物质输送至食物供给线中，并回收散逸的气体，为蜂群的工业运作提供原料。"
 job_pdexotic_cryo_chemist_machine: "培养槽管理单位"
 job_pdexotic_cryo_chemist_machine_plural: "培养槽管理单位"
 job_pdexotic_cryo_chemist_machine_desc: "培养槽管理单位将加压化学培养槽用作气体提取设施，从其内部的低温生命循环中收获挥发性副产物。在帝国仍有有机物消耗需求的情况下，生物质会被作为次级产物进行回收。"
 job_livestock_cryophile: "$job_livestock$"
 job_livestock_cryophile_plural: "$job_livestock_plural$"
 job_livestock_cryophile_desc: "$job_livestock_desc$"
 tech_pd_cryogenic_terraforming: "深冷环境改造"
 tech_pd_cryogenic_terraforming_desc: "低温工程学与特种溶剂化学的进步，使得在以往无法想象的温度与压力下进行地质工程成为可能。我们能够对一个极寒星球进行地貌改造，使其成为一颗气候温和的行星。"
