 pc_pd_ironsand: "铁砂星球"
 pc_pd_ironsand_desc: "这颗沙漠行星的铁矿储量异常丰富，氧化铁使得沙土呈现鲜红色，而富含未氧化矿物的岩石则呈现深色。"
