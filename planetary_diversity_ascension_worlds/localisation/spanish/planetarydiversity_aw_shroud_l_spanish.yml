###Shroud Planets
#AP
 ap_pd_shroud_worlds: "Desfase del Sudario"
 ap_pd_shroud_worlds_desc: "Las barreras entre el reino mortal y El Sudario son más delgadas de lo esperado. Concentrando nuestra energía psiónica, podemos debilitar aún más estas barreras y crear mundos que abarquen ambas dimensiones."
 allow_shroud_worlds: "§YDesbloquea Decisión:§! $decision_pd_aw_shroud_planet$"
 describe_shroud_worlds: "§Y$decision_pd_aw_shroud_planet$§! modificador:\n$t$- "§GPsiónico§! £pop£ Pops:\n- $mod_planet_psionic_jobs_produces_mult$: §G10%§!\n- $MOD_POP_HAPPINESS$: §G10%§!\n\n§YNo Psiónico§! £pop£ Pops:\n- £mod_pop_environment_tolerance£ §YHabitabilidad Planetaria§!: §R-50%§!\n- $MOD_POP_HAPPINESS$: §R-25%§!\n- $MOD_LOGISTIC_GROWTH_MULT$: §R-25%§"

#Decisions
 decision_pd_aw_shroud_planet: "Desfase del Sudario"
 decision_pd_aw_shroud_planet_desc: "Podemos debilitar la barrera entre este planeta y El Sudario y crear un equilibrio entre los reinos material y psiónico."
 decision_pd_aw_shroud_planet_effects_short: "Modificador §Y$pd_aw_shroud_planet$§! añadido.\n\nAumenta la §GProducción de Pops Psiónicos§! £pop£ pero reduce la §YProducción de Pops No Psiónicos§! £pop£."
 decision_pd_aw_shroud_planet_cleanup: "Fase-Bloquear Planeta"
 decision_pd_aw_shroud_planet_cleanup_desc: "Nuestros físicos pueden fortalecer la barrera entre este planeta y El Sudario, bloqueándolo en el reino material."
 decision_pd_aw_shroud_planet_cleanup_tooltip: "\nEliminaremos la influencia psiónica de este planeta."

#Modifiers
 pd_aw_shroud_planet: "Tocado por el Sudario"
 pd_aw_shroud_planet_desc: "En este lugar, la barrera deliberadamente debilitada entre el reino material y El Sudario ha permitido a individuos con habilidades psíquicas remodelar la realidad hasta cierto punto. Sin embargo, para quienes carecen de tales dones, la línea entre la pesadilla y la realidad se difumina, dando lugar a un tapiz interminable de sufrimiento y tormento."
 pd_aw_shroud_planet_tooltip: "§GPsiónico§! £pop£ Pops:\n- $mod_psionic_pop_bonus_workforce_mult$: §G10%§!\n- $MOD_POP_HAPPINESS$: §G25%§!\n\n§YNo Psiónico§! £pop£ Pops:\n- £mod_pop_environment_tolerance£ §YHabitabilidad Planetaria§!: §R-50%§!\n- $MOD_POP_HAPPINESS$: §R-25%§!\n- $MOD_LOGISTIC_GROWTH_MULT$: §R-25%§!"
 pd_shroud_planet: "$pd_aw_shroud_planet$"
 pd_shroud_planet_desc: "$pd_aw_shroud_planet_desc$"
 pd_shroud_planet_tooltip: "$pd_aw_shroud_planet_tooltip$"

#Notification Message
 MESSAGE_PD_AW_SHROUD_DESC:1 "$PLANET|Y$ ahora está §Y$pd_aw_shroud_planet$§!"
 MESSAGE_PD_AW_SHROUD_MESSAGE_TYPE_TITLE: "Comunión Planetaria con el Sudario Completa"
 MESSAGE_PD_AW_SHROUD_CLEANUP_DESC:1 "La influencia del Sudario ha sido eliminada en $PLANET|Y$."
