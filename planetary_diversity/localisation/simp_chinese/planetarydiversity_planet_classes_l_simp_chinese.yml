 pc_pd_marsh: "沼泽星球（草沼）"
 pc_pd_marsh_desc: "密集的温带盐沼覆盖着这颗星球的表面。微咸的水洼绵延至地平线，纤维状的植被在这里过滤着地表径流，牢牢固定着土壤。"
