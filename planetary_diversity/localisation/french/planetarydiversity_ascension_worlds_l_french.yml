 mod_pc_pd_nuked_cave_habitability: "$pc_pd_nuked_cave$ Habitabilité"
 mod_pc_pd_nuked_superhabitable_habitability: "$pc_pd_nuked_superhabitable$ Habitabilité"
 mod_pc_pd_nuked_tidally_locked_habitability: "$pc_pd_nuked_tidally_locked$ Habitabilité"

 #Modifiers
 pd_necro_planet: "Nécropole"
 pd_necro_planet_tooltip: "£unity£ $unity$ de [GetAdministratorPluralWithIcon] : §G+0.5§!\n$MOD_PLANET_ORBITAL_BOMBARDMENT_DAMAGE$ §G-25%§!\n$MOD_POP_GROWTH_SPEED_REDUCTION$ §R10%§!"
 pd_necro_planet_desc: "Ce monde est un temple tentaculaire, sa surface résonne des murmures d'une signifiance éternelle."
 pd_aw_necro_city_planet: "$pd_aw_necro_planet$"
 pd_aw_necro_city_planet_desc: "$pd_aw_necro_planet_desc$"
 pd_aw_necro_city_planet_tooltip: "£unity£ $unity$ de [GetAdministratorPluralWithIcon] : §G+0.5§!\n$MOD_PLANET_ORBITAL_BOMBARDMENT_DAMAGE$ §G-25%§!\n$MOD_POP_GROWTH_SPEED_REDUCTION$ §R10%§!"

###Lithoid
 #Decisions
 decision_pd_lithoid_planet: "Créer un Écosystème Lithotrophique"
 decision_pd_lithoid_planet_desc: "Ce monde attend d'être gravé en un monde de cristal et de pierre. Le fragile écosystème biologique se dresse sur notre chemin."
 decision_pd_lithoid_planet_effects_short: "Un écosystème lithotrophique sera taillé sur ce monde, nous permettant d'affiner les fréquences cristallines pour mieux correspondre à nos besoins."
 decision_pd_lithoid_planet_tooltip: "Une fois terminé, nous pourrons choisir la fréquence des cristaux lithotrophiques de cette planète."
 decision_pd_lithoid_planet_cleanup: "Restaurer l'Écosystème Biologique"
 decision_pd_lithoid_planet_cleanup_desc: "Nous devons restaurer l'écosystème biologique de cette planète à sa gloire originelle."
 decision_pd_lithoid_planet_cleanup_effects_short: "L'écosystème lithotrophique artificiel sera supprimé, le restaurant à une nature biologique."
 decision_pd_lithoid_planet_cleanup_tooltip: "Tous les Modificateurs Lithotrophiques seront supprimés, et la planète sera rendue à un écosystème biologique."
 decision_pd_lithoid_change_frequency: "Changer la Fréquence Lithotrophique"
 decision_pd_lithoid_change_frequency_desc: "Nous changerons la fréquence des cristaux de l'écosystème lithotrophique pour mieux correspondre à nos besoins."
 decision_pd_lithoid_change_frequency_effects_short: "Nous pouvons changer la fréquence des cristaux de cette planète."
 decision_pd_lithoid_change_frequency_tooltip: "Le modificateur Lithotrophique actuel sera supprimé, nous permettant de le changer pour une fréquence différente."

 #Choose Event
 pdlithoidplanets.100.name: "Fréquence Cristalline"
 pdlithoidplanets.100.desc: "Quelle fréquence de résonance devons-nous accorder au biome lithotrophique sur §Y[This.GetName]§!?"
 pdlithoidplanets.100.cyan: "Cyan"
 pdlithoidplanets.100.cyan.tooltip: "Cette fréquence de résonance agit comme une force cohésive, favorisant l'unité parmi notre population lithoïde et nourrissant une augmentation harmonieuse de la croissance démographique."
 pdlithoidplanets.100.red: "Rouge"
 pdlithoidplanets.100.red.tooltip: "Cette résonance se combine parfaitement avec les gisements minéraux, les rendant plus accessibles et propices à l'extraction."
 pdlithoidplanets.100.yellow: "Jaune"
 pdlithoidplanets.100.yellow.tooltip: "Cette fréquence de résonance s'intègre parfaitement à nos réseaux d'énergie, débloquant une augmentation de leur capacité totale."

 #Notification Message
 MESSAGE_PD_LITHOID_DESC:1 "$PLANET|Y$ est maintenant un §YMonde Lithotrophique§!"
 MESSAGE_PD_LITHOID_MESSAGE_TYPE_TITLE: "Biome Lithotrophique Terminé"
 MESSAGE_PD_LITHOID_CLEANUP_DESC:1 "Le biome biologique sur $PLANET|Y$ a été restauré."
 MESSAGE_PD_LITHOID_CLEANUP_MESSAGE_TYPE_TITLE: "Biome Lithotrophique Supprimé"

 #Modifiers
 pd_aw_lithoid_planet_cyan: "Monde Lithotrophique"
 pd_aw_lithoid_planet_cyan_desc: "Fréquence : 500 nm\nLes vibrations de résonance favorisent la bonne volonté et catalysent un taux de croissance accéléré pour les Lithoïdes."
 pd_aw_lithoid_planet_red: "Monde Lithotrophique"
 pd_aw_lithoid_planet_red_desc: "Fréquence : 650 nm\nLa résonance cristalline robuste se combine parfaitement avec les gisements minéraux, les rendant plus accessibles pour l'extraction."
 pd_aw_lithoid_planet_yellow: "Monde Lithotrophique"
 pd_aw_lithoid_planet_yellow_desc: "Fréquence : 580 nm\nLes harmoniques dynamiques de cette résonance cristalline s'intègrent parfaitement à nos réseaux d'énergie, débloquant leur capacité totale."

###Infesting Hive
 building_pd_planet_infester_1: "Nœud d'Infestation - Première Phase"
 building_pd_planet_infester_1_desc: "Ce nœud, au cœur de la phase initiale d'infestation, est vital pour la présence de la ruche sur cette planète. Sa perte démêlerait l'emprise de la ruche ici."
 building_pd_planet_infester_2: "Nœud d'Infestation - Deuxième Phase"
 building_pd_planet_infester_2_desc: "Ce nœud massif, maintenant dans la phase intermédiaire d'infestation, dispose d'une connexion à la ruche assez robuste pour manipuler les processus planétaires critiques. Sa perte démêlerait l'emprise de la ruche ici."
 building_pd_planet_infester_3: "Nœud d'Infestation Planétaire"
 building_pd_planet_infester_3_desc: "Ayant atteint son apogée, ce nœud formidable exerce une domination totale sur tous les processus planétaires. Sa perte démêlerait l'emprise de la ruche ici."
 building_pd_planet_infester_3_effect_desc: "Cette planète sera transformée en un §Y$pc_hive$§!"
 pdplanetaryinfesters.120.name: "Ruche Planétaire Terminée"
 pdplanetaryinfesters.120.desc: "Alors que le nœud atteint son plein potentiel, nous résonnons d'un profond sentiment d'accomplissement.\n\nCet instant marque un saut significatif dans le contrôle de la ruche sur [Root.GetName], solidifiant son emprise sur la planète."
 pdplanetaryinfesters.120.a: "Un foyer de plus pour la ruche."
 civic_hive_pd_planetary_infesters: "Infesteurs Planétaires"
 civic_hive_pd_planetary_infesters_desc: "Cet esprit de ruche s'intègre dans les écosystèmes d'une planète. Chaque monde devient une extension d'elle-même, s'épanouissant en tant que réseau unifié sous sa direction."
