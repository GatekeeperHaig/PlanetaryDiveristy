 l_braz_por:

###Modificadores
 #Mundos Úmidos
 pd_continental: "Mundo Continental"
 pd_continental_desc: "Grandes massas de terra são separadas por oceanos, com grandes variações climáticas dependendo da latitude e da precipitação."
 pd_retinal: "Mundo Retiniano"
 pd_retinal_desc: "A vida vegetal neste mundo é baseada em retinaldeído em vez de clorofila, dando ao planeta uma tonalidade roxa distinta."
 pd_lake: "Mundo Lacustre"
 pd_lake_desc: "O terreno do planeta é um mosaico de inúmeros lagos, variando em tamanho do pequeno ao grande."
 pd_forest: "Mundo Florestal"
 pd_forest_desc: "Densas florestas cobrem a superfície deste planeta, formando um mar ininterrupto de vegetação florestal que abrange toda a sua massa terrestre."
 pd_tepid: "Mundo Morno"
 pd_tepid_desc: "Devido à sua inclinação axial mínima, as condições ideais deste mundo estimularam a evolução de diversos processos fotossintéticos, resultando numa vibrante variedade de cores na sua flora."
 pd_mushroom: "Mundo de Cogumelos"
 pd_mushroom_desc: "A vida fúngica governa o ecossistema do planeta, envolvendo extensas regiões em densas florestas e campos de cogumelos."
 pd_temperate: "Mundo Temperado"
 pd_temperate_desc: "Este mundo possui um clima ameno que sustenta uma rica biodiversidade em quase todos os continentes."
 pd_sakura: "Mundo Sakura"
 pd_sakura_desc: "Grandes massas terrestres, separadas por oceanos e frondosas florestas de belas árvores floridas, cobrem a superfície."
 pd_moss: "$pc_pd_moss$"
 pd_moss_desc: "$pc_pd_moss_desc$"
 pd_marsh: "$pc_pd_marsh$"
 pd_marsh_desc: "$pc_pd_marsh_desc$"
 pd_carotene: "$pc_pd_carotene$"
 pd_carotene_desc: "$pc_pd_carotene_desc$"
 pd_megaflora: "Mundo de Megaflora"
 pd_megaflora_desc: "A colossal flora arbórea deste mundo cobre a superfície, com extensas raízes que se estendem por quilômetros abaixo. Construir ao redor desta vegetação rara apresenta desafios significativos."
 pd_petrified: "Mundo de Florestas Petrificadas"
 pd_petrified_desc: "Outrora coberto por uma megaflora expansiva, este planeta apresenta agora vastos vestígios petrificados da sua antiga vegetação. O material único, semelhante à madeira, tem potencial de construção, embora a sua extração exija um esforço considerável."

 #Oceano
 pd_ocean: "Mundo Oceânico"
 pd_ocean_desc: "Os oceanos cobrem mais de §Y90%§! da superfície, com ilhas dispersas constituindo a porcentagem restante."
 pd_cascadian: "Mundo Cascadiano"
 pd_cascadian_desc: "Florestas costeiras subtemperadas e cadeias de montanhas imponentes definem esta paisagem. A hidrosfera ativa e tempestuosa do planeta exibe fortes contrastes entre invernos amenos e verões breves e mais quentes."
 pd_swamp: "Mundo Pântano"
 pd_swamp_desc: "As zonas úmidas densamente florestadas dominam a maior parte do planeta, apresentando uma hidrosfera robusta e estável com mares rasos, pântanos e brejos. Este ambiente úmido sustenta uma rica abundância de vida vegetal e animal."
 pd_crag: "Mundo de Penhascos"
 pd_crag_desc: "Este planeta possui vastos oceanos e calotas polares cobrindo a maior parte de sua superfície. Ilhas sismicamente ativas dispersam as características ambientais dinâmicas e distintivas da região."
 pd_fog: "Mundo de Névoa"
 pd_fog_desc: "Embora os oceanos dominem a superfície, a umidade generalizada gera névoa e neblina quase constantes que flutuam sobre a terra e sustentam florestas exuberantes e pastagens extensas além da costa."
 pd_kelp: "Mundo de Algas"
 pd_kelp_desc: "A superfície do planeta é principalmente oceânica, com águas rasas ricas em nutrientes que promovem extensas florestas de algas. Este próspero ecossistema subaquático suporta uma biodiversidade notável em todo o planeta."
 pd_algae: "Mundo de Algas Rosadas"
 pd_algae_desc: "Os ricos mares e lagos rasos deste planeta sustentam a proliferação de algas cor-de-rosa brilhantes, criando um espetáculo visual impressionante que pode ser visto do espaço."
 pd_columnar: "$pc_pd_columnar$"
 pd_columnar_desc: "$pc_pd_columnar_desc$"
 pd_tidepool: "$pc_pd_tidepool$"
 pd_tidepool_desc: "$pc_pd_tidepool_desc$"
 pd_barnacle: "$pc_pd_barnacle$"
 pd_barnacle_desc: "$pc_pd_barnacle_desc$"
 pd_reef: "Mundo de Recifes"
 pd_reef_desc: "Extensos oceanos rasos envolvem todo o planeta, expondo sistemas de recifes significativos logo abaixo da superfície quando observados em órbita. Cadeias de ilhas formadas por corais emergem onde os recifes rompem a linha d'água."
 pd_archipelago: "Mundo Arquipélago"
 pd_archipelago_desc: "Ilhas dispersas pontilham um único oceano que abrange todo o planeta. A intensa atividade vulcânica leva ao rápido surgimento e desaparecimento de novas ilhas, criando uma paisagem em constante mudança."

 #Tropical
 pd_tropical: "Mundo Tropical"
 pd_tropical_desc: "O planeta passa por estações alternadas, com precipitações significativas e períodos mais secos, e uma vegetação densa cobre suas massas de terra."
 pd_atoll: "Mundo de Atóis"
 pd_atoll_desc: "Uma abundância de lagoas rasas, intrincados recifes de corais e exuberantes ilhas tropicais definem este planeta. Juntamente com as suas temperaturas idílicas, este mundo promove uma biosfera próspera."
 pd_tepui: "Mundo de Tepuis"
 pd_tepui_desc: "Com uma hidrosfera substancial e vegetação densa, este planeta distingue-se entre os tepuis mais frios e chuvosos e a selva mais quente e úmida das terras baixas abaixo."
 pd_mangrove: "Mundo de Manguezais"
 pd_mangrove_desc: "Os mares rasos dominam a maior parte da superfície deste planeta, deixando um mínimo de terra acima do nível do mar. As selvas de mangue se estendem por centenas de quilômetros além das costas das poucas ilhas existentes."
 pd_cenote: "Mundo de Cenotes"
 pd_cenote_desc: "As florestas tropicais esparsas cobrem massas terrestres superficiais, enquanto a maior parte da hidrosfera é filtrada em um intrincado sistema subterrâneo, sustentando ecossistemas interconectados e uma rica biodiversidade."
 pd_fungal: "Mundo de Selva Fúngica"
 pd_fungal_desc: "A vegetação baseada em fungos deste planeta forma a base de uma biosfera próspera e diversificada, que vai desde esporos microscópicos até colossais cogumelos da megaflora."
 pd_aerial: "Mundo de Sementes Aéreas"
 pd_aerial_desc: "Bem acima das massas de terra cobertas por vegetação densa, colossais vagens de sementes, transportadas pela flora única do planeta, deslizam pelos céus como nuvens."
 pd_lilypad: "Mundo de Vitórias-Régias"
 pd_lilypad_desc: "Os oceanos quentes e rasos deste planeta sustentam uma biodiversidade vibrante. Na superfície, folhas robustas da flora aquática formam um ecossistema secundário baseado na superfície."
 pd_obsidian: "$pc_pd_obsidian$"
 pd_obsidian_desc: "$pc_pd_obsidian_desc$"
 pd_thunder: "$pc_pd_thunder$"
 pd_thunder_desc: "$pc_pd_thunder_desc$"
 pd_geothermal: "Geotérmico"
 pd_geothermal_desc: "Neste planeta, fendas tropicais vibrantes emergem entre imponentes falésias de gelo. Abaixo da superfície, uma potente atividade geotérmica sustenta milhões de piscinas quentes, alimentando uma biodiversidade próspera."
 pd_biolumen: "Mundo Bioluminescente"
 pd_biolumen_desc: "Partículas atmosféricas envolvem este planeta, mas quase todas as formas de vida se adaptam à bioluminescência, criando um espetáculo deslumbrante visível da órbita."

 #Deserto
 pd_desert: "Mundo Desértico"
 pd_desert_desc: "Precipitações pouco frequentes e variações de temperatura no ciclo diurno marcam este planeta. A vegetação esparsa floresce com chuvas ocasionais no deserto."
 pd_dune: "Mundo de Dunas"
 pd_dune_desc: "Dunas de areia sem fim dominam este mundo desértico. A escassa hidrosfera existe principalmente em aquíferos subterrâneos, emergindo esporadicamente como oásis e nascentes de montanha."
 pd_oasis: "Mundo de Oásis"
 pd_oasis_desc: "A hidrosfera sustenta um vasto corpo de água com uma faixa de vegetação densa. A precipitação mal atinge o deserto interior que cobre a maior parte do planeta."
 pd_outback: "Mundo Sertão"
 pd_outback_desc: "A superfície planetária é dominada por matagais e desertos áridos e semiáridos, com vegetação aumentada perto de fontes de água. A hidrosfera está confinada a mares interiores selecionados e fontes subterrâneas."
 pd_coastal: "Mundo Costeiro"
 pd_coastal_desc: "Os oceanos profundos induzem alta estabilidade atmosférica, limitando as chuvas superficiais. Névoa e neblina predominantes sustentam várias suculentas e arbustos."
 pd_fungi: "Mundo de Fungos Desérticos"
 pd_fungi_desc: "Seco e coberto de cinzas vulcânicas, este mundo abriga fungos do deserto que resistem a altas temperaturas, à secura e à baixa nutrição."
 pd_ironsand: "$pc_pd_ironsand$"
 pd_ironsand_desc: "$pc_pd_ironsand_desc$"
 pd_cactus: "$pc_pd_cactus$"
 pd_cactus_desc: "$pc_pd_cactus_desc$"
 pd_dust: "$pc_pd_dust$"
 pd_dust_desc: "$pc_pd_dust_desc$"
 pd_sodalite: "$pc_pd_sodalite$"
 pd_sodalite_desc: "$pc_pd_sodalite_desc$"
 pd_salt: "Mundo Salino"
 pd_salt_desc: "Ricos depósitos minerais abrangem este planeta, mas o elevado teor de sal na maior parte da superfície revela-se inóspito para muitas formas de vida vegetal e animal."
 pd_aquifer: "Mundo de Aquíferos"
 pd_aquifer_desc: "Embora o terreno arenoso ofereça pouco alívio ao calor intenso, as lagoas em constante movimento e os sistemas fluviais subterrâneos abrigam uma gama diversificada de ecossistemas únicos e biodiversidade."

 #Árido
 pd_arid: "Mundo Árido"
 pd_arid_desc: "O terreno coberto de poeira compreende principalmente mesas e desfiladeiros. A vegetação é escassa, mas as florestas prosperam nas regiões polares."
 pd_mesa: "Mundo de Mesas"
 pd_mesa_desc: "Planaltos equatoriais e florestas polares definem o terreno. A hidrosfera consiste em grandes rios em cânions com leitos cobertos por vegetação, formando uma paisagem diversificada."
 pd_fog_desert: "Mundo de Deserto Enevoado"
 pd_fog_desert_desc: "Picos de altitude extrema criam sombras de chuva na maior parte da superfície. Salinas e vales áridos dominam os planaltos, enquanto alguns lagos e nascentes de montanha representam a hidrosfera."
 pd_mediterranean: "Mundo Mediterrâneo"
 pd_mediterranean_desc: "A hidrosfera deste planeta sustenta extensos mares interiores, rodeados por vegetação esparsa. As áreas do interior apresentam paisagens áridas com escassa precipitação."
 pd_badlands: "Mundo Ermo"
 pd_badlands_desc: "O terreno árido apresenta rochas sedimentares e solos ricos em argila moldados pela erosão eólica e hídrica. A vegetação, principalmente arbustos e gramíneas resistentes, prospera à sombra das colinas."
 pd_succulent: "Mundo de Suculentas"
 pd_succulent_desc: "As temperaturas elevadas e as chuvas pouco frequentes, mas esporádicas, levaram a vegetação a desenvolver técnicas de retenção de água para prosperar nas condições desafiadoras deste planeta."
 pd_striped: "Mundo Listrado"
 pd_striped_desc: "Este planeta apresenta uma composição mineralógica cativante. A paisagem apresenta listras profundas e coloridas, adicionando uma camada hipnotizante ao terreno árido e coberto de poeira."
 pd_amethyst: "Mundo Ametista"
 pd_amethyst_desc: "Este mundo árido teve um passado geológico altamente ativo, resultando em extensos depósitos de quartzo ametista em toda a crosta do planeta."
 pd_opal: "$pc_pd_opal$"
 pd_opal_desc: "$pc_pd_opal_desc$"
 pd_superbloom: "$pc_pd_superbloom$"
 pd_superbloom_desc: "$pc_pd_superbloom_desc$"
 pd_coral: "Mundo de Coral"
 pd_coral_desc: "Uma vez coberto pelos oceanos, a diminuição da hidrosfera deste planeta, devido a mudanças ecológicas, levou à adaptação dos corais ao ambiente seco."
 pd_primal: "Mundo Primevo"
 pd_primal_desc: "À medida que a atividade vulcânica diminui neste jovem planeta, surgem intrincadas flora e fauna, contribuindo para o desenvolvimento de uma atmosfera respirável e de uma hidrosfera estabilizada."

 #Savana
 pd_savannah: "Mundo Savana"
 pd_savannah_desc: "A hidrosfera limitada resulta em breves estações chuvosas. A vegetação, consistindo principalmente de gramíneas onipresentes, concentra-se em torno de oásis rasos."
 pd_steppe: "Mundo de Estepes"
 pd_steppe_desc: "Esta pastagem semiárida apresenta extensas colinas ondulantes e planícies. A ausência de árvores é notável, mas as chuvas intermitentes sustentam o crescimento de arbustos e gramíneas."
 pd_prairie: "Mundo de Pradarias"
 pd_prairie_desc: "Caracterizado por uma hidrosfera sazonal, este planeta possui uma única e vasta massa de terra, grandes mares interiores, breves verões secos e invernos frios e rigorosos."
 pd_veld: "Mundo Cerrado"
 pd_veld_desc: "Com uma atmosfera seca de nitrogênio e oxigênio, este planeta subtropical apresenta matagais e savanas com invernos amenos e verões longos e quentes."
 pd_semi_arid: "Mundo Semiárido"
 pd_semi_arid_desc: "A hidrosfera permite uma estação chuvosa breve, mas significativa, com vegetação concentrada em vales protegidos e perto de grandes massas de água."
 pd_aspen: "Mundo de Álamos"
 pd_aspen_desc: "Seco e rochoso com uma atmosfera de nitrogênio e oxigênio, este mundo possui bosques de árvores em meio a pastagens. Uma pequena mas estável hidrosfera de riachos sustenta as florestas e arbustos densos."
 pd_sandstone: "$pc_pd_sandstone$"
 pd_sandstone_desc: "Este planeta possui vastas pastagens e formações de arenito esculpidas pelo vento. A sua hidrosfera suporta gramíneas resilientes adaptadas para prosperar neste ambiente."
 pd_turquoise: "$pc_pd_turquoise$"
 pd_turquoise_desc: "Este planeta de pastagens subtropicais está repleto de vastos depósitos de gemas de turquesa, encontradas em quase toda a sua superfície."
 pd_calcite: "$pc_pd_calcite$"
 pd_calcite_desc: "$pc_pd_calcite_desc$"
 pd_monsoon: "$pc_pd_monsoon$"
 pd_monsoon_desc: "$pc_pd_monsoon_desc$"
 pd_silvergrass: "$pc_pd_silvergrass$"
 pd_silvergrass_desc: "$pc_pd_silvergrass_desc$"
 pd_supercontinent: "Mundo Supercontinente"
 pd_supercontinent_desc: "Este planeta possui atualmente um supercontinente devido às suas placas tectônicas. As áreas costeiras são exuberantes, enquanto o terreno interior transita de pastagens para grandes desertos áridos."
 pd_sinkhole: "Mundo de Sumidouros"
 pd_sinkhole_desc: "A superfície tem uma hidrosfera pequena e estável, mas um oceano subterrâneo que abrange o planeta se esconde abaixo, criando enormes buracos em toda a superfície do mundo."

 #Ártico
 pd_arctic: "Mundo Ártico"
 pd_arctic_desc: "Os polos são extensos, apresentando depósitos significativos de água congelada como gelo glacial. Apesar das variações sazonais, a faixa equatorial possui vegetação substancial."
 pd_cold_desert: "Mundo de Deserto Frio"
 pd_cold_desert_desc: "Baixa precipitação e raras massas de água superficiais caracterizam este planeta. As temperaturas médias diurnas frequentemente permanecem bem abaixo de zero."
 pd_glacial: "Mundo Glacial"
 pd_glacial_desc: "A hidrosfera fica presa no gelo glacial durante a maior parte do ano, mas os meses de verão apresentam derretimento significativo e a neve é bastante comum."
 pd_antarctic: "Mundo Antártico"
 pd_antarctic_desc: "Embora os ventos possam atingir mais de 25 km por hora no inverno, a vida se apega a bolsões isolados sob o gelo marinho, cavernas e vales protegidos."
 pd_aeolian: "Mundo Eólico"
 pd_aeolian_desc: "Os ventos deste planeta atingem rotineiramente velocidades superiores a 300 km por hora. Esses ventos criaram buracos ocos, desfiladeiros e depressões, que permitiram que a vida prosperasse no interior, protegida das intempéries."
 pd_ice_spike: "Mundo de Picos de Gelo"
 pd_ice_spike_desc: "A intensa atividade tectônica abaixo da superfície atinge a profunda camada de gelo, criando as imponentes pontas de gelo que dominam a paisagem."
 pd_crevasse: "Mundo de Crevasses"
 pd_crevasse_desc: "Embora a superfície deste planeta congelado seja inóspita, a energia geotérmica do núcleo do planeta mantém habitável o fundo das muitas crevasses do planeta."
 pd_supraglacial_lakes: "$pc_pd_supraglacial_lakes$"
 pd_supraglacial_lakes_desc: "$pc_pd_supraglacial_lakes_desc$"
 pd_ice_dunes: "Mundo de Dunas de Gelo"
 pd_ice_dunes_desc: "Com temperaturas abaixo de zero na maior parte do ano, partículas de gelo semelhantes a areia criam as dunas deste planeta."
 pd_ferrospring: "$pc_pd_ferrospring$"
 pd_ferrospring_desc: "$pc_pd_ferrospring_desc$"
 pd_storm: "Tempestade"
 pd_storm_desc: "As massas terrestres do planeta encontram-se em cada polo, separadas por um enorme oceano que gera poderosas tempestades durante todo o ano. Devido às condições extremas, a maior parte da vida do planeta está sob a superfície do oceano."
 pd_iceberg: "Mundo de Icebergs"
 pd_iceberg_desc: "Apesar das temperaturas abaixo de zero, o oceano altamente salgado que cobre todo o planeta permanece líquido. Qualquer água que se separa do sal forma icebergs semipermanentes, enquanto colônias de algas marinhas prosperam nessas condições geladas."

 #Alpino
 pd_alpine: "Mundo Alpino"
 pd_alpine_desc: "Este planeta tem picos nevados e lagos congelados que pontilham os vales. Embora o planeta experimente variações sazonais mínimas, a água ainda líquida abaixo da superfície congelada dos lagos é suficiente para sustentar alguma vegetação resistente."
 pd_boreal: "Mundo Boreal"
 pd_boreal_desc: "Este planeta subártico apresenta uma ampla faixa de temperatura, com florestas boreais em regiões mais quentes e tundra e gelo perto dos polos."
 pd_snow: "Mundo de Neve"
 pd_snow_desc: "Este planeta está atualmente passando por uma era glacial. Enquanto as geleiras cobrem a maior parte das latitudes polares e médias, as florestas subtemperadas cobrem a faixa equatorial."
 pd_highland: "Mundo de Planaltos"
 pd_highland_desc: "Precipitações persistentes e névoa frequente envolvem este planeta. A hidrosfera estável, situada entre cadeias de montanhas congeladas e vastos mares interiores, sustenta gramíneas e liquens resistentes."
 pd_dune_forest: "Mundo de Floresta de Dunas"
 pd_dune_forest_desc: "Este planeta experimenta névoa frequente, mas precipitação mínima. As terras baixas consistem principalmente de dunas secas, enquanto a hidrosfera sustenta montanhas cobertas de neve e florestas."
 pd_fjord: "Mundo de Fiordes"
 pd_fjord_desc: "Os extensos oceanos deste planeta escavam enseadas profundas, promovendo florestas tropicais subárticas ao longo da costa e pastagens alpinas em altitudes mais elevadas."
 pd_blossom: "Mundo Florido"
 pd_blossom_desc: "As ricas pastagens deste planeta são adornadas com uma flora florida vibrante, apresentando um espetáculo visível da órbita."
 pd_taiga: "$pc_pd_taiga$"
 pd_taiga_desc: "$pc_pd_taiga_desc$"
 pd_craton: "$pc_pd_craton$"
 pd_craton_desc: "$pc_pd_craton_desc$"
 pd_ravine: "$pc_pd_ravine$"
 pd_ravine_desc: "$pc_pd_ravine_desc$"
 pd_glaciovolcanic: "Mundo Glaciovulcânico"
 pd_glaciovolcanic_desc: "Este planeta sofre intensa atividade vulcânica, resultando em numerosos lagos aquecidos geotermicamente que trazem minerais raros e energia para uma paisagem que de outra forma seria congelada."
 pd_lanthanide: "Mundo de Lantanídeos"
 pd_lanthanide_desc: "Os metais de terras raras e a atividade magnética deste planeta moldam impressionantes cumes de montanha em forma de anel. Com variação sazonal mínima, a hidrosfera só consegue sustentar manchas de vegetação resistente."

 #Tundra
 pd_tundra: "Mundo de Tundra"
 pd_tundra_desc: "Este mundo mantém uma hidrosfera estável e baixas temperaturas previsíveis, promovendo vastas florestas de liquens em todo o planeta, entre montanhas escarpadas e geleiras."
 pd_bog: "Mundo de Turfeiras"
 pd_bog_desc: "Este planeta tem verões breves e úmidos, invernos frios prolongados e precipitações anuais substanciais. Uma hidrosfera robusta cobre as massas de terra em densos brejos e pântanos."
 pd_mycelium: "Mundo de Micélio"
 pd_mycelium_desc: "Este planeta tem verões curtos e frescos e invernos secos e gelados. Vastas planícies apresentam imponentes florestas de cogumelos e densas redes miceliais subterrâneas."
 pd_mud: "Mundo de Lama"
 pd_mud_desc: "Este planeta tem estações irregulares com precipitação significativa, e a atividade geotérmica de baixo nível na superfície forma numerosos lagos de lama e vulcões de lama em toda a paisagem congelada."
 pd_basalt: "Mundo de Basalto"
 pd_basalt_desc: "As estações estáveis prevalecem neste planeta, onde a atividade vulcânica intermitente cria extensos campos de lava. Musgos e liquens que prosperam no basalto resfriado sustentam a biosfera."
 pd_tuya: "Mundo de Tuyas"
 pd_tuya_desc: "Com estações limitadas e invernos rigorosos, a biosfera estável deste mundo prospera com os nutrientes do solo vulcânico, e vulcões subglaciais pontilham a superfície."
 pd_cryovolcano: "Mundo de Criovulcões"
 pd_cryovolcano_desc: "A vida persiste neste mundo graças aos nutrientes liberados pelos criovulcões, que ejetam água, amônia e metano de abaixo da superfície congelada."
 pd_treeline: "$pc_pd_treeline$"
 pd_treeline_desc: "$pc_pd_treeline_desc$"
 pd_peatland: "$pc_pd_peatland$"
 pd_peatland_desc: "$pc_pd_peatland_desc$"
 pd_travertine: "$pc_pd_travertine$"
 pd_travertine_desc: "$pc_pd_travertine_desc$"
 pd_cryoflora: "Mundo de Crioflora"
 pd_cryoflora_desc: "A hidrosfera do planeta está quase toda congelada, com as temperaturas raramente subindo acima de zero. No entanto, a flora e a fauna adaptaram-se com proteínas anticongelantes, criando um belo ecossistema luminescente."
 pd_lichen: "Mundo de Liquens"
 pd_lichen_desc: "Este mundo suporta extensas florestas de liquens em toda a sua hidrosfera estável e com baixas temperaturas previsíveis. As florestas de liquens, situadas entre montanhas escarpadas e geleiras, extraem nutrientes dos minerais."

###Superabitável
 pd_wet_superhabitable: "Mundo Superabitável Úmido"
 pd_wet_superhabitable_desc: "Este mundo superabitável úmido possui uma hidrosfera robusta e condições agrícolas ótimas, com temperaturas médias mais quentes e bacias oceânicas pouco profundas. A forte gravidade desafia os desacostumados."
 pd_dry_superhabitable: "Mundo Superabitável Árido"
 pd_dry_superhabitable_desc: "Este mundo superabitável árido possui uma hidrosfera robusta e condições agrícolas ótimas, com temperaturas médias mais quentes e bacias oceânicas rasas. A forte gravidade desafia os desacostumados."
 pd_cold_superhabitable: "Mundo Superabitável Frio"
 pd_cold_superhabitable_desc: "Este mundo superabitável frio possui uma hidrosfera robusta e condições agrícolas ótimas, com temperaturas médias mais quentes e bacias oceânicas rasas. A forte gravidade desafia os desacostumados."
 pd_gaia_superhabitable: "Mundo Gaia Superabitável"
 pd_gaia_superhabitable_desc: "Este magistralmente concebido mundo superabitável, com uma atmosfera de nitrogênio e oxigênio e um ecossistema resiliente, oferece condições ideais para diversas formas de vida. Temperaturas mais quentes e bacias oceânicas rasas caracterizam a sua paisagem, mas a forte gravidade desafia os desacostumados."
 pd_arcology_superhabitable: "Arcologia Superabitável"
 pd_arcology_superhabitable_desc: "Um mundo superabitável completamente engolido pela expansão urbano-industrial. Este planeta tem temperaturas médias mais quentes, mas a forte gravidade desafia os desacostumados."
 pd_nuked_superhabitable: "Mundo Superabitável Devastado"
 pd_nuked_superhabitable_desc: "Este mundo superabitável está passando por um inverno nuclear, marcado por densas camadas de aerossóis fuliginosos na atmosfera e elevados níveis de radiação. Os sinais de vida são mínimos e a forte gravidade desafia os desacostumados."

###Bloqueio de Marés
 pd_wet_tidally_locked: "Mundo Solar"
 pd_wet_tidally_locked_desc: "Este mundo úmido e travado pelas marés apresenta oportunidades energéticas abundantes com luz solar constante e ventos fortes. A temperatura do planeta e sua estável hidrosfera permitem uma rica biodiversidade nas zonas do lado diurno e do crepúsculo."
 pd_dry_tidally_locked: "Mundo Crepuscular"
 pd_dry_tidally_locked_desc: "Este mundo seco e travado pelas marés apresenta oportunidades energéticas abundantes com luz solar constante e ventos fortes. A zona habitável está limitada às regiões crepusculares."
 pd_cold_tidally_locked: "Mundo Ocular"
 pd_cold_tidally_locked_desc: "Este mundo frio e travado pelas marés apresenta oportunidades energéticas abundantes com luz solar constante e ventos fortes. A zona habitável está limitada às regiões do lado diurno."
 pd_gaia_tidally_locked: "Mundo Gaia Travado pelas Marés"
 pd_gaia_tidally_locked_desc: "Um mundo idealmente criado e travado pelas marés, com uma atmosfera de nitrogênio e oxigênio e um ecossistema resiliente. As condições ideais para todas as formas de vida superiores conhecidas existem nas limitadas regiões habitáveis do crepúsculo."
 pd_arcology_tidally_locked: "Arcologia Travada pelas Marés"
 pd_arcology_tidally_locked_desc: "Um mundo travado pelas marés, completamente engolido pela expansão urbano-industrial. A zona habitável está limitada às regiões crepusculares."
 pd_nuked_tidally_locked: "Mundo Devastado Travado pelas Marés"
 pd_nuked_tidally_locked_desc: "Este mundo travado pelas marés está passando por um inverno nuclear, caracterizado por densas camadas de aerossóis fuliginosos e altos níveis de radiação atmosférica. Os sinais de vida são mínimos e a zona habitável limita-se às regiões crepusculares."

###Caverna
 pd_wet_cave: "Mundo de Cavernas Cársticas"
 pd_wet_cave_desc: "Este planeta possui uma rede de cavernas subterrâneas em todo o planeta com um clima úmido. Embora a construção de instalações subterrâneas seja dispendiosa, oferece colônias defensáveis."
 pd_dry_cave: "Mundo de Cavernas Areníticas"
 pd_dry_cave_desc: "Este planeta possui uma rede de cavernas subterrâneas em todo o planeta com um clima seco. Embora a construção de instalações subterrâneas seja dispendiosa, oferece colônias defensáveis."
 pd_cold_cave: "Mundo de Cavernas de Gelo"
 pd_cold_cave_desc: "Este planeta possui uma rede de cavernas subterrâneas em todo o planeta com um clima frio. Embora a construção de instalações subterrâneas seja dispendiosa, oferece colônias defensáveis."
 pd_gaia_cave: "Mundo Gaia de Cavernas"
 pd_gaia_cave_desc: "Um mundo de cavernas idealmente criado com uma atmosfera de nitrogênio e oxigênio e um ecossistema resiliente. Condições ideais para todas as formas de vida superiores conhecidas em diferentes latitudes. Embora a construção de instalações subterrâneas seja dispendiosa, oferece colônias defensáveis."
 pd_arcology_cave: "Arcologia Cavernosa"
 pd_arcology_cave_desc: "Um mundo de cavernas completamente engolido pela expansão urbano-industrial. Embora a construção de instalações subterrâneas seja dispendiosa, oferece colônias defensáveis."
 pd_nuked_cave: "Mundo Cavernoso Devastado"
 pd_nuked_cave_desc: "Este mundo das cavernas está passando por um inverno nuclear, com densas camadas de aerossóis fuliginosos na atmosfera. Altos níveis de radiação. Sinais mínimos de vida."

###Gaia
 pd_gaia_world: "Mundo Gaia"
 pd_gaia_world_desc: "Um mundo úmido idealmente criado com uma atmosfera de nitrogênio e oxigênio e um ecossistema resiliente. Condições ideais para todas as formas de vida superiores conhecidas em diferentes latitudes."
 pd_dry_gaia_world: "Mundo Gaia Árido"
 pd_dry_gaia_world_desc: "Um mundo árido idealmente criado com uma atmosfera de nitrogênio e oxigênio e um ecossistema resiliente. Condições ideais para todas as formas de vida superiores conhecidas em diferentes latitudes."
 pd_cold_gaia_world: "Mundo Gaia Congelado"
 pd_cold_gaia_world_desc: "Um mundo congelado idealmente criado com uma atmosfera de nitrogênio e oxigênio e um ecossistema resiliente. Condições ideais para todas as formas de vida superiores conhecidas em diferentes latitudes."
 pd_uncommon_gaia_world: "Mundo Gaia"
 pd_uncommon_gaia_world_desc: "Um mundo úmido idealmente criado com uma atmosfera de nitrogênio e oxigênio e um ecossistema resiliente. Condições ideais para todas as formas de vida superiores conhecidas em diferentes latitudes."

###Arcologia/Relíquia
 pc_pd_nuked_arcology: "Mundo Relicário Devastado"
 pc_pd_nuked_arcology_desc: "Uma cidade que já se estendeu por todo o mundo. Vive um inverno nuclear, com densas camadas de aerossóis fuliginosos na atmosfera. Altos níveis de radiação superficial. Sinais mínimos de vida."
 pc_pd_nuked_arcology_tooltip: "Habitabilidade: §R-100%§!\nHabitabilidade: §G+100%§! com §Y$trait_pc_nuked_preference$§! ou §Y$trait_survivor$§! traço"

###Modificadores Inabitáveis
 pd_diamond: "Mundo de Diamante"
 pd_diamond_desc: "Devido às altas temperaturas e à pressão planetária, grande parte deste mundo se transformou em diamantes."
 pd_carbon: "Mundo de Carbono"
 pd_carbon_desc: "Ao contrário da maioria dos mundos baseados em compostos de silício e oxigênio, ele tem uma proporção carbono-oxigênio significativamente maior."
 pd_chthonian: "Mundo Ctônio"
 pd_chthonian_desc: "Este planeta já foi um gigante gasoso, mas os ventos estelares eliminaram a sua atmosfera de hidrogênio e hélio, deixando apenas o núcleo metálico estéril."
 pd_iron: "Mundo de Ferro"
 pd_iron_desc: "O planeta consiste principalmente em um núcleo rico em ferro com pouco ou nenhum manto."
 pd_volcano: "Mundo Vulcânico"
 pd_volcano_desc: "Este planeta sofre constantes erupções vulcânicas devido à alta atividade geológica, com plumas de enxofre atingindo alturas de até 500 km acima da superfície."
 pd_hydrocarbon: "Mundo de Hidrocarbonetos"
 pd_hydrocarbon_desc: "Este planeta possui uma atmosfera densa e opaca composta de nitrogênio e metano, apresentando nuvens de etano e corpos estáveis de hidrocarbonetos líquidos."
 pd_hot_gas_giant: "Mundo de Gigante Gasoso Quente"
 pd_hot_gas_giant_desc: "Este gigante gasoso experimenta temperaturas significativamente mais altas do que a média, proporcionando padrões climáticos exploráveis para a coleta de energia e gases raros."
 pd_cloudless_gas_giant: "Mundo de Gigante Gasoso sem Nuvens"
 pd_cloudless_gas_giant_desc: "O planeta gasoso carece dos produtos químicos necessários na atmosfera para formar uma cobertura global de nuvens, criando uma visão sem características distintas da órbita."
 pd_cold_gas_giant: "Mundo de Gigante Gasoso Frio"
 pd_cold_gas_giant_desc: "As temperaturas mais baixas e os ventos estáveis do gigante gasoso proporcionam oportunidades de pesquisa para exploração."
 pd_ethane_ocean: "Mundo de Oceano de Etano"
 pd_ethane_ocean_desc: "Este mundo está coberto por oceanos de etano hidrocarboneto líquido."
 pd_dwarf_gas: "Mundo Anão Gasoso"
 pd_dwarf_gas_desc: "O planeta apresenta uma densa atmosfera de hidrogênio e hélio com camadas profundas de gelo, rocha e oceanos líquidos de água e amônia."
 pd_subglacial: "Mundo Subglacial"
 pd_subglacial_desc: "A espessa camada de gelo permanente do planeta, as baixas temperaturas e a fina atmosfera tornam a vida na superfície impossível. No entanto, o aquecimento das marés e a atividade geotérmica criam um oceano subterrâneo sob o gelo sólido."
 pd_hothouse: "Mundo Estufa"
 pd_hothouse_desc: "Um mundo rochoso cuja atmosfera está atualmente sofrendo um efeito estufa descontrolado. Letal para todas as formas de vida."

#Ambiente Engenheirado
 decision_engineered_environment_gaia: "Projeto Modelador de Mundos"
 decision_engineered_environment_gaia_desc: "Usaremos técnicas avançadas de terraformação para transformar este mundo num paraíso, proporcionando-lhe condições ideais para todas as formas de vida superiores conhecidas."
 engineered_environment_gaia: "Mundo Perfeitamente Moldado"
 engineered_environment_gaia_desc: "Técnicas avançadas de terraformação moldaram este mundo, e seu ecossistema agora tem condições ideais para todas as formas de vida superiores conhecidas."

