 pc_pd_taiga: "泰加林星球"
 pc_pd_taiga_desc: "这颗多山的森林星球拥有氮氧大气层，以及活跃却极寒的水圈，这里的冬季漫长而寒冷，夏季则短暂且凉爽。"
