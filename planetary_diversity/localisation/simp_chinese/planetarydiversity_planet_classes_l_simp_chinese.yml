 pc_pd_dry_tidally_locked: "潮汐锁定星球（干燥）"
 pc_pd_dry_tidally_locked_desc: "这是一颗拥有氮氧大气层的岩石行星。该星球被潮汐锁定，一面常昼，一面常夜。晨昏圈内存在狭窄的宜居带。恒定的光照与风力极为适合食物与能源的生产。"
