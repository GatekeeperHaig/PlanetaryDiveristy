 trait_pc_pd_supraglacial_lakes_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_travertine: "石灰华星球"
 pc_pd_travertine_desc: "拥有氮氧大气层的寒冷岩石星球。富含矿物的温泉在冰冻的地表上，塑造出了层层错落的浅色石灰华阶地。生命依附于这些层级之间的温暖水池里，在这处避风港中躲避着周遭冻原的严寒。"
 pc_pd_travertine_adj: "石灰"
