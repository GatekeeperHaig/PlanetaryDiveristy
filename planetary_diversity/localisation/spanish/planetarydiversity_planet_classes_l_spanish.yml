 pc_pd_gaia_tidally_locked_desc: "Un mundo húmedo, idóneo y templado, bloqueado por marea, con una atmósfera de nitrógeno y oxígeno y un ecosistema resiliente. Condiciones óptimas para todas las formas de vida superiores conocidas en diferentes latitudes."
 pc_pd_gaia_tidally_locked_adj: "bloqueado por marea"
 mod_pc_pd_gaia_tidally_locked_habitability: "Habitabilidad Gaia Húmeda Bloqueada por Marea"
