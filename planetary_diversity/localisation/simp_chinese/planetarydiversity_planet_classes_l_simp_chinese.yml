 pc_pd_monsoon: "季风星球"
 pc_pd_monsoon_desc: "拥有氮氧大气层的岩石星球。季节性的大气环流席卷地表，引发猛烈的季风。狂风骤雨会吞没广阔的平原，而当季风退去，漫长的酷热与干旱便会接踵而至。"
 pc_pd_monsoon_adj: "尖石"
 mod_pc_pd_monsoon_habitability: "草原星球宜居性"
