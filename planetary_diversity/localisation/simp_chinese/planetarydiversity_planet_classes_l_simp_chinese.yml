 pc_pd_fungi_desc: "拥有氮氧大气层的岩石星球。火山灰覆盖的地表上生长着大规模的沙漠真菌群落，但大部分地表环境恶劣，不适合绝大多数动植物生存。"
 pc_pd_fungi_adj: "蕈菌"
 mod_pc_pd_fungi_habitability: "沙漠星球宜居性"
 trait_pc_pd_fungi_preference: "沙漠星球偏好"
 trait_pc_pd_fungi_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_salt: "盐晶星球"
 pc_pd_salt_desc: "拥有氮氧大气层的岩石星球。地表覆盖着厚厚的矿物，主要由盐滩、山脉和大型晶体结构组成。这里的大部分地表环境恶劣，不适合大多数动植物生存。"
 pc_pd_salt_adj: "盐碱"
 mod_pc_pd_salt_habitability: "沙漠星球宜居性"
 trait_pc_pd_salt_preference: "沙漠星球偏好"
 trait_pc_pd_salt_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_aquifer: "蓄水层星球"
 pc_pd_aquifer_desc: "拥有氮氧大气的干燥岩石星球。其地表之下蕴藏着丰富的水圈，无数的潟湖散布在地表各处。虽然干热的沙地难以孕育多少生命，但潟湖与地下河中却有着丰富的生物多样性。"
 pc_pd_aquifer_adj: "蓄水"
 mod_pc_pd_aquifer_habitability: "沙漠星球宜居性"
