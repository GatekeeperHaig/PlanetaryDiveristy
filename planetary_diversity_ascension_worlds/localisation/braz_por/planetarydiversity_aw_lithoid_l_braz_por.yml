l_braz_por:
###Lithoid Planets
#Decision
 decision_pd_aw_lithoid_planet: "Criar Ecossistema Litotrófico"
 decision_pd_aw_lithoid_planet_desc: "Este mundo aguarda ser esculpido em um de cristal e pedra. O fraco ecossistema biológico está em nosso caminho."
 decision_pd_aw_lithoid_planet_effects_short: "Um ecossistema litotrófico será talhado neste mundo, permitindo-nos ajustar com precisão as frequências cristalinas para melhor atender às nossas necessidades."
 decision_pd_aw_lithoid_planet_tooltip: "Uma vez concluído, poderemos escolher a frequência dos cristais litoróficos deste planeta."
 decision_pd_aw_lithoid_planet_cleanup: "Restaurar Ecossistema Biológico"
 decision_pd_aw_lithoid_planet_cleanup_desc: "Devemos restaurar o ecossistema biológico deste planeta à sua glória original."
 decision_pd_aw_lithoid_planet_cleanup_effects_short: "O ecossistema litotrófico criado artificialmente será removido, restaurando-o à sua natureza biológica."
 decision_pd_aw_lithoid_planet_cleanup_tooltip: "Todos os Modificadores Litoróficos serão removidos e o planeta será devolvido a um ecossistema biológico."
 decision_pd_aw_lithoid_change_frequency: "Alterar Frequência Litotrófica"
 decision_pd_aw_lithoid_change_frequency_desc: "Alteraremos a frequência dos cristais do ecossistema litotrófico para melhor atender às nossas necessidades."
 decision_pd_aw_lithoid_change_frequency_effects_short: "Podemos alterar a frequência dos cristais deste planeta."
 decision_pd_aw_lithoid_change_frequency_tooltip: "O modificador Litotrófico atual será removido, permitindo-nos mudá-lo para uma frequência diferente."

#Modifiers
 pd_aw_lithoid_planet_cyan: "Mundo Litotrófico"
 pd_aw_lithoid_planet_cyan_desc: "Frequência: 500 nm\nAs vibrações ressonantes promovem a boa vontade e catalisam uma taxa de crescimento acelerada para os Litoides."
 pd_aw_lithoid_planet_red: "Mundo Litotrófico"
 pd_aw_lithoid_planet_red_desc: "Frequência: 650 nm\nA robusta ressonância cristalina se sinergiza perfeitamente com os depósitos minerais, tornando-os mais acessíveis para extração."
 pd_aw_lithoid_planet_yellow: "Mundo Litotrófico"
 pd_aw_lithoid_planet_yellow_desc: "Frequência: 580 nm\nA dinâmica harmônica desta ressonância cristalina se integra perfeitamente com nossas redes de energia, desbloqueando sua capacidade total."

#Ascension Perk
 ap_pd_lithoid_worlds: "Mundos Litoróficos"
 ap_pd_lithoid_worlds_desc: "Esculpiremos nossos mundos em paraísos litoróficos inquebráveis, forjando uma base de estabilidade eterna."
 allow_lithoid_worlds: "§HDesbloqueia Decisão:§! $decision_pd_aw_lithoid_planet$"
 describe_lithoid_worlds: "§YMundos Litoróficos§! são uma classe de planeta especial com ecossistemas de base litotrófica, que permite sintonizar a frequência de grandes estruturas cristalinas que podem melhorar $i_unity$, $i_minerals$ ou $i_energy$.\n$MOD_LITHOID_POP_HAPPINESS$: §G25%§!\n$mod_LITHOID_logistic_growth_mult$: §G25%§!\n$MOD_BIOLOGICAL_POP_HAPPINESS$: §R-50%§!\n$MOD_BIO_LOGISTIC_GROWTH_MULT$: §R-50%§!"

#Notification Message
 MESSAGE_PD_AW_LITHOID_DESC:1 "$PLANET|Y$ agora é um §YMundo Litotrófico§!"
 MESSAGE_PD_AW_LITHOID_MESSAGE_TYPE_TITLE: "Bioma Litotrófico Completo"
 MESSAGE_PD_AW_LITHOID_CLEANUP_DESC:1 "O bioma biológico em $PLANET|Y$ foi restaurado."
 MESSAGE_PD_AW_LITHOID_CLEANUP_MESSAGE_TYPE_TITLE: "Bioma Litotrófico Removido"

#Choose Event
 pdawlithoidplanets.100.name: "Frequência Cristalina"
 pdawlithoidplanets.100.desc: "Qual frequência ressonante sintonizaremos no bioma litotrófico de §Y[This.GetName]§!?"
 pdawlithoidplanets.100.cyan: "Ciano"
 pdawlithoidplanets.100.cyan.tooltip: "Esta frequência ressonante atua como uma força coesiva, promovendo a unidade entre nossa população litoide e nutrindo um aumento harmonioso no crescimento populacional."
 pdawlithoidplanets.100.red: "Vermelho"
 pdawlithoidplanets.100.red.tooltip: "Esta ressonância se sinergiza perfeitamente com os depósitos minerais, tornando-os mais acessíveis e propícios para extração."
 pdawlithoidplanets.100.yellow: "Amarelo"
 pdawlithoidplanets.100.yellow.tooltip: "Esta frequência ressonante se integra perfeitamente com nossas redes de energia, desbloqueando um aumento em sua capacidade total."

