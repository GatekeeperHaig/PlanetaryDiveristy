 pd_aw_agriworld_tooltip: "£district£ §G$district_farming_plural$§! sin límite máximo"

 #Technology
 tech_pd_planetary_agriworld: "Superproyecto Planetario: Mundo Agrícola"
 tech_pd_planetary_agriworld_desc: "Al transformar un planeta en un Mundo Agrícola, crearemos vastos campos de agricultura industrial, reemplazando el ecosistema natural con una expansión agrícola artificial y abundante."
