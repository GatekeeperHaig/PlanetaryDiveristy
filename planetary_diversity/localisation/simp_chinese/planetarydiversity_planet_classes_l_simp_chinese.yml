 trait_pc_pd_barnacle_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_sodalite: "方钠石星球"
 pc_pd_sodalite_desc: "拥有氮氧大气层的岩质沙漠星球。浩瀚的方钠石矿床如脉络般延展于荒芜的平原与峡谷峭壁之上，在这片干旱的大地上，零星散落的露头岩石不时将这连绵的景致打破。"
 pc_pd_sodalite_adj: "矿物质"
