###Edificios Raros
 building_megalfora_mine: "Minería de Raíces de Megaflora"
 building_megalfora_mine_desc: "Las gigantescas raíces de los árboles de megaflora se adentran profundamente en la corteza, exponiendo depósitos minerales de difícil acceso."
 building_megalfora_lab: "Laboratorio de Investigación de Megaflora"
 building_megalfora_lab_desc: "Hay mucho que podemos aprender de la estructura única de los árboles de megaflora y los bosques circundantes."
 building_megalfora_grid: "Grifo de Savia de Megaflora"
 building_megalfora_grid_desc: "El sistema de savia de los árboles de megaflora contiene una abundancia de energía que puede aprovecharse sin efecto negativo sobre los propios árboles, mejorando nuestra producción de energía."
 building_petrified_mine: "Operación Minera Petrificada"
 building_petrified_mine_desc: "La abundancia de madera petrificada en el planeta permite un fácil acceso a los minerales."
 building_petrified_guild: "Carpintería Petrificada"
 building_petrified_guild_desc: "La composición única de la madera petrificada permite crear impresionantes productos de consumo."
 building_petrified_lab: "Red de Investigación Petrificada"
 building_petrified_lab_desc: "El turbulento pasado del planeta brinda abundantes oportunidades de investigación."
 building_reef_lab: "Investigación Acuática en Arrecifes"
 building_reef_lab_desc: "Las estructuras únicas de los arrecifes y la rica biodiversidad permiten a nuestra investigación realizar descubrimientos únicos."
 building_reef_guild: "Gremio de Artesanos del Arrecife"
 building_reef_guild_desc: "El arrecife puede usarse para crear bienes de consumo originales y hermosos."
 building_reef_mine: "Consorcio Minero del Arrecife"
 building_reef_mine_desc: "Los arrecifes ricos en minerales pueden explotarse, mejorando la producción mineral del planeta."
 building_archipelago_foundry: "Fundición de Lava del Archipiélago"
 building_archipelago_foundry_desc: "La rica actividad volcánica puede mejorar considerablemente nuestras fundiciones."
 building_archipelago_farm: "Agricultura Volcánica del Archipiélago"
 building_archipelago_farm_desc: "El alto contenido de suelo volcánico puede aprovecharse para mejorar los rendimientos agrícolas."
 building_archipelago_resort: "Red de Complejos de Playa del Archipiélago"
 building_archipelago_resort_desc: "Muchas de las islas son hermosas y seguras, lo que las convierte en destinos ideales para complejos turísticos y spas."
 building_biolumen_lab: "Estación de Investigación Bioluminiscente"
 building_biolumen_lab_desc: "Las junglas bioluminiscentes albergan una increíble variedad de formas de vida únicas y están llenas de descubrimientos médicos e industriales por explorar."
 building_biolumen_resort: "Complejo Turístico Bioluminiscente"
 building_biolumen_resort_desc: "Las junglas bioluminiscentes son hermosas. Este sistema de complejos ofrece todo lo que cualquiera podría desear bajo el cálido resplandor de las plantas bioluminiscentes."
 building_biolumen_farm: "Red Agrícola Bioluminiscente"
 building_biolumen_farm_desc: "La abundancia de vida vegetal aquí desarrollada permite a nuestros agricultores utilizar cultivos bioluminiscentes, haciendo la agricultura más eficiente en este planeta."
 building_geothermal_grid: "Red de Energía Geotérmica"
 building_geothermal_grid_desc: "Al conectar nuestra red eléctrica a la poderosa actividad geotérmica de este planeta, podemos aumentar la producción de nuestros técnicos."
 building_geothermal_foundry: "Filtración de Lodo Geotérmico"
 building_geothermal_foundry_desc: "El lodo geotérmico está repleto de recursos raros y valiosos; con la filtración adecuada, puede usarse para mejorar la producción de nuestras fundiciones."
 building_geothermal_lab: "Departamento de Ingeniería Geotérmica"
 building_geothermal_lab_desc: "La intensa actividad geotérmica y las extremas diferencias de temperatura obligan a los ingenieros a emplear soluciones únicas para problemas de ingeniería habituales."
 building_salt_lab: "Laboratorio de Análisis de Sal"
 building_salt_lab_desc: "Las raras formaciones de sal de este planeta tienen muchos posibles usos industriales y técnicos; estudiarlas mejora la calidad de la investigación realizada aquí."
 building_salt_mine: "Minería de Cristales de Sal"
 building_salt_mine_desc: "Los raros cristales de sal aquí permiten a las operaciones mineras encontrar minerales raros y novedosos con facilidad."
 building_salt_foundry: "Fundiciones Mejoradas con Sal"
 building_salt_foundry_desc: "Algunas de las sales raras pueden usarse para mejorar la calidad y cantidad de aleaciones producidas."
 building_aquifer_farm: "Red Agrícola del Acuífero"
 building_aquifer_farm_desc: "Al aprovechar la red de acuíferos para la producción de alimentos, podemos mejorar enormemente la producción agrícola de este mundo."
 building_aquifer_resort: "Servicios Vacacionales del Acuífero"
 building_aquifer_resort_desc: "Estos complejos permiten a los turistas disfrutar de la belleza natural del acuífero y de sus frescas y ricas aguas."
 building_aquifer_lab: "Laboratorio Subterráneo del Acuífero"
 building_aquifer_lab_desc: "Este laboratorio estudia las formas de vida únicas encontradas en el sistema de acuíferos subterráneos."
 mod_building_aquifer_lab_max: "Máx. $building_aquifer_lab$s"
 building_primal_foundry: "Fundición de Magma Primigenio"
 building_primal_foundry_desc: "La actividad volcánica de fácil acceso puede usarse para mejorar la producción de la fundición."
 building_primal_grid: "Red de Energía Primigenia"
 building_primal_grid_desc: "Los altos niveles de actividad volcánica pueden aprovecharse para mejorar la generación de energía."
 building_primal_mine: "Minería en Piroductos Primigenios"
 building_primal_mine_desc: "Los altos niveles de actividad volcánica crearon numerosos piroductos antiguos que dan acceso a ricas venas minerales."
 building_coral_resort: "Complejo Turístico de los Bosques de Coral"
 building_coral_resort_desc: "El clima seco y los coloridos bosques de coral constituyen espectaculares destinos vacacionales."
 building_coral_lab: "Puestos de Investigación del Bosque de Coral"
 building_coral_lab_desc: "El coral terrestre único guarda muchos secretos para biólogos e ingenieros por igual."
 building_coral_guild: "Gremio de Artesanos del Coral"
 building_coral_guild_desc: "El coral terrestre encontrado en este planeta es hermoso y tiene muchos usos de consumo."
 building_supercon_farm: "Sistema de Irrigación Supercontinental"
 building_supercon_farm_desc: "Este mundo tiene mucho espacio abierto para cultivar y agua, pero no en el mismo lugar. Este avanzado sistema de irrigación permite mejorar la producción agrícola."
 building_supercon_lab: "Red de Investigación Supercontinental"
 building_supercon_lab_desc: "El supercontinente ofrece oportunidades de investigación únicas, estudiando la colección de flora y fauna y el estado de la tectónica de placas."
 building_supercon_grid: "Red de Energía Supercontinental"
 building_supercon_grid_desc: "El interior de este supercontinente es seco, abierto y árido. Un lugar perfecto para instalar una gran red solar y mejorar la producción de energía planetaria."
 building_pd_sinkhole_mine: "Gremio Minero de Sumideros"
 building_pd_sinkhole_mine_desc: "Los sumideros ofrecen numerosas y ricas oportunidades mineras."
 building_pd_sinkhole_guild: "Bienes Subterráneos de Sumideros"
 building_pd_sinkhole_guild_desc: "Las cuevas y sumideros permiten acceder a materiales valiosos."
 building_pd_sinkhole_lab: "Red de Investigación de Sumideros"
 building_pd_sinkhole_lab_desc: "Los sumideros albergan formas de vida únicas y plantean numerosos desafíos de ingeniería para su aprovechamiento."
 building_storm_lab: "Laboratorios de Meteorología de Tormentas"
 building_storm_lab_desc: "El clima extremo de este planeta permite el estudio práctico de nuevas técnicas de ingeniería y el análisis de patrones meteorológicos."
 building_storm_grid: "Red de Parques Eólicos de Tormenta"
 building_storm_grid_desc: "Los vientos extremos de este planeta aumentan la producción de energía de la red eléctrica planetaria."
 building_storm_mine: "Minería en Fosas Erosionadas por Tormentas"
 building_storm_mine_desc: "El clima extremo de este planeta erosiona parte de la superficie a niveles tan bajos que existen muchas oportunidades mineras de fácil acceso."
 building_iceberg_lab: "Red de Laboratorios de Estudio de Icebergs"
 building_iceberg_lab_desc: "Los constantes icebergs ofrecen oportunidades únicas de investigación en ingeniería y biología."
 building_iceberg_farm: "Cultivo de Kelp en Icebergs"
 building_iceberg_farm_desc: "El kelp de este mundo crece con tanta abundancia que cualquier actividad agrícola aquí es altamente productiva."
 building_iceberg_foundry: "Fundición de Icebergs"
 building_iceberg_foundry_desc: "El agua salada fría y la abundancia de sales permiten mejorar la producción de aleaciones."
 building_cryo_lab: "Red de Investigación Criónica"
 building_cryo_lab_desc: "Estudiar la flora y fauna de este mundo ampliará las oportunidades de nuestros investigadores."
 building_cryo_guild: "Gremio de Artesanos Criónicos"
 building_cryo_guild_desc: "La crioprotína tiene muchas aplicaciones industriales y los artesanos de este planeta pueden crear asombrosos productos únicos."
 building_cryo_grid: "Red de Aprovechamiento de Crioprotína"
 building_cryo_grid_desc: "Aquí procesamos la Cryoflora para obtener sus raras proteínas y mejorar la generación de energía."
 building_lichen_farm: "Granja de Líquenes"
 building_lichen_farm_desc: "Estas granjas aprovechan los líquenes aquí presentes para mejorar la producción."
 building_lichen_grid: "Biorreactor de Líquenes"
 building_lichen_grid_desc: "Al añadir el exceso de líquenes a los biorreactores, podemos mejorar la producción de energía."
 building_lichen_lab: "Centro de Investigación de Líquenes"
 building_lichen_lab_desc: "Esta instalación de investigación estudia la biodiversidad única y los usos industriales del bosque de líquenes."
 building_cryo_resort: "Complejo Turístico de Cryoflora"
 building_cryo_resort_desc: "Este enorme complejo está construido en torno a los ricos y hermosos bosques de Cryoflora, creando oportunidades turísticas para todo el planeta."
 building_glacio_foundry: "Forjas de Magma Glaciovolcánicas"
 building_glacio_foundry_desc: "Las forjas especializadas aprovechan la alta energía volcánica para mejorar la producción de nuestras fundiciones."
 building_glacio_resort: "Complejos de Aguas Termales Glaciovolcánicas"
 building_glacio_resort_desc: "Esta red de complejos aprovecha las abundantes fuentes termales aquí presentes."
 building_glacio_mine: "Minas en Piroductos Glaciovolcánicos"
 building_glacio_mine_desc: "Los piroductos inactivos de este mundo permiten a nuestros mineros acceder a minerales de difícil extracción."
 building_lanthanide_guild: "Bienes de Consumo de Lantánidos"
 building_lanthanide_guild_desc: "Este gremio de artesanos aprovecha la rara abundancia de metales lantánidos para crear únicos bienes de consumo."
 building_lanthanide_lab: "Red de Investigación de Lantánidos"
 building_lanthanide_lab_desc: "Esta red de laboratorios y sitios de prueba permite a nuestros investigadores encontrar nuevas y novedosas formas de usar los lantánidos."
 building_lanthanide_mine: "Minería de Depósitos de Lantánidos"
 building_lanthanide_mine_desc: "Los ricos depósitos de lantánidos hacen que la minería sea especialmente productiva en este mundo."
 building_wet_td_farm: "Complejo Agrícola de Bloqueo Mareal"
 building_wet_td_farm_desc: "La luz solar constante hace que el cultivo de alimentos sea increíblemente eficiente."
 building_wet_td_grid: "Energía Renovable de Bloqueo Mareal"
 building_wet_td_grid_desc: "La constante luz solar y el viento permiten redes de energía eficientes."
 building_wet_td_bio_lab: "Laboratorios de Estudio Biológico de Bloqueo Mareal"
 building_wet_td_bio_lab_desc: "Cada zona del planeta tiene zonas ambientales tan únicas que la flora y la fauna han divergido de formas singulares y novedosas."
 building_karst_grid: "Captación Geotérmica en Cavernas"
 building_karst_grid_desc: "Las cuevas profundas permiten un fácil acceso a la rica energía geotérmica, mejorando la generación de energía planetaria."
 building_karst_lab: "Gremio de Ingeniería de Cavernas"
 building_karst_lab_desc: "Construir ciudades bajo tierra no es tarea sencilla. Este gremio coordina con los investigadores locales mejorando el rendimiento de ingeniería aquí."
 building_karst_mine: "Consorcio Minero Kárstico"
 building_karst_mine_desc: "Las cuevas profundas permiten un fácil acceso a ricas venas de mineral, mejorando la producción mineral planetaria."
 building_superhab_lab: "Laboratorios de Evolución Superhabitable"
 building_superhab_lab_desc: "Aunque los mundos superhabitables no son ideales para todas las criaturas, son ideales para que evolucione la vida biológica. La frecuencia de descubrimientos mejora la investigación social a escala planetaria."
 building_superhab_farm: "Red Agrícola Superhabitable"
 building_superhab_farm_desc: "Las condiciones de crecimiento ideales de este planeta permiten niveles de producción agrícola superiores a los normales."
 building_superhab_foundry: "Fundiciones de Alta Gravedad Superhabitables"
 building_superhab_foundry_desc: "Fabricar aleaciones con esta alta gravedad significa que las aleaciones densas de alta calidad son más fáciles de producir."

 #Edificios Gaia
 building_gaia_lab: "Centro de Investigación Gaia"
 building_gaia_lab_desc: "Desde este centro, los investigadores controlan y mantienen el entorno ideal del planeta, ofreciendo a menudo novedosas oportunidades de investigación."
 building_gaia_unity_admin: "Coordinación Burocrática Gaia"
 building_gaia_unity_admin_desc: "Las laberínticas oficinas de este centro de coordinación se complementan con impresionantes vistas y áreas comunes idílicas, mejorando significativamente el rendimiento de los burócratas planetarios."
 building_gaia_unity_temple: "Coordinación Eclesiástica Gaia"
 building_gaia_unity_temple_desc: "Este palaciego edificio administrativo de templo está situado en lo profundo de la idílica vegetación. Las impresionantes vistas rejuvenecen e inspiran a los miembros del clero que lo visitan."
 building_gaia_unity_robot: "Centro de Coordinación Gaia"
 building_gaia_unity_robot_desc: "Los sistemas ideales de control de temperatura y clima de este planeta mejoran la capacidad de procesamiento de los Coordinadores alojados aquí."
 building_gaia_unity_servitor: "Paraíso de Bio-Trofeos Gaia"
 building_gaia_unity_servitor_desc: "Con un entorno tan ideal como este, satisfacer cada necesidad de un ser orgánico sapiente es mucho más fácil, y los casos de expresión de autodeterminación disminuyen drásticamente. Los orgánicos en su interior tienen sus necesidades de vivienda completamente satisfechas."
 building_gaia_unity_hive: "Nodo de Coordinación Gaia"
 building_gaia_unity_hive_desc: "Los sistemas ideales de control de temperatura y clima de este planeta proporcionan tal comodidad a los drones que pueden concentrar mucho más de su capacidad mental en la cohesión del enjambre."
 building_gaia_resort: "Complejo Turístico Idílico Gaia"
 building_gaia_resort_desc: "El clima controlado y las impresionantes vistas permiten alcanzar la cima de los complejos turísticos tanto para el entretenimiento como para las necesidades médicas."

 #Decisión: Nukear el propio planeta
 decision_nuked_own_planet: "Nukear el Entorno"
 decision_nuked_own_planet_desc: "Necesitamos un entorno radiactivo para prosperar. Podemos transformar este mundo a nuestras necesidades actuales utilizando ojivas nucleares convencionales."

 #Ascensión por Inundación
 decision_pd_flood_planet: "Expandir el Mar Planetario"
 decision_pd_flood_planet_desc: "Este planeta oceánico tiene el potencial de ser un hogar ideal para nuestra gente. Ajustando los niveles del mar y trasladando las ciudades bajo el agua, podemos asegurar que la vida florezca para quienes están adaptados a vivir bajo las olas."
 decision_pd_flood_planet_tooltip: "El hielo será extraído de un sistema con una §Y$sm_ice_mining_station$§!\nModificador §Y$pd_aw_flooded_planet$§! añadido:\n$pd_aw_flooded_planet_tooltip$"
 pd_aw_flooded_planet: "Planeta Inundado"
 decision_pd_unflood_planet: "Desanegar el Mundo"
 decision_pd_unflood_planet_desc: "Esto eliminará el ecosistema inundado de este mundo, devolviéndolo a su estado original."

 ICE_MINING_PD_PLANET_SUCCESS_TITLE: "Planeta Inundado"
 ICE_MINING_PD_PLANET_SUCCESS_DESC: "Usando hielo extraído del sistema $SYSTEM|Y$, hemos logrado inundar §Y[This.GetName]§!."

 decision_pd_build_dayside_farm: "$decision_build_dayside_farm$"
 decision_pd_build_dayside_farm_desc: "$decision_build_dayside_farm_desc$"
 decision_pd_build_dayside_farm_effects_short: "$decision_build_dayside_farm_effects_short$"

 #Terraformación Gaia
 policy_pd_gaia_modifier: "Modelado de Mundos"
 policy_pd_gaia_modifier_desc: "Aunque costoso, podemos aplicar nuestras avanzadas técnicas de terraformación a cada proyecto planetario, asegurándonos de que cada planeta terraformado sea moldeado a la perfección."
 pd_expensive_gaia_terraforming_name: "Terraformación Moldeadora de Mundos"
 pd_expensive_gaia_terraforming: "Terraformación Moldeadora de Mundos"
 pd_expensive_gaia_terraforming_desc: "Todos los proyectos de terraformación obtendrán el §Y$engineered_environment_gaia$ Modificador§!. Esto encarecerá todos los proyectos de terraformación."
 pd_normal_terraforming_name: "Estándar de Terraformación Normal"
 pd_normal_terraforming: "Estándar de Terraformación Normal"
 pd_normal_terraforming_desc: "Los costes de terraformación se mantendrán estándar; usaremos el Moldeador de Mundos en los planetas que elijamos."

 #Mundo Nemma
 pd_nemma: "Mundo Nemma"
 pd_nemma_desc: "Las islas de este planeta son en realidad reptiles anfibios colosales con caparazón mineral. Llamados Nemmas, flotan en la superficie y permanecen dóciles si no se les molesta."
 #Alpha Centauri
 pd_alpha_centauri: "Mundo Chirón"
 pd_alpha_centauri_desc: "El planeta está cubierto de crecimientos xeno-fúngicos y azotado por condiciones meteorológicas extremas e inestabilidad sísmica. A pesar de estos peligros, sus ricos recursos y su resiliente biosfera ofrecen valiosas oportunidades de investigación y explotación."

 #Zonas
 zone_pd_hive_spawning: "Zona de Reproducción de la Colmena"
 zone_pd_hive_spawning_desc: "Una zona dedicada a la reproducción de nuevos drones."
 zone_pd_machine_replication: "Zona de Replicación de Máquinas"
 zone_pd_machine_replication_desc: "Una zona dedicada a la construcción de nuevas unidades de máquinas."

 #Planeta Pelágico
 pd_pelagic_planet: "Pelágico"
 pd_pelagic_planet_desc: "Este planeta está casi completamente envuelto por un océano global, con casi ninguna masa terrestre que emerja a la superficie."
