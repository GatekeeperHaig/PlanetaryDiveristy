 pc_pd_domed_colony_cave: "Colônia Abobadada Cavernosa"
 pc_pd_domed_colony_cave_desc: "Mundo árido, rochoso e cavernoso com uma atmosfera fina ou inexistente, a superfície completamente desprovida de vida e coberta de crateras de impacto de meteoros. Colônias abobadadas foram construídas na superfície, permitindo habitação permanente."
