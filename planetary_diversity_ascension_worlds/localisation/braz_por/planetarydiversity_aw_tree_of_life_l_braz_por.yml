 concept_pd_aw_tree_of_life_modifier: "$pd_aw_tree_of_life_home$"
 concept_pd_aw_tree_of_life_modifier_desc: "- Desbloqueia ['concept_generator_district', £district£ $district_generator_plural$]$NEW_LINE$- Desbloqueia ['concept_mining_district', £district£ $district_mining_plural$]$NEW_LINE$- Desbloqueia ['concept_farming_district', £district£ $district_farming_plural$]\n\n§L$pd_aw_tree_of_life_home_desc$§!"
 concept_pd_aw_tree_of_life_sapling: "$d_pd_aw_tree_of_life_colony$"
 concept_pd_aw_tree_of_life_sapling_desc: "- $MOD_LOGISTIC_GROWTH_MULT$: §G+10%§!\n- $mod_planet_jobs_society_research_produces_mult$: §G+10%§!\n- $MOD_PLANET_HOUSING_ADD$: §G+5§!\n- $mod_district_farming_max$: §G+2§!\n- Manutenção: 20 $i_food$\n- $MOD_PLANET_MAX_DISTRICTS_ADD$: §R-1§!\n\n§L$d_tree_of_life_colony_desc$§!"
