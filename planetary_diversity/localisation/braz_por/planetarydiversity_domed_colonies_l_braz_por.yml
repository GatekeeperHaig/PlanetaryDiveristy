 trait_pc_pd_domed_colony_frozen_preference_desc: "Placeholder/Should not see."
 pc_pd_domed_colony_toxic: "Colônia Abobadada Tóxica"
 pc_pd_domed_colony_toxic_desc: "Este mundo é um planeta rochoso com uma atmosfera densa letal para todas as formas de vida superiores conhecidas. Grandes cidades flutuantes abobadadas acima das nuvens tóxicas permitem habitação permanente."
