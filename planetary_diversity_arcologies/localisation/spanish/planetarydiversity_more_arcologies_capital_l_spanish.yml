l_spanish:

#Senate
 decision_pd_arcology_senate: "Construir Cúpula del Senado"
 decision_pd_arcology_senate_desc: "Para satisfacer las crecientes necesidades de nuestra nación, debemos construir un monumental edificio del senado en nuestra capital, dedicando un espacio sustancial para mejorar las capacidades administrativas de nuestro gobierno."
 decision_pd_arcology_senate_effects: "Añade el §Y$d_pd_senate_building$§! a esta capital, intercambiando distritos potenciales para mejorar las capacidades administrativas de nuestro gobierno."
 d_pd_senate_building: "Cúpula del Senado"
 d_pd_senate_building_desc: "La Cúpula del Senado, un majestuoso símbolo de gobernanza, se alza imponente como el corazón administrativo donde se forja el futuro de nuestra civilización."

#Palace
 decision_pd_arcology_palace: "Construir Complejo Palatino"
 decision_pd_arcology_palace_desc: "Para reflejar el poder y la autoridad de nuestro imperio, erigiremos un colosal palacio en nuestra capital. Esta grandiosa edificación encarnará el poder de nuestro liderazgo y aumentará significativamente nuestra administración gubernamental."
 decision_pd_arcology_palace_effects: "Añade el §Y$d_pd_palace_building$§! a esta capital, intercambiando distritos potenciales para mejorar las capacidades administrativas de nuestro gobierno."
 d_pd_palace_building: "Complejo Palatino"
 d_pd_palace_building_desc: "El Complejo Palatino, un grandioso símbolo de nuestra soberanía y del poder de nuestro gobernante, domina la capital. Es el corazón de la gobernanza, donde se forja el destino de nuestro imperio."

#Headquarters
 decision_pd_arcology_headquarters: "Construir Sede Planetaria"
 decision_pd_arcology_headquarters_desc: "Para mostrar el poder y la influencia de nuestra megacorporación, construiremos una imponente sede central en este centro económico. Esta imponente estructura representará la fortaleza de nuestro liderazgo y potenciará enormemente nuestras operaciones galácticas."
 decision_pd_arcology_headquarters_effects: "Añade el §Y$d_pd_headquarters_building$§! a esta capital, intercambiando distritos potenciales para mejorar las capacidades administrativas de nuestra corporación."
 d_pd_headquarters_building: "Sede Planetaria"
 d_pd_headquarters_building_desc: "Un monumental símbolo de dominio, esta sede se alza sobre el planeta. Sirve como centro neurálgico de nuestras operaciones, donde se fragua el futuro de nuestra megacorporación."

#Hive Confluence Spire
 decision_pd_hive_confluence_spire: "Construir Aguja de Confluencia"
 decision_pd_hive_confluence_spire_desc: "Para manifestar la supremacía y el alcance de nuestro colectivo, haremos crecer una poderosa aguja de confluencia. Esta imponente estructura amplificará significativamente nuestras operaciones a través de las estrellas."
 decision_pd_hive_confluence_spire_effects: "Añade el §Y$d_pd_confluence_spire_building$§! a esta capital, intercambiando distritos potenciales para mejorar nuestras capacidades administrativas."
 d_pd_confluence_spire_building: "Aguja de Confluencia"
 d_pd_confluence_spire_building_desc: "Esta aguja se alza suprema sobre la superficie del planeta, un imponente faro de control. Es el centro de nuestra voluntad colectiva, donde nuestro camino entre las estrellas se teje intrincadamente."

#Machine Centralized Processing
 decision_pd_machine_centralized_processing: "Construir Unidad de Procesamiento Centralizado"
 decision_pd_machine_centralized_processing_desc: "Para afirmar nuestra superioridad y ampliar la capacidad operativa, construiremos una Unidad de Procesamiento Centralizado. Esta estructura potenciará significativamente nuestras funciones galácticas."
 decision_pd_machine_centralized_processing_effects: "Añade el §Y$d_pd_machine_centralized_processing$§! a esta capital, intercambiando distritos potenciales para mejorar nuestras capacidades administrativas."
 d_pd_machine_centralized_processing: "Unidad de Procesamiento Centralizado"
 d_pd_machine_centralized_processing_desc: "Esta unidad de procesamiento domina la superficie planetaria y es el nodo central para nuestras directivas colectivas, orquestando intrincadamente a nuestros drones."
