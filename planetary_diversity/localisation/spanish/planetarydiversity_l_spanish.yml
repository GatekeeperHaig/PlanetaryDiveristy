 policy_pd_terraforming: "Terraformación"
 policy_pd_terraforming_desc: "Podemos decidir cómo nuestros científicos abordan la terraformación de nuestros planetas."
 pd_choose_every_planet_terraforming_name: "Elegir Cada Bioma"
 pd_choose_every_planet: "Elegir Cada Bioma"
 pd_choose_every_planet_desc: "Podremos tomar una decisión sobre la selección de bioma al final de cada proyecto de terraformación."
 pd_same_as_homeworld_terraforming_name: "Homogeneidad del Mundo Natal"
 pd_same_as_homeworld: "Homogeneidad del Mundo Natal"
 pd_same_as_homeworld_desc: "Los planetas apropiados serán terraformados a la misma clase, los demás serán terraformados a clases aleatorias."
 pd_random_same_class_terraforming_name: "Bioma Similar Aleatorio"
 pd_random_same_class: "Bioma Similar Aleatorio"
 pd_random_same_class_desc: "Seleccionaremos aleatoriamente cualquier bioma dentro del mismo grupo de planetas."

