 concept_pd_crystal_desc: "—$district_farming_plural$最大数量：§G+3%§!\n—$district_mining_plural$最大数量：§G+3%§!\n—£job_farmer£ ['concept_farmer']产出的£food£ 食物：§G+2§!"
 tech_acean_research: "艾森水晶加工"
 tech_acean_research_desc: "掌握如何在采集后保留艾森水晶的强大功效绝非易事，这需要时间才能彻底摸透。"
 tech_acean_research_tt_desc: "§H解锁：§!艾森水晶开采\n§H解锁：§!艾森水晶法令"
 edict_acean_pop_growth: "艾森水晶都市设施"
 edict_acean_pop_growth_desc: "融入城市基础设施的艾森水晶能够提升幸福感，街道和空间的设计旨在最大程度地发挥这种水晶对身心健康的积极作用。"
 edict_acean_shield_resonance: "艾森水晶护盾谐振"
 edict_acean_shield_resonance_desc: "艾森水晶的独特共振频率可应用于我们的护盾发生器，大幅提升其强度与再生能力。"
