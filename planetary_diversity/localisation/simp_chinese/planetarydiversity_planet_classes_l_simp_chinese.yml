 pc_pd_cold_cave: "岩洞星球（寒冷）"
 pc_pd_cold_cave_desc: "拥有氮氧大气层的岩石星球。因磁层微弱，地表多为荒芜岩石。地表之下分布着无尽的洞穴群，其冰冻水圈维持着地衣与苔藓的生存。"
