 pc_pd_hive_superhabitable_arc: "초적합 초월체 행성"
 pc_pd_hive_superhabitable_arc_desc: "이 초적합 행성은 행성 전체가 하나의 살아 있는 거대한 유기체이며, 이를 만든 군체 의식과 정교하게 연결되어 있습니다. 이 행성은 군체를 위한 고도의 사고 과정의 거점으로 기능하며, 단단히 방어되고 있습니다. 군체의 일원이 아닌 존재가 발을 디디면 지형 자체에 공격받을 것입니다."
