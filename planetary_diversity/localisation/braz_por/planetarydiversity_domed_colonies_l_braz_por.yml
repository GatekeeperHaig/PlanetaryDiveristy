###Colônias Abobadadas
#Megaestrutura
 pd_domed_colony_0: "Colônia Abobadada"
 pd_domed_colony_0_DESC: "Este planeta possui o potencial para terraformação. Ao estabelecer uma Colônia Abobadada, podemos criar uma base que serve de ponto de partida para a transformação gradual do ambiente planetário."
 pd_domed_colony_0_MEGASTRUCTURE_DETAILS: "Uma §YColônia Abobadada§! é uma colônia de domos de habitação autossuficientes em um planeta com potencial para ser terraformado."
 requires_terraforming_candidate: "$TRIGGER_FAIL$Deve ter um modificador de Candidato à Terraformação."
 requires_correct_planet_class: "$TRIGGER_FAIL$A Classe Planetária deve permitir a construção de uma Colônia Abobadada."
 requires_pd_colony: "$TRIGGER_FAIL$Deve haver pelo menos 1 Colônia Não Artificial neste sistema."
 requires_pd_moon_base_site: "$TRIGGER_FAIL$Deve ter um modificador de Sítio de Posto Planetário."
 pd_domed_base_0: "Posto Planetário"
 pd_domed_base_0_DESC: "Este planeta inabitável é um local ideal para um Posto Planetário. Está destinado a se tornar um hub de apoio às colônias vizinhas no sistema solar."
 pd_domed_base_0_MEGASTRUCTURE_DETAILS: "Um §YPosto Planetário§! é uma base autossuficiente de valor estratégico em um planeta inabitável. Embora não seja grande o suficiente para colonização permanente, impulsiona a economia do sistema local."
 TARGET_DOME_BASE_NAME: "[FROM.from.planet.GetName] Base"

