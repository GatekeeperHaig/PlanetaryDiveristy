 pc_pd_treeline: "林线星球"
 pc_pd_treeline_desc: "一颗拥有氮氧大气的寒冷岩石行星。除了赤道一带蓬勃发展的繁茂森林生态系统外，该行星的地表几乎全被冰原所覆盖。"
