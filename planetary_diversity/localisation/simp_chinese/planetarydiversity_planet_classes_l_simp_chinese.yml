 pc_pd_cenote: "溶井星球"
 pc_pd_cenote_desc: "潮湿的岩石星球，拥有浓厚的氮氧大气层。巨大的溶井与地下暗河系统在这颗星球的地表之下蜿蜒交错。大部分陆地都被茂密的植被所覆盖。"
 pc_pd_cenote_adj: "地陷"
