 #Habitats

#Modificadores
 hab_terraforming_candidate: "Candidato à Terraformação"
 hab_terraforming_candidate_desc: "Embora árido e desprovido de vida, este planeta possui água em forma congelada e pode ter abrigado um ecossistema próspero no passado. Com a tecnologia certa, poderia ser terraformado em um mundo habitável."
 pd_domed_colony: "Colônia Abobadada"
 pd_domed_colony_desc: "Os residentes da colônia vivem sob uma rede avançada de domos protetores que os protegem das condições inóspitas do planeta. Embora ofereçam segurança, essas estruturas exigem altos custos de manutenção e expansão."
 pd_moon_base_trade: "Posto Lunar Comercial"
 pd_moon_base_trade_desc: "Bairros comerciais, armazéns e portos espaciais habitam esta rede avançada de domos protetores, estabelecendo-a como um animado hub comercial. Conectada ao seu planeta-mãe, esta base abobadada depende do vínculo vital com o mundo habitável próximo para sobreviver."
 pd_moon_base_military: "Posto Lunar Militar"
 pd_moon_base_military_desc: "Arsenais, quartéis e rampas de lançamento dominam a paisagem ao redor desta rede avançada de domos protetores. Esta base abobadada depende do mundo habitável vizinho para suporte logístico."
 pd_moon_base_factory: "Posto Lunar Industrial"
 pd_moon_base_factory_desc: "Fábricas, oficinas artesanais e centros de fabricação são o coração desta rede avançada de domos protetores. Ligada ao mundo habitável próximo, ela depende desta conexão para seus recursos e a distribuição de seus bens manufaturados."
 pd_moon_base_foundry: "Posto Lunar de Fundição"
 pd_moon_base_foundry_desc: "Fundições e plantas de processamento de ligas são o núcleo desta rede avançada de domos protetores. Estreitamente ligada ao seu planeta-mãe, esta base abobadada depende da conexão essencial com o mundo habitável próximo para matérias-primas e a exportação de suas ligas acabadas."
 pd_moon_base_admin: "Posto Lunar Administrativo"
 pd_moon_base_admin_desc: "Escritórios governamentais e agências burocráticas preenchem esta rede avançada de domos protetores. Ligada ao seu planeta-mãe, esta base abobadada depende da conexão crucial com o mundo habitável próximo para suprimentos e manutenção."
 pd_moon_base_priest: "Posto Lunar Eclesiástico"
 pd_moon_base_priest_desc: "Templos e santuários ocupam esta rede avançada de domos protetores, distinguindo-a como um centro espiritual para os fiéis. Esta base abobadada está ligada ao seu planeta-mãe e depende da sagrada conexão com o mundo habitável próximo."
 pd_domed_base_research: "Posto Planetário de Pesquisa"
 pd_domed_base_research_desc: "Laboratórios e instalações de pesquisa dominam esta rede avançada de domos protetores. Está vinculada a planetas do sistema solar e depende desse vínculo para recursos essenciais."
 pd_domed_base_mining: "Posto Planetário de Mineração"
 pd_domed_base_mining_desc: "Minas e instalações de extração são a espinha dorsal desta rede avançada de domos protetores. Está ancorada a planetas do sistema solar, dependendo desta conexão para fornecer recursos essenciais e transportar os materiais extraídos."
 pd_domed_base_energy: "Posto Planetário Gerador"
 pd_domed_base_energy_desc: "Usinas de energia e conversores formam o núcleo desta rede avançada de domos protetores. Ligada a planetas do sistema solar, depende desta conexão para recursos vitais e a distribuição de créditos de energia."
 pd_domed_base_food: "Posto Planetário Hidropônico"
 pd_domed_base_food_desc: "Fazendas hidropônicas e módulos agrícolas se estendem por esta rede avançada de domos protetores. Conectada a planetas do sistema solar, depende desta conexão para suprimentos e a disseminação de alimentos."
 pd_domed_moonbase_site_1: "Sítio de Base Lunar"
 pd_domed_moonbase_site_1_desc: "Esta lua é ideal para estabelecer um Posto Planetário, mas requer um planeta colonizado no sistema solar para garantir seu abastecimento e sustentabilidade."
 pd_domed_research_site_1: "Possível Sítio de Posto Planetário de Pesquisa"
 pd_domed_research_site_1_desc: "Este planetoide é ideal para estabelecer uma Base de Pesquisa Abobadada, mas requer um planeta colonizado no sistema solar para garantir seu abastecimento e sustentabilidade."
 pd_domed_mining_site_1: "Possível Sítio de Posto Planetário de Mineração"
 pd_domed_mining_site_1_desc: "Este planetoide é ideal para estabelecer uma Base de Mineração Abobadada, mas requer um planeta colonizado no sistema solar para garantir seu abastecimento e sustentabilidade."
 pd_domed_food_site_1: "Possível Sítio de Posto Planetário Hidropônico"
 pd_domed_food_site_1_desc: "Este planetoide é ideal para estabelecer uma Base Hidropônica Abobadada, mas requer um planeta colonizado no sistema solar para garantir seu abastecimento e sustentabilidade."
 pd_domed_energy_site_1: "Possível Sítio de Posto Planetário Gerador"
 pd_domed_energy_site_1_desc: "Este planetoide é ideal para estabelecer uma Base Geradora Abobadada, mas requer um planeta colonizado no sistema solar para garantir seu abastecimento e sustentabilidade."

#Depósitos
 #Depósitos de Terraformação
 d_phab_energy_1: "Isótopos Radioativos"
 d_phab_energy_1_desc: "Este local possui uma rica veia de isótopos radioativos, facilmente acessíveis e ideais para a geração eficiente de energia."
 d_phab_energy_2: "Lagos de Gás Congelado"
 d_phab_energy_2_desc: "Gases antigos solidificados sob imensa pressão nestes lagos gelados criam um reservatório único e valioso de recursos congelados."
 d_phab_energy_3: "Fumarolas Subterrâneas"
 d_phab_energy_3_desc: "Sedimentos metalíferos e águas subterrâneas superaquecidas se combinam em uma reação volátil, produzindo fumarolas químicas ricas em energia, ideais para a geração de potência."
 d_phab_mining_1: "Campos Minerais"
 d_phab_mining_1_desc: "Um soerguimento geológico expôs estes valiosos minerais à superfície planetária há muito tempo."
 d_phab_mining_2: "Cavernas Ricas em Minério"
 d_phab_mining_2_desc: "Estas cavernas profundas estão repletas de depósitos de minério metálico e mineral."
 d_phab_mining_3: "Montanha Rica"
 d_phab_mining_3_desc: "As encostas destas montanhas brilham com ricos recursos minerais e pedras preciosas."
 d_phab_food_1: "Depósito de Nitrogênio"
 d_phab_food_1_desc: "Depósitos dispersos de nitrogênio neste planeta podem ser vitais para transformar seu terreno em terras férteis para produção de alimentos após a terraformação."
 d_phab_food_2: "Depósito de Fósforo"
 d_phab_food_2_desc: "Depósitos dispersos de fósforo neste planeta podem ser vitais para transformar seu terreno em terras férteis para produção de alimentos após a terraformação."
 d_phab_food_3: "Depósito de Potássio"
 d_phab_food_3_desc: "Depósitos dispersos de potássio neste planeta podem ser vitais para transformar seu terreno em terras férteis para produção de alimentos após a terraformação."
 d_pd_solar_system_network_hub: "Hub de Rede Intrassolar"
 d_pd_solar_system_network_hub_desc: "Este hub é um elo vital para os postos planetários deste sistema solar. Enquanto as bases oferecem emprego e acomodação, a colônia central fornece suprimentos e recursos essenciais para sustentar as operações."

#Tecnologia
 tech_pd_domed_colonies: "Habitação Abobadada"
 tech_pd_domed_colonies_desc: "Avanços tecnológicos tornam viável o estabelecimento de colônias abobadadas em fronteiras planetárias anteriormente inóspitas."
 allow_domed_colonies: "§HDesbloqueia Megaestruturas:§! §YColônias Abobadadas§! e §YPostos Planetários§!"
 allow_domed_colonies_DETAILS: "Esta tecnologia permitirá a construção de Colônias Abobadadas e Bases em alguns mundos inabitáveis."

#Decisões
 decision_build_solar_system_network_hub: "Construir o $d_pd_solar_system_network_hub$"
 decision_build_solar_system_network_hub_desc: "Construiremos um hub ligando os Postos Planetários do sistema solar à economia deste mundo."
 decision_remove_solar_system_network_hub: "Remover o $d_pd_solar_system_network_hub$"
 decision_remove_solar_system_network_hub_desc: "Removeremos o hub que liga os Postos Planetários do sistema solar à economia deste mundo."
 decision_change_moon_base: "Substituir o Posto Planetário Lunar"
 decision_change_moon_base_desc: "Isso mudará o Posto Planetário nesta lua."
 decision_change_moon_base_effects: "Poderemos escolher um uso diferente para o Posto Planetário desta lua."
 decision_pd_flood_domed_colony: "Inundar a Colônia Abobadada"
 decision_pd_flood_domed_colony_desc: "As Colônias Abobadadas poderiam ser ideais para nós, se apenas houvesse água suficiente. Nossas redes de mineração de gelo nos permitem colher gelo de outros corpos celestes e inundar [This.GetName], transformando-o em um aquário abobadado."

