 concept_pd_network_hub: "$d_pd_solar_system_network_hub$"
 concept_pd_network_hub_desc: "Otorga numerosos puestos de trabajo según el nivel de capital y los ['concept_pd_moonbases', Puestos Planetarios] construidos en el sistema solar.\n\n§L$d_pd_solar_system_network_hub_desc$§!"
