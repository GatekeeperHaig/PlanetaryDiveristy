 trait_pc_pd_superbloom_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_supraglacial_lakes: "冰湖星球"
 pc_pd_supraglacial_lakes_desc: "拥有氮氧大气层的极寒冰雪世界。这颗星球的表面绝大部分处于封冻状态，但在厚厚的冰川冰盖之上汇聚着巨大的融水湖泊，点缀着这片冰封的大地。在季节性太阳照射的维持下，这些冰上湖泊广泛分布于整个星球的地表。"
 pc_pd_supraglacial_lakes_adj: "冰川"
