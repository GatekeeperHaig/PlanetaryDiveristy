l_french:

###Colonies sous Dôme
#Mégastructure
 pd_domed_colony_0: "Colonie sous Dôme"
 pd_domed_colony_0_DESC: "Cette planète recèle le potentiel pour la terraformation. En établissant une Colonie sous Dôme, nous pouvons créer une tête de pont servant de base à la transformation progressive de l'environnement planétaire."
 pd_domed_colony_0_MEGASTRUCTURE_DETAILS: "Une §YColonie sous Dôme§! est une colonie de dômes d'habitation autosuffisants sur une planète susceptible d'être terraformée."
 requires_terraforming_candidate: "$TRIGGER_FAIL$Doit posséder le modificateur Candidat à la Terraformation."
 requires_correct_planet_class: "$TRIGGER_FAIL$La Classe Planétaire doit permettre la construction d'une Colonie sous Dôme."
 requires_pd_colony: "$TRIGGER_FAIL$Il doit y avoir au moins 1 Colonie Non-Artificielle dans ce système."
 requires_pd_moon_base_site: "$TRIGGER_FAIL$Doit posséder le modificateur Site d'Avant-poste Planétaire."
 pd_domed_base_0: "Avant-poste Planétaire"
 pd_domed_base_0_DESC: "Cette planète inhabitable est un site idéal pour un Avant-poste Planétaire. Elle est destinée à devenir un hub soutenant les colonies voisines dans le système solaire."
 pd_domed_base_0_MEGASTRUCTURE_DETAILS: "Un §YAvant-poste Planétaire§! est une base autosuffisante de valeur stratégique sur une planète inhabitable. Bien que trop petite pour une colonisation permanente, elle renforce l'économie du système local."
 TARGET_DOME_BASE_NAME: "[FROM.from.planet.GetName] Base"

#Info-bulles Vanilla Manquantes
 mod_job_angler_per_pop: "§G+1§! £job_angler£ Emploi $job_angler$ par $VALUE$ Habitants"
 mod_job_angler_per_pop_short: "\n§G+1§! £mod_job_angler_add£ par $VALUE$ £pop£"

#Classes Planétaires
 #Colonies
 pc_pd_domed_colony_barren: "Colonie sous Dôme Aride"
 pc_pd_domed_colony_barren_desc: "Monde aride et rocheux avec une atmosphère mince ou inexistante. La surface est couverte de cratères d'impact météoritique et totalement dépourvue de vie. Des colonies sous dôme ont été construites en surface, permettant une habitation permanente."
 pc_pd_domed_colony_barren_adj: "sous dôme"
 mod_pc_pd_domed_colony_barren_habitability: "Placeholder/Should not see."
 trait_pc_pd_domed_colony_barren_preference: "Placeholder/Should not see."
 trait_pc_pd_domed_colony_barren_preference_desc: "Placeholder/Should not see."
 pc_pd_domed_colony_barren_cold: "$pc_pd_domed_colony_barren$"
 pc_pd_domed_colony_barren_cold_desc: "$pc_pd_domed_colony_barren_desc$"
 pc_pd_domed_colony_barren_cold_adj: "$pc_pd_domed_colony_barren_adj$"
 mod_pc_pd_domed_colony_barren_cold_habitability: "Placeholder/Should not see."
 trait_pc_pd_domed_colony_barren_cold_preference: "Placeholder/Should not see."
 trait_pc_pd_domed_colony_barren_cold_preference_desc: "Placeholder/Should not see."
 pc_pd_domed_colony_frozen: "Colonie sous Dôme Gelée"
 pc_pd_domed_colony_frozen_desc: "Un monde rocheux recouvert d'une épaisse couche de glace permanente. Les basses températures et l'atmosphère mince excluent l'existence de vie en surface. Des colonies sous dôme ont été construites en surface, permettant une habitation permanente."
 pc_pd_domed_colony_frozen_adj: "$pc_pd_domed_colony_barren_adj$"
 mod_pc_pd_domed_colony_frozen_habitability: "Placeholder/Should not see."
 trait_pc_pd_domed_colony_frozen_preference: "Placeholder/Should not see."
 trait_pc_pd_domed_colony_frozen_preference_desc: "Placeholder/Should not see."
 pc_pd_domed_colony_toxic: "Colonie sous Dôme Toxique"
 pc_pd_domed_colony_toxic_desc: "Ce monde est une planète rocheuse avec une atmosphère épaisse létale pour toutes les formes de vie supérieures connues. De grandes cités flottantes sous dôme au-dessus des nuages toxiques permettent une habitation permanente."
 pc_pd_domed_colony_toxic_adj: "$pc_pd_domed_colony_barren_adj$"
 mod_pc_pd_domed_colony_toxic_habitability: "Placeholder/Should not see."
 trait_pc_pd_domed_colony_toxic_preference: "Placeholder/Should not see."
 trait_pc_pd_domed_colony_toxic_preference_desc: "Placeholder/Should not see."
 pc_pd_domed_colony_superhabitable: "Colonie sous Dôme Superhabitable"
 pc_pd_domed_colony_superhabitable_desc: "Monde superhabitable aride et rocheux avec une atmosphère mince ou inexistante, la surface totalement dépourvue de vie et couverte de cratères d'impact météoritique. Des colonies sous dôme ont été construites en surface, permettant une habitation permanente."
 pc_pd_domed_colony_superhabitable_adj: "$pc_pd_domed_colony_barren_adj$"
 mod_pc_pd_domed_colony_superhabitable_habitability: "Placeholder/Should not see."
 trait_pc_pd_domed_colony_superhabitable_preference: "Placeholder/Should not see."
 trait_pc_pd_domed_colony_superhabitable_preference_desc: "Placeholder/Should not see."
 pc_pd_domed_colony_tidally_locked: "Colonie sous Dôme Verrouillée par Marée"
 pc_pd_domed_colony_tidally_locked_desc: "Monde verrouillé par marée aride et rocheux avec une atmosphère mince ou inexistante, la surface totalement dépourvue de vie et couverte de cratères d'impact météoritique. Des colonies sous dôme ont été construites en surface, permettant une habitation permanente."
 pc_pd_domed_colony_tidally_locked_adj: "$pc_pd_domed_colony_barren_adj$"
 mod_pc_pd_domed_colony_tidally_locked_habitability: "Placeholder/Should not see."
 trait_pc_pd_domed_colony_tidally_locked_preference: "Placeholder/Should not see."
 trait_pc_pd_domed_colony_tidally_locked_preference_desc: "Placeholder/Should not see."
 pc_pd_domed_colony_cave: "Colonie sous Dôme Caverneuse"
 pc_pd_domed_colony_cave_desc: "Monde caverneux aride et rocheux avec une atmosphère mince ou inexistante, la surface totalement dépourvue de vie et couverte de cratères d'impact météoritique. Des colonies sous dôme ont été construites en surface, permettant une habitation permanente."
 pc_pd_domed_colony_cave_adj: "$pc_pd_domed_colony_barren_adj$"
 mod_pc_pd_domed_colony_cave_habitability: "Placeholder/Should not see."
 trait_pc_pd_domed_colony_cave_preference: "Placeholder/Should not see."
 trait_pc_pd_domed_colony_cave_preference_desc: "Placeholder/Should not see."
 #Habitats

#Modificateurs
 hab_terraforming_candidate: "Candidat à la Terraformation"
 hab_terraforming_candidate_desc: "Bien qu'aride et dépourvue de vie, cette planète possède de l'eau sous forme gelée et a peut-être autrefois abrité un écosystème florissant. Avec la technologie appropriée, elle pourrait être terraformée en un monde habitable."
 pd_domed_colony: "Colonie sous Dôme"
 pd_domed_colony_desc: "Les résidents de la colonie vivent sous un réseau avancé de dômes protecteurs, les protégeant des conditions inhospitalières de la planète. Bien qu'offrant sécurité, ces structures exigent des coûts d'entretien et d'expansion élevés."
 pd_moon_base_trade: "Avant-poste Lunaire Commercial"
 pd_moon_base_trade_desc: "Des quartiers commerciaux, entrepôts et spatioports peuplent ce réseau avancé de dômes protecteurs, l'établissant comme un hub commercial animé. Connecté à sa planète mère, cet avant-poste sous dôme dépend du lien vital avec le monde habitable voisin pour survivre."
 pd_moon_base_military: "Avant-poste Lunaire Militaire"
 pd_moon_base_military_desc: "Des armureries, casernes et rampes de lancement dominent le paysage autour de ce réseau avancé de dômes protecteurs. Cet avant-poste sous dôme dépend du monde habitable voisin pour le soutien logistique."
 pd_moon_base_factory: "Avant-poste Lunaire Industriel"
 pd_moon_base_factory_desc: "Des usines, ateliers artisanaux et centres de fabrication constituent le cœur battant de ce réseau avancé de dômes protecteurs. Lié au monde habitable voisin, il dépend de cette connexion pour ses ressources et la distribution de ses produits manufacturés."
 pd_moon_base_foundry: "Avant-poste Lunaire de Fonderie"
 pd_moon_base_foundry_desc: "Des fonderies et des unités de traitement d'alliages sont au cœur de ce réseau avancé de dômes protecteurs. Étroitement lié à sa planète mère, cet avant-poste sous dôme dépend de la connexion essentielle avec le monde habitable voisin pour les matières premières et l'exportation de ses alliages finis."
 pd_moon_base_admin: "Avant-poste Lunaire Administratif"
 pd_moon_base_admin_desc: "Des bureaux gouvernementaux et agences bureaucratiques remplissent ce réseau avancé de dômes protecteurs. Lié à sa planète mère, cet avant-poste sous dôme dépend de la connexion cruciale avec le monde habitable voisin pour ses fournitures et sa maintenance."
 pd_moon_base_priest: "Avant-poste Lunaire Ecclésiastique"
 pd_moon_base_priest_desc: "Des temples et sanctuaires occupent ce réseau avancé de dômes protecteurs, le distinguant comme un centre spirituel pour les fidèles. Cet avant-poste sous dôme est lié à sa planète mère et dépend de la connexion sacrée avec le monde habitable voisin."
 pd_domed_base_research: "Avant-poste Planétaire de Recherche"
 pd_domed_base_research_desc: "Des laboratoires et des installations de recherche dominent ce réseau avancé de dômes protecteurs. Il est rattaché aux planètes du système solaire et dépend de ce lien pour les ressources essentielles."
 pd_domed_base_mining: "Avant-poste Planétaire Minier"
 pd_domed_base_mining_desc: "Des mines et des installations d'extraction constituent l'épine dorsale de ce réseau avancé de dômes protecteurs. Il est ancré aux planètes du système solaire, s'appuyant sur cette connexion pour l'approvisionnement en ressources essentielles et l'expédition des matériaux extraits."
 pd_domed_base_energy: "Avant-poste Planétaire Générateur"
 pd_domed_base_energy_desc: "Des centrales électriques et des convertisseurs d'énergie forment le cœur de ce réseau avancé de dômes protecteurs. Lié aux planètes du système solaire, il dépend de cette connexion pour les ressources vitales et la distribution des crédits énergétiques."
 pd_domed_base_food: "Avant-poste Planétaire Hydroponique"
 pd_domed_base_food_desc: "Des fermes hydroponiques et des modules agricoles s'étendent dans ce réseau avancé de dômes protecteurs. Connecté aux planètes du système solaire, il dépend de cette connexion pour ses fournitures et la dissémination des approvisionnements alimentaires."
 pd_domed_moonbase_site_1: "Site de Base Lunaire"
 pd_domed_moonbase_site_1_desc: "Cette lune est idéale pour établir un Avant-poste Planétaire, mais elle nécessite une planète colonisée dans le système solaire pour assurer son approvisionnement et sa durabilité."
 pd_domed_research_site_1: "Site Potentiel d'Avant-poste de Recherche Planétaire"
 pd_domed_research_site_1_desc: "Ce planétoïde est idéal pour établir un Avant-poste de Recherche sous Dôme mais nécessite une planète colonisée dans le système solaire pour assurer son approvisionnement et sa durabilité."
 pd_domed_mining_site_1: "Site Potentiel d'Avant-poste Minier Planétaire"
 pd_domed_mining_site_1_desc: "Ce planétoïde est idéal pour établir un Avant-poste Minier sous Dôme mais nécessite une planète colonisée dans le système solaire pour assurer son approvisionnement et sa durabilité."
 pd_domed_food_site_1: "Site Potentiel d'Avant-poste Hydroponique Planétaire"
 pd_domed_food_site_1_desc: "Ce planétoïde est idéal pour établir un Avant-poste Hydroponique sous Dôme mais nécessite une planète colonisée dans le système solaire pour assurer son approvisionnement et sa durabilité."
 pd_domed_energy_site_1: "Site Potentiel d'Avant-poste Générateur Planétaire"
 pd_domed_energy_site_1_desc: "Ce planétoïde est idéal pour établir un Avant-poste Générateur sous Dôme mais nécessite une planète colonisée dans le système solaire pour assurer son approvisionnement et sa durabilité."

#Gisements
 #Gisements de Terraformation
 d_phab_energy_1: "Isotopes Radioactifs"
 d_phab_energy_1_desc: "Ce site présente une riche veine d'isotopes radioactifs, facilement accessibles et idéaux pour la production d'énergie efficace."
 d_phab_energy_2: "Lacs de Gaz Gelés"
 d_phab_energy_2_desc: "D'anciens gaz solidifiés sous une pression immense dans ces lacs glacés créent un réservoir unique et précieux de ressources gelées."
 d_phab_energy_3: "Évents Souterrains"
 d_phab_energy_3_desc: "Des sédiments métallifères et des eaux souterraines surchauffées se combinent dans une réaction volatile, produisant des évents chimiques riches en énergie propices à la production de puissance."
 d_phab_mining_1: "Champs Minéraux"
 d_phab_mining_1_desc: "Un soulèvement géologique a exposé ces précieux minéraux à la surface planétaire il y a longtemps."
 d_phab_mining_2: "Cavernes Riches en Minerai"
 d_phab_mining_2_desc: "Ces grottes profondes regorgent de gisements de minerai métallique et minéral."
 d_phab_mining_3: "Montagne Riche"
 d_phab_mining_3_desc: "Ces flancs de montagne brillent de riches ressources en minerai et pierres précieuses."
 d_phab_food_1: "Gisement d'Azote"
 d_phab_food_1_desc: "Des gisements d'azote dispersés sur cette planète pourraient être vitaux pour transformer son terrain en terres fertiles pour la production alimentaire après la terraformation."
 d_phab_food_2: "Gisement de Phosphore"
 d_phab_food_2_desc: "Des gisements de phosphore dispersés sur cette planète pourraient être vitaux pour transformer son terrain en terres fertiles pour la production alimentaire après la terraformation."
 d_phab_food_3: "Gisement de Potassium"
 d_phab_food_3_desc: "Des gisements de potassium dispersés sur cette planète pourraient être vitaux pour transformer son terrain en terres fertiles pour la production alimentaire après la terraformation."
 d_pd_solar_system_network_hub: "Hub du Réseau Intrasolaire"
 d_pd_solar_system_network_hub_desc: "Ce hub est un lien vital pour les avant-postes planétaires de ce système solaire. Alors que les bases offrent emploi et hébergement, la colonie centrale fournit les fournitures et ressources essentielles pour maintenir les opérations."

#Technologie
 tech_pd_domed_colonies: "Habitation sous Dôme"
 tech_pd_domed_colonies_desc: "Les avancées technologiques rendent possible l'établissement de colonies sous dôme sur des frontières planétaires auparavant inhospitalières."
 allow_domed_colonies: "§HDébloque les Mégastructures :§! §YColonies sous Dôme§! et §YAvants-postes Planétaires§!"
 allow_domed_colonies_DETAILS: "Cette technologie permettra la construction de Colonies sous Dôme et d'Avants-postes sur certains mondes inhabitables."

#Décisions
 decision_build_solar_system_network_hub: "Construire le $d_pd_solar_system_network_hub$"
 decision_build_solar_system_network_hub_desc: "Nous construirons un hub reliant les Avants-postes Planétaires du système solaire à l'économie de ce monde."
 decision_remove_solar_system_network_hub: "Supprimer le $d_pd_solar_system_network_hub$"
 decision_remove_solar_system_network_hub_desc: "Nous supprimerons le hub reliant les Avants-postes Planétaires du système solaire à l'économie de ce monde."
 decision_change_moon_base: "Remplacer l'Avant-poste Lunaire"
 decision_change_moon_base_desc: "Cela changera l'Avant-poste Planétaire sur cette lune."
 decision_change_moon_base_effects: "Nous pourrons choisir une utilisation différente pour l'Avant-poste Planétaire de cette lune."
 decision_pd_flood_domed_colony: "Inonder la Colonie sous Dôme"
 decision_pd_flood_domed_colony_desc: "Les Colonies sous Dôme pourraient nous être idéales - s'il y avait suffisamment d'eau. Nos réseaux miniers de glace nous permettent de récolter de la glace d'autres corps célestes et d'inonder [This.GetName], en faisant un aquarium sous dôme."

