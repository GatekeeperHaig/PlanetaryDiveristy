#Stripmine
 #Planet Class
 pc_pd_stripmine: "Mina a Cielo Abierto"
 pc_pd_stripmine_desc: "Este planeta es ahora una extensión de profundas operaciones de minería a cielo abierto, su superficie surcada por un laberinto de excavadoras industriales y plataformas de perforación. El ecosistema natural ha sido arruinado en la búsqueda incesante de recursos."
 pc_pd_stripmine_adj: "minero"
 mod_pc_pd_stripmine_habitability: "Habitabilidad de Mina a Cielo Abierto"
 trait_pc_pd_stripmine_preference: "Preferencia de Mina a Cielo Abierto"
 trait_pc_pd_stripmine_preference_desc: "$trait_pc_arctic_preference_desc$"

 #Decision
 decision_pd_aw_stripmine: "Superproyecto Planetario: Mina a Cielo Abierto"
 decision_pd_aw_stripmine_desc: "Podríamos recolectar recursos de cada centímetro de la superficie de este planeta construyendo excavadoras industriales avanzadas y plataformas de perforación. El ecosistema natural sufrirá significativamente en el proceso."
 decision_pd_stripmine_requirements: "£trigger_no£ §RNo puede haber otros distritos salvo§! §Y$district_mining_plural$§!"

