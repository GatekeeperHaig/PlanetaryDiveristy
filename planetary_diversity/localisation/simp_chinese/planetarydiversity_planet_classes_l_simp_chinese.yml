 pc_pd_lilypad: "睡莲星球"
 pc_pd_lilypad_desc: "这颗生机盎然的岩石星球笼罩在浓厚的氮氧大气层中，怀抱中的温暖浅海蕴含着极其丰富的生物群落。而在水面之上，水生植物坚韧的枝叶交织成片，又衍生出了一个构建于水面的次生生态系统。"
 pc_pd_lilypad_adj: "漂浮"
 mod_pc_pd_lilypad_habitability: "热带星球宜居性"
 trait_pc_pd_lilypad_preference: "热带星球偏好"
 trait_pc_pd_lilypad_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_geothermal: "地热星球"
 pc_pd_geothermal_desc: "寒冷冰封的星球，具有氮氧大气层。天然地热喷口加热形成了热带裂谷，打破了连绵的冰原。水圈由融水与地热喷口升腾的蒸汽构成。"
 pc_pd_geothermal_adj: "地热"
 mod_pc_pd_geothermal_habitability: "热带星球宜居性"
 trait_pc_pd_geothermal_preference: "热带星球偏好"
 trait_pc_pd_geothermal_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_biolumen: "生物光星球"
 pc_pd_biolumen_desc: "拥有氮氧大气层的热带岩石世界。大气中含有奇异但无毒的微粒，导致这颗星球几乎终年云层密布。尽管如此，得益于温室效应与地热活动，地表生命依然蓬勃发展。几乎所有的动植物都展现出生物发光的特性。"
 pc_pd_biolumen_adj: "发光"
 mod_pc_pd_biolumen_habitability: "热带星球宜居性"
 trait_pc_pd_biolumen_preference: "热带星球偏好"
 trait_pc_pd_biolumen_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_dune: "沙丘星球"
 pc_pd_dune_desc: "炎热干燥的岩石行星，拥有氮氧大气层。沙海覆盖了相当可观的地表。其水圈主要存在于地下含水层中，仅通过绿洲与山泉涌出。"
 pc_pd_dune_adj: "砂砾"
 mod_pc_pd_dune_habitability: "沙漠星球宜居性"
 trait_pc_pd_dune_preference: "沙漠星球偏好"
 trait_pc_pd_dune_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_oasis: "绿洲星球"
 pc_pd_oasis_desc: "拥有氮氧大气层的岩石星球。其水圈仅能维持一片被植被带环绕的大型水域，而覆盖星球大部分地区的内陆沙漠则往往无缘降雨。"
 pc_pd_oasis_adj: "干燥"
 mod_pc_pd_oasis_habitability: "沙漠星球宜居性"
 trait_pc_pd_oasis_preference: "沙漠星球偏好"
 trait_pc_pd_oasis_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_outback: "荒原星球"
 pc_pd_outback_desc: "炎热干燥的星球，拥有氮氧大气层。地表大部由干旱、半干旱的灌木丛与沙漠组成，仅水源周边植被略显繁茂。其水圈主要集中在少数几片内陆海和天然的地下泉之中。"
 pc_pd_outback_adj: "干涸"
 mod_pc_pd_outback_habitability: "沙漠星球宜居性"
 trait_pc_pd_outback_preference: "沙漠星球偏好"
 trait_pc_pd_outback_preference_desc: "$trait_pc_arctic_preference_desc$"
 pc_pd_coastal: "海岸漠境星球"
 pc_pd_coastal_desc: "拥有氮氧大气的亚热带干燥星球。冰冷深海中的洋流造就了极高的大气稳定性，导致陆地降水稀少，但易生雾气。这些雾气提供了充足的水分，足以滋养各种地衣、多肉植物和灌木。"
 pc_pd_coastal_adj: "海岸荒漠"
 mod_pc_pd_coastal_habitability: "沙漠星球宜居性"
