 trait_pc_pd_domed_colony_toxic_preference_desc: "Placeholder/Should not see."
 pc_pd_domed_colony_superhabitable: "Colonia Bajo Cúpula Superhabitable"
 pc_pd_domed_colony_superhabitable_desc: "Mundo superhabitable árido y rocoso con una atmósfera delgada o inexistente, la superficie completamente desprovista de vida y cubierta de cráteres de impacto de meteoritos. Se han construido colonias bajo cúpula en la superficie, permitiendo la habitación permanente."
 pc_pd_domed_colony_superhabitable_adj: "$pc_pd_domed_colony_barren_adj$"
 mod_pc_pd_domed_colony_superhabitable_habitability: "Placeholder/Should not see."
