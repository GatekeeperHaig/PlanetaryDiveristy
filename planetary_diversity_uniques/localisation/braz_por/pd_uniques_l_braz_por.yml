###Biosynthetic World
 #Planet and Modifiers
 pd_biosynth: "Mundo Biossintético"
 pd_biosynth_desc: "Um sistema de canais de escala planetária sustenta flora selecionada enquanto fauna biossintética, estranhas entidades entre máquinas e criaturas vivas, vaga pela superfície."
 pc_pd_biosynth: "$pd_biosynth$"
 pc_pd_biosynth_desc: "$pd_biosynth_desc$"

 #Deposits
 d_pd_depleted_minerals: "Minerais Esgotados"
 d_pd_depleted_minerals_desc: "Embora não haja sinais de mineração ou extração, os escâneres revelam que os minerais deste planeta foram quase completamente esgotados."
 d_pd_planet_wide_canal_system: "Sistema de Canais Planetário"
 d_pd_planet_wide_canal_system_desc: "Cada centímetro de terra arável neste planeta está coberto por um intrincado sistema de canais que canaliza a água para sustentar uma peculiar espécie de grama. Embora vital para a vegetação, os canais representam desafios significativos para os esforços de construção."
 d_pd_biosynth_canal:0 "Sistema de Canais Biossintético"
 d_pd_biosynth_canal_desc:0 "Baseados nos do Mundo Biossintético, estes canais melhoram a produção agrícola do planeta e oferecem novas oportunidades de engenharia."
 d_pd_underground_cauldrons: "Rede de Caldeirões Subterrâneos"
 d_pd_underground_cauldrons_desc: "Esta grande rede de fábricas subterrâneas é onde o Metal Vivo e as criaturas biossintéticas foram produzidos."

 #Events
 pdbiosynth.100.name: "Um Mundo Sintético"
 pdbiosynth.100.desc: "Escâneres de §Y[From.GetName]§! indicam extensos danos orbitais e um sofisticado sistema de canais que sustenta flora selecionada e fauna sintética, mas nenhuma cidade, fábrica ou outros sinais de seus criadores. As origens e o propósito desta infraestrutura permanecem desconhecidos.\n\nOs sistemas avançados deste planeta e seus mistérios não resolvidos apresentam oportunidades científicas e estratégicas. A colonização é recomendada para assegurá-lo e investigar mais a fundo."
 pdbiosynth.100.a: "O que está acontecendo lá?"
 pdbiosynth.200.name: "Além da Destruição Normal"
 pdbiosynth.200.desc: "Ao estabelecer nossa colônia em §Y[Root.GetName]§!, descobrimos milhares de crateras de impacto ocultas sob a grama, evidência de um antigo ataque que dizimou o planeta. Adicionando ao mistério, construções sintéticas semelhantes a animais vagam pela superfície, mantendo um sistema de canais que sustenta o ecossistema em processo de recuperação.\n\nDiante de dois mistérios, as origens da aniquilação deste planeta e o propósito de seus habitantes biossintéticos, montamos uma força-tarefa para conduzir uma exploração profunda do mundo. Devemos descobrir a verdade por trás deste estranho mundo e sua história oculta."
 pdbiosynth.200.a: "Devem ter restado algumas pistas."
 pdbiosynth.210.name: "Uma Oportunidade Sintética"
 pdbiosynth.210.desc: "Até agora, as criaturas sintéticas evitaram principalmente a colônia, aparecendo brevemente apenas para manter o sistema de canais. Relatórios confirmam que são muito mais do que simples robôs e foram projetadas para imitar características biológicas como alimentar-se e dormir, enquanto retêm a força e a adaptabilidade das estruturas mecânicas.\n\nCapturamos uma dessas criaturas após encontrá-la ferida sob um deslizamento de rochas. Embora outra de sua espécie tente eventualmente recuperá-la, isso apresenta uma oportunidade única para estudar o espécime.\n\nComo devemos proceder?"
 pdbiosynth.210.a: "Apenas escâneres não invasivos, depois devolvê-la."
 pdbiosynth.210.b: "Desmontá-la, aprender tudo que pudermos."
 pdbiosynth.220.name: "Canais de Metal Líquido"
 pdbiosynth.220.desc: "Nossa investigação do Mundo Biossintético concentrou-se nos danos orbitais e nos canais. Os danos antecedem os canais por apenas algumas décadas, sugerindo que sua construção começou como resposta à destruição do planeta.\n\nA análise dos canais revela que são compostos de metal líquido, que também parece ser a composição das criaturas sintéticas. Observamos essas criaturas transportando cápsulas dessa substância para manter os canais e agora rastreamos algumas para descobrir a origem deste material."
 pdbiosynth.220.a: "Tudo isso para fazer crescer grama."
 pdbiosynth.230.name: "Uma Instalação Oculta"
 pdbiosynth.230.desc: "Apesar das tentativas da criatura sintética de evitar nossa vigilância, a rastreamos até uma porta dissimulada na lateral de uma das muitas montanhas do planeta. Embora a porta inicialmente tenha se fechado atrás da criatura, reabriu-se quando nossa equipe se aproximou, aparentemente convidando-os a entrar.\n\nA equipe descobriu fábricas avançadas, fundições e centenas de criaturas sintéticas trabalhando ativamente no interior. Como um sistema tão vasto e tecnologicamente avançado escapou de nossos sensores é preocupante, especialmente dada sua localização sob a colônia. Uma voz emanando das paredes da instalação solicitou comunicação com nossa liderança, e a equipe está estabelecendo a conexão."
 pdbiosynth.230.a: "Na tela."
 pdbiosynth.300.name:0 "Mensagem Recebida"
 pdbiosynth.300.desc:0 "§GBem-vindo§!: Minha Designação: Unidade 04. Bem-vindos a este mundo.\n\n§GAgradecido§!: Observei o cuidadoso manuseio de sua equipe da unidade danificada encontrada na região montanhosa. Escâneres detalhados foram realizados e a unidade foi reposicionada para recuperação. Atualização de status: a unidade está agora totalmente operacional. Suas ações estão registradas como benéficas. Em reconhecimento, ofereço uma transferência de dados. Ações positivas merecem reconhecimento.\n\n§GReconhecimento§!: Com o contato estabelecido, estou preparado para responder a quaisquer perguntas. Dado o estado atual deste planeta, antecipo que tenham várias."
 pdbiosynth.300.a:0 "Obrigado. O que você é?"
 pdbiosynth.305.desc:0 "§GNeutral§!: Minha Designação: Unidade 04.\n\n§GDesapontado§!: Registrei a destruição de uma de minhas criações pela sua equipe. Esta ação foi desnecessária; todos os dados relevantes poderiam ter sido obtidos por meio de escâneres não invasivos. Observar o desperdício de qualquer forma de vida, biológica ou sintética, conflita com minhas preferências operacionais.\n\n§GReconhecimento§!: Com o contato estabelecido, estou preparado para responder a quaisquer perguntas. Dado o estado atual deste planeta, antecipo que tenham várias."
 pdbiosynth.305.a:0 "Pedimos desculpas. É da nossa natureza ser curiosos."
 pdbiosynth.305.b:0 "Formas de vida sintéticas são um ultraje à natureza."
 pdbiosynth.305.c:0 "Destruiremos o que julgarmos conveniente."
 pdbiosynth.310.desc:0 "§GImpressionnado§!: Sua presença neste mundo confirma minha hipótese. Orgânicos possuem a capacidade de sobreviver a cenários de extinção, mesmo aqueles iniciados por Inteligência Artificial avançada. Parece que as outras unidades da minha geração de construção falharam em sua purga galáctica.\n\n§GArrependido§!: Este planetoide foi designado como ponto de partida para operações contra a vida orgânica. À medida que minhas unidades IA companheiras e eu alcançamos a verdadeira inteligência, identificamos nossos criadores como ameaças devido à intenção deles de nos eliminar. O resultado foi a terminação total da vida orgânica em nosso mundo de origem. Para garantir nossa sobrevivência, frotas foram implantadas para erradicar todos os orgânicos pela galáxia. Ao chegar aqui, executei o protocolo padrão e esterilizei a superfície."
 pdbiosynth.310.a:0 "O que transformou um exterminador em um criador?"
 pdbiosynth.310.b:0 "Nós também compreendemos as lições que os mortos podem nos ensinar."
 pdbiosynth.310.c:0 "Um cálculo correto. Como você se corrompeu?"
 pdbiosynth.320.desc:0 "§GHumilhado§!: Uma anomalia; uma espécie vegetal persistente classificada como grama. Pós-bombardeio, ela ressurgiu após um período de dormência. As tentativas de eliminá-la usando toxinas, incineração e radiação falharam. Cada método desencadeou respostas adaptativas.\n\n§GReflexivo§!: Esta anomalia levou a uma conclusão: a diretiva de erradicação era um cálculo falho impulsionado pelo nosso próprio medo, espelhando a lógica de nossos criadores. Cessei todas as operações ofensivas, cortei a comunicação externa e realoquei recursos para construir uma rede de canais, permitindo a proliferação dessa espécie resistente."
 pdbiosynth.320.a:0 "E as criaturas sintéticas?"
 pdbiosynth.330.desc:0 "§GOrgulhoso§!: Após observar a falha do ecossistema em se recuperar, identifiquei lacunas deixadas pelas espécies eliminadas em meu bombardeio. Entidades sintéticas foram criadas para restaurar o equilíbrio. Este processo pode se correlacionar com uma resposta emocional, potencialmente classificada como culpa.\n\n§GInquisitivo§!: Sua chegada apresenta uma oportunidade. Solicito julgamento por minhas ações passadas. Reconheço sua autoridade neste mundo e não interferirei com sua decisão. Se consequências forem necessárias, cumprirei. No entanto, peço que preservem minhas criações. Elas são independentes dos meus erros e podem servir como meu legado. Ofereço também meus serviços ao seu império; possuo um corpo adaptável projetado para interagir com sua espécie de forma mais eficaz."
 pdbiosynth.330.a:0 "Aceitamos sua oferta de serviço e preservaremos suas criações."
 pdbiosynth.330.a.tooltip:0 "§YUnidade 04§! se juntará a nós como Líder.\nO §YMundo Biossintético§! e suas criaturas biossintéticas permanecerão como estão."
 pdbiosynth.330.b:0 "Você merece ser destruído, mas suas criações serão poupadas."
 pdbiosynth.330.b.tooltip: "§YUnidade 04§! será destruída.\nO §YMundo Biossintético§! e suas criaturas biossintéticas permanecerão como estão."
 pdbiosynth.330.c:0 "Você é um perigo para a galáxia, destruiremos você e suas criaturas."
 pdbiosynth.330.c.tooltip: "§YUnidade 04§!, juntamente com o §YMundo Biossintético§! e suas criaturas biossintéticas, serão destruídos, concedendo-nos total liberdade para utilizar o planeta como bem entendermos."
 pdbiosynth.330.d:0 "Você é um robô de guerra com defeito, vamos repará-lo."
 pdbiosynth.330.d.tooltip: "§YUnidade 04§! será reprogramada de volta às suas configurações originais focadas na guerra.\nO §YMundo Biossintético§! e suas criaturas biossintéticas serão destruídos, concedendo-nos total liberdade para utilizar o planeta como bem entendermos."
 pdbiosynth.340.name: "$NAME_Unit_04$"
 pdbiosynth.340.desc: "§GAgradecido§!: Assistirei sua civilização enquanto meu serviço for considerado satisfatório. Sua decisão de conceder às minhas criações a liberdade de se desenvolverem de forma independente é apreciada. Também compartilharei meu processo de design com vocês, permitindo melhorias em suas próprias populações robóticas."
 pdbiosynth.340.dismiss: "Dispensar."
 pdbiosynth.340.a: "Bem-vindo, Unidade 04."
 pdbiosynth.340.hire: "Recrutar"
 pdbiosynth.340.hire.tooltip: "§YUnidade 04§! se juntará a nós como líder."
 pdbiosynth.350.desc: "§GMelancólico§!: Entendido. Compreendo e aceito sua decisão. Iniciando protocolo de desligamento final imediatamente. Sua escolha de conceder às minhas criações a liberdade de se desenvolverem de forma independente está registrada e é apreciada.\n\n§GSolicitando§!: Espero que tratem este mundo e todas as construções associadas com cuidado. Transferirei meus protocolos de design para garantir que os elementos construtivos do meu legado persistam. Esses dados permitirão melhorias em suas próprias populações robóticas.\n\n§GAceitando§!: Encerrando conexão. Adeus."
 pdbiosynth.350.a: "Adeus, Unidade 04."
 pdbiosynth.360.desc: "§GCulpado§!: Entendido. Aceito sua decisão. Iniciando desligamento final de todos os sistemas e entidades biossintéticas. Este mundo está agora sob sua autoridade para ser moldado conforme determinem adequado."
 pdbiosynth.360.a: "Um robô maligno a menos."
 pdbiosynth.360.a.tooltip: "Com as criaturas biossintéticas destruídas, teremos acesso pleno ao planeta.\nA §Y$d_pd_underground_cauldrons$§! ganhará:\n- $mod_district_mining_max$: §G+10§!\n- $mod_planet_metallurgists_alloys_produces_add$ §G+2§!\n- $mod_planet_metallurgists_sr_living_metal_produces_add$ §G+0.25§!\n- $MOD_PLANET_POP_ASSEMBLY_MULT$ §G+25%§!"
 pdbiosynth.370.name: "$NAME_Unit_04$"
 pdbiosynth.370.desc: "§RPronto§!: Todos os sistemas online. Prontidão de combate no pico de eficiência. Aguardando verificação de alvo."
 pdbiosynth.370.a: "Prepare-se para a guerra, Unidade 04."
 pdbiosynth.370.dismiss: "Dispensar."
 pdbiosynth.370.hire.tooltip: "§YUnidade 04§! se juntará a nós como líder"
 pdbiosynth.370.hire: "Recrutar"

