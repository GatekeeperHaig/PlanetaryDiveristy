 tech_biosynth_canals: "Canais Biossintéticos"
 tech_biosynth_canals_desc: "Estudando o sistema de canais presente no Mundo Biossintético, podemos ser capazes de replicar versões menores em outros planetas para melhorar a produção agrícola."
 tech_biosynth_canals_tt_desc: "§HDesbloqueia Decisão:§! $decision_pd_add_biosynth_canal_system$"
